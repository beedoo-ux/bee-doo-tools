<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bee-doo · 🎰 1000er Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#F5C500;--gold2:#FFE066;--bg:#08090f;--bg2:#0e1019;--card:#12141f;--card2:#181b28;--border:#1e2235;--text:#e8ecf4;--dim:#7b87a8;--green:#22c55e;--blue:#3b82f6;--cyan:#06b6d4;--purple:#a855f7;--orange:#f59e0b;--red:#ef4444;--pink:#ec4899}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,#F5C50006 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#22c55e04 0%,transparent 50%);pointer-events:none;z-index:0}

.main{max-width:640px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}

/* Header */
.ch-header{text-align:center;margin-bottom:28px;position:relative}
.ch-badge{display:inline-block;background:linear-gradient(135deg,#F5C500,#f59e0b);color:#1a1200;font-family:'Outfit',sans-serif;font-size:11px;font-weight:800;padding:4px 14px;border-radius:20px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.ch-title{font-family:'Outfit',sans-serif;font-size:clamp(28px,7vw,42px);font-weight:900;line-height:1.1;background:linear-gradient(135deg,var(--gold),var(--gold2),#fff,var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
.ch-subtitle{font-size:13px;color:var(--dim);margin-top:8px;font-weight:500}
.ch-prize{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.ch-prize-tag{background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--gold)}

/* Month Selector */
.ch-months{display:flex;justify-content:center;gap:6px;margin-bottom:24px}
.ch-month-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .15s}
.ch-month-btn:hover{border-color:var(--gold);color:var(--text)}
.ch-month-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* Big Counter */
.counter-wrap{position:relative;margin-bottom:24px}
.counter-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 20px;text-align:center;position:relative;overflow:hidden}
.counter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--green),var(--gold));background-size:200% 100%;animation:gradientSlide 3s linear infinite}
@keyframes gradientSlide{to{background-position:200% 0}}
.counter-label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.counter-big{font-family:'Outfit',sans-serif;font-size:clamp(56px,14vw,80px);font-weight:900;line-height:1;color:var(--gold)}
.counter-of{font-size:14px;color:var(--dim);margin-top:4px;font-weight:600}
.counter-remaining{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-top:8px}
.counter-remaining em{font-style:normal;color:var(--gold)}

/* Progress Bar */
.progress-wrap{margin-top:16px}
.progress-bar{height:20px;background:var(--bg);border-radius:10px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--gold),var(--green));transition:width 1s ease;position:relative}
.progress-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:40px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2));animation:progressShine 2s ease-in-out infinite}
@keyframes progressShine{0%,100%{opacity:0}50%{opacity:1}}
.progress-pct{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:800;color:var(--bg);z-index:2}
.progress-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--dim);font-weight:600}

/* Time left */
.time-card{display:flex;gap:6px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.time-seg{background:var(--card2);border-radius:8px;padding:6px 10px;text-align:center;min-width:52px}
.time-val{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--text)}
.time-unit{font-size:9px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.time-sep{color:var(--border);font-size:16px;align-self:center}

/* Rate info */
.rate-row{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.rate-pill{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--dim)}
.rate-pill b{color:var(--text);font-weight:700}

/* Leaderboard */
.lb-section{margin-top:24px}
.lb-title{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:center}
.lb-list{display:flex;flex-direction:column;gap:6px}
.lb-card{display:grid;grid-template-columns:36px 1fr auto;gap:10px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;transition:all .2s}
.lb-card.qualified{border-color:var(--gold);background:linear-gradient(135deg,var(--card),#F5C50008)}
.lb-card.qualified::after{content:'🎰';position:absolute;right:8px;top:4px;font-size:12px}
.lb-card{position:relative}
.lb-pos{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;text-align:center;color:var(--dim)}
.lb-card:nth-child(1) .lb-pos{color:var(--gold);font-size:20px}
.lb-card:nth-child(2) .lb-pos{color:#94a3b8;font-size:18px}
.lb-card:nth-child(3) .lb-pos{color:#cd7f32;font-size:18px}
.lb-info{min-width:0}
.lb-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-detail{font-size:11px;color:var(--dim);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.lb-detail span{display:flex;align-items:center;gap:2px}
.lb-bar{height:3px;background:var(--bg);border-radius:2px;margin-top:4px;overflow:hidden}
.lb-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.lb-right{text-align:right}
.lb-count{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:var(--green)}
.lb-card:nth-child(1) .lb-count{font-size:26px;color:var(--gold)}
.lb-los{font-size:9px;font-weight:700;color:var(--gold);margin-top:2px}
.lb-progress-txt{font-size:9px;color:var(--dim);margin-top:2px}

/* Ticket visual */
.los-visual{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#F5C500,#f59e0b);color:#1a1200;font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}

/* Footer */
.ch-footer{text-align:center;margin-top:28px;padding-top:16px;border-top:1px solid var(--border)}
.ch-footer-line{font-size:11px;color:var(--dim)}
.ch-footer a{color:#5a6a8a;text-decoration:none;border-bottom:1px solid #2a3050}
.ch-footer a:hover{color:var(--gold)}
.ch-back{display:inline-flex;align-items:center;gap:6px;color:var(--dim);text-decoration:none;font-size:12px;font-weight:600;margin-bottom:16px;transition:color .2s}
.ch-back:hover{color:var(--gold)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeUp .4s ease both}
.fd1{animation-delay:.05s}.fd2{animation-delay:.1s}.fd3{animation-delay:.15s}.fd4{animation-delay:.2s}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:13px;color:var(--dim);font-weight:500}

/* Mobile */
@media(max-width:480px){
.main{padding:14px 10px 50px}
.counter-big{font-size:52px}
.lb-card{grid-template-columns:30px 1fr auto;gap:8px;padding:10px 12px}
.lb-name{font-size:13px}
.lb-count{font-size:18px}
.lb-card:nth-child(1) .lb-count{font-size:22px}
.ch-prize-tag{font-size:11px;padding:5px 10px}
.time-seg{min-width:44px;padding:5px 8px}
.time-val{font-size:16px}
}
</style>
</head>
<body>
<div class="main" id="app">
<div class="loading"><div class="loader"></div><div class="load-text">Lade Challenge-Daten...</div></div>
</div>

<script>
(function(){
var SB='https://hqzpemfaljxcysyqssng.supabase.co';
var AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
var hd={apikey:AK,Authorization:'Bearer '+AK};
var GOAL=1000;
var MN=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var MONTHS=['2026-03','2026-04','2026-05'];
var curMonth=MONTHS[0]; // Default to March
var cache={};

// Find current challenge month
var now=new Date();
var nowKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
if(MONTHS.indexOf(nowKey)>=0) curMonth=nowKey;

function sn(f){var p=(f||'?').trim().split(/\s+/);if(p.length<2)return p[0];var particles=['van','von','de','den','der','del','di','la','le','ter'];var first=p[0];if(first.indexOf('-')>0){var hp2=first.split('-');first=hp2[0]+'-'+hp2[1][0].toUpperCase()+'.';}if(p.length>=3&&particles.indexOf(p[1].toLowerCase())>=0)return first+' '+p[1][0].toLowerCase()+'.';return first+' '+p[p.length-1][0].toUpperCase()+'.';}

function getWorkingDays(year,m){
    var first=new Date(year,m-1,1),last=new Date(year,m,0);
    var total=0,elapsed=0,today=new Date();
    today.setHours(0,0,0,0);
    for(var d=new Date(first);d<=last;d.setDate(d.getDate()+1)){
        var dow=d.getDay();
        if(dow!==0&&dow!==6){total++;if(d<=today)elapsed++;}
    }
    return{total:total,elapsed:Math.min(elapsed,total)};
}

function getDaysLeft(year,m){
    var last=new Date(year,m,0);
    var now2=new Date();
    var diff=last.getTime()-now2.getTime();
    if(diff<0)return{d:0,h:0,m:0,over:true};
    var d2=Math.floor(diff/86400000);
    var h2=Math.floor((diff%86400000)/3600000);
    var m2=Math.floor((diff%3600000)/60000);
    return{d:d2,h:h2,m:m2,over:false};
}

async function loadMonth(monthKey){
    if(cache[monthKey])return cache[monthKey];
    // Fetch directly from Leveto via serverless function
    var resp=await fetch('/api/challenge-leads?month='+monthKey);
    var data=await resp.json();
    if(data.error)throw new Error(data.error+': '+(data.details||''));
    var result={
        total:data.total,
        byPerson:data.byPerson||[],
        allLeads:data.allLeadsCount||0,
        fetchedAt:data.fetchedAt
    };
    cache[monthKey]=result;
    return result;
}

function render(data){
    var sp=curMonth.split('-');
    var yr=+sp[0],mo=+sp[1];
    var monatName=MN[mo-1]+' '+yr;
    var remaining=GOAL-data.total;
    if(remaining<0)remaining=0;
    var pct=Math.min(100,Math.round(data.total/GOAL*100));
    var tl=getDaysLeft(yr,mo);
    var wd=getWorkingDays(yr,mo);

    // Rates
    var daysElapsed=wd.elapsed||1;
    var ratePerDay=(data.total/daysElapsed).toFixed(1);
    var needed=remaining>0&&wd.total>wd.elapsed?Math.ceil(remaining/(wd.total-wd.elapsed)):0;

    // Month buttons
    var monthBtns='';
    MONTHS.forEach(function(m){
        var msp=m.split('-');
        var label=MN[+msp[1]-1].substring(0,3);
        monthBtns+='<button class="ch-month-btn'+(m===curMonth?' active':'')+'" data-m="'+m+'">'+label+' '+msp[0]+'</button>';
    });

    // Leaderboard (ohne "kein Berater" – werden aber oben im Total mitgezählt)
    var visiblePersons=data.byPerson.filter(function(p){return p.n&&p.n!=='(kein Berater)';});
    var maxP=visiblePersons.length?visiblePersons[0].total:1;
    var cards='';
    visiblePersons.forEach(function(p,i){
        var pos=i+1;
        var qualified=p.total>=25;
        var losCount=Math.floor(p.total/25);
        var toNextLos=25-(p.total%25);
        var barW=Math.round(p.total/Math.max(maxP,1)*100);
        var barColor=qualified?'var(--gold)':'var(--green)';

        var losHtml='';
        if(qualified){
            losHtml='<div class="los-visual">🎰 '+losCount+'× Los</div>';
            if(toNextLos<25) losHtml+='<div class="lb-progress-txt" style="font-size:11px;margin-top:2px">noch '+toNextLos+' → '+(losCount+1)+'. Los</div>';
        }else{
            losHtml='<div class="lb-progress-txt">'+(25-p.total)+' bis zum Los</div>';
        }

        cards+='<div class="lb-card'+(qualified?' qualified':'')+' fade-in" style="animation-delay:'+Math.min(i,20)*0.03+'s">'
            +'<div class="lb-pos">'+pos+'</div>'
            +'<div class="lb-info">'
                +'<div class="lb-name">'+sn(p.n)+'</div>'
                +'<div class="lb-detail">'
                    +'<span>🎯 '+p.el+' EL</span>'
                    +'<span>🤝 '+p.emp+' Emp</span>'
                    +'<span style="color:var(--dim)">📊 '+p.allLeads+' Leads ges.</span>'
                +'</div>'
                +'<div class="lb-bar"><div class="lb-bar-fill" style="width:'+barW+'%;background:'+barColor+'"></div></div>'
            +'</div>'
            +'<div class="lb-right">'
                +'<div class="lb-count">'+p.total+'</div>'
                +losHtml
            +'</div>'
        +'</div>';
    });

    if(!visiblePersons.length){
        cards='<div style="text-align:center;padding:32px;color:var(--dim)">Noch keine Eigenleads / Empfehlungen in '+monatName+'</div>';
    }

    // Count qualified (nur sichtbare Personen für Lose)
    var qualifiedCount=visiblePersons.filter(function(p){return p.total>=25}).length;
    var totalLose=visiblePersons.reduce(function(s,p){return s+Math.floor(p.total/25)},0);

    var isOver=tl.over;
    var goalReached=data.total>=GOAL;

    var html='<a href="vt-ranking.html" class="ch-back fade-in">← Zurück zum Ranking</a>'
        +'<div class="ch-header fade-in">'
            +'<div class="ch-badge">🏆 Challenge März – Mai 2026</div>'
            +'<div class="ch-title">1.000er Challenge</div>'
            +'<div class="ch-subtitle">1.000 Eigenleads + Empfehlungen pro Monat</div>'
            +'<div class="ch-prize">'
                +'<div class="ch-prize-tag">🎰 2 × 5.000€ Verlosung</div>'
                +'<div class="ch-prize-tag">🎟️ Ab 25 pro Kopf = 1 Los</div>'
            +'</div>'
        +'</div>'

        +'<div class="ch-months fade-in fd1">'+monthBtns+'</div>'

        +'<div class="counter-wrap fade-in fd2">'
            +'<div class="counter-card">'
                +'<div class="counter-label">'+monatName+'</div>'
                +'<div class="counter-big">'+data.total+'</div>'
                +'<div class="counter-of">von '+GOAL.toLocaleString('de-DE')+' Eigenleads + Empfehlungen</div>'
                +'<div class="counter-remaining">'+(goalReached?'🎉 <em>ZIEL ERREICHT!</em> 🎉':'Noch <em>'+remaining.toLocaleString('de-DE')+'</em> bis zum Ziel')+'</div>'

                +'<div class="progress-wrap">'
                    +'<div class="progress-bar">'
                        +'<div class="progress-fill" style="width:'+Math.max(pct,1)+'%"></div>'
                        +(pct>=8?'<div class="progress-pct" style="right:'+(100-pct+1)+'%">'+pct+'%</div>':'')
                    +'</div>'
                    +'<div class="progress-labels"><span>0</span><span>250</span><span>500</span><span>750</span><span>1.000</span></div>'
                +'</div>'

                +(!isOver?'<div class="time-card">'
                    +'<div class="time-seg"><div class="time-val">'+tl.d+'</div><div class="time-unit">Tage</div></div>'
                    +'<div class="time-sep">:</div>'
                    +'<div class="time-seg"><div class="time-val">'+tl.h+'</div><div class="time-unit">Std</div></div>'
                    +'<div class="time-sep">:</div>'
                    +'<div class="time-seg"><div class="time-val">'+tl.m+'</div><div class="time-unit">Min</div></div>'
                    +'<div class="time-seg" style="margin-left:8px"><div class="time-val">'+wd.elapsed+'/'+wd.total+'</div><div class="time-unit">Arbeitstage</div></div>'
                +'</div>':'')

                +'<div class="rate-row">'
                    +'<div class="rate-pill">ø <b>'+ratePerDay+'</b> / Tag</div>'
                    +(needed>0?'<div class="rate-pill">Nötig: <b>'+needed+'</b> / Tag</div>':'')
                    +'<div class="rate-pill">🎰 <b>'+totalLose+'</b> Lose vergeben</div>'
                +'</div>'
            +'</div>'
        +'</div>'

        +'<div class="lb-section fade-in fd3">'
            +'<div class="lb-title">🏅 Eigenleads + Empfehlungen pro Vertriebler · '+monatName+'</div>'
            +'<div class="lb-list">'+cards+'</div>'
        +'</div>'

        +'<div class="ch-footer fade-in fd4">'
            +'<div class="ch-footer-line">bee-doo GmbH · Geschäftsführer: O. Schader, P. Grabowski</div>'
            +'<div style="margin-top:6px;font-size:10px;color:#4a5578">Stand: '+new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})+' · <span style="color:var(--gold)">⚡ Live</span></div>'
            +'<div style="margin-top:8px;font-size:10px"><a href="https://bee-doo.de/impressum/" target="_blank">Impressum</a> · <a href="https://bee-doo.de/datenschutzerklaerung/" target="_blank">Datenschutzerklärung</a></div>'
        +'</div>';

    document.getElementById('app').innerHTML=html;

    // Bind month buttons
    document.querySelectorAll('.ch-month-btn').forEach(function(b){
        b.addEventListener('click',function(){
            curMonth=this.getAttribute('data-m');
            init();
        });
    });
}

async function init(){
    document.getElementById('app').innerHTML='<div class="loading"><div class="loader"></div><div class="load-text">Lade Challenge-Daten...</div></div>';
    try{
        var data=await loadMonth(curMonth);
        render(data);
    }catch(e){
        document.getElementById('app').innerHTML='<div class="loading"><div class="load-text" style="color:var(--red)">Fehler beim Laden: '+e.message+'</div></div>';
    }
}

// Auto-refresh every 2 minutes
setInterval(function(){
    delete cache[curMonth];
    init();
},120000);

init();
})();
</script>
</body>
</html>
