<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bee-doo | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root{--a:#F5C500;--ad:rgba(245,197,0,.12);--bg:#08090d;--c:#111219;--ch:#16171f;--el:#1a1b24;--b:rgba(255,255,255,.06);--ba:rgba(245,197,0,.2);--t:#d8dae2;--td:#6b7280;--tb:#f3f4f6;--g:#22c55e;--gd:rgba(34,197,94,.12);--r:#ef4444;--rd:rgba(239,68,68,.12);--o:#f59e0b;--od:rgba(245,158,11,.12);--bl:#3b82f6;--bld:rgba(59,130,246,.12);--p:#a855f7;--pd:rgba(168,85,247,.12);--cy:#06b6d4;--cyd:rgba(6,182,212,.12)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes sp{to{transform:rotate(360deg)}}
        .fi{animation:fi .3s ease-out}.spinner{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
        /* Header */
        .hdr{padding:12px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(245,197,0,.02) 0%,transparent 100%)}
        .hdr-l{display:flex;align-items:center;gap:14px}.logo{display:flex;align-items:center;gap:10px}
        .logo img{height:26px}.logo span{font-size:14px;color:var(--td);font-weight:400}
        .hdr-r{display:flex;align-items:center;gap:10px}
        .hdr-lk{font-size:11px;color:var(--td);text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid var(--b);transition:all .2s}.hdr-lk:hover{color:var(--a);border-color:var(--ba)}
        /* Top Nav */
        .topnav{display:flex;gap:0;border-bottom:2px solid var(--b);background:var(--bg);padding:0 28px;overflow-x:auto}
        .topnav-item{display:flex;align-items:center;gap:10px;padding:14px 24px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;position:relative}
        .topnav-item:hover{background:rgba(255,255,255,.02)}.topnav-item.on{border-bottom-color:var(--a)}
        .topnav-icon{font-size:20px}.topnav-label{font-size:14px;font-weight:600;color:var(--td)}.topnav-item.on .topnav-label{color:var(--a)}
        .topnav-badge{font-size:10px;background:var(--ad);color:var(--a);padding:2px 7px;border-radius:10px;font-weight:700}
        /* Content */
        .mn{max-width:1440px;margin:0 auto;padding:20px 28px}
        .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:20px}
        .kpi{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:14px 16px;transition:all .2s;position:relative;overflow:hidden}
        .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .3s}.kpi:hover::before{opacity:1}
        .kpi-l{font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.kpi-v{font-size:24px;font-weight:700}.kpi-s{font-size:10px;margin-top:2px}
        .cd{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:18px;margin-bottom:14px}
        .cd-t{font-size:14px;font-weight:600;color:var(--tb);display:flex;align-items:center;gap:8px;margin-bottom:12px}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
        .mt{width:100%;border-collapse:collapse;font-size:12px}.mt th{text-align:left;padding:8px 10px;color:var(--td);font-size:9px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b)}
        .mt td{padding:7px 10px;border-bottom:1px solid var(--b)}.mt tr:last-child td{border:none}.mt tr:hover td{background:rgba(255,255,255,.015)}
        .tg{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
        .tg-r{background:var(--rd);color:var(--r)}.tg-o{background:var(--od);color:var(--o)}.tg-g{background:var(--gd);color:var(--g)}.tg-b{background:var(--bld);color:var(--bl)}.tg-p{background:var(--pd);color:var(--p)}.tg-a{background:var(--ad);color:var(--a)}.tg-c{background:var(--cyd);color:var(--cy)}
        .bar-h{height:7px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.04)}.bar-f{height:100%;border-radius:4px;transition:width .5s ease}
        .btn{padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
        .bo{background:transparent;color:var(--t);border:1px solid var(--b)}.bo:hover{border-color:var(--ba);color:var(--a)}
        .bsm{padding:5px 10px;font-size:10px}
        .lnk{color:var(--a);text-decoration:none;font-size:11px;display:inline-flex;align-items:center;gap:4px;opacity:.7;transition:opacity .2s}.lnk:hover{opacity:1}
        .empty{text-align:center;padding:30px;color:var(--td);font-size:13px}
        .sub-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--el);border-radius:8px;padding:3px;overflow-x:auto}
        .sub-tab{padding:8px 16px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--td);transition:all .2s;white-space:nowrap}.sub-tab:hover{color:var(--t)}.sub-tab.on{background:var(--c);color:var(--a);font-weight:600}
        .days-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
        .days-ok{background:var(--gd);color:var(--g)}.days-warn{background:var(--od);color:var(--o)}.days-danger{background:var(--rd);color:var(--r)}
        @media(max-width:1100px){.g2,.g3{grid-template-columns:1fr}}
        @media(max-width:768px){.mn{padding:12px}.topnav{padding:0 12px}.topnav-item{padding:10px 16px}.kpis{grid-template-columns:repeat(2,1fr)}.hdr{padding:10px 14px}.topnav-label{font-size:12px}}
        @media(max-width:480px){.kpis{grid-template-columns:1fr 1fr}.kpi-v{font-size:20px}.topnav-item{padding:8px 12px}.topnav-icon{font-size:16px}}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;
const SU='https://hqzpemfaljxcysyqssng.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const ap=t=>`${SU}/rest/v1/${t}`;
const hd=()=>({apikey:SK,Authorization:`Bearer ${SK}`,'Content-Type':'application/json'});
const fm=v=>typeof v==='number'?v.toLocaleString('de-DE'):v;
const pct=(a,b)=>b>0?(a/b*100).toFixed(1):'0';

async function sCnt(t,filter=''){const r=await fetch(ap(t)+`?select=id&limit=0${filter?'&'+filter:''}`,{headers:{...hd(),'Prefer':'count=exact'}});const rng=r.headers.get('content-range');return rng?parseInt(rng.split('/')[1])||0:0}
async function sGet(t,q='',limit=5000){const all=[];for(let off=0;off<limit;off+=1000){const r=await(await fetch(ap(t)+`?${q}&limit=1000&offset=${off}`,{headers:hd()})).json();if(!r.length)break;all.push(...r);if(r.length<1000)break}return all}

function daysSince(d){if(!d)return null;try{return Math.floor((Date.now()-new Date(d).getTime())/86400000)}catch{return null}}
function daysBadge(days){if(days===null)return<span className="tg" style={{background:'rgba(255,255,255,.05)',color:'var(--td)'}}>?</span>;if(days<=30)return<span className="days-badge days-ok">{days}d</span>;if(days<=60)return<span className="days-badge days-warn">{days}d</span>;return<span className="days-badge days-danger">{days}d</span>}
function parseWH(wh){const steps=[];const parts=(wh||'').split(/(?=\d{2}\.\d{2}\.\d{4})/);for(const p of parts){const m=p.match(/^(\d{2})\.(\d{2})\.(\d{4})\s*-\s*(\d{2}):(\d{2})-\s*(.+?):\s*(.+)/);if(m){try{const dt=new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]);const trans=m[7].trim().match(/^(.+?)\s*>\s*(.+)/);if(trans)steps.push({dt,from:trans[1].trim(),to:trans[2].trim()});else steps.push({dt,from:'',to:m[7].trim()})}catch(e){}}}return steps}

const STAGES=[{key:'auftrag',label:'Auftrag',color:'var(--a)'},{key:'dc_planung',label:'DC Planung',color:'var(--bl)'},{key:'dc_freigabe',label:'DC Freigabe',color:'var(--bl)'},{key:'baustelle',label:'Baustelle',color:'var(--cy)'},{key:'dc_fertig',label:'DC fertig',color:'var(--g)'},{key:'ac_freigabe',label:'AC Freigabe',color:'var(--p)'},{key:'ac_fertig',label:'AC fertig',color:'var(--g)'},{key:'abgeschlossen',label:'Abgeschlossen',color:'var(--g)'}];
const STAGE_MATCH={auftrag:['auftrag'],dc_planung:['dc in planung'],dc_freigabe:['dc freigabe','freigabe dc'],baustelle:['baustelle gestartet'],dc_fertig:['dc montage vollständig'],ac_freigabe:['ac freigabe','freigabe ac'],ac_fertig:['ac montage vollständig'],abgeschlossen:['montage abgeschlossen']};
function matchStage(s){const sl=s.toLowerCase();for(const[k,ps] of Object.entries(STAGE_MATCH))if(ps.some(p=>sl.includes(p)))return k;return null}

// ═══════════════ MAIN APP ═══════════════
function App(){
    const[sec,setSec]=useState('sales');
    const[data,setData]=useState({});
    const[loading,setLoading]=useState({});
    const loaded=useRef({});

    const load=useCallback(async(section)=>{
        if(loaded.current[section])return;
        setLoading(p=>({...p,[section]:true}));
        try{
            let d={};
            if(section==='sales'){
                const[orders,vts,efs]=await Promise.all([
                    sGet('auftraege','select=auftrag_nr,kunde_name,kunde_plz,beedoo_fortschritt,datum_angenommen,storniert,anlagen_kwp,hat_speicher,vertriebler_id,workflow_history,lead_quelle,status'),
                    sGet('vertriebler','select=id,name,aktiv'),
                    sGet('efs_projekte','select=simplified_status,gesamtpreis_eur,leveto_id')
                ]);
                d={orders,vts,efs};
            }else if(section==='montage'){
                const orders=await sGet('auftraege','select=auftrag_nr,kunde_name,kunde_plz,beedoo_fortschritt,datum_angenommen,storniert,workflow_history,anlagen_kwp,hat_speicher');
                const appts=await sGet('leveto_appointments','select=leveto_id,appointment_type,start_date,status,feedback_status,user_received,kunde_nachname,kunde_plz');
                d={orders:orders.filter(o=>!o.storniert),appts};
            }else if(section==='termine'){
                const appts=await sGet('leveto_appointments','select=leveto_id,appointment_type,start_date,end_date,status,feedback_status,user_created,user_received,kunde_nachname,kunde_plz,storno_reason');
                d={appts};
            }else if(section==='leads'){
                const cnt=await sCnt('leveto_leads');
                const leads=await sGet('leveto_leads','select=status_name,status_indicator,quelle,berater_name,plz,leveto_erstellt_am,ort',10000);
                d={total:cnt,leads};
            }else if(section==='scouts'){
                const scouts=await sGet('scouter','select=id,vorname,nachname,phone,email,active,fix_gehalt');
                const orders=await sGet('auftraege','select=lead_quelle,vertriebler_id,storniert,datum_angenommen');
                d={scouts,orders};
            }
            setData(p=>({...p,[section]:d}));loaded.current[section]=true;
        }catch(e){console.error(e)}
        setLoading(p=>({...p,[section]:false}));
    },[]);

    useEffect(()=>{load(sec)},[sec,load]);

    const NAV=[
        {k:'sales',i:'📊',l:'Sales',c:'var(--a)'},
        {k:'montage',i:'🏗️',l:'Montage',c:'var(--cy)'},
        {k:'termine',i:'📅',l:'Termine',c:'var(--bl)'},
        {k:'leads',i:'📥',l:'Leads',c:'var(--g)'},
        {k:'scouts',i:'🏃',l:'Scouts',c:'var(--p)'}
    ];

    return(<React.Fragment>
        <div className="hdr">
            <div className="hdr-l"><div className="logo"><img src="https://bee-doo-tools.vercel.app/bee-doo-Logo-white.svg" alt="bee-doo"/><span>Dashboard</span></div></div>
            <div className="hdr-r">
                <a href="https://bee-doo-tools.vercel.app/reporting.html" className="hdr-lk">📊 Reporting</a>
                <a href="https://bee-doo-tools.vercel.app/" className="hdr-lk">← Toolbox</a>
            </div>
        </div>
        <div className="topnav">
            {NAV.map(n=><div key={n.k} className={`topnav-item ${sec===n.k?'on':''}`} onClick={()=>setSec(n.k)}>
                <span className="topnav-icon">{n.i}</span>
                <span className="topnav-label">{n.l}</span>
            </div>)}
        </div>
        <div className="mn">
            {loading[sec]&&!data[sec]?<div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:60,flexDirection:'column',gap:14}}>
                <span className="spinner" style={{width:28,height:28,borderWidth:3,color:'var(--a)'}}/>
                <span style={{color:'var(--td)',fontSize:13}}>Lade {NAV.find(n=>n.k===sec)?.l}...</span>
            </div>:null}
            {sec==='sales'&&data.sales&&<SalesSection d={data.sales}/>}
            {sec==='montage'&&data.montage&&<MontageSection d={data.montage}/>}
            {sec==='termine'&&data.termine&&<TermineSection d={data.termine}/>}
            {sec==='leads'&&data.leads&&<LeadsSection d={data.leads}/>}
            {sec==='scouts'&&data.scouts&&<ScoutsSection d={data.scouts}/>}
        </div>
    </React.Fragment>);
}

// ═══════════════ SALES ═══════════════
function SalesSection({d}){
    const[sub,setSub]=useState('overview');
    const{orders,vts,efs}=d;
    const active=orders.filter(o=>!o.storniert);
    const storno=orders.filter(o=>o.storniert);
    const vtMap={};vts.forEach(v=>{vtMap[v.id]=v.name||'?'});

    // Monthly breakdown
    const monthly={};active.forEach(o=>{const da=o.datum_angenommen;if(da){const ym=da.substring(0,7);monthly[ym]=(monthly[ym]||0)+1}});
    // Fortschritt breakdown
    const fortschritt={};active.forEach(o=>{const f=o.beedoo_fortschritt||'(leer)';fortschritt[f]=(fortschritt[f]||0)+1});
    const fortSorted=Object.entries(fortschritt).sort((a,b)=>b[1]-a[1]);
    // VT performance
    const vtPerf={};active.forEach(o=>{const vt=vtMap[o.vertriebler_id]||'Unbekannt';vtPerf[vt]=(vtPerf[vt]||0)+1});
    const vtSorted=Object.entries(vtPerf).sort((a,b)=>b[1]-a[1]);
    // EFS stats
    const efsStatus={};efs.forEach(e=>{const s=e.simplified_status||'?';efsStatus[s]=(efsStatus[s]||0)+1});
    const totalKwp=active.reduce((s,o)=>s+(parseFloat(o.anlagen_kwp)||0),0);
    const efsTotal=efs.length;
    const efsCompleted=efs.filter(e=>['COMPLETED','GRID_CONNECTED','INSTALLED'].includes(e.simplified_status)).length;

    return(<React.Fragment>
        <div className="kpis fi">
            <div className="kpi" style={{'--c':'var(--a)'}}><div className="kpi-l">Aktive Aufträge</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(active.length)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{fm(storno.length)} storniert</div></div>
            <div className="kpi"><div className="kpi-l">Storno-Quote</div><div className="kpi-v" style={{color:storno.length/orders.length>.3?'var(--r)':'var(--o)'}}>{pct(storno.length,orders.length)}%</div></div>
            <div className="kpi"><div className="kpi-l">Gesamt kWp</div><div className="kpi-v" style={{color:'var(--cy)'}}>{fm(Math.round(totalKwp))}</div><div className="kpi-s" style={{color:'var(--td)'}}>Ø {(totalKwp/active.length).toFixed(1)} kWp</div></div>
            <div className="kpi"><div className="kpi-l">EFS Projekte</div><div className="kpi-v" style={{color:'var(--bl)'}}>{fm(efsTotal)}</div><div className="kpi-s" style={{color:'var(--g)'}}>{fm(efsCompleted)} abgeschlossen</div></div>
            <div className="kpi"><div className="kpi-l">Vertriebler</div><div className="kpi-v" style={{color:'var(--p)'}}>{vts.filter(v=>v.aktiv).length}</div><div className="kpi-s" style={{color:'var(--td)'}}>aktiv</div></div>
        </div>

        <div className="sub-tabs">{[{k:'overview',l:'Übersicht'},{k:'vt',l:'Vertriebler'},{k:'status',l:'Status'},{k:'efs',l:'EFS'}].map(t=>
            <div key={t.k} className={`sub-tab ${sub===t.k?'on':''}`} onClick={()=>setSub(t.k)}>{t.l}</div>
        )}</div>

        {sub==='overview'&&<React.Fragment>
            <div className="g2 fi">
                <div className="cd"><div className="cd-t">📈 Aufträge pro Monat</div>
                    <div style={{display:'flex',alignItems:'flex-end',gap:6,height:160}}>
                        {Object.entries(monthly).sort().slice(-12).map(([m,c])=>{
                            const max=Math.max(...Object.values(monthly));
                            return<div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                                <span style={{fontSize:11,fontWeight:700,color:'var(--a)'}}>{c}</span>
                                <div style={{width:'100%',maxWidth:50,height:c/max*120,background:'linear-gradient(180deg,var(--a),rgba(245,197,0,.3))',borderRadius:'5px 5px 0 0',minHeight:3}}/>
                                <span style={{fontSize:9,color:'var(--td)'}}>{m.split('-')[1]}/{m.split('-')[0].slice(2)}</span>
                            </div>
                        })}
                    </div>
                </div>
                <div className="cd"><div className="cd-t">🏆 Top Vertriebler</div>
                    <div style={{maxHeight:200,overflowY:'auto'}}>
                        {vtSorted.slice(0,10).map(([vt,c],i)=><div key={vt} style={{display:'flex',alignItems:'center',gap:10,padding:'5px 0',borderBottom:'1px solid var(--b)'}}>
                            <span style={{fontSize:12,fontWeight:700,color:i<3?'var(--a)':'var(--td)',minWidth:20}}>{i+1}.</span>
                            <span style={{fontSize:12,color:'var(--tb)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{vt}</span>
                            <span style={{fontSize:14,fontWeight:700,color:'var(--a)'}}>{c}</span>
                        </div>)}
                    </div>
                </div>
            </div>
            <div className="cd fi"><div className="cd-t">📊 Top Status <a href="https://bee-doo-tools.vercel.app/stuck-orders.html" className="lnk" style={{marginLeft:'auto'}}>→ Stuck Orders</a></div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:8}}>
                    {fortSorted.slice(0,8).map(([f,c])=><div key={f} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',background:'var(--el)',borderRadius:8,fontSize:11}}>
                        <span style={{color:'var(--tb)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f}</span>
                        <span style={{fontWeight:700,color:'var(--a)',marginLeft:8}}>{c}</span>
                    </div>)}
                </div>
            </div>
        </React.Fragment>}

        {sub==='vt'&&<div className="cd fi"><div className="cd-t">🏆 Vertriebler Performance</div>
            <table className="mt"><thead><tr><th>#</th><th>Vertriebler</th><th>Aufträge</th><th>Anteil</th><th></th></tr></thead><tbody>
                {vtSorted.map(([vt,c],i)=><tr key={vt}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td><td style={{color:'var(--tb)',fontWeight:500}}>{vt}</td><td style={{fontWeight:700,color:'var(--a)'}}>{c}</td><td style={{color:'var(--td)'}}>{pct(c,active.length)}%</td><td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/vtSorted[0][1]*100}%`,background:'var(--a)'}}/></div></td></tr>)}
            </tbody></table>
        </div>}

        {sub==='status'&&<div className="cd fi"><div className="cd-t">📋 Alle Status</div>
            <table className="mt"><thead><tr><th>Fortschritt</th><th>Anzahl</th><th>%</th><th></th></tr></thead><tbody>
                {fortSorted.map(([f,c])=><tr key={f}><td style={{color:'var(--tb)',fontSize:11}}>{f}</td><td style={{fontWeight:700}}>{c}</td><td style={{color:'var(--td)'}}>{pct(c,active.length)}%</td><td style={{width:'40%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/fortSorted[0][1]*100}%`,background:'var(--a)'}}/></div></td></tr>)}
            </tbody></table>
        </div>}

        {sub==='efs'&&<div className="cd fi"><div className="cd-t">📊 EFS Finanzierung</div>

// ═══════════════ MONTAGE ═══════════════
function MontageSection({d}){
    const[sub,setSub]=useState('pipeline');
    const{orders,appts}=d;

    const analysis=useMemo(()=>{
        const stageCounts={};STAGES.forEach(s=>{stageCounts[s.key]=0});
        const stageDurations={};const monthlyComp={};let totalBau=0,totalNA=0;
        const stuckFin=[],stuckOld=[];

        for(const o of orders){
            const f=(o.beedoo_fortschritt||'').toLowerCase();
            const days=daysSince(o.datum_angenommen)||0;
            if(f.includes('finanzierung')&&days>30)stuckFin.push(o);
            if(days>60&&!['abnahme','barzahler','montage abgeschlossen'].some(s=>f.includes(s)))stuckOld.push(o);

            const steps=parseWH(o.workflow_history);if(!steps.length)continue;
            const reached={};let hasBau=false,hasNA=false;
            for(const s of steps){
                const sk=matchStage(s.to);
                if(sk&&!reached[sk]){reached[sk]={dt:s.dt};stageCounts[sk]++}
                if(s.to.toLowerCase().includes('baustelle gestartet'))hasBau=true;
                if(s.to.toLowerCase().includes('nacharbeit'))hasNA=true;
                if(s.to.toLowerCase().includes('montage abgeschlossen')){
                    const ym=`${s.dt.getFullYear()}-${String(s.dt.getMonth()+1).padStart(2,'0')}`;
                    monthlyComp[ym]=(monthlyComp[ym]||0)+1;
                }
            }
            if(hasBau)totalBau++;if(hasNA)totalNA++;
            const so=['auftrag','dc_planung','dc_freigabe','baustelle','dc_fertig','ac_freigabe','ac_fertig','abgeschlossen'];
            for(let i=0;i<so.length-1;i++){const a=so[i],b=so[i+1];if(reached[a]&&reached[b]){const days2=Math.round((reached[b].dt-reached[a].dt)/86400000);if(days2>=0&&days2<365){if(!stageDurations[`${a}→${b}`])stageDurations[`${a}→${b}`]=[];stageDurations[`${a}→${b}`].push(days2)}}}
            if(reached.auftrag&&reached.abgeschlossen){const td=Math.round((reached.abgeschlossen.dt-reached.auftrag.dt)/86400000);if(td>=0&&td<365){if(!stageDurations['total'])stageDurations['total']=[];stageDurations['total'].push(td)}}
        }
        const medians={};for(const[k,arr] of Object.entries(stageDurations)){arr.sort((a,b)=>a-b);medians[k]={median:arr[Math.floor(arr.length/2)],avg:Math.round(arr.reduce((s,v)=>s+v,0)/arr.length*10)/10,n:arr.length}}
        return{stageCounts,medians,monthlyComp,totalBau,totalNA,stuckFin,stuckOld};
    },[orders]);

    const naPct=analysis.totalBau>0?(analysis.totalNA/analysis.totalBau*100).toFixed(1):'0';

    return(<React.Fragment>
        <div className="kpis fi">
            <div className="kpi"><div className="kpi-l">🏗️ Baustellen</div><div className="kpi-v" style={{color:'var(--cy)'}}>{fm(analysis.totalBau)}</div></div>
            <div className="kpi"><div className="kpi-l">✅ Abgeschlossen</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(analysis.stageCounts.abgeschlossen)}</div></div>
            <div className="kpi"><div className="kpi-l">🔧 Nacharbeit</div><div className="kpi-v" style={{color:parseFloat(naPct)>40?'var(--r)':'var(--o)'}}>{naPct}%</div><div className="kpi-s" style={{color:'var(--td)'}}>{fm(analysis.totalNA)} Aufträge</div></div>
            <div className="kpi"><div className="kpi-l">⏱️ Durchlaufzeit</div><div className="kpi-v" style={{color:'var(--o)'}}>{analysis.medians.total?.median||'—'}d</div><div className="kpi-s" style={{color:'var(--td)'}}>Median gesamt</div></div>
            <div className="kpi"><div className="kpi-l">⚠️ Stuck Fin. >30d</div><div className="kpi-v" style={{color:'var(--r)'}}>{fm(analysis.stuckFin.length)}</div></div>
            <div className="kpi"><div className="kpi-l">📅 Montage-Termine</div><div className="kpi-v" style={{color:'var(--bl)'}}>{fm(appts.length)}</div></div>
        </div>

        <div className="sub-tabs">{[{k:'pipeline',l:'Pipeline'},{k:'timing',l:'Durchlaufzeiten'},{k:'monthly',l:'Monatlich'},{k:'stuck',l:'Stuck Orders'}].map(t=>
            <div key={t.k} className={`sub-tab ${sub===t.k?'on':''}`} onClick={()=>setSub(t.k)}>{t.l}</div>
        )}</div>

        {sub==='pipeline'&&<div className="g2 fi">
            <div className="cd"><div className="cd-t">🔄 Pipeline Funnel</div>
                {STAGES.map(s=>{const c=analysis.stageCounts[s.key]||0;const mx=Math.max(...Object.values(analysis.stageCounts),1);
                    return<div key={s.key} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid var(--b)'}}>
                        <span style={{fontSize:11,color:'var(--tb)',minWidth:110,fontWeight:500}}>{s.label}</span>
                        <div style={{flex:1}}><div className="bar-h"><div className="bar-f" style={{width:`${c/mx*100}%`,background:s.color}}/></div></div>
                        <span style={{fontWeight:700,color:s.color,minWidth:40,textAlign:'right',fontSize:13}}>{fm(c)}</span>
                    </div>})}
            </div>
            <div className="cd"><div className="cd-t">⏱️ Durchlaufzeiten</div>
                {[['auftrag→dc_planung','Auftrag → DC Planung'],['dc_freigabe→baustelle','DC Freigabe → Baustelle ⚠️'],['baustelle→dc_fertig','Baustelle → DC fertig'],['ac_freigabe→ac_fertig','AC Freigabe → AC fertig ⚠️'],['total','GESAMT']].map(([k,l])=>{
                    const m=analysis.medians[k];if(!m)return null;
                    return<div key={k} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid var(--b)'}}>
                        <span style={{fontSize:11,color:k==='total'?'var(--a)':'var(--tb)',fontWeight:k==='total'?700:500,minWidth:180}}>{l}</span>
                        <span style={{fontWeight:700,color:m.median>20?'var(--r)':m.median>5?'var(--o)':'var(--g)',fontSize:13}}>{m.median}d</span>
                        <span style={{fontSize:10,color:'var(--td)'}}>n={m.n}</span>
                    </div>})}
            </div>
        </div>}

        {sub==='timing'&&<div className="cd fi"><div className="cd-t">⏱️ Alle Phasen Detail</div>
            <table className="mt"><thead><tr><th>Phase</th><th>Median</th><th>Ø</th><th>n</th><th>Bewertung</th></tr></thead><tbody>
                {[['auftrag→dc_planung','Auftrag → DC Planung'],['dc_planung→dc_freigabe','DC Planung → Freigabe'],['dc_freigabe→baustelle','DC Freigabe → Baustelle'],['baustelle→dc_fertig','Baustelle → DC fertig'],['dc_fertig→ac_freigabe','DC → AC Freigabe'],['ac_freigabe→ac_fertig','AC Freigabe → AC fertig'],['ac_fertig→abgeschlossen','AC → Abgeschlossen'],['total','GESAMT']].map(([k,l])=>{
                    const m=analysis.medians[k];if(!m)return null;
                    return<tr key={k} style={{fontWeight:k==='total'?700:400}}><td style={{color:k==='total'?'var(--a)':'var(--tb)'}}>{l}</td><td style={{fontWeight:700,color:m.median>20?'var(--r)':m.median>5?'var(--o)':'var(--g)'}}>{m.median}d</td><td>{m.avg}d</td><td style={{color:'var(--td)'}}>{fm(m.n)}</td><td>{m.median>20?<span className="tg tg-r">🚨 Kritisch</span>:m.median>5?<span className="tg tg-o">⚠️ Langsam</span>:<span className="tg tg-g">✅ Gut</span>}</td></tr>})}
            </tbody></table>
            <div style={{marginTop:14}}><a href="https://bee-doo-tools.vercel.app/montage-performance.html" className="lnk">→ Vollständiges Montage-Performance Dashboard</a></div>
        </div>}

        {sub==='monthly'&&<div className="cd fi"><div className="cd-t">📈 Monatliche Fertigstellungen</div>
            <div style={{display:'flex',alignItems:'flex-end',gap:8,height:180,paddingTop:20}}>
                {Object.entries(analysis.monthlyComp).sort().map(([m,c])=>{const max=Math.max(...Object.values(analysis.monthlyComp));
                    return<div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                        <span style={{fontSize:13,fontWeight:700,color:'var(--a)'}}>{c}</span>
                        <div style={{width:'100%',maxWidth:60,height:c/max*140,background:'linear-gradient(180deg,var(--cy),rgba(6,182,212,.3))',borderRadius:'6px 6px 0 0',minHeight:4}}/>
                        <span style={{fontSize:10,color:'var(--td)'}}>{m.split('-')[1]}/{m.split('-')[0].slice(2)}</span>
                    </div>})}
            </div>
        </div>}

        {sub==='stuck'&&<div className="cd fi"><div className="cd-t">⚠️ Stuck Orders <a href="https://bee-doo-tools.vercel.app/stuck-orders.html" className="lnk" style={{marginLeft:'auto'}}>→ Detail-Dashboard</a></div>
            <div className="g2">
                <div style={{background:'var(--rd)',borderRadius:10,padding:16,textAlign:'center'}}>
                    <div style={{fontSize:28,fontWeight:700,color:'var(--r)'}}>{fm(analysis.stuckFin.length)}</div>
                    <div style={{fontSize:11,color:'var(--td)'}}>Finanzierung >30 Tage</div>
                </div>
                <div style={{background:'var(--od)',borderRadius:10,padding:16,textAlign:'center'}}>
                    <div style={{fontSize:28,fontWeight:700,color:'var(--o)'}}>{fm(analysis.stuckOld.length)}</div>
                    <div style={{fontSize:11,color:'var(--td)'}}>Alt >60 Tage ohne Abschluss</div>
                </div>
            </div>
        </div>}
    </React.Fragment>);
}

// ═══════════════ SCOUTS ═══════════════
function ScoutsSection({d}){
    const{scouts,orders}=d;
    const active=scouts.filter(s=>s.active);
    const totalGehalt=active.reduce((s,sc)=>s+(parseFloat(sc.fix_gehalt)||0),0);

    return(<React.Fragment>
        <div className="kpis fi">
            <div className="kpi"><div className="kpi-l">🏃 Scouts gesamt</div><div className="kpi-v" style={{color:'var(--p)'}}>{fm(scouts.length)}</div></div>
            <div className="kpi"><div className="kpi-l">✅ Aktiv</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(active.length)}</div></div>
            <div className="kpi"><div className="kpi-l">💰 Fixgehalt Σ</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(Math.round(totalGehalt))}€</div><div className="kpi-s" style={{color:'var(--td)'}}>monatlich</div></div>
            <div className="kpi"><div className="kpi-l">💰 Ø Gehalt</div><div className="kpi-v" style={{color:'var(--o)'}}>{active.length?fm(Math.round(totalGehalt/active.length)):0}€</div></div>
        </div>

        <div className="cd fi"><div className="cd-t">👥 Scout-Team</div>
            <table className="mt"><thead><tr><th>Name</th><th>Telefon</th><th>E-Mail</th><th>Fix-Gehalt</th><th>Status</th></tr></thead><tbody>
                {scouts.sort((a,b)=>(b.active?1:0)-(a.active?1:0)).map(s=><tr key={s.id}>
                    <td style={{color:'var(--tb)',fontWeight:600}}>{s.vorname} {s.nachname}</td>
                    <td style={{fontSize:11,color:'var(--td)'}}>{s.phone||'—'}</td>
                    <td style={{fontSize:11,color:'var(--td)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis'}}>{s.email||'—'}</td>
                    <td style={{fontWeight:600,color:'var(--a)'}}>{s.fix_gehalt?`${fm(parseFloat(s.fix_gehalt))} €`:'—'}</td>
                    <td>{s.active?<span className="tg tg-g">Aktiv</span>:<span className="tg tg-r">Inaktiv</span>}</td>
                </tr>)}
            </tbody></table>
        </div>
    </React.Fragment>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
