<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bee-doo | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
    <style>
        :root{--a:#F5C500;--ad:rgba(245,197,0,.12);--bg:#08090d;--c:#111219;--el:#1a1b24;--b:rgba(255,255,255,.06);--ba:rgba(245,197,0,.2);--t:#d8dae2;--td:#6b7280;--tb:#f3f4f6;--g:#22c55e;--gd:rgba(34,197,94,.12);--r:#ef4444;--rd:rgba(239,68,68,.12);--o:#f59e0b;--od:rgba(245,158,11,.12);--bl:#3b82f6;--bld:rgba(59,130,246,.12);--p:#a855f7;--pd:rgba(168,85,247,.12);--cy:#06b6d4;--cyd:rgba(6,182,212,.12)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes sp{to{transform:rotate(360deg)}}
        .fi{animation:fi .3s ease-out}.spinner{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
        .hdr{padding:12px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(245,197,0,.02) 0%,transparent 100%)}
        .hdr-l{display:flex;align-items:center;gap:14px}.logo{display:flex;align-items:center;gap:10px}.logo img{height:26px}.logo span{font-size:14px;color:var(--td)}
        .hdr-r{display:flex;align-items:center;gap:10px}
        .hdr-lk{font-size:11px;color:var(--td);text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid var(--b);transition:all .2s}.hdr-lk:hover{color:var(--a);border-color:var(--ba)}
        .nav{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:12px 28px;border-bottom:1px solid var(--b);background:var(--bg)}
        .nav-i{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 8px;border-radius:10px;cursor:pointer;transition:all .2s;background:var(--c);border:1px solid var(--b);text-align:center}
        .nav-i:hover{border-color:var(--ba);background:var(--el)}
        .nav-i.on{border-color:var(--a);background:var(--ad);box-shadow:0 0 16px rgba(245,197,0,.08)}
        .nav-ic{font-size:22px;line-height:1}
        .nav-i span:last-child{font-size:11px;font-weight:600;color:var(--td);white-space:nowrap}
        .nav-i.on span:last-child{color:var(--a)}
        .mn,.main{max-width:1440px;margin:0 auto;padding:20px 28px}
        .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:20px}
        .kpi{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:14px 16px}.kpi-l{font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.kpi-v{font-size:24px;font-weight:700}.kpi-s{font-size:10px;margin-top:2px}
        .cd{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:18px;margin-bottom:14px}.cd-t{font-size:14px;font-weight:600;color:var(--tb);display:flex;align-items:center;gap:8px;margin-bottom:12px}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .mt{width:100%;border-collapse:collapse;font-size:12px}.mt th{text-align:left;padding:8px 10px;color:var(--td);font-size:9px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b)}
        .mt td{padding:7px 10px;border-bottom:1px solid var(--b)}.mt tr:last-child td{border:none}.mt tr:hover td{background:rgba(255,255,255,.015)}
        .tg{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
        .tg-r{background:var(--rd);color:var(--r)}.tg-o{background:var(--od);color:var(--o)}.tg-g{background:var(--gd);color:var(--g)}.tg-b{background:var(--bld);color:var(--bl)}.tg-p{background:var(--pd);color:var(--p)}.tg-a{background:var(--ad);color:var(--a)}.tg-c{background:var(--cyd);color:var(--cy)}
        .bar-h{height:7px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.04)}.bar-f{height:100%;border-radius:4px;transition:width .5s ease}
        .lnk{color:var(--a);text-decoration:none;font-size:11px;opacity:.7}.lnk:hover{opacity:1}
        .sub-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--el);border-radius:8px;padding:3px;overflow-x:auto}
        .sub-tab{padding:8px 16px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--td);transition:all .2s;white-space:nowrap}.sub-tab:hover{color:var(--t)}.sub-tab.on{background:var(--c);color:var(--a);font-weight:600}
        .funnel-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b)}.funnel-label{font-size:12px;color:var(--tb);min-width:140px;font-weight:500}
        .funnel-bar{height:28px;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:700;color:#fff;min-width:60}
        .funnel-pct{font-size:10px;color:var(--td);min-width:50px;text-align:right}
        .stat-box{background:var(--el);border-radius:10px;padding:16px;text-align:center}.stat-box-v{font-size:28px;font-weight:700;margin-bottom:2px}.stat-box-l{font-size:10px;color:var(--td)}
        @media(max-width:1100px){.g2{grid-template-columns:1fr}}
        @media(max-width:768px){.mn{padding:12px}.nav{padding:8px 12px;grid-template-columns:repeat(3,1fr);gap:6px}.kpis{grid-template-columns:repeat(2,1fr)}.hdr{padding:10px 14px}}
        @media(max-width:400px){.nav{grid-template-columns:repeat(3,1fr);gap:5px}.nav-i{padding:10px 4px}.nav-ic{font-size:20px}.nav-i span:last-child{font-size:10px}}
        @media(max-width:480px){.kpis{grid-template-columns:1fr 1fr}.kpi-v{font-size:20px}}
        .time-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 28px;border-bottom:1px solid var(--b);background:var(--bg)}
        .tb-btn{background:var(--c);border:1px solid var(--b);border-radius:8px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--td);cursor:pointer;transition:all .15s}
        .tb-btn:hover{border-color:var(--ba);color:var(--t)}
        .tb-btn.on{background:var(--ad);border-color:var(--a);color:var(--a)}
        .tb-nav{background:none;border:1px solid var(--b);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--td);font-size:14px;transition:all .15s}
        .tb-nav:hover{border-color:var(--a);color:var(--a)}
        .tb-label{font-size:13px;font-weight:600;color:var(--tb);min-width:160px;text-align:center}
        .bem-wrap{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
        .bem-sel{background:var(--c);border:1px solid var(--b);border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t);outline:none;cursor:pointer;min-width:200px;max-width:100%}
        .bem-sel:focus{border-color:var(--a)}
        .bem-card{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:border .2s}
        .bem-card:hover{border-color:var(--ba)}
        .bem-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;flex-wrap:wrap}
        .bem-kunde{font-size:14px;font-weight:600;color:var(--tb)}
        .bem-date{font-size:11px;color:var(--td);white-space:nowrap}
        .bem-text{font-size:13px;color:var(--t);line-height:1.5;white-space:pre-wrap;word-break:break-word}
        .bem-footer{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
        .bem-empty{text-align:center;padding:40px;color:var(--td);font-size:14px}
        .bem-count{font-size:12px;color:var(--td);margin-bottom:12px}
        .bem-search{background:var(--el);border:1px solid var(--b);border-radius:8px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t);outline:none;flex:1;min-width:150px}
        .bem-search:focus{border-color:var(--a)}
        @media(max-width:768px){.time-bar{padding:8px 12px;gap:4px;flex-wrap:wrap}.tb-label{min-width:auto;font-size:12px}.bem-wrap{flex-direction:column;align-items:stretch}}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const{useState,useEffect,useMemo,useCallback,useRef}=React;
const SB='https://hqzpemfaljxcysyqssng.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const ap=t=>`${SB}/rest/v1/${t}`;const hd=()=>({apikey:AK,Authorization:`Bearer ${AK}`});
const fm=v=>typeof v==='number'?v.toLocaleString('de-DE'):v;
const pct=(a,b)=>b>0?(a/b*100).toFixed(1):'0';
async function sGet(t,q='',limit=50000){const all=[];for(let off=0;off<limit;off+=1000){const r=await(await fetch(ap(t)+`?${q}&limit=1000&offset=${off}`,{headers:hd()})).json();if(!r.length)break;all.push(...r);if(r.length<1000)break}return all}
function parseWH(wh){const steps=[];const parts=(wh||'').split(/(?=\d{2}\.\d{2}\.\d{4})/);for(const p of parts){const m=p.match(/^(\d{2})\.(\d{2})\.(\d{4})\s*-\s*(\d{2}):(\d{2})-\s*(.+?):\s*(.+)/);if(m){try{const dt=new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]);const trans=m[7].trim().match(/^(.+?)\s*>\s*(.+)/);if(trans)steps.push({dt,from:trans[1].trim(),to:trans[2].trim()});else steps.push({dt,from:'',to:m[7].trim()})}catch(e){}}}return steps}
const STAGE_MATCH={auftrag:['auftrag'],dc_planung:['dc in planung'],dc_freigabe:['dc freigabe','freigabe dc'],baustelle:['baustelle gestartet'],dc_fertig:['dc montage vollständig'],ac_freigabe:['ac freigabe','freigabe ac'],ac_fertig:['ac montage vollständig'],abgeschlossen:['montage abgeschlossen']};
function matchStage(s){const sl=s.toLowerCase();for(const[k,ps] of Object.entries(STAGE_MATCH))if(ps.some(p=>sl.includes(p)))return k;return null}
const STAGES=[{key:'auftrag',label:'Auftrag',color:'var(--a)'},{key:'dc_planung',label:'DC Planung',color:'var(--bl)'},{key:'dc_freigabe',label:'DC Freigabe',color:'var(--bl)'},{key:'baustelle',label:'Baustelle',color:'var(--cy)'},{key:'dc_fertig',label:'DC fertig',color:'var(--g)'},{key:'ac_freigabe',label:'AC Freigabe',color:'var(--p)'},{key:'ac_fertig',label:'AC fertig',color:'var(--g)'},{key:'abgeschlossen',label:'Abgeschlossen',color:'var(--g)'}];
const SCOUT_APPT=['Termin vor Ort ( SCOUT )'];
const VT_APPT=['Termin vor Ort PV','Beratungstermin Online','Ersttermin','Termin vor Ort','Vor Ort Termin','Termin vor Ort EP','Termin vor Ort für Wärmepumpe','Termin vor Ort PV und Wärmepumpe'];
const FOLGE=['Folgetermin vor Ort'];
const isVTA=t=>VT_APPT.includes(t)||SCOUT_APPT.includes(t)||FOLGE.includes(t);
const isScQ=q=>{if(!q)return false;const l=q.toLowerCase();return l.startsWith('mvpp')||l.includes('sadd')||l.includes('omega')};
const isScAppt=a=>SCOUT_APPT.includes(a.appointment_type)||(a.user_created||'').trim()==='Scouty';

// ===== TIME RANGE HELPERS =====
function getRange(view,ref){
    const d=new Date(ref);d.setHours(0,0,0,0);
    if(view==='tag'){const e=new Date(d);e.setHours(23,59,59,999);return[d,e]}
    if(view==='woche'){const day=d.getDay()||7;const mon=new Date(d);mon.setDate(d.getDate()-(day-1));mon.setHours(0,0,0,0);const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);return[mon,sun]}
    const s=new Date(d.getFullYear(),d.getMonth(),1);const e=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999);return[s,e]
}
function shiftDate(view,ref,dir){
    const d=new Date(ref);
    if(view==='tag')d.setDate(d.getDate()+dir);
    else if(view==='woche')d.setDate(d.getDate()+dir*7);
    else d.setMonth(d.getMonth()+dir);
    return d
}
function rangeLabel(view,ref){
    const[s,e]=getRange(view,ref);const o={day:'2-digit',month:'2-digit',year:'numeric'};
    if(view==='tag')return s.toLocaleDateString('de-DE',{weekday:'long',...o});
    if(view==='woche')return s.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+' – '+e.toLocaleDateString('de-DE',o);
    return s.toLocaleDateString('de-DE',{month:'long',year:'numeric'})
}
function inRange(dateStr,range){if(!dateStr||!range)return true;const d=new Date(dateStr);return d>=range[0]&&d<=range[1]}

// ===== TIMEBAR COMPONENT =====
function TimeBar({view,setView,refDate,setRefDate}){
    const shift=dir=>setRefDate(shiftDate(view,refDate,dir));
    const goToday=()=>setRefDate(new Date());
    return<div className="time-bar">
        {['monat','woche','tag'].map(v=><button key={v} className={`tb-btn${view===v?' on':''}`} onClick={()=>setView(v)}>{v==='tag'?'📅 Tag':v==='woche'?'📆 Woche':'📊 Monat'}</button>)}
        <div style={{width:1,height:20,background:'var(--b)',margin:'0 6px'}}/>
        <button className="tb-nav" onClick={()=>shift(-1)}>←</button>
        <div className="tb-label">{rangeLabel(view,refDate)}</div>
        <button className="tb-nav" onClick={()=>shift(1)}>→</button>
        <button className="tb-btn" onClick={goToday} style={{fontSize:11}}>Heute</button>
    </div>
}

// ===== BEMERKUNGEN COMPONENT =====
const acDcPat=/(?:^|[^a-zA-Z])(?:AC|DC)(?:[^a-zA-Z]|$)|AC\/DC/i;
function Bemerkungen({d,range}){
    const{appts}=d;
    const[selVts,setSelVts]=useState([]);
    const[vtOpen,setVtOpen]=useState(false);
    const[statusF,setStatusF]=useState('');
    const[search,setSearch]=useState('');
    const[saving,setSaving]=useState({});
    const[saved,setSaved]=useState({});
    const[showNB,setShowNB]=useState(false);
    const[nbList,setNbList]=useState([]);
    const[nbLoading,setNbLoading]=useState(false);
    const vtRef=useRef(null);
    useEffect(()=>{const h=e=>{if(vtRef.current&&!vtRef.current.contains(e.target))setVtOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[]);
    const berater=useMemo(()=>{
        const cut=new Date();cut.setDate(cut.getDate()-90);
        const active={};appts.forEach(a=>{if(!a.user_received)return;const n=a.user_received.trim();if(a.start_date&&new Date(a.start_date)>=cut&&!acDcPat.test(n))active[n]=true});
        return Object.keys(active).sort((a,b)=>a.localeCompare(b,'de'))
    },[appts]);
    const toggleVt=n=>setSelVts(p=>p.includes(n)?p.filter(x=>x!==n):[...p,n]);
    const filtered=useMemo(()=>{
        let f=appts.filter(a=>(a.feedback_status||'').trim()||((a.feedback_detail||'').trim()));
        if(range)f=f.filter(a=>inRange(a.start_date,range));
        if(selVts.length)f=f.filter(a=>selVts.includes((a.user_received||'').trim()));
        if(statusF)f=f.filter(a=>fbCat((a.feedback_status||'').trim())===statusF);
        if(search){const q=search.toLowerCase();f=f.filter(a=>(a.feedback_detail||'').toLowerCase().includes(q)||(a.kunde_nachname||'').toLowerCase().includes(q)||(a.kunde_vorname||'').toLowerCase().includes(q))}
        return f.sort((a,b)=>(b.start_date||'').localeCompare(a.start_date||''))
    },[appts,selVts,statusF,search,range]);
    const statusCounts=useMemo(()=>{
        let base=appts.filter(a=>(a.feedback_status||'').trim());
        if(range)base=base.filter(a=>inRange(a.start_date,range));
        if(selVts.length)base=base.filter(a=>selVts.includes((a.user_received||'').trim()));
        const c={ok:0,wvl:0,nein:0,tnm:0,weg:0};
        base.forEach(a=>{const cat=fbCat((a.feedback_status||'').trim());if(c[cat]!==undefined)c[cat]++});
        return{...c,total:base.length}
    },[appts,selVts,range]);
    const cleanHTML=s=>(s||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
    const saveNB=useCallback(async(a)=>{
        const lid=a.leveto_id||a.id;setSaving(p=>({...p,[lid]:true}));
        try{const body={leveto_id:lid,berater:(a.user_received||'').trim(),kunde_name:((a.kunde_vorname||'')+' '+(a.kunde_nachname||'')).trim(),kunde_plz:a.kunde_plz||'',termin_datum:a.start_date,feedback_status:(a.feedback_status||'').trim(),feedback_detail:cleanHTML(a.feedback_detail)};
        await fetch(ap('nachzubesprechen'),{method:'POST',headers:{...hd(),'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
        setSaved(p=>({...p,[lid]:true}));setTimeout(()=>setSaved(p=>({...p,[lid]:false})),3000)}catch(e){console.error(e);alert('Fehler beim Speichern')}
        setSaving(p=>({...p,[lid]:false}))
    },[]);
    const loadNB=useCallback(async()=>{setNbLoading(true);try{const r=await fetch(ap('nachzubesprechen')+'?erledigt=eq.false&order=erstellt_am.desc&limit=200',{headers:hd()});setNbList(await r.json())}catch(e){console.error(e)}setNbLoading(false)},[]);
    const markDone=useCallback(async(id)=>{try{await fetch(ap('nachzubesprechen')+'?id=eq.'+id,{method:'PATCH',headers:{...hd(),'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({erledigt:true,erledigt_am:new Date().toISOString()})});setNbList(p=>p.filter(x=>x.id!==id))}catch(e){console.error(e)}},[]);
    useEffect(()=>{if(showNB)loadNB()},[showNB]);
    return<React.Fragment>
        <div className="kpis fi">
            <div className="kpi"><div className="kpi-l">Mit Feedback</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(statusCounts.total)}</div></div>
            <div className="kpi"><div className="kpi-l">✅ Abschlüsse</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(statusCounts.ok)}</div><div className="kpi-s" style={{color:'var(--g)'}}>{pct(statusCounts.ok,statusCounts.total)}%</div></div>
            <div className="kpi"><div className="kpi-l">⏳ WVL</div><div className="kpi-v" style={{color:'var(--o)'}}>{fm(statusCounts.wvl)}</div></div>
            <div className="kpi"><div className="kpi-l">❌ Kein Interesse</div><div className="kpi-v" style={{color:'var(--r)'}}>{fm(statusCounts.nein)}</div></div>
            <div className="kpi" style={{cursor:'pointer',border:showNB?'1px solid var(--a)':'1px solid var(--b)'}} onClick={()=>setShowNB(!showNB)}><div className="kpi-l">📋 Nachbesprechung</div><div className="kpi-v" style={{color:'var(--cy)'}}>{showNB?'▼ Offen':'→ Öffnen'}</div></div>
        </div>
        {showNB&&<div className="cd fi" style={{marginBottom:16}}>
            <div className="cd-t">📋 Nachzubesprechen {nbLoading&&<span className="spinner" style={{marginLeft:8}}/>}</div>
            {nbList.length===0&&!nbLoading&&<div className="bem-empty">Keine offenen Nachbesprechungen.</div>}
            {nbList.map(nb=><div key={nb.id} className="bem-card" style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:'var(--tb)',fontSize:13}}>{nb.kunde_name} <span style={{color:'var(--td)',fontWeight:400,fontSize:11}}>{nb.kunde_plz}</span></div>
                    <div style={{fontSize:12,color:'var(--td)',marginTop:2}}>👤 {nb.berater} · {nb.termin_datum?new Date(nb.termin_datum).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}):''}</div>
                    {nb.feedback_detail&&<div style={{fontSize:12,color:'var(--t)',marginTop:4,maxHeight:60,overflow:'hidden',textOverflow:'ellipsis'}}>{nb.feedback_detail.substring(0,150)}{nb.feedback_detail.length>150?'\u2026':''}</div>}

const FB_ABSCHLUSS=['Abschluss','Abgeschlossen','1. Auftrag'];
const FB_WVL=['WVL Überleger','WVL Gegenangebot','WVL Frau nicht da','3. Angebot','4. Folgetermin'];
const FB_NEIN=['Kein Interesse zu teuer','Kein Interesse Wettbewerb','Kein Interesse Partner dagegen','Kein Interesse zu alt','6. Kein Interesse'];
const FB_TNM=['T.n.M Dach zu klein','T.n.M. Dachbelag','T.n.M. Verschattung','7. Technisch nicht möglich'];
const fbCat=f=>{if(!f)return'none';if(FB_ABSCHLUSS.includes(f))return'ok';if(FB_WVL.includes(f))return'wvl';if(FB_NEIN.includes(f))return'nein';if(FB_TNM.includes(f))return'tnm';if(f==='Kunde nicht da')return'weg';if(f==='5. nicht stattgefunden')return'weg';return'other'};
function BarC({data,color='var(--a)',height=160}){const max=Math.max(...data.map(d=>d.v),1);return<div style={{display:'flex',alignItems:'flex-end',gap:6,height,paddingTop:20}}>{data.map((d,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontSize:11,fontWeight:700,color}}>{fm(d.v)}</span><div style={{width:'100%',maxWidth:55,height:d.v/max*(height-40),background:`linear-gradient(180deg,${color},${color}44)`,borderRadius:'5px 5px 0 0',minHeight:3}}/><span style={{fontSize:9,color:'var(--td)'}}>{d.l}</span></div>)}</div>}
function RT({items,cols,mc='var(--a)'}){const mx=items.length?items[0].v:1;return<table className="mt"><thead><tr>{cols.map((c,i)=><th key={i}>{c}</th>)}<th></th></tr></thead><tbody>{items.map((it,i)=><tr key={i}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700,width:30}}>{i+1}</td><td style={{color:'var(--tb)',fontWeight:500,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.n}</td><td style={{fontWeight:700,color:mc}}>{fm(it.v)}</td>{it.x?<td style={{fontSize:11,color:'var(--td)'}}>{it.x}</td>:null}<td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${it.v/mx*100}%`,background:mc}}/></div></td></tr>)}</tbody></table>}

    const byVt={};aktiv.forEach(o=>{const n=(o.kundenberater_name||'?').trim();byVt[n]=(byVt[n]||0)+1});
    const moD={};aktiv.forEach(o=>{if(o.datum_angenommen){const ym=o.datum_angenommen.substring(0,7);moD[ym]=(moD[ym]||0)+1}});
    const totalNetto=aktiv.reduce((s,o)=>s+(parseFloat(o.an_wert_netto)||0),0);
    const efsA=efs.filter(e=>e.simplified_status&&!['REVOKED','REJECTED'].includes(e.simplified_status));const efsVol=efsA.reduce((s,e)=>s+(parseFloat(e.gesamtpreis_eur)||0),0);
    return<React.Fragment>
        <div className="kpis fi">
            <div className="kpi"><div className="kpi-l">Aufträge aktiv</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(aktiv.length)}</div></div>
            <div className="kpi"><div className="kpi-l">Storniert</div><div className="kpi-v" style={{color:'var(--r)'}}>{fm(storno.length)}</div><div className="kpi-s" style={{color:'var(--r)'}}>{pct(storno.length,orders.length)}%</div></div>
            <div className="kpi"><div className="kpi-l">Gesamt kWp</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(Math.round(kwp))}</div><div className="kpi-s" style={{color:'var(--td)'}}>Ø {(kwp/Math.max(aktiv.length,1)).toFixed(1)}</div></div>

            <div className="kpi"><div className="kpi-l">EFS Volumen</div><div className="kpi-v" style={{color:'var(--bl)'}}>{fm(Math.round(efsVol/1000))}k€</div></div>
        </div>
        <div className="sub-tabs">{['Übersicht','VT-Ranking','Monatlich','EFS'].map((t,i)=>{const k=['overview','vt','monthly','efs'][i];return<div key={k} className={`sub-tab ${sub===k?'on':''}`} onClick={()=>setSub(k)}>{t}</div>})}</div>

function Montage({d,range}){
    const[sub,setSub]=useState('pipeline');const{orders:allOrders,appts:allAppts}=d;
    const orders=useMemo(()=>allOrders.filter(o=>inRange(o.datum_angenommen,range)),[allOrders,range]);
    const appts=useMemo(()=>allAppts.filter(a=>inRange(a.start_date,range)),[allAppts,range]);
    const pipeline=useMemo(()=>{const stages={};STAGES.forEach(s=>stages[s.key]=[]);const unmatched=[];
        orders.forEach(o=>{const steps=parseWH(o.workflow_history);if(!steps.length){unmatched.push(o);return}const last=steps[steps.length-1];const sk=matchStage(last.to);if(sk)stages[sk].push({...o,lastStep:last});else unmatched.push(o)});
        return{stages,unmatched}},[orders]);
    const mAppts=appts;const dcA=mAppts.filter(a=>a.appointment_type.includes('DC'));const acA=mAppts.filter(a=>a.appointment_type.includes('AC'));
    return<React.Fragment>
        <div className="kpis fi">
            <div className="kpi"><div className="kpi-l">In Pipeline</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(orders.length)}</div></div>
            <div className="kpi"><div className="kpi-l">Gesamt kWp</div><div className="kpi-v" style={{color:'var(--cy)'}}>{fm(Math.round(orders.reduce((s,o)=>s+(parseFloat(o.anlagen_kwp)||0),0)))}</div></div>
            <div className="kpi"><div className="kpi-l">Montage-Termine</div><div className="kpi-v" style={{color:'var(--bl)'}}>{fm(appts.length)}</div></div>
        </div>
        <div className="sub-tabs">{['Pipeline','Termine'].map((t,i)=>{const k=['pipeline','termine'][i];return<div key={k} className={`sub-tab ${sub===k?'on':''}`} onClick={()=>setSub(k)}>{t}</div>})}</div>
        {sub==='pipeline'&&<div className="cd fi"><div className="cd-t">🏗️ Montage-Pipeline</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:8}}>{STAGES.map(s=>{const items=pipeline.stages[s.key]||[];return<div key={s.key} className="stat-box"><div className="stat-box-v" style={{color:s.color,fontSize:22}}>{items.length}</div><div className="stat-box-l">{s.label}</div></div>})}</div></div>}
        {sub==='termine'&&<div className="cd fi"><div className="cd-t">📅 Montage-Termine</div><div className="g2"><div className="stat-box"><div className="stat-box-v" style={{color:'var(--bl)'}}>{dcA.length}</div><div className="stat-box-l">DC-Termine</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--p)'}}>{acA.length}</div><div className="stat-box-l">AC-Termine</div></div></div></div>}
    </React.Fragment>
}

function Termine({d,range}){
    const[sub,setSub]=useState('overview');const{appts:allAppts}=d;
    const appts=useMemo(()=>allAppts.filter(a=>inRange(a.start_date,range)),[allAppts,range]);
    const sales=appts.filter(a=>isVTA(a.appointment_type));const montage=appts.filter(a=>['AC Montage','DC Montage','AC Nacharbeit','DC Nacharbeit'].includes(a.appointment_type));
    const up=sales.filter(a=>a.status==='Open'&&a.start_date).sort((a,b)=>a.start_date.localeCompare(b.start_date));
    const byTm={};sales.forEach(a=>{const t=(a.user_received||'?').trim();byTm[t]=(byTm[t]||0)+1});
    // NEW: Feedback analysis
    const fb=useMemo(()=>{
        const withFb=sales.filter(a=>(a.feedback_status||'').trim());
        const cats={ok:0,wvl:0,nein:0,tnm:0,weg:0,other:0};
        const detail={};
        withFb.forEach(a=>{const f=(a.feedback_status||'').trim();const cat=fbCat(f);cats[cat]++;detail[f]=(detail[f]||0)+1});
        // Per VT feedback
        const vtFb={};sales.forEach(a=>{const vt=(a.user_received||'?').trim();const f=(a.feedback_status||'').trim();if(!vtFb[vt])vtFb[vt]={total:0,ok:0,wvl:0,nein:0,tnm:0,weg:0,noFb:0};vtFb[vt].total++;if(!f){vtFb[vt].noFb++}else{const cat=fbCat(f);if(vtFb[vt][cat]!==undefined)vtFb[vt][cat]++}});
        return{total:withFb.length,cats,detail,vtFb}
    },[sales]);
    return<React.Fragment>
        <div className="kpis fi">

function Leads({d,range}){
    const[sub,setSub]=useState('overview');const{leads:allLeads}=d;
    const leads=useMemo(()=>allLeads.filter(l=>inRange(l.leveto_erstellt_am,range)),[allLeads,range]);
    const byQ={};const byB={};const byP={};
    leads.forEach(l=>{const q=l.quelle||'?';byQ[q]=(byQ[q]||0)+1;const b=l.berater_name||'(kein)';byB[b]=(byB[b]||0)+1;const p=(l.plz||'').substring(0,2);if(p)byP[p]=(byP[p]||0)+1});
    // NEW: Enriched data stats
    const enriched=useMemo(()=>{
        const withStrom=leads.filter(l=>l.stromverbrauch_kwh>0);
        const avgStrom=withStrom.length>0?Math.round(withStrom.reduce((s,l)=>s+l.stromverbrauch_kwh,0)/withStrom.length):0;
        const eigentuemer=leads.filter(l=>l.eigentuemer===true).length;
        const nichtEigen=leads.filter(l=>l.eigentuemer===false).length;
        const eAuto=leads.filter(l=>(l.e_auto_geplant||'').toLowerCase().includes('ja')).length;
        const keinAuto=leads.filter(l=>(l.e_auto_geplant||'').toLowerCase().includes('nein')).length;
        // Stromverbrauch distribution
        const stromBuckets={'<3000':0,'3-5k':0,'5-7k':0,'7-10k':0,'>10k':0};
        withStrom.forEach(l=>{const v=l.stromverbrauch_kwh;if(v<3000)stromBuckets['<3000']++;else if(v<5000)stromBuckets['3-5k']++;else if(v<7000)stromBuckets['5-7k']++;else if(v<10000)stromBuckets['7-10k']++;else stromBuckets['>10k']++});
        return{withStrom:withStrom.length,avgStrom,eigentuemer,nichtEigen,eAuto,keinAuto,stromBuckets}
    },[leads]);
    return<React.Fragment>
        <div className="kpis fi"><div className="kpi"><div className="kpi-l">Gesamt Leads</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(leads.length)}</div></div><div className="kpi"><div className="kpi-l">Ø Stromverbrauch</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(enriched.avgStrom)} kWh</div><div className="kpi-s" style={{color:'var(--td)'}}>{fm(enriched.withStrom)} erfasst</div></div><div className="kpi"><div className="kpi-l">Eigentümer</div><div className="kpi-v" style={{color:'var(--g)'}}>{pct(enriched.eigentuemer,enriched.eigentuemer+enriched.nichtEigen)}%</div><div className="kpi-s" style={{color:'var(--td)'}}>{fm(enriched.eigentuemer)} ja / {fm(enriched.nichtEigen)} nein</div></div><div className="kpi"><div className="kpi-l">E-Auto geplant</div><div className="kpi-v" style={{color:'var(--cy)'}}>{pct(enriched.eAuto,enriched.eAuto+enriched.keinAuto)}%</div><div className="kpi-s" style={{color:'var(--td)'}}>{fm(enriched.eAuto)} ja</div></div></div>
        <div className="sub-tabs">{['Übersicht','Berater','Regionen','Strom-Profil'].map((t,i)=>{const k=['overview','berater','geo','strom'][i];return<div key={k} className={`sub-tab ${sub===k?'on':''}`} onClick={()=>setSub(k)}>{t}</div>})}</div>
        {sub==='overview'&&<div className="g2 fi"><div className="cd"><div className="cd-t">📊 Quellen</div><RT items={Object.entries(byQ).sort((a,b)=>b[1]-a[1]).filter(([q])=>q!=='?').slice(0,15).map(([n,v])=>({n,v,x:pct(v,leads.length)+'%'}))} cols={['#','Quelle','Leads','%']} mc="var(--a)"/></div><div className="cd"><div className="cd-t">📊 Status</div><RT items={Object.entries(leads.reduce((a,l)=>{const s=l.status_name||'?';a[s]=(a[s]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([n,v])=>({n,v}))} cols={['#','Status','Leads']} mc="var(--bl)"/></div></div>}
        {sub==='berater'&&<div className="cd fi"><div className="cd-t">👥 Berater</div><RT items={Object.entries(byB).sort((a,b)=>b[1]-a[1]).filter(([b])=>b!=='(kein)').slice(0,25).map(([n,v])=>({n,v,x:pct(v,leads.length)+'%'}))} cols={['#','Berater','Leads','%']} mc="var(--p)"/></div>}
        {sub==='geo'&&<div className="cd fi"><div className="cd-t">📍 Regionen</div><RT items={Object.entries(byP).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([n,v])=>({n:n+'xxx',v,x:pct(v,leads.length)+'%'}))} cols={['#','PLZ','Leads','%']} mc="var(--a)"/></div>}
        {sub==='strom'&&<div className="cd fi"><div className="cd-t">⚡ Stromverbrauch-Verteilung ({fm(enriched.withStrom)} Leads)</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10,marginBottom:16}}>{Object.entries(enriched.stromBuckets).map(([k,v])=><div key={k} className="stat-box"><div className="stat-box-v" style={{color:'var(--a)',fontSize:22}}>{fm(v)}</div><div className="stat-box-l">{k} kWh ({pct(v,enriched.withStrom)}%)</div></div>)}</div><div className="g2"><div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)',fontSize:28}}>{fm(enriched.avgStrom)}</div><div className="stat-box-l">Ø Stromverbrauch (kWh/Jahr)</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--cy)',fontSize:28}}>{fm(enriched.eAuto)}</div><div className="stat-box-l">E-Auto geplant ({pct(enriched.eAuto,enriched.eAuto+enriched.keinAuto)}%)</div></div></div></div>}
    </React.Fragment>
}

function Scouts({d,range}){
    const[sub,setSub]=useState('funnel');const{leads:allLeads,orders:allOrders,appts:allAppts,scouter}=d;
    const leads=useMemo(()=>allLeads.filter(l=>inRange(l.leveto_erstellt_am,range)),[allLeads,range]);
    const orders=useMemo(()=>allOrders.filter(o=>inRange(o.datum_angenommen,range)),[allOrders,range]);
    const appts=useMemo(()=>allAppts.filter(a=>inRange(a.start_date,range)),[allAppts,range]);
    const an=useMemo(()=>{
        const sl=leads.filter(l=>isScQ(l.quelle));const so=orders.filter(o=>isScQ(o.lead_quelle));
        const sa=appts.filter(a=>isScAppt(a));
        const groups={};
        for(const src of ['MVPP','SADD','Omega']){
            const mq=q=>{if(!q)return false;const ql=q.toLowerCase();return src==='SADD'?(ql.includes('sadd')):ql.includes(src.toLowerCase())};
            const gl=sl.filter(l=>mq(l.quelle));const go=so.filter(o=>mq(o.lead_quelle));const goA=go.filter(o=>!o.storniert);const goS=go.filter(o=>o.storniert);
            groups[src]={leads:gl.length,sales:goA.length,storno:goS.length}
        }
        const sOpen=sa.filter(a=>a.status==='Open').length,sClosed=sa.filter(a=>a.status==='Closed').length,sCanc=sa.filter(a=>a.status==='Cancelled').length;
        const stBk={};sl.forEach(l=>{const s=l.status_name||'?';stBk[s]=(stBk[s]||0)+1});
        const mo={};sl.forEach(l=>{if(l.leveto_erstellt_am){const ym=l.leveto_erstellt_am.substring(0,7);mo[ym]=(mo[ym]||0)+1}});
        const stR={};sa.filter(a=>a.status==='Cancelled').forEach(a=>{const r=(a.storno_reason||'(kein Grund)').trim();stR[r]=(stR[r]||0)+1});
        // Feedback on scout appointments
        const saFb=sa.filter(a=>(a.feedback_status||'').trim());
        const fbCats={ok:0,wvl:0,nein:0,tnm:0,weg:0};
        saFb.forEach(a=>{const cat=fbCat((a.feedback_status||'').trim());if(fbCats[cat]!==undefined)fbCats[cat]++});
        // Per scout performance from mvpp_name
        const scPerf={};sl.forEach(l=>{const n=(l.mvpp_name||'').trim();if(!n)return;if(!scPerf[n])scPerf[n]={leads:0,id:l.mvpp_id||''};scPerf[n].leads++});
        // Match orders to scouts via lead_quelle + mvpp_name is tricky... use scouter table
        return{sl:sl.length,so:so.filter(o=>!o.storniert).length,soSt:so.filter(o=>o.storniert).length,groups,sa:sa.length,sOpen,sClosed,sCanc,stBk,mo,stR,tl:leads.length,saFb:saFb.length,fbCats,scPerf}
    },[leads,orders,appts]);
    const scRank=Object.entries(an.scPerf).sort((a,b)=>b[1].leads-a[1].leads);
    return<React.Fragment>
        <div className="kpis fi">
            <div className="kpi"><div className="kpi-l">Scout-Leads</div><div className="kpi-v" style={{color:'var(--p)'}}>{fm(an.sl)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{pct(an.sl,an.tl)}% aller Leads</div></div>
            <div className="kpi"><div className="kpi-l">Scout-Termine</div><div className="kpi-v" style={{color:'var(--bl)'}}>{fm(an.sa)}</div><div className="kpi-s" style={{color:'var(--r)'}}>{pct(an.sCanc,an.sa)}% Ausfall</div></div>
            <div className="kpi"><div className="kpi-l">→ Sales</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(an.so)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{an.soSt} storniert</div></div>
            <div className="kpi"><div className="kpi-l">Termin-Feedback</div><div className="kpi-v" style={{color:'var(--cy)'}}>{fm(an.saFb)}</div><div className="kpi-s" style={{color:'var(--g)'}}>{pct(an.fbCats.ok,an.saFb)}% Abschluss</div></div>
            <div className="kpi"><div className="kpi-l">Aktive Scouts</div><div className="kpi-v" style={{color:'var(--a)'}}>{scouter.filter(s=>s.active).length}</div><div className="kpi-s" style={{color:'var(--td)'}}>{scouter.length} gesamt</div></div>
        </div>
        <div className="sub-tabs">{['Funnel','Scout-Ranking','Quellen','Feedback','Terminausfall','Lead-Status','Monatlich'].map((t,i)=>{const k=['funnel','ranking','quellen','feedback','ausfall','status','monthly'][i];return<div key={k} className={`sub-tab ${sub===k?'on':''}`} onClick={()=>setSub(k)}>{t}</div>})}</div>
        {sub==='funnel'&&<React.Fragment>
            <div className="cd fi"><div className="cd-t">🏃 Scout-Funnel: Lead → Termin → Sale</div><div style={{maxWidth:700}}>
                {[{l:'Leads generiert',v:an.sl,c:'var(--p)'},{l:'Termine gelegt (Appointments)',v:an.sa,c:'var(--bl)'},{l:'Termine stattgefunden',v:an.sClosed,c:'var(--cy)'},{l:'Aufträge (aktiv)',v:an.so,c:'var(--g)'}].map((s,i)=>{const mx=an.sl||1;const w=Math.max(s.v/mx*100,3);return<div key={i} className="funnel-row"><span className="funnel-label">{s.l}</span><div className="funnel-bar" style={{width:`${w}%`,background:s.c}}>{fm(s.v)}</div><span className="funnel-pct">{i>0?pct(s.v,an.sl)+'%':''}</span></div>})}
            </div></div>
            <div className="g2 fi">
                <div className="cd"><div className="cd-t">📊 Conversion</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <div className="stat-box"><div className="stat-box-v" style={{color:'var(--bl)'}}>{pct(an.sa,an.sl)}%</div><div className="stat-box-l">Lead → Termin</div></div>
                    <div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)'}}>{pct(an.so,an.sClosed||1)}%</div><div className="stat-box-l">Termin → Sale</div></div>
                    <div className="stat-box"><div className="stat-box-v" style={{color:'var(--r)'}}>{pct(an.sCanc,an.sa)}%</div><div className="stat-box-l">Terminausfall</div></div>
                    <div className="stat-box"><div className="stat-box-v" style={{color:'var(--a)'}}>{pct(an.so,an.sl)}%</div><div className="stat-box-l">Lead → Sale</div></div>
                </div></div>
                <div className="cd"><div className="cd-t">🏃 Quellen-Vergleich</div><table className="mt"><thead><tr><th>Quelle</th><th>Leads</th><th>Sales</th><th>Storno</th></tr></thead><tbody>
                    {Object.entries(an.groups).map(([src,g])=><tr key={src}><td style={{fontWeight:700,color:'var(--p)'}}>{src}</td><td>{fm(g.leads)}</td><td style={{fontWeight:700,color:'var(--g)'}}>{fm(g.sales)}</td><td style={{color:'var(--r)'}}>{fm(g.storno)}</td></tr>)}
                </tbody></table></div>
            </div>
        </React.Fragment>}
        {sub==='ranking'&&<div className="cd fi"><div className="cd-t">🏆 Scout-Ranking (nach generierten Leads)</div><table className="mt"><thead><tr><th>#</th><th>Scout</th><th>MVPP-ID</th><th>Leads</th><th></th></tr></thead><tbody>{scRank.slice(0,30).map(([n,info],i)=><tr key={n}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td><td style={{color:'var(--tb)',fontWeight:500}}>{n}</td><td style={{fontSize:11,color:'var(--td)',fontFamily:'monospace'}}>{info.id}</td><td style={{fontWeight:700,color:'var(--p)'}}>{fm(info.leads)}</td><td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${info.leads/(scRank[0]?scRank[0][1].leads:1)*100}%`,background:'var(--p)'}}/></div></td></tr>)}</tbody></table></div>}
        {sub==='quellen'&&<div className="cd fi"><div className="cd-t">📊 Quellen im Detail</div>{Object.entries(an.groups).map(([src,g])=><div key={src} style={{marginBottom:20,padding:14,background:'var(--el)',borderRadius:10}}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}><span style={{fontSize:16,fontWeight:700,color:'var(--p)'}}>{src}</span><span className="tg tg-p">{fm(g.leads)} Leads</span></div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:8}}><div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)',fontSize:20}}>{fm(g.sales)}</div><div className="stat-box-l">Sales (aktiv)</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--r)',fontSize:20}}>{fm(g.storno)}</div><div className="stat-box-l">Storno ({pct(g.storno,g.sales+g.storno||1)}%)</div></div></div></div>)}</div>}
        {sub==='feedback'&&<div className="cd fi"><div className="cd-t">🎯 Feedback auf Scout-Termine ({fm(an.saFb)} von {fm(an.sa)})</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:16}}>
            <div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)',fontSize:24}}>{fm(an.fbCats.ok)}</div><div className="stat-box-l">✅ Abschluss ({pct(an.fbCats.ok,an.saFb)}%)</div></div>
            <div className="stat-box"><div className="stat-box-v" style={{color:'var(--o)',fontSize:24}}>{fm(an.fbCats.wvl)}</div><div className="stat-box-l">⏳ WVL ({pct(an.fbCats.wvl,an.saFb)}%)</div></div>
            <div className="stat-box"><div className="stat-box-v" style={{color:'var(--r)',fontSize:24}}>{fm(an.fbCats.nein)}</div><div className="stat-box-l">❌ Kein Interesse ({pct(an.fbCats.nein,an.saFb)}%)</div></div>
            <div className="stat-box"><div className="stat-box-v" style={{color:'var(--p)',fontSize:24}}>{fm(an.fbCats.tnm)}</div><div className="stat-box-l">🏠 T.n.M. ({pct(an.fbCats.tnm,an.saFb)}%)</div></div>
            <div className="stat-box"><div className="stat-box-v" style={{color:'var(--td)',fontSize:24}}>{fm(an.fbCats.weg)}</div><div className="stat-box-l">👻 Nicht da ({pct(an.fbCats.weg,an.saFb)}%)</div></div>
        </div></div>}
        {sub==='ausfall'&&<div className="cd fi"><div className="cd-t">❌ Terminausfall (Scout)</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:16}}><div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)'}}>{fm(an.sClosed)}</div><div className="stat-box-l">Erledigt</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--r)'}}>{fm(an.sCanc)}</div><div className="stat-box-l">Storniert</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--r)'}}>{pct(an.sCanc,an.sa)}%</div><div className="stat-box-l">Ausfallquote</div></div></div><table className="mt"><thead><tr><th>Storno-Grund</th><th>Anz.</th><th>%</th><th></th></tr></thead><tbody>{Object.entries(an.stR).sort((a,b)=>b[1]-a[1]).map(([r,c])=><tr key={r}><td style={{color:'var(--tb)',fontSize:11}}>{r}</td><td style={{fontWeight:700,color:'var(--r)'}}>{c}</td><td style={{color:'var(--td)'}}>{pct(c,an.sCanc)}%</td><td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/Math.max(...Object.values(an.stR))*100}%`,background:'var(--r)'}}/></div></td></tr>)}</tbody></table></div>}
        {sub==='status'&&<div className="cd fi"><div className="cd-t">📊 Lead-Status (Scout)</div><table className="mt"><thead><tr><th>Status</th><th>Anz.</th><th>%</th><th></th></tr></thead><tbody>{Object.entries(an.stBk).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([s,c])=>{const ok=['Terminiert','Angebot erstellt','AB erstellt','Rechnung beglichen','RECHNUNG VON Q-CELLS BEGLICHEN'].includes(s);const bad=['REKLAMATION','5x NICHT ERREICHT','Nicht im PLZ-Gebiet','Kein Interesse','15 Kontaktversuche','nicht erreicht','Telefonnummer falsch'].includes(s);return<tr key={s}><td style={{fontSize:11}}><span style={{color:ok?'var(--g)':bad?'var(--r)':'var(--tb)'}}>{ok?'✅':bad?'❌':'⏳'} {s}</span></td><td style={{fontWeight:700}}>{fm(c)}</td><td style={{color:'var(--td)'}}>{pct(c,an.sl)}%</td><td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/Math.max(...Object.values(an.stBk))*100}%`,background:ok?'var(--g)':bad?'var(--r)':'var(--bl)'}}/></div></td></tr>})}</tbody></table></div>}
        {sub==='monthly'&&<div className="cd fi"><div className="cd-t">📈 Scout-Leads/Monat</div><BarC data={Object.entries(an.mo).sort().slice(-12).map(([m,c])=>({v:c,l:m.split('-')[1]+'/'+m.split('-')[0].slice(2)}))} color="var(--p)" height={180}/></div>}
    </React.Fragment>
}

function CallCenter({d,range}){
    const[sub,setSub]=useState('overview');const{appts:allAppts,leads:allLeads,orders:allOrders}=d;
    const appts=useMemo(()=>allAppts.filter(a=>inRange(a.start_date,range)),[allAppts,range]);
    const leads=useMemo(()=>allLeads.filter(l=>inRange(l.leveto_erstellt_am,range)),[allLeads,range]);
    const orders=useMemo(()=>allOrders.filter(o=>inRange(o.datum_angenommen,range)),[allOrders,range]);
    const an=useMemo(()=>{
        const sa=appts.filter(a=>isVTA(a.appointment_type));
        const cc=sa.filter(a=>!SCOUT_APPT.includes(a.appointment_type)&&a.appointment_type!=='Folgetermin vor Ort'&&(a.user_created||'').trim()!=='Scouty');
        const wvl=appts.filter(a=>a.appointment_type==='WVL Telefon');
        const agents={};cc.forEach(a=>{const c=(a.user_created||'?').trim();if(!agents[c])agents[c]={t:0,o:0,cl:0,ca:0,fbOk:0,fbWvl:0,fbNein:0,fbTot:0};agents[c].t++;if(a.status==='Open')agents[c].o++;else if(a.status==='Closed')agents[c].cl++;else if(a.status==='Cancelled')agents[c].ca++;const f=(a.feedback_status||'').trim();if(f){agents[c].fbTot++;const cat=fbCat(f);if(cat==='ok')agents[c].fbOk++;else if(cat==='wvl')agents[c].fbWvl++;else if(cat==='nein')agents[c].fbNein++}});
        const stR={};cc.filter(a=>a.status==='Cancelled').forEach(a=>{const r=(a.storno_reason||'(kein Grund)').trim();stR[r]=(stR[r]||0)+1});
        const mo={};cc.forEach(a=>{if(a.start_date){const ym=a.start_date.substring(0,7);if(!mo[ym])mo[ym]={t:0,ca:0};mo[ym].t++;if(a.status==='Cancelled')mo[ym].ca++}});
        const wvlA={};wvl.forEach(a=>{const c=(a.user_created||'?').trim();wvlA[c]=(wvlA[c]||0)+1});
        const tot=cc.length,op=cc.filter(a=>a.status==='Open').length,cl=cc.filter(a=>a.status==='Closed').length,ca=cc.filter(a=>a.status==='Cancelled').length;
        // CC feedback totals
        const ccFb=cc.filter(a=>(a.feedback_status||'').trim());
        const fbCats={ok:0,wvl:0,nein:0,tnm:0,weg:0};
        ccFb.forEach(a=>{const cat=fbCat((a.feedback_status||'').trim());if(fbCats[cat]!==undefined)fbCats[cat]++});
        return{cc,tot,op,cl,ca,agents,stR,mo,wvl:wvl.length,wvlA,wvlOp:wvl.filter(a=>a.status==='Open').length,wvlCl:wvl.filter(a=>a.status==='Closed').length,ccFbTot:ccFb.length,fbCats}
    },[appts]);
    const agS=Object.entries(an.agents).sort((a,b)=>b[1].t-a[1].t).filter(([n])=>n!=='?');
    return<React.Fragment>
        <div className="kpis fi">
            <div className="kpi"><div className="kpi-l">CC-Termine gelegt</div><div className="kpi-v" style={{color:'var(--bl)'}}>{fm(an.tot)}</div></div>
            <div className="kpi"><div className="kpi-l">Erledigt</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(an.cl)}</div><div className="kpi-s" style={{color:'var(--g)'}}>{pct(an.cl,an.tot)}%</div></div>
            <div className="kpi"><div className="kpi-l">Storniert</div><div className="kpi-v" style={{color:'var(--r)'}}>{fm(an.ca)}</div><div className="kpi-s" style={{color:'var(--r)'}}>{pct(an.ca,an.tot)}% Ausfall</div></div>
            <div className="kpi"><div className="kpi-l">Abschlussquote</div><div className="kpi-v" style={{color:'var(--g)'}}>{pct(an.fbCats.ok,an.ccFbTot)}%</div><div className="kpi-s" style={{color:'var(--td)'}}>{fm(an.fbCats.ok)} Abschlüsse</div></div>
            <div className="kpi"><div className="kpi-l">WVL Telefon</div><div className="kpi-v" style={{color:'var(--cy)'}}>{fm(an.wvl)}</div></div>
            <div className="kpi"><div className="kpi-l">CC-Agenten</div><div className="kpi-v" style={{color:'var(--p)'}}>{agS.length}</div></div>
        </div>
        <div className="sub-tabs">{['Übersicht','CC-Agenten','Abschluss/Agent','Terminausfall','WVL Telefon','Monatlich'].map((t,i)=>{const k=['overview','agents','conversion','ausfall','wvl','monthly'][i];return<div key={k} className={`sub-tab ${sub===k?'on':''}`} onClick={()=>setSub(k)}>{t}</div>})}</div>
        {sub==='overview'&&<React.Fragment>
            <div className="cd fi"><div className="cd-t">📞 CC Funnel</div><div style={{maxWidth:700}}>{[{l:'Termine gelegt',v:an.tot,c:'var(--bl)'},{l:'Stattgefunden',v:an.cl,c:'var(--cy)'},{l:'→ Abschluss (Feedback)',v:an.fbCats.ok,c:'var(--g)'},{l:'→ WVL/Überleger',v:an.fbCats.wvl,c:'var(--o)'},{l:'Storniert/Ausfall',v:an.ca,c:'var(--r)'}].map((s,i)=>{const mx=an.tot||1;const w=Math.max(s.v/mx*100,3);return<div key={i} className="funnel-row"><span className="funnel-label">{s.l}</span><div className="funnel-bar" style={{width:`${w}%`,background:s.c}}>{fm(s.v)}</div><span className="funnel-pct">{pct(s.v,an.tot)}%</span></div>})}</div></div>
            <div className="g2 fi">
                <div className="cd"><div className="cd-t">🏆 Top CC-Agenten</div><table className="mt"><thead><tr><th>#</th><th>Agent</th><th>Termine</th><th>✅ CR</th><th>Storno%</th></tr></thead><tbody>{agS.slice(0,10).map(([n,a],i)=>{const cr=a.fbTot>0?(a.fbOk/a.fbTot*100).toFixed(1):'—';return<tr key={n}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td><td style={{color:'var(--tb)',fontWeight:500,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n}</td><td style={{fontWeight:700,color:'var(--bl)'}}>{fm(a.t)}</td><td>{cr!=='—'&&parseFloat(cr)>=15?<span className="tg tg-g">{cr}%</span>:cr!=='—'?<span className="tg tg-o">{cr}%</span>:<span style={{color:'var(--td)'}}>—</span>}</td><td>{a.ca/a.t>.35?<span className="tg tg-r">{pct(a.ca,a.t)}%</span>:<span className="tg tg-g">{pct(a.ca,a.t)}%</span>}</td></tr>})}</tbody></table></div>
                <div className="cd"><div className="cd-t">📊 Feedback-Übersicht</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)'}}>{fm(an.fbCats.ok)}</div><div className="stat-box-l">✅ Abschluss</div></div>
                    <div className="stat-box"><div className="stat-box-v" style={{color:'var(--o)'}}>{fm(an.fbCats.wvl)}</div><div className="stat-box-l">⏳ WVL</div></div>
                    <div className="stat-box"><div className="stat-box-v" style={{color:'var(--r)'}}>{fm(an.fbCats.nein)}</div><div className="stat-box-l">❌ Kein Interesse</div></div>
                    <div className="stat-box"><div className="stat-box-v" style={{color:'var(--p)'}}>{fm(an.fbCats.tnm)}</div><div className="stat-box-l">🏠 T.n.M.</div></div>
                </div></div>
            </div>
        </React.Fragment>}
        {sub==='agents'&&<div className="cd fi"><div className="cd-t">👥 Alle CC-Agenten</div><table className="mt"><thead><tr><th>#</th><th>Agent</th><th>Terme</th><th>Erledigt</th><th>Storno</th><th>Offen</th><th>Ausfall%</th><th></th></tr></thead><tbody>{agS.map(([n,a],i)=>{const ap2=a.ca/(a.t||1)*100;return<tr key={n}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td><td style={{color:'var(--tb)',fontWeight:500,maxWidth:170,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n}</td><td style={{fontWeight:700}}>{fm(a.t)}</td><td style={{color:'var(--g)'}}>{fm(a.cl)}</td><td style={{color:'var(--r)'}}>{fm(a.ca)}</td><td style={{color:'var(--o)'}}>{fm(a.o)}</td><td>{ap2>35?<span className="tg tg-r">{ap2.toFixed(1)}%</span>:ap2>25?<span className="tg tg-o">{ap2.toFixed(1)}%</span>:<span className="tg tg-g">{ap2.toFixed(1)}%</span>}</td><td style={{width:'18%'}}><div className="bar-h"><div className="bar-f" style={{width:`${a.t/agS[0][1].t*100}%`,background:'var(--bl)'}}/></div></td></tr>})}</tbody></table></div>}
        {sub==='conversion'&&<div className="cd fi"><div className="cd-t">🎯 Abschlussquote pro CC-Agent (Feedback-basiert)</div><table className="mt"><thead><tr><th>#</th><th>Agent</th><th>Terme</th><th>✅ Abschluss</th><th>⏳ WVL</th><th>❌ Nein</th><th>CR%</th></tr></thead><tbody>{agS.filter(([n,a])=>a.fbTot>=5).sort((a,b)=>{const crA=a[1].fbTot>0?a[1].fbOk/a[1].fbTot:0;const crB=b[1].fbTot>0?b[1].fbOk/b[1].fbTot:0;return crB-crA}).map(([n,a],i)=>{const cr=a.fbTot>0?(a.fbOk/a.fbTot*100).toFixed(1):'0';return<tr key={n}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td><td style={{color:'var(--tb)',fontWeight:500,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n}</td><td>{fm(a.t)}</td><td style={{color:'var(--g)',fontWeight:700}}>{fm(a.fbOk)}</td><td style={{color:'var(--o)'}}>{fm(a.fbWvl)}</td><td style={{color:'var(--r)'}}>{fm(a.fbNein)}</td><td>{parseFloat(cr)>=15?<span className="tg tg-g">{cr}%</span>:parseFloat(cr)>=10?<span className="tg tg-o">{cr}%</span>:<span className="tg tg-r">{cr}%</span>}</td></tr>})}</tbody></table><div style={{marginTop:10,fontSize:11,color:'var(--td)'}}>Nur Agenten mit ≥5 Feedback-Einträgen. CR = Abschlüsse / Termine mit Feedback.</div></div>}
        {sub==='ausfall'&&<div className="cd fi"><div className="cd-t">❌ Storno-Gründe (CC)</div><table className="mt"><thead><tr><th>Grund</th><th>Anz.</th><th>%</th><th></th></tr></thead><tbody>{Object.entries(an.stR).sort((a,b)=>b[1]-a[1]).map(([r,c])=><tr key={r}><td style={{color:'var(--tb)',fontSize:11,maxWidth:250,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r}</td><td style={{fontWeight:700,color:'var(--r)'}}>{fm(c)}</td><td style={{color:'var(--td)'}}>{pct(c,an.ca)}%</td><td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/Math.max(...Object.values(an.stR))*100}%`,background:'var(--r)'}}/></div></td></tr>)}</tbody></table></div>}
        {sub==='wvl'&&<div className="cd fi"><div className="cd-t">📞 WVL Telefon</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:16}}><div className="stat-box"><div className="stat-box-v" style={{color:'var(--cy)'}}>{fm(an.wvl)}</div><div className="stat-box-l">Gesamt</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)'}}>{fm(an.wvlCl)}</div><div className="stat-box-l">Erledigt</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--o)'}}>{fm(an.wvlOp)}</div><div className="stat-box-l">Offen</div></div></div><RT items={Object.entries(an.wvlA).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([n,v])=>({n,v}))} cols={['#','Person','WVL']} mc="var(--cy)"/></div>}
        {sub==='monthly'&&<div className="cd fi"><div className="cd-t">📈 CC-Termine/Monat</div><div style={{display:'flex',alignItems:'flex-end',gap:6,height:200,paddingTop:20}}>{Object.entries(an.mo).sort().slice(-12).map(([m,dd])=>{const mx=Math.max(...Object.values(an.mo).map(x=>x.t),1);const cH=dd.ca/mx*160;const oH=(dd.t-dd.ca)/mx*160;return<div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontSize:10,fontWeight:700,color:'var(--bl)'}}>{fm(dd.t)}</span><div style={{width:'100%',maxWidth:55,display:'flex',flexDirection:'column'}}><div style={{height:oH,background:'linear-gradient(180deg,var(--bl),var(--bl)44)',borderRadius:'5px 5px 0 0',minHeight:dd.t>0?2:0}}/><div style={{height:cH,background:'linear-gradient(180deg,var(--r),var(--r)44)',minHeight:dd.ca>0?2:0}}/></div><span style={{fontSize:9,color:'var(--td)'}}>{m.split('-')[1]}/{m.split('-')[0].slice(2)}</span></div>})}</div><div style={{display:'flex',gap:14,justifyContent:'center',marginTop:10,fontSize:11}}><span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--bl)',marginRight:4,verticalAlign:'middle'}}/>OK</span><span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--r)',marginRight:4,verticalAlign:'middle'}}/>Storno</span></div></div>}
    </React.Fragment>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
