<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bee-doo | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"><\/script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"><\/script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
    <style>
        :root{--a:#F5C500;--ad:rgba(245,197,0,.12);--bg:#08090d;--c:#111219;--el:#1a1b24;--b:rgba(255,255,255,.06);--ba:rgba(245,197,0,.2);--t:#d8dae2;--td:#6b7280;--tb:#f3f4f6;--g:#22c55e;--gd:rgba(34,197,94,.12);--r:#ef4444;--rd:rgba(239,68,68,.12);--o:#f59e0b;--od:rgba(245,158,11,.12);--bl:#3b82f6;--bld:rgba(59,130,246,.12);--p:#a855f7;--pd:rgba(168,85,247,.12);--cy:#06b6d4;--cyd:rgba(6,182,212,.12)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes sp{to{transform:rotate(360deg)}}
        .fi{animation:fi .3s ease-out}.spinner{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
        .hdr{padding:12px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(245,197,0,.02) 0%,transparent 100%)}
        .hdr-l{display:flex;align-items:center;gap:14px}.logo{display:flex;align-items:center;gap:10px}.logo img{height:26px}.logo span{font-size:14px;color:var(--td)}
        .hdr-r{display:flex;align-items:center;gap:10px}
        .hdr-lk{font-size:11px;color:var(--td);text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid var(--b);transition:all .2s}.hdr-lk:hover{color:var(--a);border-color:var(--ba)}
        .topnav{display:flex;gap:0;border-bottom:2px solid var(--b);background:var(--bg);padding:0 28px;overflow-x:auto}
        .topnav-item{display:flex;align-items:center;gap:8px;padding:14px 20px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
        .topnav-item:hover{background:rgba(255,255,255,.02)}.topnav-item.on{border-bottom-color:var(--a)}
        .topnav-icon{font-size:18px}.topnav-label{font-size:13px;font-weight:600;color:var(--td)}.topnav-item.on .topnav-label{color:var(--a)}
        .mn{max-width:1440px;margin:0 auto;padding:20px 28px}
        .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:20px}
        .kpi{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:14px 16px}.kpi-l{font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.kpi-v{font-size:24px;font-weight:700}.kpi-s{font-size:10px;margin-top:2px}
        .cd{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:18px;margin-bottom:14px}.cd-t{font-size:14px;font-weight:600;color:var(--tb);display:flex;align-items:center;gap:8px;margin-bottom:12px}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .mt{width:100%;border-collapse:collapse;font-size:12px}.mt th{text-align:left;padding:8px 10px;color:var(--td);font-size:9px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b)}
        .mt td{padding:7px 10px;border-bottom:1px solid var(--b)}.mt tr:last-child td{border:none}.mt tr:hover td{background:rgba(255,255,255,.015)}
        .tg{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
        .tg-r{background:var(--rd);color:var(--r)}.tg-o{background:var(--od);color:var(--o)}.tg-g{background:var(--gd);color:var(--g)}.tg-b{background:var(--bld);color:var(--bl)}.tg-p{background:var(--pd);color:var(--p)}.tg-a{background:var(--ad);color:var(--a)}.tg-c{background:var(--cyd);color:var(--cy)}
        .bar-h{height:7px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.04)}.bar-f{height:100%;border-radius:4px;transition:width .5s ease}
        .lnk{color:var(--a);text-decoration:none;font-size:11px;opacity:.7}.lnk:hover{opacity:1}
        .sub-tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--el);border-radius:8px;padding:3px;overflow-x:auto}
        .sub-tab{padding:8px 16px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--td);transition:all .2s;white-space:nowrap}.sub-tab:hover{color:var(--t)}.sub-tab.on{background:var(--c);color:var(--a);font-weight:600}
        .funnel-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b)}.funnel-label{font-size:12px;color:var(--tb);min-width:140px;font-weight:500}
        .funnel-bar{height:28px;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:700;color:#fff;min-width:60}
        .funnel-pct{font-size:10px;color:var(--td);min-width:50px;text-align:right}
        .stat-box{background:var(--el);border-radius:10px;padding:16px;text-align:center}.stat-box-v{font-size:28px;font-weight:700;margin-bottom:2px}.stat-box-l{font-size:10px;color:var(--td)}
        @media(max-width:1100px){.g2{grid-template-columns:1fr}}
        @media(max-width:768px){.mn{padding:12px}.topnav{padding:0 8px}.topnav-item{padding:10px 12px}.kpis{grid-template-columns:repeat(2,1fr)}.hdr{padding:10px 14px}.topnav-label{font-size:11px}}
        @media(max-width:480px){.kpis{grid-template-columns:1fr 1fr}.kpi-v{font-size:20px}}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;
const SU='https://hqzpemfaljxcysyqssng.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const ap=t=>`${SU}/rest/v1/${t}`;
const hd=()=>({apikey:SK,Authorization:`Bearer ${SK}`,'Content-Type':'application/json'});
const fm=v=>typeof v==='number'?v.toLocaleString('de-DE'):v;
const pct=(a,b)=>b>0?(a/b*100).toFixed(1):'0';
async function sGet(t,q='',limit=50000){const all=[];for(let off=0;off<limit;off+=1000){const r=await(await fetch(ap(t)+`?${q}&limit=1000&offset=${off}`,{headers:hd()})).json();if(!r.length)break;all.push(...r);if(r.length<1000)break}return all}
function parseWH(wh){const steps=[];const parts=(wh||'').split(/(?=\d{2}\.\d{2}\.\d{4})/);for(const p of parts){const m=p.match(/^(\d{2})\.(\d{2})\.(\d{4})\s*-\s*(\d{2}):(\d{2})-\s*(.+?):\s*(.+)/);if(m){try{const dt=new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]);const trans=m[7].trim().match(/^(.+?)\s*>\s*(.+)/);if(trans)steps.push({dt,from:trans[1].trim(),to:trans[2].trim()});else steps.push({dt,from:'',to:m[7].trim()})}catch(e){}}}return steps}
const STAGE_MATCH={auftrag:['auftrag'],dc_planung:['dc in planung'],dc_freigabe:['dc freigabe','freigabe dc'],baustelle:['baustelle gestartet'],dc_fertig:['dc montage vollständig'],ac_freigabe:['ac freigabe','freigabe ac'],ac_fertig:['ac montage vollständig'],abgeschlossen:['montage abgeschlossen']};
function matchStage(s){const sl=s.toLowerCase();for(const[k,ps] of Object.entries(STAGE_MATCH))if(ps.some(p=>sl.includes(p)))return k;return null}
const STAGES=[{key:'auftrag',label:'Auftrag',color:'var(--a)'},{key:'dc_planung',label:'DC Planung',color:'var(--bl)'},{key:'dc_freigabe',label:'DC Freigabe',color:'var(--bl)'},{key:'baustelle',label:'Baustelle',color:'var(--cy)'},{key:'dc_fertig',label:'DC fertig',color:'var(--g)'},{key:'ac_freigabe',label:'AC Freigabe',color:'var(--p)'},{key:'ac_fertig',label:'AC fertig',color:'var(--g)'},{key:'abgeschlossen',label:'Abgeschlossen',color:'var(--g)'}];
const SCOUT_APPT=['Termin vor Ort ( SCOUT )'];
const VT_APPT=['Termin vor Ort PV','Beratungstermin Online','Ersttermin','Termin vor Ort','Vor Ort Termin','Termin vor Ort EP','Termin vor Ort für Wärmepumpe','Termin vor Ort PV und Wärmepumpe'];
const FOLGE=['Folgetermin vor Ort'];
const isVTA=t=>VT_APPT.includes(t)||SCOUT_APPT.includes(t)||FOLGE.includes(t);
const isScQ=q=>{if(!q)return false;const l=q.toLowerCase();return l.startsWith('mvpp')||l.includes('sadd')||l.includes('omega')};
function BarC({data,color='var(--a)',height=160}){const max=Math.max(...data.map(d=>d.v),1);return<div style={{display:'flex',alignItems:'flex-end',gap:6,height,paddingTop:20}}>{data.map((d,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontSize:11,fontWeight:700,color}}>{fm(d.v)}</span><div style={{width:'100%',maxWidth:55,height:d.v/max*(height-40),background:`linear-gradient(180deg,${color},${color}44)`,borderRadius:'5px 5px 0 0',minHeight:3}}/><span style={{fontSize:9,color:'var(--td)'}}>{d.l}</span></div>)}</div>}
function RT({items,cols,mc='var(--a)'}){const mx=items.length?items[0].v:1;return<table className="mt"><thead><tr>{cols.map((c,i)=><th key={i}>{c}</th>)}<th></th></tr></thead><tbody>{items.map((it,i)=><tr key={i}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700,width:30}}>{i+1}</td><td style={{color:'var(--tb)',fontWeight:500,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.n}</td><td style={{fontWeight:700,color:mc}}>{fm(it.v)}</td>{it.x?<td style={{fontSize:11,color:'var(--td)'}}>{it.x}</td>:null}<td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${it.v/mx*100}%`,background:mc}}/></div></td></tr>)}</tbody></table>}

function App(){
    const[sec,setSec]=useState('sales');const[data,setData]=useState({});const[loading,setLoading]=useState({});const loaded=useRef({});
    const load=useCallback(async(section)=>{if(loaded.current[section])return;setLoading(p=>({...p,[section]:true}));try{let d={};
        if(section==='sales'){const[orders,vts,efs]=await Promise.all([sGet('auftraege','select=auftrag_nr,kunde_name,kunde_plz,beedoo_fortschritt,datum_angenommen,storniert,anlagen_kwp,hat_speicher,vertriebler_id,workflow_history,lead_quelle,status'),sGet('vertriebler','select=id,name,aktiv'),sGet('efs_projekte','select=simplified_status,gesamtpreis_eur')]);d={orders,vts,efs}}
        else if(section==='montage'){const[orders,appts]=await Promise.all([sGet('auftraege','select=auftrag_nr,kunde_name,kunde_plz,beedoo_fortschritt,datum_angenommen,storniert,workflow_history,anlagen_kwp'),sGet('leveto_appointments','select=leveto_id,appointment_type,start_date,status,user_received,kunde_plz&appointment_type=in.(AC Montage,DC Montage,AC Nacharbeit,DC Nacharbeit)')]);d={orders:orders.filter(o=>!o.storniert),appts}}
        else if(section==='termine'){d={appts:await sGet('leveto_appointments','select=leveto_id,appointment_type,start_date,status,user_created,user_received,kunde_nachname,kunde_plz,storno_reason')}}
        else if(section==='leads'){d={leads:await sGet('leveto_leads','select=status_name,quelle,berater_name,plz,leveto_erstellt_am')}}
        else if(section==='scouts'){const[leads,orders,appts,scouter]=await Promise.all([sGet('leveto_leads','select=leveto_id,status_name,quelle,berater_name,plz,leveto_erstellt_am'),sGet('auftraege','select=auftrag_nr,lead_quelle,storniert,datum_angenommen,vertriebler_id,anlagen_kwp'),sGet('leveto_appointments','select=leveto_id,appointment_type,status,start_date,user_created,user_received,storno_reason,kunde_plz'),sGet('scouter','select=id,vorname,nachname,active,fix_gehalt,phone,email')]);d={leads,orders,appts,scouter}}
        else if(section==='callcenter'){const[appts,leads,orders]=await Promise.all([sGet('leveto_appointments','select=leveto_id,appointment_type,status,start_date,user_created,user_received,storno_reason,kunde_plz'),sGet('leveto_leads','select=leveto_id,status_name,quelle,leveto_erstellt_am'),sGet('auftraege','select=auftrag_nr,lead_quelle,storniert,datum_angenommen')]);d={appts,leads,orders}}
        setData(p=>({...p,[section]:d}));loaded.current[section]=true}catch(e){console.error(e)}setLoading(p=>({...p,[section]:false}))
    },[]);
    useEffect(()=>{load(sec)},[sec,load]);
    const NAV=[{k:'sales',i:'📊',l:'Sales'},{k:'montage',i:'🏗️',l:'Montage'},{k:'termine',i:'📅',l:'Termine'},{k:'leads',i:'📥',l:'Leads'},{k:'scouts',i:'🏃',l:'Scouts'},{k:'callcenter',i:'📞',l:'Call Center'}];
    return<React.Fragment>
        <div className="hdr"><div className="hdr-l"><div className="logo"><img src="https://bee-doo-tools.vercel.app/bee-doo-Logo-white.svg" alt="bee-doo"/><span>Dashboard</span></div></div><div className="hdr-r"><a href="https://bee-doo-tools.vercel.app/" className="hdr-lk">← Toolbox</a></div></div>
        <div className="topnav">{NAV.map(n=><div key={n.k} className={`topnav-item ${sec===n.k?'on':''}`} onClick={()=>setSec(n.k)}><span className="topnav-icon">{n.i}</span><span className="topnav-label">{n.l}</span></div>)}</div>
        <div className="mn">
            {loading[sec]&&!data[sec]?<div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:60,flexDirection:'column',gap:14}}><span className="spinner" style={{width:28,height:28,borderWidth:3,color:'var(--a)'}}/><span style={{color:'var(--td)',fontSize:13}}>Lade {NAV.find(n=>n.k===sec)?.l}...</span></div>:null}
            {sec==='sales'&&data.sales&&<Sales d={data.sales}/>}
            {sec==='montage'&&data.montage&&<Montage d={data.montage}/>}
            {sec==='termine'&&data.termine&&<Termine d={data.termine}/>}
            {sec==='leads'&&data.leads&&<Leads d={data.leads}/>}
            {sec==='scouts'&&data.scouts&&<Scouts d={data.scouts}/>}
            {sec==='callcenter'&&data.callcenter&&<CallCenter d={data.callcenter}/>}
        </div>
    </React.Fragment>
}
function Sales({d}){
    const[sub,setSub]=useState('overview');const{orders,vts,efs}=d;
    const active=orders.filter(o=>!o.storniert),storno=orders.filter(o=>o.storniert);
    const vtMap={};vts.forEach(v=>{vtMap[v.id]=v.name||'?'});
    const monthly={};active.forEach(o=>{if(o.datum_angenommen){const ym=o.datum_angenommen.substring(0,7);monthly[ym]=(monthly[ym]||0)+1}});
    const fort={};active.forEach(o=>{const f=o.beedoo_fortschritt||'(leer)';fort[f]=(fort[f]||0)+1});const fortS=Object.entries(fort).sort((a,b)=>b[1]-a[1]);
    const vtP={};active.forEach(o=>{const v=vtMap[o.vertriebler_id]||'?';vtP[v]=(vtP[v]||0)+1});const vtS=Object.entries(vtP).sort((a,b)=>b[1]-a[1]);
    const efsS={};efs.forEach(e=>{const s=e.simplified_status||'?';efsS[s]=(efsS[s]||0)+1});
    const kwp=active.reduce((s,o)=>s+(parseFloat(o.anlagen_kwp)||0),0);
    const efsDone=efs.filter(e=>['COMPLETED','GRID_CONNECTED','INSTALLED'].includes(e.simplified_status)).length;
    return<React.Fragment>
        <div className="kpis fi">
            <div className="kpi"><div className="kpi-l">Aktive Aufträge</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(active.length)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{fm(storno.length)} storniert</div></div>
            <div className="kpi"><div className="kpi-l">Storno-Quote</div><div className="kpi-v" style={{color:'var(--o)'}}>{pct(storno.length,orders.length)}%</div></div>
            <div className="kpi"><div className="kpi-l">Gesamt kWp</div><div className="kpi-v" style={{color:'var(--cy)'}}>{fm(Math.round(kwp))}</div><div className="kpi-s" style={{color:'var(--td)'}}>Ø {(kwp/active.length).toFixed(1)} kWp</div></div>
            <div className="kpi"><div className="kpi-l">EFS Projekte</div><div className="kpi-v" style={{color:'var(--bl)'}}>{fm(efs.length)}</div><div className="kpi-s" style={{color:'var(--g)'}}>{fm(efsDone)} fertig</div></div>
            <div className="kpi"><div className="kpi-l">Vertriebler aktiv</div><div className="kpi-v" style={{color:'var(--p)'}}>{vts.filter(v=>v.aktiv).length}</div></div>
        </div>
        <div className="sub-tabs">{['Übersicht','Vertriebler','Status','EFS'].map((t,i)=>{const k=['overview','vt','status','efs'][i];return<div key={k} className={`sub-tab ${sub===k?'on':''}`} onClick={()=>setSub(k)}>{t}</div>})}</div>
        {sub==='overview'&&<div className="g2 fi"><div className="cd"><div className="cd-t">📈 Aufträge/Monat</div><BarC data={Object.entries(monthly).sort().slice(-12).map(([m,c])=>({v:c,l:m.split('-')[1]+'/'+m.split('-')[0].slice(2)}))} color="var(--a)"/></div><div className="cd"><div className="cd-t">🏆 Top Vertriebler</div><RT items={vtS.slice(0,10).map(([n,v])=>({n,v}))} cols={['#','Vertriebler','Aufträge']}/></div></div>}
        {sub==='vt'&&<div className="cd fi"><div className="cd-t">🏆 Alle Vertriebler</div><RT items={vtS.map(([n,v])=>({n,v,x:pct(v,active.length)+'%'}))} cols={['#','Vertriebler','Aufträge','%']}/></div>}
        {sub==='status'&&<div className="cd fi"><div className="cd-t">📋 Status <a href="stuck-orders.html" className="lnk" style={{marginLeft:'auto'}}>→ Stuck Orders</a></div><table className="mt"><thead><tr><th>Fortschritt</th><th>Anz.</th><th>%</th><th></th></tr></thead><tbody>{fortS.map(([f,c])=><tr key={f}><td style={{color:'var(--tb)',fontSize:11}}>{f}</td><td style={{fontWeight:700}}>{c}</td><td style={{color:'var(--td)'}}>{pct(c,active.length)}%</td><td style={{width:'40%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/fortS[0][1]*100}%`,background:'var(--a)'}}/></div></td></tr>)}</tbody></table></div>}
        {sub==='efs'&&<div className="cd fi"><div className="cd-t">📊 EFS</div><table className="mt"><thead><tr><th>Status</th><th>Anz.</th><th>%</th><th></th></tr></thead><tbody>{Object.entries(efsS).sort((a,b)=>b[1]-a[1]).map(([s,c])=>{const clr=['REVOKED','CUSTOMER_REJECTED'].includes(s)?'var(--r)':['COMPLETED','GRID_CONNECTED','INSTALLED'].includes(s)?'var(--g)':'var(--bl)';return<tr key={s}><td><span className={`tg ${['REVOKED','CUSTOMER_REJECTED'].includes(s)?'tg-r':['COMPLETED','GRID_CONNECTED','INSTALLED'].includes(s)?'tg-g':'tg-b'}`}>{s.replace(/_/g,' ')}</span></td><td style={{fontWeight:700,color:clr}}>{c}</td><td style={{color:'var(--td)'}}>{pct(c,efs.length)}%</td><td style={{width:'35%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/efs.length*100}%`,background:clr}}/></div></td></tr>})}</tbody></table></div>}
    </React.Fragment>
}

function Montage({d}){
    const[sub,setSub]=useState('pipeline');const{orders,appts}=d;
    const a=useMemo(()=>{const sc={};STAGES.forEach(s=>{sc[s.key]=0});const sd={};const mc={};let bau=0,na=0;
        for(const o of orders){const steps=parseWH(o.workflow_history);if(!steps.length)continue;const rch={};let hb=false,hn=false;
            for(const s of steps){const sk=matchStage(s.to);if(sk&&!rch[sk]){rch[sk]={dt:s.dt};sc[sk]++}if(s.to.toLowerCase().includes('baustelle gestartet'))hb=true;if(s.to.toLowerCase().includes('nacharbeit'))hn=true;if(s.to.toLowerCase().includes('montage abgeschlossen')){const ym=`${s.dt.getFullYear()}-${String(s.dt.getMonth()+1).padStart(2,'0')}`;mc[ym]=(mc[ym]||0)+1}}
            if(hb)bau++;if(hn)na++;const so=['auftrag','dc_planung','dc_freigabe','baustelle','dc_fertig','ac_freigabe','ac_fertig','abgeschlossen'];
            for(let i=0;i<so.length-1;i++){const x=so[i],y=so[i+1];if(rch[x]&&rch[y]){const dd=Math.round((rch[y].dt-rch[x].dt)/86400000);if(dd>=0&&dd<365){if(!sd[`${x}→${y}`])sd[`${x}→${y}`]=[];sd[`${x}→${y}`].push(dd)}}}

        {sub==='team'&&<div className="cd fi"><div className="cd-t">👥 Scout-Team</div><table className="mt"><thead><tr><th>Name</th><th>Telefon</th><th>E-Mail</th><th>Fix-Gehalt</th><th>Status</th></tr></thead><tbody>{scouter.sort((a,b)=>(b.active?1:0)-(a.active?1:0)).map(s=><tr key={s.id}><td style={{color:'var(--tb)',fontWeight:600}}>{s.vorname} {s.nachname}</td><td style={{fontSize:11,color:'var(--td)'}}>{s.phone||'—'}</td><td style={{fontSize:11,color:'var(--td)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis'}}>{s.email||'—'}</td><td style={{fontWeight:600,color:'var(--a)'}}>{s.fix_gehalt?`${fm(parseFloat(s.fix_gehalt))} €`:'—'}</td><td>{s.active?<span className="tg tg-g">Aktiv</span>:<span className="tg tg-r">Inaktiv</span>}</td></tr>)}</tbody></table></div>}
        {sub==='monthly'&&<div className="cd fi"><div className="cd-t">📈 Scout-Leads/Monat</div><BarC data={Object.entries(an.mo).sort().slice(-12).map(([m,c])=>({v:c,l:m.split('-')[1]+'/'+m.split('-')[0].slice(2)}))} color="var(--p)" height={180}/></div>}
    </React.Fragment>
}

function CallCenter({d}){
    const[sub,setSub]=useState('overview');const{appts,leads,orders}=d;
    const an=useMemo(()=>{
        const sa=appts.filter(a=>isVTA(a.appointment_type));
        const cc=sa.filter(a=>!SCOUT_APPT.includes(a.appointment_type)&&a.appointment_type!=='Folgetermin vor Ort'&&(a.user_created||'').trim()!=='Scouty');
        const wvl=appts.filter(a=>a.appointment_type==='WVL Telefon');
        const agents={};cc.forEach(a=>{const c=(a.user_created||'?').trim();if(!agents[c])agents[c]={t:0,o:0,cl:0,ca:0};agents[c].t++;if(a.status==='Open')agents[c].o++;else if(a.status==='Closed')agents[c].cl++;else if(a.status==='Cancelled')agents[c].ca++});
        const stR={};cc.filter(a=>a.status==='Cancelled').forEach(a=>{const r=(a.storno_reason||'(kein Grund)').trim();stR[r]=(stR[r]||0)+1});
        const mo={};cc.forEach(a=>{if(a.start_date){const ym=a.start_date.substring(0,7);if(!mo[ym])mo[ym]={t:0,ca:0};mo[ym].t++;if(a.status==='Cancelled')mo[ym].ca++}});
        const wvlA={};wvl.forEach(a=>{const c=(a.user_created||'?').trim();wvlA[c]=(wvlA[c]||0)+1});
        const tot=cc.length,op=cc.filter(a=>a.status==='Open').length,cl=cc.filter(a=>a.status==='Closed').length,ca=cc.filter(a=>a.status==='Cancelled').length;
        return{cc,tot,op,cl,ca,agents,stR,mo,wvl:wvl.length,wvlA,wvlOp:wvl.filter(a=>a.status==='Open').length,wvlCl:wvl.filter(a=>a.status==='Closed').length}
    },[appts]);
    const agS=Object.entries(an.agents).sort((a,b)=>b[1].t-a[1].t).filter(([n])=>n!=='?');
    return<React.Fragment>
        <div className="kpis fi">
            <div className="kpi"><div className="kpi-l">CC-Termine gelegt</div><div className="kpi-v" style={{color:'var(--bl)'}}>{fm(an.tot)}</div></div>
            <div className="kpi"><div className="kpi-l">Erledigt</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(an.cl)}</div><div className="kpi-s" style={{color:'var(--g)'}}>{pct(an.cl,an.tot)}%</div></div>
            <div className="kpi"><div className="kpi-l">Storniert</div><div className="kpi-v" style={{color:'var(--r)'}}>{fm(an.ca)}</div><div className="kpi-s" style={{color:'var(--r)'}}>{pct(an.ca,an.tot)}% Ausfall</div></div>
            <div className="kpi"><div className="kpi-l">Offen</div><div className="kpi-v" style={{color:'var(--o)'}}>{fm(an.op)}</div></div>
            <div className="kpi"><div className="kpi-l">WVL Telefon</div><div className="kpi-v" style={{color:'var(--cy)'}}>{fm(an.wvl)}</div></div>
            <div className="kpi"><div className="kpi-l">CC-Agenten</div><div className="kpi-v" style={{color:'var(--p)'}}>{agS.length}</div></div>
        </div>
        <div className="sub-tabs">{['Übersicht','CC-Agenten','Terminausfall','WVL Telefon','Monatlich'].map((t,i)=>{const k=['overview','agents','ausfall','wvl','monthly'][i];return<div key={k} className={`sub-tab ${sub===k?'on':''}`} onClick={()=>setSub(k)}>{t}</div>})}</div>
        {sub==='overview'&&<React.Fragment>
            <div className="cd fi"><div className="cd-t">📞 CC Funnel</div><div style={{maxWidth:700}}>{[{l:'Termine gelegt',v:an.tot,c:'var(--bl)'},{l:'Stattgefunden',v:an.cl,c:'var(--cy)'},{l:'Storniert/Ausfall',v:an.ca,c:'var(--r)'}].map((s,i)=>{const mx=an.tot||1;const w=Math.max(s.v/mx*100,3);return<div key={i} className="funnel-row"><span className="funnel-label">{s.l}</span><div className="funnel-bar" style={{width:`${w}%`,background:s.c}}>{fm(s.v)}</div><span className="funnel-pct">{pct(s.v,an.tot)}%</span></div>})}</div></div>
            <div className="g2 fi">
                <div className="cd"><div className="cd-t">🏆 Top CC-Agenten</div><table className="mt"><thead><tr><th>#</th><th>Agent</th><th>Termine</th><th>Erledigt</th><th>Storno</th><th>Quote</th></tr></thead><tbody>{agS.slice(0,10).map(([n,a],i)=><tr key={n}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td><td style={{color:'var(--tb)',fontWeight:500,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n}</td><td style={{fontWeight:700,color:'var(--bl)'}}>{fm(a.t)}</td><td style={{color:'var(--g)'}}>{fm(a.cl)}</td><td style={{color:'var(--r)'}}>{fm(a.ca)}</td><td>{a.ca/a.t>.35?<span className="tg tg-r">{pct(a.ca,a.t)}%</span>:<span className="tg tg-g">{pct(a.ca,a.t)}%</span>}</td></tr>)}</tbody></table></div>
                <div className="cd"><div className="cd-t">📊 Conversion</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)'}}>{pct(an.cl,an.tot)}%</div><div className="stat-box-l">Stattgefunden</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--r)'}}>{pct(an.ca,an.tot)}%</div><div className="stat-box-l">Ausfallquote</div></div></div></div>
            </div>
        </React.Fragment>}
        {sub==='agents'&&<div className="cd fi"><div className="cd-t">👥 Alle CC-Agenten</div><table className="mt"><thead><tr><th>#</th><th>Agent</th><th>Termine</th><th>Erledigt</th><th>Storno</th><th>Offen</th><th>Ausfall%</th><th></th></tr></thead><tbody>{agS.map(([n,a],i)=>{const ap2=a.ca/(a.t||1)*100;return<tr key={n}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td><td style={{color:'var(--tb)',fontWeight:500,maxWidth:170,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n}</td><td style={{fontWeight:700}}>{fm(a.t)}</td><td style={{color:'var(--g)'}}>{fm(a.cl)}</td><td style={{color:'var(--r)'}}>{fm(a.ca)}</td><td style={{color:'var(--o)'}}>{fm(a.o)}</td><td>{ap2>35?<span className="tg tg-r">{ap2.toFixed(1)}%</span>:ap2>25?<span className="tg tg-o">{ap2.toFixed(1)}%</span>:<span className="tg tg-g">{ap2.toFixed(1)}%</span>}</td><td style={{width:'18%'}}><div className="bar-h"><div className="bar-f" style={{width:`${a.t/agS[0][1].t*100}%`,background:'var(--bl)'}}/></div></td></tr>})}</tbody></table></div>}
        {sub==='ausfall'&&<div className="cd fi"><div className="cd-t">❌ Storno-Gründe (CC)</div><table className="mt"><thead><tr><th>Grund</th><th>Anz.</th><th>%</th><th></th></tr></thead><tbody>{Object.entries(an.stR).sort((a,b)=>b[1]-a[1]).map(([r,c])=><tr key={r}><td style={{color:'var(--tb)',fontSize:11,maxWidth:250,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r}</td><td style={{fontWeight:700,color:'var(--r)'}}>{fm(c)}</td><td style={{color:'var(--td)'}}>{pct(c,an.ca)}%</td><td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/Math.max(...Object.values(an.stR))*100}%`,background:'var(--r)'}}/></div></td></tr>)}</tbody></table></div>}
        {sub==='wvl'&&<div className="cd fi"><div className="cd-t">📞 WVL Telefon</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginBottom:16}}><div className="stat-box"><div className="stat-box-v" style={{color:'var(--cy)'}}>{fm(an.wvl)}</div><div className="stat-box-l">Gesamt</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)'}}>{fm(an.wvlCl)}</div><div className="stat-box-l">Erledigt</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--o)'}}>{fm(an.wvlOp)}</div><div className="stat-box-l">Offen</div></div></div><RT items={Object.entries(an.wvlA).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([n,v])=>({n,v}))} cols={['#','Person','WVL']} mc="var(--cy)"/></div>}
        {sub==='monthly'&&<div className="cd fi"><div className="cd-t">📈 CC-Termine/Monat</div><div style={{display:'flex',alignItems:'flex-end',gap:6,height:200,paddingTop:20}}>{Object.entries(an.mo).sort().slice(-12).map(([m,dd])=>{const mx=Math.max(...Object.values(an.mo).map(x=>x.t),1);const cH=dd.ca/mx*160;const oH=(dd.t-dd.ca)/mx*160;return<div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontSize:10,fontWeight:700,color:'var(--bl)'}}>{fm(dd.t)}</span><div style={{width:'100%',maxWidth:55,display:'flex',flexDirection:'column'}}><div style={{height:oH,background:'linear-gradient(180deg,var(--bl),var(--bl)44)',borderRadius:'5px 5px 0 0',minHeight:dd.t>0?2:0}}/><div style={{height:cH,background:'linear-gradient(180deg,var(--r),var(--r)44)',minHeight:dd.ca>0?2:0}}/></div><span style={{fontSize:9,color:'var(--td)'}}>{m.split('-')[1]}/{m.split('-')[0].slice(2)}</span></div>})}</div><div style={{display:'flex',gap:14,justifyContent:'center',marginTop:10,fontSize:11}}><span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--bl)',marginRight:4,verticalAlign:'middle'}}/>OK</span><span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--r)',marginRight:4,verticalAlign:'middle'}}/>Storno</span></div></div>}
    </React.Fragment>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
