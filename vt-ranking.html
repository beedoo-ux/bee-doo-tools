<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bee-doo · VT-Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#F5C500;--gold2:#FFE066;--bg:#08090f;--bg2:#0e1019;--card:#12141f;--card2:#181b28;--border:#1e2235;--text:#e8ecf4;--dim:#7b87a8;--green:#22c55e;--blue:#3b82f6;--cyan:#06b6d4;--purple:#a855f7;--orange:#f59e0b;--red:#ef4444;--pink:#ec4899}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,#F5C50008 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#3b82f606 0%,transparent 50%);pointer-events:none;z-index:0}

/* Boot Overlay */
.boot-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .6s ease}
.boot-overlay.done{opacity:0;pointer-events:none}
.boot-inner{width:100%;max-width:400px;padding:24px}
.boot-logo{text-align:center;margin-bottom:32px}
.boot-logo-icon{font-size:32px;margin-bottom:8px}
.boot-logo-text{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:4px}
.boot-steps{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
.boot-step{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;opacity:.2;transition:all .4s ease;transform:translateX(-8px)}
.boot-step.active{opacity:1;transform:translateX(0)}
.boot-step.current{background:#F5C50008;border:1px solid #F5C50020}
.boot-step-icon{font-size:14px;width:20px;text-align:center}
.boot-step-label{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.boot-step-status{font-size:10px;font-weight:700;color:var(--green);background:#22c55e15;padding:2px 8px;border-radius:6px}
.boot-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px}
.boot-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width .15s ease;box-shadow:0 0 12px #F5C50040;width:0%}
.boot-info{display:flex;justify-content:space-between}
.boot-info span{font-size:10px;font-weight:600;color:var(--dim)}
.boot-info .pct{color:var(--gold);font-family:monospace;font-weight:700}
.boot-stats{display:flex;gap:10px;justify-content:center;margin-top:16px;opacity:0;transition:opacity .4s ease}
.boot-stats.show{opacity:1}
.boot-stat{text-align:center;padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.boot-stat-val{font-size:14px;font-weight:800;font-family:'Outfit',sans-serif}
.boot-stat-label{font-size:8px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Main */
.main{max-width:720px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}
.header{text-align:center;margin-bottom:28px;position:relative}
.hero-label{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:3px}
.hero-number{font-family:'Outfit',sans-serif;font-size:clamp(72px,16vw,110px);font-weight:900;line-height:1;background:linear-gradient(135deg,var(--gold),var(--gold2),#fff,var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.hero-sub{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:#3d4566;letter-spacing:2px;text-transform:uppercase;margin-top:8px}

.confetti-wrap{position:absolute;top:0;left:0;right:0;height:200px;overflow:hidden;pointer-events:none;z-index:10}
.confetti-p{position:absolute;opacity:0;animation:confettiFall 3.5s ease-in-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg) scale(1)}60%{opacity:1}100%{opacity:0;transform:translateY(200px) rotate(720deg) scale(.4)}}

.crown-pos{position:relative}
.crown-pos::before{content:'👑';position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:18px;animation:crownFloat 2s ease-in-out infinite}
@keyframes crownFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

/* Countdown */
.countdown{text-align:center;margin-bottom:20px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.countdown-inner{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.countdown-seg{text-align:center}
.countdown-val{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--gold)}
.countdown-unit{font-size:9px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.countdown-sep{font-size:18px;color:var(--border);font-weight:300}
.countdown-label{font-size:11px;font-weight:600;color:var(--dim)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;transition:all .2s}
.kpi:hover{border-color:var(--gold);transform:translateY(-2px)}
.kpi-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;line-height:1}
.kpi-label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.ctrl-btn:hover{border-color:var(--gold);color:var(--text)}
.ctrl-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.ctrl-select{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;outline:none}
.ctrl-select:focus{border-color:var(--gold)}
.ctrl-select option{background:var(--card);color:var(--text)}

/* Compact legend */
.legend{display:flex;flex-wrap:wrap;gap:6px 16px;justify-content:center;margin-bottom:16px;padding:10px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.legend span{font-size:13px;font-weight:600;white-space:nowrap}

/* Rank cards */
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-card{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:all .25s ease;position:relative;overflow:hidden}
.rank-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0}
.rank-card:hover{border-color:#2a3050;transform:translateX(4px)}
.rank-card.gold{background:linear-gradient(135deg,#1a1708 0%,var(--card) 60%);border-color:#3a3010;animation:pulseGold 2.5s ease-in-out infinite}
.rank-card.gold::before{background:linear-gradient(180deg,var(--gold),#b8940a)}
.rank-card.gold:hover{border-color:#4a4020;box-shadow:0 0 30px #F5C50010}
@keyframes pulseGold{0%,100%{box-shadow:0 0 0 0 #F5C50000,0 0 20px #F5C50000;transform:scale(1)}50%{box-shadow:0 0 20px #F5C50025,0 0 40px #F5C50010;transform:scale(1.012)}}
@keyframes pulseSilver{0%,100%{box-shadow:0 0 0 0 #94a3b800;transform:scale(1)}50%{box-shadow:0 0 15px #94a3b820,0 0 30px #94a3b808;transform:scale(1.008)}}
@keyframes pulseBronze{0%,100%{box-shadow:0 0 0 0 #d9770600;transform:scale(1)}50%{box-shadow:0 0 15px #d9770620,0 0 30px #d9770608;transform:scale(1.006)}}
.rank-card.silver{background:linear-gradient(135deg,#161820 0%,var(--card) 60%);border-color:#2a2d3a;animation:pulseSilver 3s ease-in-out infinite}
.rank-card.silver::before{background:linear-gradient(180deg,#94a3b8,#64748b)}
.rank-card.bronze{background:linear-gradient(135deg,#1a1410 0%,var(--card) 60%);border-color:#2a2418;animation:pulseBronze 3.5s ease-in-out infinite}
.rank-card.bronze::before{background:linear-gradient(180deg,#d97706,#92400e)}
.rank-pos{font-family:'Outfit',sans-serif;font-weight:900;text-align:center;line-height:1}
.rank-pos.p1{font-size:28px}.rank-pos.p2{font-size:24px}.rank-pos.p3{font-size:22px}
.rank-pos.pn{font-size:16px;color:var(--dim)}
.rank-info{min-width:0}
.rank-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rank-name{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-card.gold .rank-name{font-size:17px}
.rank-trend{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:20px;font-size:10px;font-weight:800;font-family:'Outfit',sans-serif}
.rank-trend.up{background:#22c55e18;color:#4ade80}
.rank-trend.down{background:#ef444418;color:#f87171}
.rank-trend.same{background:#6366f118;color:#a5b4fc}
.rank-achievement{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:800;white-space:nowrap}
.rank-streak{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:800;background:#f9731618;color:#fb923c;border:1px solid #f9731630}
.rank-pb{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:20px;font-size:9px;font-weight:800;background:#F5C50018;color:var(--gold);border:1px solid #F5C50030}
.rank-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.rank-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.tag-pv{background:#f9731616;color:#fb923c}.tag-hp{background:#06b6d416;color:#22d3ee}
.tag-el{background:#22c55e16;color:#4ade80}.tag-emp{background:#3b82f616;color:#60a5fa}
.tag-sp{background:#a855f716;color:#c084fc}.tag-zero{background:#f59e0b16;color:#fbbf24}
.rank-spark{display:inline-block;vertical-align:middle;margin-left:4px}
.rank-bar{grid-column:1/-1;height:3px;background:var(--bg);border-radius:2px;margin-top:2px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.rank-right{text-align:right}
.rank-sales{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;line-height:1}
.rank-card.gold .rank-sales{font-size:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rank-card.silver .rank-sales{font-size:30px;color:#94a3b8}
.rank-card.bronze .rank-sales{font-size:28px;color:#d97706}
.rank-vol{font-size:11px;font-weight:600;color:var(--dim);margin-top:2px}

/* Quote */
.quote-box{text-align:center;margin-top:24px;padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.quote-text{font-size:14px;font-weight:500;color:var(--text);font-style:italic;line-height:1.5}
.quote-author{font-size:11px;font-weight:600;color:var(--dim);margin-top:6px}

/* Blinking month selector hint */
.ctrl-select.pulse-hint{animation:selectPulse 1.5s ease-in-out infinite;border-color:var(--gold);box-shadow:0 0 12px #F5C50030}
@keyframes selectPulse{0%,100%{box-shadow:0 0 8px #F5C50020;border-color:var(--gold)}50%{box-shadow:0 0 20px #F5C50050;border-color:var(--gold2)}}
.month-hint{text-align:center;margin-bottom:12px;padding:8px 16px;background:#F5C50010;border:1px solid #F5C50020;border-radius:10px;font-size:12px;font-weight:600;color:var(--gold);animation:fadeUp .4s ease both .3s}
.month-hint .hint-arrow{display:inline-block;animation:bounceDown 1s ease-in-out infinite;margin-left:4px}
@keyframes bounceDown{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

/* Projection */
.rank-proj{font-size:10px;font-weight:600;color:var(--dim);margin-top:1px;font-style:italic}
.kpi-proj{font-size:10px;font-weight:600;color:var(--dim);margin-top:2px;font-style:italic}

/* Entry animations — top3 drop, rest slide */
.rank-card.entry-drop{opacity:0;transform:translateY(-40px) scale(.95);animation:dropIn .5s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes dropIn{to{opacity:1;transform:translateY(0) scale(1)}}
.rank-card.entry-slide{opacity:0;transform:translateX(-20px);animation:slideIn .4s ease forwards}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}

.footer{text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.footer-line{font-size:11px;color:var(--dim)}
.footer-ts{font-size:10px;color:#4a5578;margin-top:6px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeUp .4s ease both}
.fade-d1{animation-delay:.05s}.fade-d2{animation-delay:.1s}.fade-d3{animation-delay:.15s}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:13px;color:var(--dim);font-weight:500}

@media(max-width:480px){
.main{padding:12px 10px 40px}
.kpis{grid-template-columns:repeat(3,1fr);gap:6px}
.kpi{padding:10px 8px}.kpi-val{font-size:18px}
.rank-card{grid-template-columns:40px 1fr auto;gap:8px;padding:10px 12px}
.rank-name{font-size:13px}.rank-card.gold .rank-name{font-size:14px}
.rank-sales{font-size:22px}.rank-card.gold .rank-sales{font-size:28px}
.rank-card.silver .rank-sales{font-size:24px}
.rank-tag{font-size:9px;padding:1px 5px}
.controls{gap:6px}.ctrl-btn{font-size:12px;padding:7px 12px}
.legend span{font-size:11px}
.countdown-val{font-size:16px}
.rank-achievement,.rank-streak,.rank-pb{font-size:9px;padding:2px 6px}
.rank-trend{font-size:10px}
.rank-tag{font-size:10px;padding:2px 6px}
}
</style>
</head>

// Working days calculation (NRW holidays for 2026)
function getWorkingDays(year,m){
    // NRW Feiertage 2026
    var holidays={
        '2026-01-01':1,'2026-04-03':1,'2026-04-06':1,'2026-05-01':1,
        '2026-05-14':1,'2026-05-25':1,'2026-06-04':1,'2026-10-03':1,
        '2026-11-01':1,'2026-12-25':1,'2026-12-26':1
    };
    var total=0,elapsed=0;
    var today=new Date();today.setHours(0,0,0,0);
    var d=new Date(year,m-1,1);
    var end=new Date(year,m,1);
    while(d<end){
        var dow=d.getDay();
        var iso=d.toISOString().slice(0,10);
        if(dow>=1&&dow<=5&&!holidays[iso]){
            total++;
            if(d<=today)elapsed++;
        }
        d.setDate(d.getDate()+1);
    }
    return{total:total,elapsed:elapsed};
}

function getProjection(sales,year,m){
    var wd=getWorkingDays(year,m);
    if(wd.elapsed<1||wd.total<1)return null;
    var proj=Math.round(sales/wd.elapsed*wd.total);
    return{proj:proj,elapsed:wd.elapsed,total:wd.total};
}

    return m===cur;
}

// Sparkline SVG
function sparkSVG(name){
    if(month==='2026-01')return'';
    var j=findVt(JAN,name),f=findVt(FEB,name),m=marchData?findVt(marchData,name):null;
    var vals=[j?j.sales:0,f?f.sales:0];
    if(month==='2026-03'&&marchData)vals.push(m?m.sales:0);
    if(vals.length<2)return'';
    var max=Math.max.apply(null,vals)||1;
    var w=40,h=16,pad=2;
    var pts=vals.map(function(v,i){
        var x=pad+i*(w-2*pad)/(vals.length-1||1);
        var y=h-pad-(v/max)*(h-2*pad);
        return x+','+y;
    });
    var up=vals[vals.length-1]>=vals[0];
    var col=up?'#4ade80':'#f87171';
    return '<svg class="rank-spark" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><polyline points="'+pts.join(' ')+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+pts[pts.length-1].split(',')[0]+'" cy="'+pts[pts.length-1].split(',')[1]+'" r="2" fill="'+col+'"/></svg>';
}

// Streak: top3 in consecutive months
function getStreak(name){
    var months=['2026-01','2026-02'];
    if(marchData)months.push('2026-03');
    var streak=0;
    for(var i=months.length-1;i>=0;i--){
        var data=months[i]==='2026-03'?marchData:MONTHS_DATA[months[i]];
        if(!data)break;
        var sorted=data.slice().sort(function(a,b){return(b.sales-a.sales)||(b.netto-a.netto)});
        // Check if VT is in top 3 (with tied ranks)
        var r=1;var inTop3=false;
        for(var k=0;k<sorted.length;k++){
            if(k>0){var pv=sorted[k-1].sales;if(sorted[k].sales<pv)r=k+1;}
            if(sorted[k].n===name&&r<=3){inTop3=true;break;}
            if(r>3)break;
        }
        if(inTop3)streak++;else break;
    }
    return streak;
}

    var end=new Date(yr,mo,1);
    var diff=end-now;
    if(diff<=0)return'';

        // Personal best
        var pbHTML='';

        // Neu badge — first time this VT appears
        var neuHTML='';

        if(month==='2026-03'&&!findVt(JAN,d.n)&&!findVt(FEB,d.n))neuHTML='<span class="rank-achievement" style="background:#06b6d418;color:#22d3ee;border:1px solid #06b6d430">🆕 Neu</span>';

        // Projection for current month
        var projHTML='';
        var isCur=isCurrentMonth(month);
        if(isCur&&sort==='sales'){
            var sp2=month.split('-');
            var p=getProjection(d.sales,+sp2[0],+sp2[1]);
            if(p&&p.elapsed>=1)projHTML='<div class="rank-proj">→ ~'+p.proj+' Hochrechn.</div>';
        }

        // Entry animation: top3 drop in, rest slide in
        var entryClass=r<=3?'entry-drop':'entry-slide';

        cards+='<div class="rank-card '+cls+' '+entryClass+' fade-in" style="animation-delay:'+(Math.min(i,15)*0.04)+'s">'
            +'<div class="rank-pos '+pc+(r===1?' crown-pos':'')+'">'+ic+'</div>'
            +'<div class="rank-info">'
                +'<div class="rank-name-row"><span class="rank-name">'+sn(d.n)+'</span>'+sparkHTML+trendHTML+pbHTML+'</div>'
                +'<div class="rank-meta">'+tg+achHTML+neuHTML+streakHTML+'</div>'
                +'<div class="rank-bar"><div class="rank-bar-fill" style="width:'+bp+'%;background:'+bg+'"></div></div>'
            +'</div>'
            +'<div class="rank-right"><div class="rank-sales">'+v+'</div><div class="rank-vol">'+sb+'</div>'+projHTML+'</div>'
        +'</div>';
    });

    if(!rk.length)cards='<div style="text-align:center;padding:40px;color:var(--dim)">Keine Aufträge in '+monat+'</div>';

    var ts=new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    var lh=isCurrentMonth(month)||month==='2026'?' · <span style="color:var(--gold)">⚡ Live</span>':'';

    // Daily quote
    var dayOfYear=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/86400000);
    var q=QUOTES[dayOfYear%QUOTES.length];

    document.getElementById('app').innerHTML='<div class="main">'
        +'<div class="header fade-in"><div class="confetti-wrap">'+cf+'</div>'
        +'<div class="hero-label">bee-doo Sales Ranking</div>'
        +'<div class="hero-number">'+total+'</div>'
        +'<div class="hero-label">Deals '+(month.length===4?'in':'im')+' '+monat+'</div>'
        +'<div class="hero-sub">🐝 powered by bee-doo</div></div>'
        +countdownHTML()
        +'<div class="kpis fade-in fade-d1">'
        +'<div class="kpi"><div class="kpi-val" style="color:var(--gold)">'+total+'</div><div class="kpi-label">Deals</div></div>'
        +'<div class="kpi"><div class="kpi-val" style="color:#fb923c">☀️ '+tPV+'</div><div class="kpi-label">PV</div></div>'
        +kH
        +'<div class="kpi"><div class="kpi-val">'+fmt(Math.round(tNetto/1000))+'k</div><div class="kpi-label">Auftragswert €</div></div>'
        +'<div class="kpi"><div class="kpi-val">'+fmt(tKwp)+'</div><div class="kpi-label">kWp</div></div>'
        +'<div class="kpi"><div class="kpi-val" style="color:var(--green)">'+tEl+'</div><div class="kpi-label">Eigenleads</div></div>'
        +kEmp+kS+kZ
        +'<div class="kpi"><div class="kpi-val">'+vtCount+'</div><div class="kpi-label">Vertriebler</div></div>'
        +'<div class="kpi"><div class="kpi-val">ø '+avgDeals.toLocaleString("de-DE",{maximumFractionDigits:1})+'</div><div class="kpi-label">Deals / VT</div></div>'
        +projKPI
        +'</div>'
        +hintHTML
        +'<div class="controls fade-in fade-d2">'
        +'<button class="ctrl-btn'+(sort==='sales'?' active':'')+'" data-sort="sales">🏆 Deals</button>'
        +'<button class="ctrl-btn'+(sort==='volume'?' active':'')+'" data-sort="volume">💰 Volumen</button>'
        +'<button class="ctrl-btn'+(sort==='kwp'?' active':'')+'" data-sort="kwp">⚡ kWp</button>'
        +'<div style="flex:1 0 4px"></div>'
        +'<select class="'+selectPulseClass+'" id="ms">'+mo+'</select></div>'
        +'<div class="legend fade-in fade-d3">'
        +'<span style="color:#fb923c">☀️ PV</span><span style="color:#22d3ee">🌡️ HP</span>'
        +'<span style="color:#4ade80">🎯 Eigenlead</span><span style="color:#60a5fa">🤝 Empfehlung</span>'
        +'<span style="color:#c084fc">🔋 Speicher</span><span style="color:#fbbf24">⚡ Zero</span></div>'
        +'<div class="rank-list">'+cards+'</div>'
        +'<div class="quote-box fade-in"><div class="quote-text">„'+q+'"</div><div class="quote-author">— bee-doo Daily Motivation</div></div>'
        +'<div class="footer fade-in"><div class="footer-line">bee-doo GmbH · Am Stadtholz 39 · 33609 Bielefeld</div>'
        +'<div class="footer-ts">Stand: '+ts+' · Stornos inkl. · Dedup per Lead+Produkt'+lh+'</div>'
        +'<div style="margin-top:16px;padding-top:12px;border-top:1px solid #1a1d2a">'
        +'<div style="font-size:9px;color:#3d4566;line-height:1.6;max-width:520px;margin:0 auto;text-align:center">'
        +'© '+new Date().getFullYear()+' bee-doo GmbH · Alle Rechte vorbehalten · HRB 46243 AG Bielefeld<br>'
        +'Geschäftsführer: O. Schader, P. Grabowski · USt-ID: DE323940446<br>'
        +'Die dargestellten Daten sind vertraulich und ausschließlich für den internen Gebrauch bestimmt. '
        +'Jegliche Weitergabe, Vervielfältigung oder Veröffentlichung – auch auszugsweise – ist ohne '
        +'ausdrückliche schriftliche Genehmigung der bee-doo GmbH untersagt. '

        +'</div></div></div></div>';

    document.querySelectorAll('[data-sort]').forEach(function(b){b.addEventListener('click',function(){sort=this.getAttribute('data-sort');render()})});
    document.getElementById('ms').addEventListener('change',function(){
        hintDismissed=true;
        var hint=document.getElementById('monthHint');if(hint)hint.remove();
        this.classList.remove('pulse-hint');
        month=this.value;window.history.replaceState(null,'','?m='+month);
        if((month==='2026-03'||month==='2026')&&!marchLoaded){loadMarch();return}render()
    });

function isHP(o){var m=o.angebot_module;return m===null||m===undefined||m===0||m===''||String(m)==='0'||String(m)==='None';}

function computeMarch(orders,zeros){
    var zi={};if(zeros)zeros.forEach(function(e){if(e.efs_id)zi[e.efs_id]=true});
    var a6=orders.filter(function(o){return(parseFloat(o.an_wert_netto)||0)>=6000});
    var bk={};
    a6.forEach(function(o){var l=o.leveto_lead_id;if(!l)return;var k=l+'_'+(isHP(o)?'HP':'PV');var an=parseInt(o.auftrag_nr)||0;if(!bk[k]||an>(parseInt(bk[k].auftrag_nr)||0))bk[k]=o});
    var u=Object.values(bk),bv={};
    u.forEach(function(o){
        var n=(o.kundenberater_name||'?').trim();
        if(!bv[n])bv[n]={sales:0,kwp:0,netto:0,storno:0,el:0,emp:0,sp:0,zero:0,hp:0,pv:0};
        var d=bv[n];d.sales++;d.kwp+=parseFloat(o.anlagen_kwp)||0;d.netto+=parseFloat(o.an_wert_netto)||0;
        if(o.storniert)d.storno++;if(o.ist_eigenlead)d.el++;if(o.ist_empfehlung)d.emp++;
        if(o.hat_speicher)d.sp++;if(o.efs_projekt_id&&zi[o.efs_projekt_id])d.zero++;
        if(isHP(o))d.hp++;else d.pv++;
    });
    return Object.entries(bv).map(function(e){var v=e[1];v.n=e[0];return v});
}

async function loadMarch(){
    document.getElementById('app').innerHTML='<div class="loading"><div class="loader"></div><div class="load-text">Lade März-Daten...</div></div>';
    try{
        var all=[];
        for(var o=0;o<60000;o+=1000){
            var r=await fetch(SB+'/rest/v1/auftraege?select=kundenberater_name,datum_angenommen,anlagen_kwp,an_wert_netto,storniert,ist_eigenlead,ist_empfehlung,hat_speicher,efs_projekt_id,auftrag_nr,leveto_lead_id,angebot_module&datum_angenommen=gte.2026-03-01&datum_angenommen=lt.2026-04-01&limit=1000&offset='+o,{headers:hd});
            var d=await r.json();if(!d.length)break;all=all.concat(d);if(d.length<1000)break;
        }
        var z=[];try{var eR=await fetch(SB+'/rest/v1/efs_projekte?select=efs_id,preismodell&preismodell=eq.Zero',{headers:hd});if(eR.ok)z=await eR.json()}catch(e){}
        marchData=computeMarch(all,z);marchLoaded=true;render();
    }catch(err){document.getElementById('app').innerHTML='<div class="loading"><div class="load-text" style="color:var(--red)">Fehler: '+err.message+'</div></div>'}
}

// ══════════════════════════════════════
// BOOT SEQUENCE
// ══════════════════════════════════════
function runBoot(){
    var steps=document.querySelectorAll('.boot-step');
    var bar=document.getElementById('bootBar');
    var pct=document.getElementById('bootPct');
    var label=document.getElementById('bootLabel');
    var stats=document.getElementById('bootStats');
    var overlay=document.getElementById('bootOverlay');
    var progress=0;var stepIdx=-1;
    var labels=['Verbindung wird hergestellt...','Cluster-Check...','Pipeline aktivieren...','Daten synchronisieren...','Engine starten...','Alle Systeme online ✅'];
    var iv=setInterval(function(){
        progress+=3;if(progress>100)progress=100;
        bar.style.width=progress+'%';
        pct.textContent=progress+'%';
        var newStep=Math.min(Math.floor(progress/20),steps.length-1);
        if(newStep!==stepIdx){
            stepIdx=newStep;
            label.textContent=labels[stepIdx];
            for(var j=0;j<steps.length;j++){
                steps[j].classList.toggle('active',j<=stepIdx);
                steps[j].classList.toggle('current',j===stepIdx);
                if(j<=stepIdx&&!steps[j].querySelector('.boot-step-status')){
                    var st=document.createElement('span');st.className='boot-step-status';st.textContent=steps[j].dataset.status;steps[j].appendChild(st);
                }
            }
        }
        if(progress>=100){
            clearInterval(iv);
            label.textContent=labels[labels.length-1];
            stats.classList.add('show');
            setTimeout(function(){
                overlay.classList.add('done');
                document.getElementById('app').style.display='block';
                setTimeout(function(){overlay.style.display='none'},600);
            },800);
        }
    },50);
}

// INIT
runBoot();
if(month==='2026-01'||month==='2026-02')render();else loadMarch();

})();
