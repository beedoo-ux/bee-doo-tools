    var kH=tHP>0?'<div class="kpi"><div class="kpi-val" style="color:var(--cyan)">🌡️ '+tHP+'</div><div class="kpi-label">Wärmepumpe</div></div>':'';
    var kS=tSp>0?'<div class="kpi"><div class="kpi-val" style="color:var(--purple)">'+tSp+'</div><div class="kpi-label">Speicher</div></div>':'';
    var cards='';
    rk.forEach(function(d,i){
        var cls=i<3?['gold','silver','bronze'][i]:'',pc=i<3?'p'+(i+1):'pn';
        var ic=i<3?['🥇','🥈','🥉'][i]:'<span style="opacity:.5">'+(i+1)+'</span>';
        var v=sort==='volume'?Math.round(d.netto/1000)+'k':sort==='kwp'?d.kwp.toFixed(0):d.sales;
        var sb=sort==='sales'?fmt(Math.round(d.netto/1000))+'k€':d.sales+' Deals';
        var bp=Math.max(5,(sort==='volume'?d.netto:sort==='kwp'?d.kwp:d.sales)/maxV*100);
        var bg=i===0?'linear-gradient(90deg,var(--gold),var(--gold2))':i===1?'linear-gradient(90deg,#94a3b8,#cbd5e1)':i===2?'linear-gradient(90deg,#d97706,#fbbf24)':'linear-gradient(90deg,var(--blue),#60a5fa)';
        var tg='';
        if(d.pv>0)tg+='<span class="rank-tag tag-pv">☀️'+d.pv+'</span>';
        if(d.hp>0)tg+='<span class="rank-tag tag-hp">🌡️'+d.hp+'</span>';
        if(d.el>0)tg+='<span class="rank-tag tag-el">🎯'+d.el+'</span>';
        if(d.emp>0)tg+='<span class="rank-tag tag-emp">🤝'+d.emp+'</span>';
        if(d.sp>0)tg+='<span class="rank-tag tag-sp">🔋'+d.sp+'</span>';
        if(d.zero>0)tg+='<span class="rank-tag tag-zero">⚡'+d.zero+'</span>';
        cards+='<div class="rank-card '+cls+' fade-in" style="animation-delay:'+(Math.min(i,15)*0.03)+'s"><div class="rank-pos '+pc+(i===0?' crown-pos':'')+'">'+ic+'</div><div class="rank-info"><div class="rank-name">'+sn(d.n)+'</div><div class="rank-meta">'+tg+'</div><div class="rank-bar"><div class="rank-bar-fill" style="width:'+bp+'%;background:'+bg+'"></div></div></div><div class="rank-right"><div class="rank-sales">'+v+'</div><div class="rank-vol">'+sb+'</div></div></div>';
    });
    if(!rk.length)cards='<div style="text-align:center;padding:40px;color:var(--dim)">Keine Aufträge in '+monat+'</div>';
    var ts=new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    var lh=(month==='2026-01'||month==='2026-02')?'':' · <span style="color:var(--gold)">⚡ Live</span>';
    document.getElementById('app').innerHTML='<div class="main"><div class="header fade-in"><div class="confetti-wrap">'+cf+'</div><div class="hero-label">bee-doo Sales Ranking</div><div class="hero-number">'+total+'</div><div class="hero-label">Deals '+(month.length===4?'in':'im')+' '+monat+'</div><div class="hero-sub">🐝 powered by bee-doo</div></div><div class="kpis fade-in fade-d1"><div class="kpi"><div class="kpi-val" style="color:var(--gold)">'+total+'</div><div class="kpi-label">Deals</div></div><div class="kpi"><div class="kpi-val" style="color:#fb923c">☀️ '+tPV+'</div><div class="kpi-label">PV</div></div>'+kH+'<div class="kpi"><div class="kpi-val">'+fmt(tKwp)+'</div><div class="kpi-label">kWp</div></div><div class="kpi"><div class="kpi-val">'+fmt(Math.round(tNetto/1000))+'k</div><div class="kpi-label">Volumen €</div></div><div class="kpi"><div class="kpi-val" style="color:var(--green)">'+tEl+'</div><div class="kpi-label">Eigenleads</div></div>'+kS+'</div><div class="controls fade-in fade-d2"><button class="ctrl-btn'+(sort==='sales'?' active':'')+'" data-sort="sales">🏆 Deals</button><button class="ctrl-btn'+(sort==='volume'?' active':'')+'" data-sort="volume">💰 Volumen</button><button class="ctrl-btn'+(sort==='kwp'?' active':'')+'" data-sort="kwp">⚡ kWp</button><div style="flex:1 0 4px"></div><select class="ctrl-select" id="ms">'+mo+'</select></div><div class="legend fade-in fade-d3"><span style="color:#fb923c">☀️ PV</span><span style="color:#22d3ee">🌡️ Wärmepumpe</span><span style="color:#4ade80">🎯 Eigenlead</span><span style="color:#60a5fa">🤝 Empfehlung</span><span style="color:#c084fc">🔋 Speicher</span><span style="color:#fbbf24">⚡ Zero</span></div><div class="rank-list">'+cards+'</div><div class="footer fade-in"><div class="footer-line">bee-doo GmbH · Am Stadtholz 39 · 33609 Bielefeld</div><div class="footer-ts">Stand: '+ts+' · Stornos inkl. · Dedup per Lead+Produkt'+lh+'</div></div></div>';
    document.querySelectorAll('[data-sort]').forEach(function(b){b.addEventListener('click',function(){sort=this.getAttribute('data-sort');render()})});
    document.getElementById('ms').addEventListener('change',function(){month=this.value;window.history.replaceState(null,'','?m='+month);if((month==='2026-03'||month==='2026')&&!marchLoaded){loadMarch();return}render()});
}

function isHP(o){var m=o.angebot_module;return m===null||m===undefined||m===0||m===''||String(m)==='0'||String(m)==='None';}

function computeMarch(orders,zeros){
    var zi={};if(zeros)zeros.forEach(function(e){if(e.efs_id)zi[e.efs_id]=true});
    var a6=orders.filter(function(o){return(parseFloat(o.an_wert_netto)||0)>=6000});
    var bk={};
    a6.forEach(function(o){var l=o.leveto_lead_id;if(!l)return;var k=l+'_'+(isHP(o)?'HP':'PV');var an=parseInt(o.auftrag_nr)||0;if(!bk[k]||an>(parseInt(bk[k].auftrag_nr)||0))bk[k]=o});
    var u=Object.values(bk),bv={};
    u.forEach(function(o){
        var n=(o.kundenberater_name||'?').trim();
        if(!bv[n])bv[n]={sales:0,kwp:0,netto:0,storno:0,el:0,emp:0,sp:0,zero:0,hp:0,pv:0};
        var d=bv[n];d.sales++;d.kwp+=parseFloat(o.anlagen_kwp)||0;d.netto+=parseFloat(o.an_wert_netto)||0;
        if(o.storniert)d.storno++;if(o.ist_eigenlead)d.el++;if(o.ist_empfehlung)d.emp++;
        if(o.hat_speicher)d.sp++;if(o.efs_projekt_id&&zi[o.efs_projekt_id])d.zero++;
        if(isHP(o))d.hp++;else d.pv++;
    });
    return Object.entries(bv).map(function(e){var v=e[1];v.n=e[0];return v});
}

async function loadMarch(){
    document.getElementById('app').innerHTML='<div class="loading"><div class="loader"></div><div class="load-text">Lade März-Daten...</div></div>';
    try{
        var all=[];
        for(var o=0;o<60000;o+=1000){
            var r=await fetch(SB+'/rest/v1/auftraege?select=kundenberater_name,datum_angenommen,anlagen_kwp,an_wert_netto,storniert,ist_eigenlead,ist_empfehlung,hat_speicher,efs_projekt_id,auftrag_nr,leveto_lead_id,angebot_module&datum_angenommen=gte.2026-03-01&datum_angenommen=lt.2026-04-01&limit=1000&offset='+o,{headers:hd});
            var d=await r.json();if(!d.length)break;all=all.concat(d);if(d.length<1000)break;
        }
        var z=[];try{var eR=await fetch(SB+'/rest/v1/efs_projekte?select=efs_id,preismodell&preismodell=eq.Zero',{headers:hd});if(eR.ok)z=await eR.json()}catch(e){}
        marchData=computeMarch(all,z);marchLoaded=true;render();
    }catch(err){document.getElementById('app').innerHTML='<div class="loading"><div class="load-text" style="color:var(--red)">Fehler: '+err.message+'</div></div>'}
}

if(month==='2026-01'||month==='2026-02')render();else loadMarch();
})();
</script>
