<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bee-doo · VT-Ranking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0e1a;color:#e8ecf4;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
:root{--a:#F5C500;--g:#22c55e;--r:#ef4444;--bl:#3b82f6;--bg:#0a0e1a;--cd:#111827;--el:#1a2236;--tb:#e8ecf4;--td:#8896b0}

.ctrl{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.ctrl select{background:#1a2236;color:#e8ecf4;border:1px solid #263354;border-radius:8px;padding:8px 14px;font-family:inherit;font-size:14px;cursor:pointer;outline:none}
.ctrl select:focus{border-color:var(--a)}
.btn{background:var(--a);color:#0a0e1a;border:none;border-radius:8px;padding:8px 18px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px #F5C50044}
.btn-sec{background:#1a2236;color:#e8ecf4;border:1px solid #263354}
.btn-sec:hover{border-color:var(--a);color:var(--a)}

.poster{width:520px;max-width:96vw;background:linear-gradient(170deg,#111827 0%,#0d1424 50%,#0a0e1a 100%);border-radius:20px;overflow:hidden;position:relative}
.poster::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--a),#FFE066,var(--a))}

.p-head{padding:28px 28px 0;text-align:center;position:relative}
.p-logo{height:28px;margin-bottom:8px;filter:brightness(0) invert(1);opacity:.7}
.p-title{font-size:28px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,#F5C500,#FFE066);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.p-sub{font-size:14px;color:var(--td);margin-top:2px;font-weight:500}
.p-kpis{display:flex;justify-content:center;gap:24px;margin-top:16px;padding-bottom:16px;border-bottom:1px solid #1e2a42}
.p-kpi-v{font-size:22px;font-weight:800;color:var(--a)}
.p-kpi-l{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.5px}

.p-body{padding:8px 20px 20px}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;transition:background .2s;position:relative}
.rank-row:hover{background:#ffffff06}
.rank-row.top3{background:linear-gradient(90deg,#F5C50008,transparent)}
.rank-pos{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;border-radius:8px;flex-shrink:0}
.pos-1{background:linear-gradient(135deg,#F5C500,#FFE066);color:#0a0e1a;font-size:16px}
.pos-2{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#1e293b}
.pos-3{background:linear-gradient(135deg,#b45309,#d97706);color:#fff}
.pos-n{background:#1a2236;color:var(--td)}
.rank-name{flex:1;font-weight:600;font-size:14px;color:var(--tb);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-sales{font-weight:800;font-size:16px;min-width:40px;text-align:right}
.rank-bar-wrap{width:100px;height:8px;background:#1a2236;border-radius:4px;overflow:hidden;flex-shrink:0}
.rank-bar{height:100%;border-radius:4px;transition:width .6s ease}

.p-foot{padding:12px 28px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #1e2a42;margin:0 20px}
.p-foot-l{font-size:10px;color:var(--td)}
.p-foot-r{font-size:10px;color:var(--td)}
.p-ts{text-align:center;padding:0 0 16px;font-size:10px;color:#3a4a6a}

.spinner{width:20px;height:20px;border:3px solid #263354;border-top-color:var(--a);border-radius:50%;animation:spin .6s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:560px){
  .poster{border-radius:14px}
  .p-head{padding:20px 16px 0}
  .p-title{font-size:22px}
  .p-body{padding:6px 12px 14px}
  .rank-bar-wrap{width:60px}
  .p-kpis{gap:16px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;
const SB='https://hqzpemfaljxcysyqssng.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const hd=()=>({apikey:AK,Authorization:`Bearer ${AK}`});

const MONATE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function App(){
    const[orders,setOrders]=useState(null);
    const[month,setMonth]=useState(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`});
    const[downloading,setDownloading]=useState(false);
    const posterRef=useRef(null);

    useEffect(()=>{
        (async()=>{
            const all=[];
            for(let off=0;off<5000;off+=1000){
                const r=await fetch(`${SB}/rest/v1/auftraege?select=auftrag_nr,kundenberater_name,storniert,datum_angenommen,anlagen_kwp,an_wert_netto&datum_angenommen=not.is.null&limit=1000&offset=${off}`,{headers:hd()});
                const d=await r.json();if(!d.length)break;all.push(...d);if(d.length<1000)break
            }
            setOrders(all);
        })();
    },[]);

    const data=React.useMemo(()=>{
        if(!orders)return null;
        const ym=month;
        const filtered=orders.filter(o=>o.datum_angenommen&&o.datum_angenommen.startsWith(ym));
        const byVt={};
        filtered.forEach(o=>{
            const n=(o.kundenberater_name||'Unbekannt').trim();
            if(!byVt[n])byVt[n]={sales:0,kwp:0,netto:0,storno:0};
            byVt[n].sales++;
            byVt[n].kwp+=(parseFloat(o.anlagen_kwp)||0);
            byVt[n].netto+=(parseFloat(o.an_wert_netto)||0);
            if(o.storniert)byVt[n].storno++;
        });
        const ranking=Object.entries(byVt).sort((a,b)=>b[1].sales-a[1].sales||b[1].netto-a[1].netto);
        const totalSales=filtered.length;
        const stornoCount=filtered.filter(o=>o.storniert).length;
        const totalKwp=filtered.reduce((s,o)=>s+(parseFloat(o.anlagen_kwp)||0),0);
        const totalNetto=filtered.reduce((s,o)=>s+(parseFloat(o.an_wert_netto)||0),0);
        // Available months
        const months=new Set();
        orders.forEach(o=>{if(o.datum_angenommen)months.add(o.datum_angenommen.substring(0,7))});
        return{ranking,totalSales,stornoCount,totalKwp,totalNetto,months:Array.from(months).sort().reverse()}
    },[orders,month]);

    const downloadPNG=useCallback(async()=>{
        if(!posterRef.current)return;
        setDownloading(true);
        try{
            const canvas=await html2canvas(posterRef.current,{backgroundColor:'#0a0e1a',scale:2,useCORS:true,logging:false});
            const link=document.createElement('a');
            const[y,m]=month.split('-');
            link.download=`bee-doo-ranking-${MONATE[+m-1]}-${y}.png`;
            link.href=canvas.toDataURL('image/png');
            link.click();
        }catch(e){console.error(e)}
        setDownloading(false);
    },[month]);

    const copyLink=useCallback(()=>{
        const url=`${window.location.origin}${window.location.pathname}?m=${month}`;
        navigator.clipboard.writeText(url).then(()=>alert('Link kopiert!')).catch(()=>{});
    },[month]);

    // Read month from URL
    useEffect(()=>{
        const p=new URLSearchParams(window.location.search);
        if(p.get('m'))setMonth(p.get('m'));
    },[]);

    if(!orders)return<div><div className="spinner"/></div>;
    if(!data)return null;

    const[y,m]=month.split('-');
    const monatName=MONATE[+m-1]+' '+y;
    const maxSales=data.ranking.length?data.ranking[0][1].sales:1;

    return<React.Fragment>
        <div className="ctrl">
            <select value={month} onChange={e=>{setMonth(e.target.value);window.history.replaceState(null,'',`?m=${e.target.value}`)}}>
                {data.months.map(m=>{const[y2,m2]=m.split('-');return<option key={m} value={m}>{MONATE[+m2-1]} {y2}</option>})}
            </select>
            <button className="btn" onClick={downloadPNG} disabled={downloading}>
                {downloading?'⏳':'📸'} Als Bild speichern
            </button>
            <button className="btn btn-sec" onClick={copyLink}>🔗 Link kopieren</button>
            <a className="btn btn-sec" href="index.html" style={{textDecoration:'none'}}>← Toolbox</a>
        </div>

        <div className="poster" ref={posterRef}>
            <div className="p-head">
                <img className="p-logo" src="https://bee-doo-tools.vercel.app/Logo%20bee-doo%20Schriftzug.svg" alt="bee-doo"/>
                <div className="p-title">🏆 Sales Ranking</div>
                <div className="p-sub">{monatName}</div>
                <div className="p-kpis">
                    <div><div className="p-kpi-v">{data.totalSales}</div><div className="p-kpi-l">Aufträge (brutto)</div></div>
                    <div><div className="p-kpi-v" style={{color:'var(--r)',fontSize:16}}>{data.stornoCount}</div><div className="p-kpi-l">davon Storno</div></div>
                    <div><div className="p-kpi-v">{Math.round(data.totalKwp).toLocaleString('de-DE')}</div><div className="p-kpi-l">kWp gesamt</div></div>
                    <div><div className="p-kpi-v">{Math.round(data.totalNetto/1000).toLocaleString('de-DE')}k€</div><div className="p-kpi-l">Volumen</div></div>
                    <div><div className="p-kpi-v">{data.ranking.length}</div><div className="p-kpi-l">Vertriebler</div></div>
                </div>
            </div>

            <div className="p-body">
                {data.ranking.map(([name,d],i)=>{
                    const posClass=i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'pos-n';
                    const barColor=i===0?'linear-gradient(90deg,#F5C500,#FFE066)':i===1?'linear-gradient(90deg,#94a3b8,#cbd5e1)':i===2?'linear-gradient(90deg,#b45309,#d97706)':`linear-gradient(90deg,var(--bl),#60a5fa)`;
                    const salesColor=i===0?'#F5C500':i===1?'#cbd5e1':i===2?'#d97706':'var(--bl)';
                    return<div key={name} className={`rank-row ${i<3?'top3':''}`}>
                        <div className={`rank-pos ${posClass}`}>{i<3?['🥇','🥈','🥉'][i]:i+1}</div>
                        <div className="rank-name">{name}</div>
                        <div className="rank-bar-wrap"><div className="rank-bar" style={{width:`${d.sales/maxSales*100}%`,background:barColor}}/></div>
                        <div className="rank-sales" style={{color:salesColor}}>{d.sales}</div>
                        {d.storno>0&&<div style={{fontSize:10,color:'var(--r)',minWidth:28,textAlign:'right'}}>({d.storno}✕)</div>}
                    </div>
                })}
                {data.ranking.length===0&&<div style={{textAlign:'center',padding:30,color:'var(--td)'}}>Keine Aufträge in {monatName}</div>}
            </div>

            <div className="p-foot">
                <div className="p-foot-l">bee-doo GmbH · Am Stadtholz 39 · 33609 Bielefeld</div>
                <div className="p-foot-r">bee-doo-tools.vercel.app</div>
            </div>
            <div className="p-ts">Stand: {new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
    </React.Fragment>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
