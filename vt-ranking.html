<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bee-doo · VT-Ranking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0e1a;color:#e8ecf4;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
:root{--a:#F5C500;--g:#22c55e;--r:#ef4444;--bl:#3b82f6;--cy:#06b6d4;--o:#f59e0b;--p:#a855f7;--pk:#ec4899;--bg:#0a0e1a;--cd:#111827;--el:#1a2236;--tb:#e8ecf4;--td:#8896b0}
.ctrl{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.ctrl select{background:#1a2236;color:#e8ecf4;border:1px solid #263354;border-radius:8px;padding:8px 14px;font-family:inherit;font-size:14px;cursor:pointer;outline:none}
.ctrl select:focus{border-color:var(--a)}
.btn{background:var(--a);color:#0a0e1a;border:none;border-radius:8px;padding:8px 18px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px #F5C50044}
.btn-sec{background:#1a2236;color:#e8ecf4;border:1px solid #263354}
.btn-sec:hover{border-color:var(--a);color:var(--a)}
.poster{width:620px;max-width:96vw;background:linear-gradient(170deg,#111827 0%,#0d1424 50%,#0a0e1a 100%);border-radius:20px;overflow:hidden;position:relative}
.poster::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--a),#FFE066,var(--a))}
.p-head{padding:24px 24px 0;text-align:center;position:relative}
.p-logo{height:26px;margin-bottom:6px;filter:brightness(0) invert(1);opacity:.7}
.p-title{font-size:26px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,#F5C500,#FFE066);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.p-sub{font-size:14px;color:var(--td);font-weight:600;margin-top:2px}
.p-kpis{display:flex;justify-content:center;gap:16px;margin-top:14px;padding:12px 0;border-top:1px solid #1e2a42;border-bottom:1px solid #1e2a42;flex-wrap:wrap}
.p-kpi-v{font-size:18px;font-weight:800;color:var(--a)}
.p-kpi-l{font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.p-body{padding:12px 16px 8px}
.p-legend{display:flex;gap:10px;justify-content:flex-end;padding:0 4px 8px;flex-wrap:wrap}
.p-legend span{font-size:9px;color:var(--td);display:flex;align-items:center;gap:3px}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block}
.rank-row{display:grid;grid-template-columns:36px 1fr 50px;align-items:center;gap:6px;padding:5px 4px;border-radius:8px;transition:background .15s}
.rank-row.top3{padding:7px 4px}
.rank-row:hover{background:#ffffff06}
.rank-pos{text-align:center;font-size:13px;font-weight:800;color:var(--td)}
.pos-1{font-size:20px}.pos-2{font-size:18px}.pos-3{font-size:16px}
.rank-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top3 .rank-name{font-size:14px}
.rank-sales{font-size:18px;font-weight:900;text-align:right}
.top3 .rank-sales{font-size:22px}
.rank-detail{display:grid;grid-template-columns:36px 1fr;gap:6px;padding:0 4px 6px}
.rank-bar-wrap{height:5px;background:#0a0e1a;border-radius:3px;overflow:hidden;grid-column:2;width:100%}
.rank-bar{height:100%;border-radius:3px}
.rank-badges{grid-column:2;display:flex;gap:4px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700}
.badge-el{background:#22c55e22;color:#4ade80}
.badge-emp{background:#3b82f622;color:#60a5fa}
.badge-sp{background:#a855f722;color:#c084fc}
.badge-zero{background:#f59e0b22;color:#fbbf24}
.p-foot{display:flex;justify-content:space-between;padding:12px 20px;font-size:10px;color:#3a4a6a;border-top:1px solid #1e2a42;margin-top:4px}
.p-ts{text-align:center;font-size:9px;color:#2a3a5a;padding:0 0 12px}
.spinner{width:24px;height:24px;border:3px solid #263354;border-top-color:var(--a);border-radius:50%;animation:sp .6s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:640px){.poster{width:100%;border-radius:14px}.rank-name{font-size:12px}.rank-sales{font-size:15px}.top3 .rank-sales{font-size:18px}.p-kpis{gap:10px}.p-kpi-v{font-size:15px}.badge{font-size:8px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback,useRef}=React;
const SB='https://hqzpemfaljxcysyqssng.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const hd={apikey:AK,Authorization:'Bearer '+AK};
const MONATE=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

function App(){
    const posterRef=useRef(null);
    const now=new Date();
    const defMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const[month,setMonth]=useState(defMonth);
    const[orders,setOrders]=useState(null);
    const[zeroIds,setZeroIds]=useState({});
    const[downloading,setDownloading]=useState(false);

    useEffect(()=>{
        (async()=>{
            const all=[];
            for(let o=0;o<10000;o+=1000){
                const r=await fetch(SB+'/rest/v1/auftraege?select=kundenberater_name,datum_angenommen,anlagen_kwp,an_wert_netto,storniert,ist_eigenlead,ist_empfehlung,hat_speicher,efs_projekt_id,auftrag_nr,leveto_lead_id,angebot_module&limit=1000&offset='+o,{headers:hd});
                const d=await r.json();if(!d.length)break;all.push(...d);if(d.length<1000)break;
            }
            setOrders(all);
            try{
                const eR=await fetch(SB+'/rest/v1/efs_projekte?select=efs_id,preismodell&preismodell=eq.Zero',{headers:hd});
                if(eR.ok){const ed=await eR.json();const zm={};if(Array.isArray(ed))ed.forEach(e=>{zm[e.efs_id]=true});setZeroIds(zm)}
            }catch(e){}
        })();
    },[]);

    const data=useMemo(()=>{
        if(!orders)return null;
        const filtered=orders.filter(o=>o.datum_angenommen&&o.datum_angenommen.startsWith(month));
        // HP-Erkennung: angebot_module leer/null/0 = Wärmepumpe (erst ab 2026-02)
        const isHP=o=>{
            if(month<'2026-02')return false;
            const m=o.angebot_module;
            return m===null||m===undefined||m===0||m===''||String(m)==='0'||String(m)==='None';
        };
        const getTyp=o=>isHP(o)?'HP':'PV';
        // Filter: AN-WertNetto >= 6000
        const above6k=filtered.filter(o=>(parseFloat(o.an_wert_netto)||0)>=6000);
        // Dedup: Pro Lead ID + Produkttyp → nur höchste AN
        const byKey={};
        above6k.forEach(o=>{
            const lid=o.leveto_lead_id;
            if(!lid)return;
            const k=lid+'_'+getTyp(o);
            const an=parseInt(o.auftrag_nr)||0;
            if(!byKey[k]||an>(parseInt(byKey[k].auftrag_nr)||0))byKey[k]=o;
        });
        const unique=Object.values(byKey);
        // Stornos zählen MIT für Rankings (brutto)
        const byVt={};
        unique.forEach(o=>{
            const n=(o.kundenberater_name||'Unbekannt').trim();
            if(!byVt[n])byVt[n]={sales:0,kwp:0,netto:0,storno:0,el:0,emp:0,sp:0,zero:0,hp:0,pv:0,hpNetto:0,pvNetto:0};
            byVt[n].sales++;
            byVt[n].kwp+=(parseFloat(o.anlagen_kwp)||0);
            byVt[n].netto+=(parseFloat(o.an_wert_netto)||0);
            if(o.storniert)byVt[n].storno++;
            if(o.ist_eigenlead)byVt[n].el++;
            if(o.ist_empfehlung)byVt[n].emp++;
            if(o.hat_speicher)byVt[n].sp++;
            if(o.efs_projekt_id&&zeroIds[o.efs_projekt_id])byVt[n].zero++;
            if(isHP(o)){byVt[n].hp++;byVt[n].hpNetto+=(parseFloat(o.an_wert_netto)||0)}
            else{byVt[n].pv++;byVt[n].pvNetto+=(parseFloat(o.an_wert_netto)||0)}
        });
        const ranking=Object.entries(byVt).sort((a,b)=>b[1].sales-a[1].sales||b[1].netto-a[1].netto);
        const tEl=unique.filter(o=>o.ist_eigenlead).length;
        const tEmp=unique.filter(o=>o.ist_empfehlung).length;
        const tSp=unique.filter(o=>o.hat_speicher).length;
        const tZero=unique.filter(o=>o.efs_projekt_id&&zeroIds[o.efs_projekt_id]).length;
        const tKwp=unique.reduce((s,o)=>s+(parseFloat(o.anlagen_kwp)||0),0);
        const tNetto=unique.reduce((s,o)=>s+(parseFloat(o.an_wert_netto)||0),0);
        const tHP=unique.filter(o=>isHP(o)).length;
        const tPV=unique.filter(o=>!isHP(o)).length;
        const months=new Set();
        orders.forEach(o=>{if(o.datum_angenommen)months.add(o.datum_angenommen.substring(0,7))});
        return{ranking,totalSales:unique.length,tEl,tEmp,tSp,tZero,tKwp,tNetto,tHP,tPV,months:Array.from(months).sort().reverse()}
    },[orders,month,zeroIds]);

    const downloadPNG=useCallback(async()=>{
        if(!posterRef.current)return;
        setDownloading(true);
        try{
            const canvas=await html2canvas(posterRef.current,{backgroundColor:'#0a0e1a',scale:2,useCORS:true,logging:false});
            const link=document.createElement('a');
            const sp=month.split('-');
            link.download='bee-doo-ranking-'+MONATE[+sp[1]-1]+'-'+sp[0]+'.png';
            link.href=canvas.toDataURL('image/png');
            link.click();
        }catch(e){console.error(e)}
        setDownloading(false);
    },[month]);

    const copyLink=useCallback(()=>{
        navigator.clipboard.writeText(window.location.origin+window.location.pathname+'?m='+month).then(()=>alert('Link kopiert!')).catch(()=>{});
    },[month]);

    useEffect(()=>{const p=new URLSearchParams(window.location.search);if(p.get('m'))setMonth(p.get('m'))},[]);

    if(!orders)return<div><div className="spinner"/></div>;
    if(!data)return null;

    const sp2=month.split('-');
    const monatName=MONATE[+sp2[1]-1]+' '+sp2[0];
    const maxSales=data.ranking.length?data.ranking[0][1].sales:1;

    return<React.Fragment>
        <div className="ctrl">
            <select value={month} onChange={e=>{setMonth(e.target.value);window.history.replaceState(null,'','?m='+e.target.value)}}>
                {data.months.map(mv=>{const p=mv.split('-');return<option key={mv} value={mv}>{MONATE[+p[1]-1]} {p[0]}</option>})}
            </select>
            <button className="btn" onClick={downloadPNG} disabled={downloading}>{downloading?'⏳':'📸'} Als Bild speichern</button>
            <button className="btn btn-sec" onClick={copyLink}>🔗 Link kopieren</button>
            <a className="btn btn-sec" href="index.html" style={{textDecoration:'none'}}>← Toolbox</a>
        </div>

        <div className="poster" ref={posterRef}>
            <div className="p-head">
                <img className="p-logo" src="https://bee-doo-tools.vercel.app/Logo%20bee-doo%20Schriftzug.svg" alt="bee-doo"/>
                <div className="p-title">🏆 Sales Ranking</div>
                <div className="p-sub">{monatName}</div>
                <div className="p-kpis">
                    <div><div className="p-kpi-v">{data.totalSales}</div><div className="p-kpi-l">Aufträge</div></div>
                    <div><div className="p-kpi-v" style={{color:'#f97316'}}>☀️{data.tPV}</div><div className="p-kpi-l">PV</div></div>
                    {data.tHP>0&&<div><div className="p-kpi-v" style={{color:'#06b6d4'}}>🌡️{data.tHP}</div><div className="p-kpi-l">Wärmepumpe</div></div>}
                    <div><div className="p-kpi-v">{Math.round(data.tKwp).toLocaleString('de-DE')}</div><div className="p-kpi-l">kWp gesamt</div></div>
                    <div><div className="p-kpi-v">{Math.round(data.tNetto/1000).toLocaleString('de-DE')}k€</div><div className="p-kpi-l">Volumen (brutto)</div></div>
                    <div><div className="p-kpi-v" style={{color:'#4ade80'}}>{data.tEl}</div><div className="p-kpi-l">Eigenleads</div></div>
                    <div><div className="p-kpi-v" style={{color:'#60a5fa'}}>{data.tEmp}</div><div className="p-kpi-l">Empfehlungen</div></div>
                    <div><div className="p-kpi-v" style={{color:'#c084fc'}}>{data.tSp}</div><div className="p-kpi-l">Speicher</div></div>
                    {data.tZero>0&&<div><div className="p-kpi-v" style={{color:'#fbbf24'}}>{data.tZero}</div><div className="p-kpi-l">Zero</div></div>}
                </div>
            </div>

            <div className="p-body">
                <div className="p-legend">
                    <span><span className="ldot" style={{background:'#4ade80'}}/> Eigenlead</span>
                    <span><span className="ldot" style={{background:'#60a5fa'}}/> Empfehlung</span>
                    <span><span className="ldot" style={{background:'#c084fc'}}/> Speicher</span>
                    <span><span className="ldot" style={{background:'#fbbf24'}}/> Zero</span>
                    {data.tHP>0&&<span><span className="ldot" style={{background:'#06b6d4'}}/> Wärmepumpe</span>}
                </div>
                {data.ranking.map(([name,d],i)=>{
                    const posClass=i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'pos-n';
                    const barBg=i===0?'linear-gradient(90deg,#F5C500,#FFE066)':i===1?'linear-gradient(90deg,#94a3b8,#cbd5e1)':i===2?'linear-gradient(90deg,#b45309,#d97706)':'linear-gradient(90deg,var(--bl),#60a5fa)';
                    const salesCol=i===0?'#F5C500':i===1?'#cbd5e1':i===2?'#d97706':'var(--bl)';
                    const hasBadges=d.el>0||d.emp>0||d.sp>0||d.zero>0||d.hp>0;
                    return<React.Fragment key={name}>
                        <div className={'rank-row '+(i<3?'top3':'')}>
                            <div className={'rank-pos '+posClass}>{i<3?['🥇','🥈','🥉'][i]:i+1}</div>
                            <div className="rank-name">{name} {d.hp>0&&d.pv>0?<span style={{fontSize:10,color:'var(--td)',fontWeight:500}}> ({d.pv}☀️+{d.hp}🌡️)</span>:d.hp>0?<span style={{fontSize:10,color:'#06b6d4',fontWeight:500}}> ({d.hp}🌡️)</span>:''}</div>
                            <div className="rank-sales" style={{color:salesCol}}>{d.sales}</div>
                        </div>
                        <div className="rank-detail">
                            <div/>
                            <div className="rank-bar-wrap"><div className="rank-bar" style={{width:(d.sales/maxSales*100)+'%',background:barBg}}/></div>
                            {hasBadges&&<React.Fragment><div/><div className="rank-badges">
                                {d.el>0&&<span className="badge badge-el">🎯 {d.el} EL</span>}
                                {d.emp>0&&<span className="badge badge-emp">🤝 {d.emp} Emp</span>}
                                {d.sp>0&&<span className="badge badge-sp">🔋 {d.sp} Sp</span>}
                                {d.zero>0&&<span className="badge badge-zero">⚡ {d.zero} Zero</span>}
                                {d.hp>0&&<span className="badge" style={{background:'#06b6d422',color:'#22d3ee'}}>🌡️ {d.hp} HP</span>}
                            </div></React.Fragment>}
                        </div>
                    </React.Fragment>
                })}
                {data.ranking.length===0&&<div style={{textAlign:'center',padding:30,color:'var(--td)'}}>Keine Aufträge in {monatName}</div>}
            </div>

            <div className="p-foot">
                <div>bee-doo GmbH · Am Stadtholz 39 · 33609 Bielefeld</div>
                <div>tools.bee-doo.de</div>
            </div>
            <div className="p-ts">Stand: {new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
    </React.Fragment>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
