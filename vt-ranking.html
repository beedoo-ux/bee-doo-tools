<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bee-doo · VT-Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#F5C500;--gold2:#FFE066;--bg:#08090f;--bg2:#0e1019;--card:#12141f;--card2:#181b28;--border:#1e2235;--text:#e8ecf4;--dim:#7b87a8;--green:#22c55e;--blue:#3b82f6;--cyan:#06b6d4;--purple:#a855f7;--orange:#f59e0b;--red:#ef4444;--pink:#ec4899}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,#F5C50008 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#3b82f606 0%,transparent 50%);pointer-events:none;z-index:0}

/* Boot Overlay */
.boot-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .6s ease}
.boot-overlay.done{opacity:0;pointer-events:none}
.boot-inner{width:100%;max-width:400px;padding:24px}
.boot-logo{text-align:center;margin-bottom:32px}
.boot-logo-icon{font-size:32px;margin-bottom:8px}
.boot-logo-text{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:4px}
.boot-steps{display:flex;flex-direction:column;gap:4px;margin-bottom:24px}
.boot-step{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;opacity:.2;transition:all .4s ease;transform:translateX(-8px)}
.boot-step.active{opacity:1;transform:translateX(0)}
.boot-step.current{background:#F5C50008;border:1px solid #F5C50020}
.boot-step-icon{font-size:14px;width:20px;text-align:center}
.boot-step-label{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.boot-step-status{font-size:10px;font-weight:700;color:var(--green);background:#22c55e15;padding:2px 8px;border-radius:6px}
.boot-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px}
.boot-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width .15s ease;box-shadow:0 0 12px #F5C50040;width:0%}
.boot-info{display:flex;justify-content:space-between}
.boot-info span{font-size:10px;font-weight:600;color:var(--dim)}
.boot-info .pct{color:var(--gold);font-family:monospace;font-weight:700}
.boot-stats{display:flex;gap:10px;justify-content:center;margin-top:16px;opacity:0;transition:opacity .4s ease}
.boot-stats.show{opacity:1}
.boot-stat{text-align:center;padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.boot-stat-val{font-size:14px;font-weight:800;font-family:'Outfit',sans-serif}
.boot-stat-label{font-size:8px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* Main */
.main{max-width:720px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}
.header{text-align:center;margin-bottom:28px;position:relative}
.hero-label{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:3px}
.hero-number{font-family:'Outfit',sans-serif;font-size:clamp(72px,16vw,110px);font-weight:900;line-height:1;background:linear-gradient(135deg,var(--gold),var(--gold2),#fff,var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.hero-sub{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:#3d4566;letter-spacing:2px;text-transform:uppercase;margin-top:8px}

/* Hero PV/HP Split */
.hero-split{display:flex;justify-content:center;gap:32px;margin-top:12px}
.hero-split-item{text-align:center}
.hero-split-val{font-family:'Outfit',sans-serif;font-size:clamp(36px,8vw,52px);font-weight:900;line-height:1}
.hero-split-label{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.hero-split-sep{font-size:32px;color:var(--border);font-weight:200;align-self:center}
.hero-rates{display:flex;justify-content:center;gap:16px;margin-top:8px;flex-wrap:wrap}
.hero-rate{font-size:10px;color:var(--dim);font-weight:500;background:var(--card);padding:3px 10px;border-radius:8px;border:1px solid var(--border)}
.hero-rate b{font-weight:700}

/* Per-rep rate line */
.rank-rates{font-size:10px;color:var(--dim);margin-top:2px;display:flex;flex-wrap:wrap;gap:6px}
.rank-rate{background:#ffffff06;padding:1px 6px;border-radius:4px;white-space:nowrap}
.rank-rate .r-val{font-weight:700;color:var(--text)}

.confetti-wrap{display:none}
.confetti-p{display:none}

.crown-pos{position:relative}
.crown-pos::before{content:'👑';position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:18px;animation:crownFloat 2s ease-in-out infinite}
@keyframes crownFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

/* Countdown */
.countdown{text-align:center;margin-bottom:20px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.countdown-inner{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.countdown-seg{text-align:center}
.countdown-val{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--gold)}
.countdown-unit{font-size:9px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.countdown-sep{font-size:18px;color:var(--border);font-weight:300}
.countdown-label{font-size:11px;font-weight:600;color:var(--dim)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;transition:all .2s;overflow:hidden}
.kpi:hover{border-color:var(--gold);transform:translateY(-2px)}
.kpi-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-label{font-size:9px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;align-items:center}
.ctrl-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.ctrl-btn:hover{border-color:var(--gold);color:var(--text)}
.ctrl-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.ctrl-select{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;outline:none}
.ctrl-select:focus{border-color:var(--gold)}
.ctrl-select option{background:var(--card);color:var(--text)}

/* Compact legend */
.legend{display:flex;flex-wrap:wrap;gap:6px 16px;justify-content:center;margin-bottom:16px;padding:10px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.legend span{font-size:13px;font-weight:600;white-space:nowrap}

/* Monthly comparison chart */
.chart-section{margin-bottom:20px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:14px}
.chart-title{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:12px}
.chart-bars{display:flex;align-items:flex-end;justify-content:center;gap:16px;height:120px;padding:0 8px}
.chart-month{display:flex;flex-direction:column;align-items:center;flex:1;max-width:120px;gap:4px}
.chart-bar-group{display:flex;align-items:flex-end;gap:3px;height:100px;width:100%}
.chart-bar{flex:1;border-radius:4px 4px 0 0;min-height:2px;position:relative;transition:height .6s ease}
.chart-bar-val{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;white-space:nowrap}
.chart-bar-pv{background:linear-gradient(180deg,#fb923c,#f97316)}
.chart-bar-hp{background:linear-gradient(180deg,#22d3ee,#06b6d4)}
.chart-month-label{font-size:11px;font-weight:600;color:var(--dim)}
.chart-month-total{font-size:14px;font-weight:800;color:var(--text)}
.chart-legend-mini{display:flex;gap:12px;justify-content:center;margin-top:8px}
.chart-legend-mini span{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px}
.chart-legend-mini .dot{width:8px;height:8px;border-radius:2px;display:inline-block}

/* Notification bell */
.notif-wrap{position:fixed;bottom:20px;right:20px;z-index:100}

/* Challenge Mini-Widget (in ranking view) */
.challenge-widget{margin-bottom:16px;background:var(--card);border:1px solid var(--gold);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .2s;text-decoration:none;display:block;position:relative;overflow:hidden}
.challenge-widget:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(245,197,0,.15)}
.challenge-widget::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--green),var(--gold));background-size:200% 100%;animation:chGrad 3s linear infinite}
@keyframes chGrad{to{background-position:200% 0}}
.cw-row{display:flex;align-items:center;gap:12px}
.cw-icon{font-size:28px;flex-shrink:0}
.cw-info{flex:1;min-width:0}
.cw-title{font-size:12px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.cw-count{font-family:'Outfit',sans-serif;font-size:20px;font-weight:900;color:var(--text);line-height:1}
.cw-sub{font-size:10px;color:var(--dim);margin-top:2px}
.cw-bar{height:6px;background:var(--bg);border-radius:3px;margin-top:6px;overflow:hidden}
.cw-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--green));transition:width 1s ease}
.cw-arrow{font-size:18px;color:var(--dim);flex-shrink:0}

/* Challenge Full View */
.ch-header{text-align:center;margin-bottom:24px}
.ch-badge{display:inline-block;background:linear-gradient(135deg,#F5C500,#f59e0b);color:#1a1200;font-family:'Outfit',sans-serif;font-size:11px;font-weight:800;padding:4px 14px;border-radius:20px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.ch-title{font-family:'Outfit',sans-serif;font-size:clamp(28px,7vw,42px);font-weight:900;line-height:1.1;background:linear-gradient(135deg,var(--gold),var(--gold2),#fff,var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
.ch-subtitle{font-size:13px;color:var(--dim);margin-top:8px;font-weight:500}
.ch-prize{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.ch-prize-tag{background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--gold)}
.ch-months{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.ch-month-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .15s}
.ch-month-btn:hover{border-color:var(--gold);color:var(--text)}
.ch-month-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}

.counter-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 20px;text-align:center;position:relative;overflow:hidden;margin-bottom:20px}
.counter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--green),var(--gold));background-size:200% 100%;animation:chGrad 3s linear infinite}
.counter-label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.counter-big{font-family:'Outfit',sans-serif;font-size:clamp(48px,12vw,72px);font-weight:900;line-height:1;color:var(--gold)}
.counter-of{font-size:14px;color:var(--dim);margin-top:4px;font-weight:600}
.counter-remaining{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-top:8px}
.counter-remaining em{font-style:normal;color:var(--gold)}

.ch-progress{margin-top:14px}
.ch-pbar{height:18px;background:var(--bg);border-radius:9px;overflow:hidden;position:relative}
.ch-pfill{height:100%;border-radius:9px;background:linear-gradient(90deg,var(--gold),var(--green));transition:width 1s ease;position:relative}
.ch-pfill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:40px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2));animation:pShine 2s ease-in-out infinite}
@keyframes pShine{0%,100%{opacity:0}50%{opacity:1}}
.ch-ppct{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:800;color:var(--bg);z-index:2}
.ch-plabels{display:flex;justify-content:space-between;margin-top:3px;font-size:9px;color:var(--dim);font-weight:600}

.ch-time{display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.ch-tseg{background:var(--card2);border-radius:8px;padding:6px 10px;text-align:center;min-width:50px}
.ch-tval{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--text)}
.ch-tunit{font-size:9px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.ch-tsep{color:var(--border);font-size:16px;align-self:center}
.ch-rates{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.ch-rate{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--dim)}
.ch-rate b{color:var(--text);font-weight:700}

.ch-goto{display:flex;justify-content:center;margin-top:20px;margin-bottom:20px}
.ch-goto-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 28px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.ch-goto-btn:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1px)}

/* Challenge Leaderboard */
.lb-section{margin-top:20px}
.lb-title{font-size:12px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:center}
.lb-list{display:flex;flex-direction:column;gap:6px}
.lb-card{display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;transition:all .2s;position:relative}
.lb-card.qualified{border-color:var(--gold);background:linear-gradient(135deg,var(--card),#F5C50008)}
.lb-pos{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;text-align:center;color:var(--dim)}
.lb-card:nth-child(1) .lb-pos{color:var(--gold);font-size:18px}
.lb-card:nth-child(2) .lb-pos{color:#94a3b8;font-size:17px}
.lb-card:nth-child(3) .lb-pos{color:#cd7f32;font-size:17px}
.lb-info{min-width:0}
.lb-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-detail{font-size:11px;color:var(--dim);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.lb-detail span{display:flex;align-items:center;gap:2px}
.lb-minibar{height:3px;background:var(--bg);border-radius:2px;margin-top:4px;overflow:hidden}
.lb-minibar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.lb-right{text-align:right}
.lb-count{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:var(--green)}
.lb-card:nth-child(1) .lb-count{font-size:26px;color:var(--gold)}
.los-visual{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#F5C500,#f59e0b);color:#1a1200;font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.lb-progress-txt{font-size:9px;color:var(--dim);margin-top:2px}

@media(max-width:480px){
.ch-prize-tag{font-size:11px;padding:5px 10px}
.ch-tseg{min-width:44px;padding:5px 8px}
.ch-tval{font-size:16px}
.lb-card{grid-template-columns:28px 1fr auto;gap:8px;padding:10px 12px}
.lb-name{font-size:13px}
.lb-count{font-size:18px}
.lb-card:nth-child(1) .lb-count{font-size:22px}
.counter-big{font-size:48px}
.ch-goto-btn{font-size:13px;padding:10px 20px}
}
.notif-btn{width:48px;height:48px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.4);position:relative}
.notif-btn:hover{border-color:var(--gold);transform:scale(1.1)}
.notif-btn.active{border-color:var(--gold);background:#F5C50020}
.notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:white;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.notif-toast{position:fixed;bottom:80px;right:20px;background:var(--card);border:1px solid var(--gold);border-radius:12px;padding:12px 16px;max-width:280px;z-index:101;animation:toastIn .4s ease;box-shadow:0 8px 24px rgba(0,0,0,.5)}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.notif-toast-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:4px}
.notif-toast-body{font-size:11px;color:var(--text)}
.notif-toast-close{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}

/* Rank cards */
.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-card{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:all .25s ease;position:relative;overflow:hidden}
.rank-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0}
.rank-card:hover{border-color:#2a3050;transform:translateX(4px)}
.rank-card.gold{background:linear-gradient(135deg,#1a1708 0%,var(--card) 60%);border-color:#3a3010;animation:pulseGold 2.5s ease-in-out infinite}
.rank-card.gold::before{background:linear-gradient(180deg,var(--gold),#b8940a)}
.rank-card.gold:hover{border-color:#4a4020;box-shadow:0 0 30px #F5C50010}
@keyframes pulseGold{0%,100%{box-shadow:0 0 0 0 #F5C50000,0 0 20px #F5C50000;transform:scale(1)}50%{box-shadow:0 0 20px #F5C50025,0 0 40px #F5C50010;transform:scale(1.012)}}
@keyframes pulseSilver{0%,100%{box-shadow:0 0 0 0 #94a3b800;transform:scale(1)}50%{box-shadow:0 0 15px #94a3b820,0 0 30px #94a3b808;transform:scale(1.008)}}
@keyframes pulseBronze{0%,100%{box-shadow:0 0 0 0 #d9770600;transform:scale(1)}50%{box-shadow:0 0 15px #d9770620,0 0 30px #d9770608;transform:scale(1.006)}}
.rank-card.silver{background:linear-gradient(135deg,#161820 0%,var(--card) 60%);border-color:#2a2d3a;animation:pulseSilver 3s ease-in-out infinite}
.rank-card.silver::before{background:linear-gradient(180deg,#94a3b8,#64748b)}
.rank-card.bronze{background:linear-gradient(135deg,#1a1410 0%,var(--card) 60%);border-color:#2a2418;animation:pulseBronze 3.5s ease-in-out infinite}
.rank-card.bronze::before{background:linear-gradient(180deg,#d97706,#92400e)}
.rank-pos{font-family:'Outfit',sans-serif;font-weight:900;text-align:center;line-height:1}
.rank-pos.p1{font-size:28px}.rank-pos.p2{font-size:24px}.rank-pos.p3{font-size:24px}
.rank-pos.pn{font-size:16px;color:var(--dim)}
.rank-info{min-width:0}
.rank-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rank-name{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-card.gold .rank-name{font-size:17px}
.rank-card.silver .rank-name{font-size:16px}
.rank-card.bronze .rank-name{font-size:16px}

// Working days calculation (NRW holidays for 2026)
function getWorkingDays(year,m){
    // NRW Feiertage 2026
    var holidays={
        '2026-01-01':1,'2026-04-03':1,'2026-04-06':1,'2026-05-01':1,
        '2026-05-14':1,'2026-05-25':1,'2026-06-04':1,'2026-10-03':1,
        '2026-11-01':1,'2026-12-25':1,'2026-12-26':1
    };
    var total=0,elapsed=0;
    var today=new Date();today.setHours(0,0,0,0);
    var d=new Date(year,m-1,1);
    var end=new Date(year,m,1);
    while(d<end){
        var dow=d.getDay();
        var iso=d.toISOString().slice(0,10);
        if(dow>=1&&dow<=5&&!holidays[iso]){
            total++;
            if(d<=today)elapsed++;
        }
        d.setDate(d.getDate()+1);
    }
    return{total:total,elapsed:elapsed};
}

function getProjection(sales,year,m){
    var wd=getWorkingDays(year,m);
    if(wd.elapsed<1||wd.total<1)return null;
    var proj=Math.round(sales/wd.elapsed*wd.total);
    return{proj:proj,elapsed:wd.elapsed,total:wd.total};
}

}

// Sparkline SVG
function sparkSVG(name){
    if(month==='2026-01')return'';
    var j=findVt(JAN,name),f=findVt(FEB,name),m=marchData?findVt(marchData,name):null;
    var vals=[j?j.sales:0,f?f.sales:0];
    if(month==='2026-03'&&marchData)vals.push(m?m.sales:0);
    if(vals.length<2)return'';
    var max=Math.max.apply(null,vals)||1;
    var w=40,h=16,pad=2;
    var pts=vals.map(function(v,i){
        var x=pad+i*(w-2*pad)/(vals.length-1||1);
        var y=h-pad-(v/max)*(h-2*pad);
        return x+','+y;
    });
    var up=vals[vals.length-1]>=vals[0];
    var col=up?'#4ade80':'#94a3b8';
    return '<svg class="rank-spark" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><polyline points="'+pts.join(' ')+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+pts[pts.length-1].split(',')[0]+'" cy="'+pts[pts.length-1].split(',')[1]+'" r="2" fill="'+col+'"/></svg>';
}

function isPB(name,currentSales){

    if(month==='2026-01')return false;

}

// Streak: top3 in consecutive months
function getStreak(name){
    var months=['2026-01','2026-02'];
    if(marchData)months.push('2026-03');
    var streak=0;
    for(var i=months.length-1;i>=0;i--){
        var data=months[i]==='2026-03'?marchData:MONTHS_DATA[months[i]];
        if(!data)break;
        var sorted=data.slice().sort(function(a,b){return(b.sales-a.sales)||(b.netto-a.netto)});
        // Check if VT is in top 3 (with tied ranks)
        var r=1;var inTop3=false;
        for(var k=0;k<sorted.length;k++){
            if(k>0){var pv=sorted[k-1].sales;if(sorted[k].sales<pv)r=k+1;}
            if(sorted[k].n===name&&r<=3){inTop3=true;break;}
            if(r>3)break;
        }
        if(inTop3)streak++;else break;
    }
    return streak;
}

// Countdown
function countdownHTML(){
    if(month.length===4)return'';
    if(!isCurrentMonth(month))return'';
    var now=new Date();
    var sp=month.split('-');
    var yr=+sp[0],mo=+sp[1];
    var end=new Date(yr,mo,1);
    var diff=end-now;
    if(diff<=0)return'';
    var days=Math.floor(diff/86400000);
    var hrs=Math.floor((diff%86400000)/3600000);
    var mins=Math.floor((diff%3600000)/60000);
    var wd=getWorkingDays(yr,mo);
    return '<div class="countdown fade-in"><div class="countdown-inner"><div class="countdown-seg"><div class="countdown-val">'+days+'</div><div class="countdown-unit">Tage</div></div><div class="countdown-sep">:</div><div class="countdown-seg"><div class="countdown-val">'+hrs+'</div><div class="countdown-unit">Std</div></div><div class="countdown-sep">:</div><div class="countdown-seg"><div class="countdown-val">'+mins+'</div><div class="countdown-unit">Min</div></div><div style="width:12px"></div><div class="countdown-label">bis Monatsende · Arbeitstag '+wd.elapsed+'/'+wd.total+'</div></div></div>';
}

function getDaysLeft(yr,mo2){
    var last2=new Date(yr,mo2,0,23,59,59);
    var now3=new Date();
    var diff=last2.getTime()-now3.getTime();
    if(diff<0)return{d:0,h:0,m:0,over:true};
    return{d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000),over:false};
}

function computeMarch(orders,zeros){
    var zi={};if(zeros)zeros.forEach(function(e){if(e.efs_id)zi[e.efs_id]=true});
    var a6=orders.filter(function(o){return(parseFloat(o.calculated_realprice_netto)||0)>=6000});
    var bk={};
    a6.forEach(function(o){var l=o.lead_id;if(!l)return;var k=l+'_'+(isHP(o)?'HP':'PV');var an=o.leveto_id||0;if(!bk[k]||an>(bk[k].leveto_id||0))bk[k]=o});
    var u=Object.values(bk),bv={};
    u.forEach(function(o){
        var n=(o.ersteller||'?').trim();
        if(!bv[n])bv[n]={sales:0,kwp:0,netto:0,storno:0,el:0,emp:0,sp:0,zero:0,hp:0,pv:0};
        var d=bv[n];d.sales++;d.kwp+=Math.round((parseFloat(o.calculated_realprice_netto)||0)/2550*10)/10;d.netto+=parseFloat(o.calculated_realprice_netto)||0;
        if(o.status_kunde==='Storniert')d.storno++;
        var q=(o.quelle||'').toLowerCase();
        if(q==='eigenlead')d.el++;if(q==='empfehlung')d.emp++;
        if(hasSpeicher(o))d.sp++;
        if(isHP(o))d.hp++;else d.pv++;
    });
    return Object.entries(bv).map(function(e){var v=e[1];v.n=e[0];return v});
}

function runBoot(){
    var steps=document.querySelectorAll('.boot-step');
    var bar=document.getElementById('bootBar');
    var pct=document.getElementById('bootPct');
    var label=document.getElementById('bootLabel');
    var stats=document.getElementById('bootStats');
    var overlay=document.getElementById('bootOverlay');
    var progress=0;var stepIdx=-1;
    var labels=['Verbindung wird hergestellt...','Cluster-Check...','Pipeline aktivieren...','Daten synchronisieren...','Engine starten...','Alle Systeme online ✅'];
    var iv=setInterval(function(){
        progress+=3;if(progress>100)progress=100;
        bar.style.width=progress+'%';
        pct.textContent=progress+'%';
        var newStep=Math.min(Math.floor(progress/20),steps.length-1);
        if(newStep!==stepIdx){
            stepIdx=newStep;
            label.textContent=labels[stepIdx];
            for(var j=0;j<steps.length;j++){
                steps[j].classList.toggle('active',j<=stepIdx);
                steps[j].classList.toggle('current',j===stepIdx);
                if(j<=stepIdx&&!steps[j].querySelector('.boot-step-status')){
                    var st=document.createElement('span');st.className='boot-step-status';st.textContent=steps[j].dataset.status;steps[j].appendChild(st);
                }
            }
        }
        if(progress>=100){
            clearInterval(iv);
            label.textContent=labels[labels.length-1];
            stats.classList.add('show');
            setTimeout(function(){
                overlay.classList.add('done');
                document.getElementById('app').style.display='block';
                setTimeout(function(){overlay.style.display='none'},600);
            },800);
        }
    },50);
}

// === BUILD DAILY CHART ===
function buildDailyChart(byDay, year, month) {
    var daysInMonth = new Date(year, month, 0).getDate();
    var today = new Date();
    var isToday = function(d) { return today.getFullYear() === year && today.getMonth() + 1 === month && today.getDate() === d; };
    var isWeekend = function(d) { var dow = new Date(year, month - 1, d).getDay(); return dow === 0 || dow === 6; };
    var maxVal = 0;
    for (var dd = 1; dd <= daysInMonth; dd++) {
        var key = String(dd).padStart(2, '0');
        var val = byDay[key] || byDay[String(dd)] || 0;
        if (val > maxVal) maxVal = val;
    }
    if (maxVal === 0) maxVal = 1;
    var bars = '';
    for (var dd = 1; dd <= daysInMonth; dd++) {
        var key2 = String(dd).padStart(2, '0');
        var val2 = byDay[key2] || byDay[String(dd)] || 0;
        var h = Math.max(2, Math.round(val2 / maxVal * 70));
        var cls = isToday(dd) ? 'today' : (isWeekend(dd) && val2 === 0 ? 'weekend' : '');
        var dayLbl = (dd % 3 === 1 || dd === daysInMonth) ? dd : '';
        var dayClass = isToday(dd) ? 'today' : '';
        bars += '<div class="daily-bar-wrap">'
            + (val2 > 0 ? '<div class="daily-bar-val">' + val2 + '</div>' : '')
            + '<div class="daily-bar ' + cls + '" style="height:' + h + 'px"></div>'
            + (dayLbl ? '<div class="daily-bar-day ' + dayClass + '">' + dayLbl + '</div>' : '')
            + '</div>';
    }
    return '<div class="daily-chart">'
        + '<div class="daily-chart-title">Leads pro Tag</div>'
        + '<div class="daily-bars">' + bars + '</div>'
        + '</div>';
}

// === BUILD LIVE TICKER ===
function buildTicker(recentLeads) {
    if (!recentLeads || !recentLeads.length) {
        return '<div class="ticker-wrap"><div class="ticker-title"><span class="ticker-dot"></span> Live-Ticker</div><div class="ticker-empty">Noch keine aktuellen Leads</div></div>';
    }
    var items = '';
    var shown = recentLeads.slice(0, 5);
    shown.forEach(function(lead) {
        var srcClass = (lead.source || '').toLowerCase().indexOf('empfehlung') >= 0 ? 'empfehlung' : 'eigenlead';
        var srcLabel = srcClass === 'empfehlung' ? 'Empfehlung' : 'Eigenlead';
        var berater = lead.berater || 'Unbekannt';
        var parts = berater.trim().split(/\s+/);
        var shortName = parts.length >= 2 ? parts[0] + ' ' + parts[parts.length - 1][0] + '.' : parts[0];
        var city = lead.city ? ' \xB7 ' + lead.city : '';
        items += '<div class="ticker-item">'
            + '<div class="ticker-icon">' + (srcClass === 'empfehlung' ? '\uD83E\uDD1D' : '\uD83C\uDFAF') + '</div>'
            + '<div class="ticker-name">' + shortName + city + '</div>'
            + '<div class="ticker-src ' + srcClass + '">' + srcLabel + '</div>'
            + '</div>';
    });
    return '<div class="ticker-wrap">'
        + '<div class="ticker-title"><span class="ticker-dot"></span> Live-Ticker</div>'
        + '<div class="ticker-list">' + items + '</div>'
        + '</div>';
}

// === TREND BADGE ===
function getTrendHTML(name, rk, prevData) {
    if (!prevData) return '';
    var curRank = -1;
    for (var i = 0; i < rk.length; i++) { if (rk[i].n === name) { curRank = i + 1; break; } }
    var prevRk = prevData.slice().sort(function(a,b){ return (b[sort==='volume'?'netto':sort==='kwp'?'kwp':'sales'] - a[sort==='volume'?'netto':sort==='kwp'?'kwp':'sales']); });
    var prevRank = -1;
    for (var j = 0; j < prevRk.length; j++) { if (prevRk[j].n === name) { prevRank = j + 1; break; } }
    if (curRank < 0 || prevRank < 0) return '';
    var diff = prevRank - curRank;
    if (diff > 0) return '<span class="rank-trend up">▲ '+diff+'</span>';
    if (diff < 0) return '<span class="rank-trend down">▼ '+Math.abs(diff)+'</span>';
    return '<span class="rank-trend same">=</span>';
}

function checkKonfetti(total, month) {
    var milestones = [100, 250, 500, 750, 1000];
    for (var i = 0; i < milestones.length; i++) {
        if (total >= milestones[i]) {
            // Milestone reached – confetti already rendered via buildMilestoneConfetti in HTML
            break;
        }
    }
}

// === MILESTONE CONFETTI ===
function buildMilestoneConfetti(total) {
    var milestones = [1000, 750, 500, 250, 100];
    var reached = null;
    for (var mi = 0; mi < milestones.length; mi++) {
        if (total >= milestones[mi]) { reached = milestones[mi]; break; }
    }
    if (!reached) return '';
    var msgs = {};
    msgs[100] = 'Die ersten 100!';
    msgs[250] = 'Viertel geschafft!';
    msgs[500] = 'Halbzeit!';
    msgs[750] = 'Dreiviertel!';
    msgs[1000] = 'ZIEL ERREICHT!';
    var emos = {};
    emos[100] = '\uD83D\uDE80';
    emos[250] = '\uD83D\uDCAA';
    emos[500] = '\uD83D\uDD25';
    emos[750] = '\u26A1';
    emos[1000] = '\uD83C\uDFC6';
    var confetti = '';
    var colors = ['#F5C500','#FFE066','#22c55e','#3b82f6','#a855f7','#ec4899','#06b6d4','#ef4444'];
    for (var ci = 0; ci < 25; ci++) {
        var sz = 4 + Math.random() * 6;
        confetti += '<div class="ms-confetti-p" style="left:' + Math.random() * 100 + '%;top:' + Math.random() * 30 + '%;background:' + colors[ci % 8] + ';width:' + sz + 'px;height:' + sz + 'px;border-radius:' + (Math.random() > .5 ? '50%' : '2px') + ';animation-delay:' + Math.random() * 2 + 's"></div>';
    }
    return '<div class="milestone-banner">'
        + '<div class="ms-confetti">' + confetti + '</div>'
        + '<div class="ms-text">' + (emos[reached] || '') + ' ' + reached.toLocaleString('de-DE') + ' ' + (msgs[reached] || '') + '</div>'
        + '<div class="ms-sub">Meilenstein bei ' + reached.toLocaleString('de-DE') + ' Eigenleads + Empfehlungen erreicht</div>'
        + '</div>';
}

// === SHARE RANKING ===
function shareRanking() {
    var title = document.querySelector('.big-number');
    var titleText = title ? title.textContent : '';
    var header = document.querySelector('.header-label');
    var headerText = header ? header.textContent : '';
    var shareText = 'bee-doo VT-Ranking: ' + titleText + ' ' + headerText + '\n\nLive-Ranking: ' + window.location.href;
    if (navigator.share) {
        navigator.share({ title: 'bee-doo VT-Ranking', text: shareText, url: window.location.href }).catch(function(){});
    } else {
        navigator.clipboard.writeText(shareText).then(function() {
            var toast = document.createElement('div');
            toast.className = 'share-toast';
            toast.textContent = 'Link kopiert!';
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 2000);
        }).catch(function() {
            var ta = document.createElement('textarea');
            ta.value = shareText;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            ta.remove();
            var t2 = document.createElement('div');
            t2.className = 'share-toast';
            t2.textContent = 'Link kopiert!';
            document.body.appendChild(t2);
            setTimeout(function() { t2.remove(); }, 2000);
        });
    }
}
window.shareRanking = shareRanking;

            delete challengeCache[challengeMonth];
            showChallenge();
        }else if((month==='2026-03'||month==='2026')&&marchLoaded){
            loadMarch();
        }
    }
},300000);

})();
