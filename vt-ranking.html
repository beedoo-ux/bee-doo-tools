<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bee-doo · VT-Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#F5C500;--gold2:#FFE066;--bg:#08090f;--bg2:#0e1019;--card:#12141f;--card2:#181b28;--border:#1e2235;--text:#e8ecf4;--dim:#5e6888;--green:#22c55e;--blue:#3b82f6;--cyan:#06b6d4;--purple:#a855f7;--orange:#f59e0b;--red:#ef4444;--pink:#ec4899}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,#F5C50008 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#3b82f606 0%,transparent 50%);pointer-events:none;z-index:0}

.main{max-width:720px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}
.header{text-align:center;margin-bottom:28px;position:relative}
.hero-label{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:3px}
.hero-number{font-family:'Outfit',sans-serif;font-size:clamp(72px,16vw,110px);font-weight:900;line-height:1;background:linear-gradient(135deg,var(--gold),var(--gold2),#fff,var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.hero-sub{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:#2a3550;letter-spacing:2px;text-transform:uppercase;margin-top:8px}

.confetti-wrap{position:absolute;top:0;left:0;right:0;height:200px;overflow:hidden;pointer-events:none;z-index:10}
.confetti-p{position:absolute;opacity:0;animation:confettiFall 3.5s ease-in-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg) scale(1)}60%{opacity:1}100%{opacity:0;transform:translateY(200px) rotate(720deg) scale(.4)}}

.crown-pos{position:relative}
.crown-pos::before{content:'👑';position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:18px;animation:crownFloat 2s ease-in-out infinite}
@keyframes crownFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;transition:all .2s}
.kpi:hover{border-color:var(--gold);transform:translateY(-2px)}
.kpi-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;line-height:1}
.kpi-label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.ctrl-btn:hover{border-color:var(--gold);color:var(--text)}
.ctrl-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.ctrl-select{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;outline:none}
.ctrl-select:focus{border-color:var(--gold)}
.ctrl-select option{background:var(--card);color:var(--text)}

.legend{display:grid;grid-template-columns:repeat(3,auto);gap:6px 20px;justify-content:center;margin-bottom:16px;padding:12px 20px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.legend span{font-size:13px;font-weight:600}

.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-card{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:all .25s ease;position:relative;overflow:hidden}
.rank-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0}
.rank-card:hover{border-color:#2a3050;transform:translateX(4px)}

.rank-card.gold{background:linear-gradient(135deg,#1a1708 0%,var(--card) 60%);border-color:#3a3010}
.rank-card.gold::before{background:linear-gradient(180deg,var(--gold),#b8940a)}
.rank-card.gold:hover{border-color:#4a4020;box-shadow:0 0 30px #F5C50010}
.rank-card.silver{background:linear-gradient(135deg,#161820 0%,var(--card) 60%);border-color:#2a2d3a}
.rank-card.silver::before{background:linear-gradient(180deg,#94a3b8,#64748b)}
.rank-card.bronze{background:linear-gradient(135deg,#1a1410 0%,var(--card) 60%);border-color:#2a2418}
.rank-card.bronze::before{background:linear-gradient(180deg,#d97706,#92400e)}

.rank-pos{font-family:'Outfit',sans-serif;font-weight:900;text-align:center;line-height:1}
.rank-pos.p1{font-size:28px}
.rank-pos.p2{font-size:24px}
.rank-pos.p3{font-size:22px}
.rank-pos.pn{font-size:16px;color:var(--dim)}

.rank-info{min-width:0}
.rank-name{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-card.gold .rank-name{font-size:17px}
.rank-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.rank-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.tag-pv{background:#f9731616;color:#fb923c}
.tag-hp{background:#06b6d416;color:#22d3ee}
.tag-el{background:#22c55e16;color:#4ade80}
.tag-emp{background:#3b82f616;color:#60a5fa}
.tag-sp{background:#a855f716;color:#c084fc}
.tag-zero{background:#f59e0b16;color:#fbbf24}

.rank-bar{grid-column:1/-1;height:3px;background:var(--bg);border-radius:2px;margin-top:2px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}

.rank-right{text-align:right}
.rank-sales{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;line-height:1}
.rank-card.gold .rank-sales{font-size:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.rank-card.silver .rank-sales{font-size:30px;color:#94a3b8}
.rank-card.bronze .rank-sales{font-size:28px;color:#d97706}
.rank-vol{font-size:11px;font-weight:600;color:var(--dim);margin-top:2px}

.footer{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.footer-line{font-size:11px;color:var(--dim)}
.footer-ts{font-size:10px;color:#2a3550;margin-top:6px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeUp .4s ease both}
.fade-d1{animation-delay:.05s}.fade-d2{animation-delay:.1s}.fade-d3{animation-delay:.15s}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:13px;color:var(--dim);font-weight:500}

@media(max-width:480px){
    .main{padding:12px 10px 40px}
    .kpis{grid-template-columns:repeat(3,1fr);gap:6px}
    .kpi{padding:10px 8px}
    .kpi-val{font-size:18px}
    .rank-card{grid-template-columns:40px 1fr auto;gap:8px;padding:10px 12px}
    .rank-name{font-size:13px}
    .rank-card.gold .rank-name{font-size:14px}
    .rank-sales{font-size:22px}
    .rank-card.gold .rank-sales{font-size:28px}
    .rank-card.silver .rank-sales{font-size:24px}
    .rank-tag{font-size:9px;padding:1px 5px}
    .controls{gap:6px}
    .ctrl-btn{font-size:12px;padding:7px 12px}
    .legend{grid-template-columns:repeat(2,auto);gap:4px 16px;padding:10px 14px}
    .legend span{font-size:11px}
}
</style>
</head>
<body>
<div id="app">
    <div class="loading">
        <div class="loader"></div>
        <div class="load-text">Lade Ranking...</div>
    </div>
</div>
<script>
(function(){
    var SB='https://hqzpemfaljxcysyqssng.supabase.co';
    var AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
    var hd={apikey:AK,Authorization:'Bearer '+AK};
    var MN=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
    var NOW=new Date();
    var MONTHS=['2026-03','2026-02'];
    var sort='sales';
    var month='2026-02';
    var allOrders=[];
    var zeroIds={};
    var availMonths=MONTHS;

    var p=new URLSearchParams(window.location.search);
    var qm=p.get('m');
    if(qm&&(qm==='2026-02'||qm==='2026-03'))month=qm;

    function shortName(full){
        var parts=(full||'Unbekannt').trim().split(/\s+/);
        if(parts.length<2)return parts[0];
        return parts[0]+' '+parts[parts.length-1].charAt(0).toUpperCase()+'.';
    }

    function fmt(n){return Math.round(n).toLocaleString('de-DE')}

    function compute(){
        var filtered=allOrders.filter(function(o){return o.datum_angenommen&&o.datum_angenommen.indexOf(month)===0});
        var above6k=filtered.filter(function(o){return(parseFloat(o.an_wert_netto)||0)>=6000});
        var byKey={};
        above6k.forEach(function(o){
            var lid=o.leveto_lead_id;if(!lid)return;
            var hp=isHP(o);
            var k=lid+'_'+(hp?'HP':'PV');
            var an=parseInt(o.auftrag_nr)||0;
            if(!byKey[k]||an>(parseInt(byKey[k].auftrag_nr)||0))byKey[k]=o;
        });
        var unique=Object.values(byKey);
        var byVt={};
        unique.forEach(function(o){
            var n=(o.kundenberater_name||'Unbekannt').trim();
            if(!byVt[n])byVt[n]={sales:0,kwp:0,netto:0,storno:0,el:0,emp:0,sp:0,zero:0,hp:0,pv:0};
            var d=byVt[n];d.sales++;d.kwp+=(parseFloat(o.anlagen_kwp)||0);d.netto+=(parseFloat(o.an_wert_netto)||0);
            if(o.storniert)d.storno++;if(o.ist_eigenlead)d.el++;if(o.ist_empfehlung)d.emp++;
            if(o.hat_speicher)d.sp++;if(o.efs_projekt_id&&zeroIds[o.efs_projekt_id])d.zero++;
            if(isHP(o))d.hp++;else d.pv++;
        });
        var ranking=Object.entries(byVt).sort(function(a,b){
            if(sort==='volume')return(b[1].netto-a[1].netto)||b[1].sales-a[1].sales;
            if(sort==='kwp')return(b[1].kwp-a[1].kwp)||b[1].sales-a[1].sales;
            return(b[1].sales-a[1].sales)||b[1].netto-a[1].netto;
        });
        var tKwp=0,tNetto=0,tHP=0,tPV=0,tEl=0,tSp=0;
        unique.forEach(function(o){
            tKwp+=parseFloat(o.anlagen_kwp)||0;
            tNetto+=parseFloat(o.an_wert_netto)||0;
            if(isHP(o))tHP++;else tPV++;
            if(o.ist_eigenlead)tEl++;
            if(o.hat_speicher)tSp++;
        });
        return{ranking:ranking,total:unique.length,tKwp:tKwp,tNetto:tNetto,tHP:tHP,tPV:tPV,tEl:tEl,tSp:tSp};
    }

    function isHP(o){
        if(month<'2026-02')return false;
        var m=o.angebot_module;
        return m===null||m===undefined||m===0||m===''||String(m)==='0'||String(m)==='None';
    }

    function render(){
        var d=compute();
        var sp=month.split('-');
        var monat=MN[+sp[1]-1]+' '+sp[0];
        var maxVal=d.ranking.length?d.ranking[0][1][sort==='volume'?'netto':sort==='kwp'?'kwp':'sales']:1;

        var confettiHTML='';
        var cc=['#F5C500','#FFE066','#22c55e','#3b82f6','#a855f7','#ec4899','#06b6d4','#ef4444'];
        for(var ci=0;ci<35;ci++){
            var sz=4+Math.random()*6;
            confettiHTML+='<div class="confetti-p" style="left:'+Math.random()*100+'%;background:'+cc[ci%cc.length]+';width:'+sz+'px;height:'+sz+'px;border-radius:'+(Math.random()>.5?'50%':'2px')+';animation-delay:'+Math.random()*2+'s;animation-duration:'+(2.5+Math.random()*2)+'s"></div>';
        }

        var monthOpts='';
        availMonths.forEach(function(mv){
            var mp=mv.split('-');
            monthOpts+='<option value="'+mv+'"'+(mv===month?' selected':'')+'>'+MN[+mp[1]-1]+' '+mp[0]+'</option>';
        });

        var kpiHP=d.tHP>0?'<div class="kpi"><div class="kpi-val" style="color:var(--cyan)">🌡️ '+d.tHP+'</div><div class="kpi-label">Wärmepumpe</div></div>':'';
        var kpiSp=d.tSp>0?'<div class="kpi"><div class="kpi-val" style="color:var(--purple)">'+d.tSp+'</div><div class="kpi-label">Speicher</div></div>':'';

        var cards='';
        d.ranking.forEach(function(entry,i){
            var name=entry[0],v=entry[1];
            var cls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
            var posClass=i<3?'p'+(i+1):'pn';
            var icon=i===0?'🥇':i===1?'🥈':i===2?'🥉':'<span style="opacity:.5">'+(i+1)+'</span>';
            var crownClass=i===0?' crown-pos':'';
            var val=sort==='volume'?Math.round(v.netto/1000)+'k':sort==='kwp'?v.kwp.toFixed(0):v.sales;
            var sub=sort==='sales'?fmt(Math.round(v.netto/1000))+'k€':v.sales+' Deals';
            var barPct=Math.max(5,(sort==='volume'?v.netto:sort==='kwp'?v.kwp:v.sales)/maxVal*100);
            var barBg=i===0?'linear-gradient(90deg,var(--gold),var(--gold2))':i===1?'linear-gradient(90deg,#94a3b8,#cbd5e1)':i===2?'linear-gradient(90deg,#d97706,#fbbf24)':'linear-gradient(90deg,var(--blue),#60a5fa)';

            var tags='';
            if(v.pv>0)tags+='<span class="rank-tag tag-pv">☀️'+v.pv+'</span>';
            if(v.hp>0)tags+='<span class="rank-tag tag-hp">🌡️'+v.hp+'</span>';
            if(v.el>0)tags+='<span class="rank-tag tag-el">🎯'+v.el+'</span>';
            if(v.emp>0)tags+='<span class="rank-tag tag-emp">🤝'+v.emp+'</span>';
            if(v.sp>0)tags+='<span class="rank-tag tag-sp">🔋'+v.sp+'</span>';
            if(v.zero>0)tags+='<span class="rank-tag tag-zero">⚡'+v.zero+'</span>';

            cards+='<div class="rank-card '+cls+' fade-in" style="animation-delay:'+(Math.min(i,15)*0.03)+'s">'
                +'<div class="rank-pos '+posClass+crownClass+'">'+icon+'</div>'
                +'<div class="rank-info">'
                    +'<div class="rank-name">'+shortName(name)+'</div>'
                    +'<div class="rank-meta">'+tags+'</div>'
                    +'<div class="rank-bar"><div class="rank-bar-fill" style="width:'+barPct+'%;background:'+barBg+'"></div></div>'
                +'</div>'
                +'<div class="rank-right">'
                    +'<div class="rank-sales">'+val+'</div>'
                    +'<div class="rank-vol">'+sub+'</div>'
                +'</div>'
            +'</div>';
        });

        if(d.ranking.length===0)cards='<div style="text-align:center;padding:40px;color:var(--dim)">Keine Aufträge in '+monat+'</div>';

        var now=new Date();
        var ts=now.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

        document.getElementById('app').innerHTML=
            '<div class="main">'
            +'<div class="header fade-in">'
                +'<div class="confetti-wrap">'+confettiHTML+'</div>'
                +'<div class="hero-label">bee-doo Sales Ranking</div>'
                +'<div class="hero-number">'+d.total+'</div>'
                +'<div class="hero-label">Deals im '+monat+'</div>'
                +'<div class="hero-sub">🐝 powered by bee-doo</div>'
            +'</div>'
            +'<div class="kpis fade-in fade-d1">'
                +'<div class="kpi"><div class="kpi-val" style="color:var(--gold)">'+d.total+'</div><div class="kpi-label">Deals</div></div>'
                +'<div class="kpi"><div class="kpi-val" style="color:#fb923c">☀️ '+d.tPV+'</div><div class="kpi-label">PV</div></div>'
                +kpiHP
                +'<div class="kpi"><div class="kpi-val">'+fmt(d.tKwp)+'</div><div class="kpi-label">kWp</div></div>'
                +'<div class="kpi"><div class="kpi-val">'+fmt(Math.round(d.tNetto/1000))+'k</div><div class="kpi-label">Volumen €</div></div>'
                +'<div class="kpi"><div class="kpi-val" style="color:var(--green)">'+d.tEl+'</div><div class="kpi-label">Eigenleads</div></div>'
                +kpiSp
            +'</div>'
            +'<div class="controls fade-in fade-d2">'
                +'<button class="ctrl-btn'+(sort==='sales'?' active':'')+'" data-sort="sales">🏆 Deals</button>'
                +'<button class="ctrl-btn'+(sort==='volume'?' active':'')+'" data-sort="volume">💰 Volumen</button>'
                +'<button class="ctrl-btn'+(sort==='kwp'?' active':'')+'" data-sort="kwp">⚡ kWp</button>'
                +'<div style="flex:1 0 4px"></div>'
                +'<select class="ctrl-select" id="monthSelect">'+monthOpts+'</select>'
            +'</div>'
            +'<div class="legend fade-in fade-d3">'
                +'<span style="color:#fb923c">☀️ PV</span>'
                +'<span style="color:#22d3ee">🌡️ Wärmepumpe</span>'
                +'<span style="color:#4ade80">🎯 Eigenlead</span>'
                +'<span style="color:#60a5fa">🤝 Empfehlung</span>'
                +'<span style="color:#c084fc">🔋 Speicher</span>'
                +'<span style="color:#fbbf24">⚡ Zero</span>'
            +'</div>'
            +'<div class="rank-list" id="rankList">'+cards+'</div>'
            +'<div class="footer fade-in">'
                +'<div class="footer-line">bee-doo GmbH · Am Stadtholz 39 · 33609 Bielefeld</div>'
                +'<div class="footer-ts">Stand: '+ts+' · Stornos inkl. · Dedup per Lead+Produkt</div>'
            +'</div>'
            +'</div>';

        // Bind events
        document.querySelectorAll('[data-sort]').forEach(function(btn){
            btn.addEventListener('click',function(){
                sort=this.getAttribute('data-sort');
                render();
            });
        });
        document.getElementById('monthSelect').addEventListener('change',function(){
            month=this.value;
            window.history.replaceState(null,'','?m='+month);
            render();
        });
    }

    // Load data
    async function loadData(){
        try{
            var all=[];
            for(var o=0;o<60000;o+=1000){
                var r=await fetch(SB+'/rest/v1/auftraege?select=kundenberater_name,datum_angenommen,anlagen_kwp,an_wert_netto,storniert,ist_eigenlead,ist_empfehlung,hat_speicher,efs_projekt_id,auftrag_nr,leveto_lead_id,angebot_module&datum_angenommen=gte.2026-02-01&datum_angenommen=lt.2026-04-01&limit=1000&offset='+o,{headers:hd});
                var d=await r.json();
                if(!d.length)break;
                all=all.concat(d);
                if(d.length<1000)break;
            }
            allOrders=all;

            // Load zero IDs
            try{
                var eR=await fetch(SB+'/rest/v1/efs_projekte?select=efs_id,preismodell&preismodell=eq.Zero',{headers:hd});
                if(eR.ok){
                    var ed=await eR.json();
                    if(Array.isArray(ed))ed.forEach(function(e){zeroIds[e.efs_id]=true});
                }
            }catch(e){}

            render();
        }catch(err){
            document.getElementById('app').innerHTML='<div class="loading"><div class="load-text" style="color:var(--red)">Fehler beim Laden: '+err.message+'</div></div>';
        }
    }

    loadData();
})();
</script>
</body>
</html>
