<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bee-doo · VT-Ranking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#F5C500;--gold2:#FFE066;--bg:#08090f;--bg2:#0e1019;--card:#12141f;--card2:#181b28;--border:#1e2235;--text:#e8ecf4;--dim:#5e6888;--green:#22c55e;--blue:#3b82f6;--cyan:#06b6d4;--purple:#a855f7;--orange:#f59e0b;--red:#ef4444;--pink:#ec4899}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,#F5C50008 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,#3b82f606 0%,transparent 50%);pointer-events:none;z-index:0}

.gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;z-index:1}
.gate-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;max-width:380px;width:100%;text-align:center;animation:fadeUp .5s ease}
.gate-logo{height:28px;filter:brightness(0) invert(1);opacity:.6;margin-bottom:20px}
.gate-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--dim);margin-bottom:24px}
.gate-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:inherit;font-size:15px;outline:none;transition:border .2s}
.gate-input:focus{border-color:var(--gold)}
.gate-input.shake{animation:shake .4s ease}
.gate-btn{width:100%;margin-top:12px;background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:12px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.gate-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px #F5C50033}
.gate-error{margin-top:14px;font-size:13px;color:var(--red);font-weight:600;animation:fadeUp .3s ease;line-height:1.4}

.main{max-width:720px;margin:0 auto;padding:20px 16px 60px;position:relative;z-index:1}
.header{text-align:center;margin-bottom:28px}
.header-logo{height:24px;filter:brightness(0) invert(1);opacity:.5;margin-bottom:8px}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:5px 14px 5px 10px;font-size:11px;font-weight:600;color:var(--dim);margin-bottom:10px}
.header-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.header-title{font-family:'Outfit',sans-serif;font-size:clamp(28px,6vw,42px);font-weight:900;letter-spacing:-1px;line-height:1.1}
.header-title span{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-month{font-family:'Outfit',sans-serif;font-size:16px;font-weight:500;color:var(--dim);margin-top:4px}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;transition:all .2s}
.kpi:hover{border-color:var(--gold);transform:translateY(-2px)}
.kpi-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;line-height:1}
.kpi-label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.ctrl-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.ctrl-btn:hover{border-color:var(--gold);color:var(--text)}
.ctrl-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.ctrl-select{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;outline:none}
.ctrl-select:focus{border-color:var(--gold)}

.rank-list{display:flex;flex-direction:column;gap:6px}
.rank-card{display:grid;grid-template-columns:48px 1fr auto;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:all .25s ease;position:relative;overflow:hidden}
.rank-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 3px 3px 0}
.rank-card:hover{border-color:#2a3050;transform:translateX(4px)}

.rank-card.gold{background:linear-gradient(135deg,#1a1708 0%,var(--card) 60%);border-color:#3a3010}
.rank-card.gold::before{background:linear-gradient(180deg,var(--gold),#b8940a)}
.rank-card.gold:hover{border-color:#4a4020;box-shadow:0 0 30px #F5C50010}
.rank-card.silver{background:linear-gradient(135deg,#161820 0%,var(--card) 60%);border-color:#2a2d3a}
.rank-card.silver::before{background:linear-gradient(180deg,#94a3b8,#64748b)}
.rank-card.bronze{background:linear-gradient(135deg,#1a1410 0%,var(--card) 60%);border-color:#2a2418}
.rank-card.bronze::before{background:linear-gradient(180deg,#d97706,#92400e)}

.rank-pos{font-family:'Outfit',sans-serif;font-weight:900;text-align:center;line-height:1}
.rank-pos.p1{font-size:28px}
.rank-pos.p2{font-size:24px}
.rank-pos.p3{font-size:22px}
.rank-pos.pn{font-size:16px;color:var(--dim)}

.rank-info{min-width:0}
.rank-name{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-card.gold .rank-name{font-size:17px}
.rank-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.rank-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.tag-pv{background:#f9731616;color:#fb923c}
.tag-hp{background:#06b6d416;color:#22d3ee}
.tag-el{background:#22c55e16;color:#4ade80}
.tag-emp{background:#3b82f616;color:#60a5fa}
.tag-sp{background:#a855f716;color:#c084fc}
.tag-zero{background:#f59e0b16;color:#fbbf24}
.tag-storno{background:#ef444416;color:#f87171}

.rank-right{text-align:right}
.rank-sales{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;line-height:1}
.rank-card.gold .rank-sales{font-size:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.rank-card.silver .rank-sales{font-size:30px;color:#94a3b8}
.rank-card.bronze .rank-sales{font-size:28px;color:#d97706}
.rank-pn .rank-sales{color:var(--blue)}
.rank-vol{font-size:11px;font-weight:600;color:var(--dim);margin-top:2px}

.rank-bar{grid-column:1/-1;height:3px;background:var(--bg);border-radius:2px;margin-top:2px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}

.footer{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.footer-line{font-size:11px;color:var(--dim)}
.footer-ts{font-size:10px;color:#2a3550;margin-top:6px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade-in{animation:fadeUp .4s ease both}
.fade-d1{animation-delay:.05s}.fade-d2{animation-delay:.1s}.fade-d3{animation-delay:.15s}
.fade-d4{animation-delay:.2s}.fade-d5{animation-delay:.25s}.fade-d6{animation-delay:.3s}
.fade-d7{animation-delay:.35s}.fade-d8{animation-delay:.4s}.fade-d9{animation-delay:.45s}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:13px;color:var(--dim);font-weight:500}

.month-wrap{position:relative;display:flex;align-items:center;gap:6px}
.month-hint{position:absolute;top:-34px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg);font-size:11px;font-weight:700;font-family:'Outfit',sans-serif;padding:4px 12px;border-radius:8px;white-space:nowrap;animation:hintBounce 2s ease infinite;pointer-events:none}
.month-hint::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid var(--gold)}
@keyframes hintBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}

@media(max-width:480px){
    .main{padding:12px 10px 40px}
    .kpis{grid-template-columns:repeat(3,1fr);gap:6px}
    .kpi{padding:10px 8px}
    .kpi-val{font-size:18px}
    .rank-card{grid-template-columns:40px 1fr auto;gap:8px;padding:10px 12px}
    .rank-name{font-size:13px}
    .rank-card.gold .rank-name{font-size:14px}
    .rank-sales{font-size:22px}
    .rank-card.gold .rank-sales{font-size:28px}
    .rank-card.silver .rank-sales{font-size:24px}
    .rank-tag{font-size:9px;padding:1px 5px}
    .controls{gap:6px}
    .ctrl-btn{font-size:12px;padding:7px 12px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback,useRef}=React;
const SB='https://hqzpemfaljxcysyqssng.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const hd={apikey:AK,Authorization:'Bearer '+AK};
const MN=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const FREE=['2026-02','2026-03'];
const PW='Patrick123!';

function Gate({onUnlock}){
    const[pw,setPw]=useState('');
    const[err,setErr]=useState('');
    const[shake,setShake]=useState(false);
    const check=()=>{
        if(pw===PW){onUnlock();return}
        setErr('🚨 Dieser unsägliche Versuch wird gemeldet!');
        setShake(true);setTimeout(()=>setShake(false),400);setPw('');
    };
    return<div className="gate">
        <div className="gate-card">
            <img className="gate-logo" src="https://bee-doo-tools.vercel.app/Logo%20bee-doo%20Schriftzug.svg" alt="bee-doo"/>
            <div className="gate-title">🔒 Zugang für andere Monate</div>
            <input className={`gate-input${shake?' shake':''}`} type="password" placeholder="Passwort eingeben..."
                value={pw} onChange={e=>{setPw(e.target.value);setErr('')}}
                onKeyDown={e=>e.key==='Enter'&&check()} autoFocus/>
            <button className="gate-btn" onClick={check}>Entsperren</button>
            {err&&<div className="gate-error">{err}</div>}
        </div>
    </div>
}

function App(){
    const posterRef=useRef(null);
    const[orders,setOrders]=useState(null);
    const[zeroIds,setZeroIds]=useState({});
    const now=new Date();const defM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    const[month,setMonth]=useState(FREE.includes(defM)?defM:FREE[FREE.length-1]);
    const[unlocked,setUnlocked]=useState(false);
    const[showGate,setShowGate]=useState(false);
    const[pendingMonth,setPendingMonth]=useState(null);
    const[downloading,setDownloading]=useState(false);
    const[sort,setSort]=useState('sales');

    useEffect(()=>{
        const p=new URLSearchParams(window.location.search);
        const m=p.get('m');
        if(m&&FREE.includes(m))setMonth(m);
        else if(m&&unlocked)setMonth(m);
    },[]);

    useEffect(()=>{
        (async()=>{
            const all=[];
            for(let o=0;o<60000;o+=1000){
                const r=await fetch(SB+'/rest/v1/auftraege?select=kundenberater_name,datum_angenommen,anlagen_kwp,an_wert_netto,storniert,ist_eigenlead,ist_empfehlung,hat_speicher,efs_projekt_id,auftrag_nr,leveto_lead_id,angebot_module&limit=1000&offset='+o,{headers:hd});
                const d=await r.json();if(!d.length)break;all.push(...d);if(d.length<1000)break;
            }
            setOrders(all);
            try{
                const eR=await fetch(SB+'/rest/v1/efs_projekte?select=efs_id,preismodell&preismodell=eq.Zero',{headers:hd});
                if(eR.ok){const ed=await eR.json();const zm={};if(Array.isArray(ed))ed.forEach(e=>{zm[e.efs_id]=true});setZeroIds(zm)}
            }catch(e){}
        })();
    },[]);

    const tryMonth=(m)=>{
        if(FREE.includes(m)||unlocked){setMonth(m);window.history.replaceState(null,'','?m='+m);return}
        setPendingMonth(m);setShowGate(true);
    };
    const handleUnlock=()=>{
        setUnlocked(true);setShowGate(false);
        if(pendingMonth){setMonth(pendingMonth);window.history.replaceState(null,'','?m='+pendingMonth);setPendingMonth(null)}
    };

    const data=useMemo(()=>{
        if(!orders)return null;
        const filtered=orders.filter(o=>o.datum_angenommen&&o.datum_angenommen.startsWith(month));
        const isHP=o=>{
            if(month<'2026-02')return false;
            const m=o.angebot_module;return m===null||m===undefined||m===0||m===''||String(m)==='0'||String(m)==='None';
        };
        const getTyp=o=>isHP(o)?'HP':'PV';
        const above6k=filtered.filter(o=>(parseFloat(o.an_wert_netto)||0)>=6000);
        const byKey={};
        above6k.forEach(o=>{
            const lid=o.leveto_lead_id;if(!lid)return;
            const k=lid+'_'+getTyp(o);const an=parseInt(o.auftrag_nr)||0;
            if(!byKey[k]||an>(parseInt(byKey[k].auftrag_nr)||0))byKey[k]=o;
        });
        const unique=Object.values(byKey);
        const byVt={};
        unique.forEach(o=>{
            const n=(o.kundenberater_name||'Unbekannt').trim();
            if(!byVt[n])byVt[n]={sales:0,kwp:0,netto:0,storno:0,el:0,emp:0,sp:0,zero:0,hp:0,pv:0};
            const d=byVt[n];d.sales++;d.kwp+=(parseFloat(o.anlagen_kwp)||0);d.netto+=(parseFloat(o.an_wert_netto)||0);
            if(o.storniert)d.storno++;if(o.ist_eigenlead)d.el++;if(o.ist_empfehlung)d.emp++;
            if(o.hat_speicher)d.sp++;if(o.efs_projekt_id&&zeroIds[o.efs_projekt_id])d.zero++;
            if(isHP(o))d.hp++;else d.pv++;
        });
        const sf=sort==='volume'?(a,b)=>b[1].netto-a[1].netto||b[1].sales-a[1].sales
            :sort==='kwp'?(a,b)=>b[1].kwp-a[1].kwp||b[1].sales-a[1].sales
            :(a,b)=>b[1].sales-a[1].sales||b[1].netto-a[1].netto;
        const ranking=Object.entries(byVt).sort(sf);
        const tKwp=unique.reduce((s,o)=>s+(parseFloat(o.anlagen_kwp)||0),0);
        const tNetto=unique.reduce((s,o)=>s+(parseFloat(o.an_wert_netto)||0),0);
        const tHP=unique.filter(o=>isHP(o)).length;
        const tPV=unique.filter(o=>!isHP(o)).length;
        const tEl=unique.filter(o=>o.ist_eigenlead).length;
        const tSp=unique.filter(o=>o.hat_speicher).length;
        const tSt=unique.filter(o=>o.storniert).length;
        const months=new Set();orders.forEach(o=>{if(o.datum_angenommen)months.add(o.datum_angenommen.substring(0,7))});
        return{ranking,total:unique.length,tKwp,tNetto,tHP,tPV,tEl,tSp,tSt,months:Array.from(months).sort().reverse()}
    },[orders,month,zeroIds,sort]);

    const downloadPNG=useCallback(async()=>{
        if(!posterRef.current)return;setDownloading(true);
        try{
            const c=await html2canvas(posterRef.current,{backgroundColor:'#08090f',scale:2,useCORS:true,logging:false});
            const a=document.createElement('a');const sp=month.split('-');
            a.download='bee-doo-ranking-'+MN[+sp[1]-1]+'-'+sp[0]+'.png';a.href=c.toDataURL('image/png');a.click();
        }catch(e){console.error(e)}
        setDownloading(false);
    },[month]);

    if(showGate)return<Gate onUnlock={handleUnlock}/>;
    if(!orders)return<div className="loading"><div className="loader"/><div className="load-text">Lade Ranking-Daten...</div></div>;
    if(!data)return null;

    const sp=month.split('-');const monat=MN[+sp[1]-1]+' '+sp[0];
    const maxVal=data.ranking.length?data.ranking[0][1][sort==='volume'?'netto':sort==='kwp'?'kwp':'sales']:1;
    const gv=(d)=>sort==='volume'?d.netto:sort==='kwp'?d.kwp:d.sales;

    return<div className="main">
        <div className="header fade-in">
            <img className="header-logo" src="https://bee-doo-tools.vercel.app/Logo%20bee-doo%20Schriftzug.svg" alt="bee-doo"/>
            <div className="header-badge"><span className="dot"/>Live aus Supabase</div>
            <div className="header-title">🏆 <span>Sales Ranking</span></div>
            <div className="header-month">{monat}</div>
        </div>

        <div className="kpis fade-in fade-d1">
            <div className="kpi"><div className="kpi-val" style={{color:'var(--gold)'}}>{data.total}</div><div className="kpi-label">Deals</div></div>
            <div className="kpi"><div className="kpi-val" style={{color:'#fb923c'}}>☀️ {data.tPV}</div><div className="kpi-label">PV</div></div>
            {data.tHP>0&&<div className="kpi"><div className="kpi-val" style={{color:'var(--cyan)'}}>🌡️ {data.tHP}</div><div className="kpi-label">Wärmepumpe</div></div>}
            <div className="kpi"><div className="kpi-val">{Math.round(data.tKwp).toLocaleString('de-DE')}</div><div className="kpi-label">kWp</div></div>
            <div className="kpi"><div className="kpi-val">{Math.round(data.tNetto/1000).toLocaleString('de-DE')}k</div><div className="kpi-label">Volumen €</div></div>
            <div className="kpi"><div className="kpi-val" style={{color:'var(--green)'}}>{data.tEl}</div><div className="kpi-label">Eigenleads</div></div>
            {data.tSp>0&&<div className="kpi"><div className="kpi-val" style={{color:'var(--purple)'}}>{data.tSp}</div><div className="kpi-label">Speicher</div></div>}
        </div>

        <div className="fade-in fade-d2" style={{display:'grid',gridTemplateColumns:'repeat(3,auto)',gap:'6px 20px',justifyContent:'center',marginBottom:'16px',padding:'12px 20px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'12px'}}>
            <span style={{fontSize:13,fontWeight:600,color:'#fb923c'}}>☀️ PV</span>
            <span style={{fontSize:13,fontWeight:600,color:'#22d3ee'}}>🌡️ Wärmepumpe</span>
            <span style={{fontSize:13,fontWeight:600,color:'#4ade80'}}>🎯 Eigenlead</span>
            <span style={{fontSize:13,fontWeight:600,color:'#60a5fa'}}>🤝 Empfehlung</span>
            <span style={{fontSize:13,fontWeight:600,color:'#c084fc'}}>🔋 Speicher</span>
            <span style={{fontSize:13,fontWeight:600,color:'#fbbf24'}}>⚡ Zero</span>
        </div>

        <div className="controls fade-in fade-d2">
            <button className={`ctrl-btn${sort==='sales'?' active':''}`} onClick={()=>setSort('sales')}>🏆 Deals</button>
            <button className={`ctrl-btn${sort==='volume'?' active':''}`} onClick={()=>setSort('volume')}>💰 Volumen</button>
            <button className={`ctrl-btn${sort==='kwp'?' active':''}`} onClick={()=>setSort('kwp')}>⚡ kWp</button>
            <div style={{flex:'1 0 4px'}}/>
            <div className="month-wrap">
                <div className="month-hint">📅 Monat wechseln</div>
                <select className="ctrl-select" value={month} onChange={e=>tryMonth(e.target.value)}>
                    {data.months.map(mv=>{const p=mv.split('-');return<option key={mv} value={mv}>{MN[+p[1]-1]} {p[0]}{FREE.includes(mv)?' 🔓':!unlocked?' 🔒':''}</option>})}
                </select>
            </div>
            <button className="ctrl-btn" onClick={downloadPNG} disabled={downloading}>{downloading?'⏳':'📸'}</button>
            <a className="ctrl-btn" href="index.html" style={{textDecoration:'none'}}>←</a>
        </div>

        <div className="rank-list" ref={posterRef}>
            {data.ranking.map(([name,d],i)=>{
                const cls=i===0?'gold':i===1?'silver':i===2?'bronze':'pn';
                const barPct=Math.max(5,gv(d)/maxVal*100);
                const barBg=i===0?'linear-gradient(90deg,var(--gold),var(--gold2))':i===1?'linear-gradient(90deg,#94a3b8,#cbd5e1)':i===2?'linear-gradient(90deg,#d97706,#fbbf24)':'linear-gradient(90deg,var(--blue),#60a5fa)';
                const dl=Math.min(i,9);
                return<div key={name} className={`rank-card ${cls} fade-in fade-d${dl}`}>
                    <div className={`rank-pos p${i<3?i+1:'n'}`}>{i<3?['🥇','🥈','🥉'][i]:<span style={{opacity:.5}}>{i+1}</span>}</div>
                    <div className="rank-info">
                        <div className="rank-name">{name}</div>
                        <div className="rank-meta">
                            {d.pv>0&&<span className="rank-tag tag-pv">☀️{d.pv}</span>}
                            {d.hp>0&&<span className="rank-tag tag-hp">🌡️{d.hp}</span>}
                            {d.el>0&&<span className="rank-tag tag-el">🎯{d.el}</span>}
                            {d.emp>0&&<span className="rank-tag tag-emp">🤝{d.emp}</span>}
                            {d.sp>0&&<span className="rank-tag tag-sp">🔋{d.sp}</span>}
                            {d.zero>0&&<span className="rank-tag tag-zero">⚡{d.zero}</span>}
                        </div>
                        <div className="rank-bar"><div className="rank-bar-fill" style={{width:barPct+'%',background:barBg}}/></div>
                    </div>
                    <div className="rank-right">
                        <div className="rank-sales">{sort==='volume'?Math.round(d.netto/1000)+'k':sort==='kwp'?d.kwp.toFixed(0):d.sales}</div>
                        <div className="rank-vol">{sort==='sales'?Math.round(d.netto/1000).toLocaleString('de-DE')+'k€':d.sales+' Deals'}</div>
                    </div>
                </div>
            })}
            {data.ranking.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--dim)'}}>Keine Aufträge in {monat}</div>}
        </div>

        <div className="footer fade-in">
            <div className="footer-line">bee-doo GmbH · Am Stadtholz 39 · 33609 Bielefeld</div>
            <div className="footer-ts">Stand: {new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})} · Stornos inkl. · Dedup per Lead+Produkt</div>
        </div>
    </div>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
