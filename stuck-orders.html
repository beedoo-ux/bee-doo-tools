<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bee-doo | Stuck Orders Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
    <style>
        :root{--a:#F5C500;--ad:rgba(245,197,0,.12);--bg:#08090d;--c:#111219;--ch:#16171f;--el:#1a1b24;--b:rgba(255,255,255,.06);--ba:rgba(245,197,0,.2);--t:#d8dae2;--td:#6b7280;--tb:#f3f4f6;--g:#22c55e;--gd:rgba(34,197,94,.12);--r:#ef4444;--rd:rgba(239,68,68,.12);--o:#f59e0b;--od:rgba(245,158,11,.12);--bl:#3b82f6;--bld:rgba(59,130,246,.12);--p:#a855f7;--pd:rgba(168,85,247,.12)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes sp{to{transform:rotate(360deg)}}@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
        .fi{animation:fi .3s ease-out}.spinner{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
        .pulse{animation:pu 2s ease-in-out infinite}
        .hdr{padding:14px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(245,197,0,.02) 0%,transparent 100%)}
        .hdr-l{display:flex;align-items:center;gap:14px}.logo{font-size:18px;font-weight:700;color:var(--a);letter-spacing:-.5px}.logo span{color:var(--td);font-weight:400;font-size:15px}
        .hdr-r{display:flex;align-items:center;gap:10px}
        .hdr-lk{font-size:12px;color:var(--td);text-decoration:none;padding:5px 10px;border-radius:6px;border:1px solid var(--b);transition:all .2s}.hdr-lk:hover{color:var(--a);border-color:var(--ba);background:var(--ad)}
        .mn{max-width:1440px;margin:0 auto;padding:24px 28px}
        .sts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
        .st{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:16px 18px;transition:all .2s;cursor:pointer;position:relative;overflow:hidden}
        .st:hover{border-color:var(--ba);transform:translateY(-1px)}.st.on{border-color:var(--a)}.st.on::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--a)}
        .st-l{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}.st-v{font-size:26px;font-weight:700}.st-s{font-size:10px;color:var(--td);margin-top:3px}
        .cd{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:20px;margin-bottom:16px}
        .cd-t{font-size:15px;font-weight:600;color:var(--tb);display:flex;align-items:center;gap:8px;margin-bottom:14px}
        .mt{width:100%;border-collapse:collapse;font-size:12px}.mt th{text-align:left;padding:9px 12px;color:var(--td);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--c);z-index:1}
        .mt td{padding:8px 12px;border-bottom:1px solid var(--b)}.mt tr:last-child td{border:none}.mt tr:hover td{background:rgba(255,255,255,.02)}
        .mt .sort{cursor:pointer;user-select:none}.mt .sort:hover{color:var(--a)}
        .tg{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
        .tg-r{background:var(--rd);color:var(--r)}.tg-o{background:var(--od);color:var(--o)}.tg-g{background:var(--gd);color:var(--g)}.tg-b{background:var(--bld);color:var(--bl)}.tg-p{background:var(--pd);color:var(--p)}
        .btn{padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
        .by{background:var(--a);color:#000}.by:hover:not(:disabled){background:#ffe566}.by:disabled{opacity:.35;cursor:not-allowed}
        .bo{background:transparent;color:var(--t);border:1px solid var(--b)}.bo:hover{border-color:var(--ba);color:var(--a)}
        .bsm{padding:6px 12px;font-size:11px}
        .srch{padding:9px 14px;border-radius:8px;border:1px solid var(--b);background:var(--el);color:var(--t);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;max-width:320px;transition:border-color .2s}.srch:focus{border-color:var(--a)}
        .empty{text-align:center;padding:40px 20px;color:var(--td);font-size:14px}
        .days-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
        .days-ok{background:var(--gd);color:var(--g)}.days-warn{background:var(--od);color:var(--o)}.days-danger{background:var(--rd);color:var(--r)}
        .wh-box{font-size:11px;color:var(--td);max-height:80px;overflow-y:auto;padding:6px 8px;background:var(--el);border-radius:6px;line-height:1.6;cursor:pointer}.wh-box:hover{color:var(--t)}
        .detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
        .detail-card{background:var(--c);border:1px solid var(--b);border-radius:16px;padding:28px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto}
        .detail-card h2{font-size:18px;color:var(--tb);margin-bottom:16px;display:flex;align-items:center;gap:10px}
        .detail-row{display:grid;grid-template-columns:140px 1fr;gap:8px;font-size:13px;padding:6px 0;border-bottom:1px solid var(--b)}.detail-row:last-child{border:none}
        .detail-label{color:var(--td);font-weight:500}.detail-value{color:var(--tb)}
        @media(max-width:1100px){.sts{grid-template-columns:repeat(3,1fr)}}
        @media(max-width:768px){.mn{padding:14px}.sts{grid-template-columns:repeat(2,1fr)}.hdr{padding:12px 14px;flex-wrap:wrap;gap:8px}.srch{max-width:100%}.mt{font-size:11px}.mt th,.mt td{padding:6px 8px}}
        @media(max-width:480px){.sts{grid-template-columns:1fr 1fr}.st-v{font-size:20px}}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo}=React;
const SU='https://hqzpemfaljxcysyqssng.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const ap=t=>`${SU}/rest/v1/${t}`;
const hd=(x={})=>({apikey:SK,Authorization:`Bearer ${SK}`,'Content-Type':'application/json',...x});

// ═══ STUCK CATEGORIES ═══
const CATS=[
    {k:'fin30',l:'Finanzierung >30d',i:'🏦',color:'var(--r)',bg:'var(--rd)',desc:'In Finanzierung festsitzend seit über 30 Tagen'},
    {k:'old60',l:'Alt >60d',i:'⏰',color:'var(--o)',bg:'var(--od)',desc:'Aufträge ohne Abschluss seit über 60 Tagen'},
    {k:'qcneg',l:'QC Negativ',i:'❌',color:'var(--r)',bg:'var(--rd)',desc:'Qualitäts-Check nicht bestanden'},
    {k:'backvt',l:'Zurück an VT',i:'↩️',color:'var(--p)',bg:'var(--pd)',desc:'An den Vertrieb zurückgegeben'},
    {k:'readymontage',l:'Bereit für Montage',i:'🔧',color:'var(--bl)',bg:'var(--bld)',desc:'AC/DC Freigabe erteilt, wartet auf Montage-Termin'},
    {k:'nomontage',l:'Ohne Montage-Termin',i:'📅',color:'var(--o)',bg:'var(--od)',desc:'Fortgeschrittene Aufträge ohne Montage-Termin in Leveto'},
    {k:'efsissue',l:'EFS Probleme',i:'⚠️',color:'var(--o)',bg:'var(--od)',desc:'EFS-Status: Sperrliste, Rückwiderruf oder abgelehnt'},
    {k:'all',l:'Alle Aktiven',i:'📋',color:'var(--a)',bg:'var(--ad)',desc:'Alle aktiven (nicht stornierten) Aufträge'}
];

function daysSince(d){if(!d)return null;try{return Math.floor((new Date()-new Date(d))/(86400000))}catch{return null}}
function daysBadge(days){if(days===null)return<span className="tg" style={{background:'rgba(255,255,255,.05)',color:'var(--td)'}}>?</span>;if(days<=30)return<span className="days-badge days-ok">{days}d</span>;if(days<=60)return<span className="days-badge days-warn">{days}d</span>;return<span className="days-badge days-danger">{days}d</span>}
function parseWH(wh){if(!wh)return[];const parts=(wh||'').split(/(?=\d{2}\.\d{2}\.\d{4})/);return parts.filter(p=>p.trim()).map(p=>{const m=p.match(/^(\d{2}\.\d{2}\.\d{4})\s*-\s*(\d{2}:\d{2})-\s*(.+?):\s*(.+)/);if(m)return{date:m[1],time:m[2],source:m[3].trim(),action:m[4].trim()};return{date:'',time:'',source:'',action:p.trim()}})}

function App(){
    const[loading,setLoading]=useState(true);
    const[orders,setOrders]=useState([]);
    const[appointments,setAppointments]=useState([]);
    const[efsData,setEfsData]=useState([]);
    const[cat,setCat]=useState('fin30');
    const[search,setSearch]=useState('');
    const[sortCol,setSortCol]=useState('days');
    const[sortDir,setSortDir]=useState('desc');
    const[detail,setDetail]=useState(null);
    const[lastLoad,setLastLoad]=useState(null);

    const loadData=useCallback(async()=>{
        setLoading(true);
        try{
            // Load all active orders
            const allOrders=[];
            for(let off=0;off<5000;off+=1000){
                const r=await fetch(ap('auftraege')+`?storniert=eq.false&select=id,auftrag_nr,kunde_name,kunde_plz,kunde_ort,kunde_strasse,beedoo_fortschritt,datum_angenommen,auftrags_datum,workflow_history,status,auftragsstatus,notiz,leveto_lead_id,efs_projekt_id,anlagen_kwp,hat_speicher,speicher_kwh,lead_quelle,montage_datum,vertriebler_id,produkt_typ,kundenberater_name&limit=1000&offset=${off}`,{headers:hd()});
                const d=await r.json();if(!d.length)break;allOrders.push(...d);
            }
            // Load vertriebler names
            const vtR=await(await fetch(ap('vertriebler')+'?select=id,name&limit=500',{headers:hd()})).json();
            const vtMap={};if(Array.isArray(vtR))vtR.forEach(v=>{vtMap[v.id]=(v.name||'').trim()});
            
            // Enrich orders with VT name
            allOrders.forEach(o=>{o._vt_name=vtMap[o.vertriebler_id]||o.kundenberater_name||'—';o._days=daysSince(o.datum_angenommen||o.auftrags_datum)});
            setOrders(allOrders);

            // Load montage appointments
            const apptR=await(await fetch(ap('leveto_appointments')+'?select=leveto_id,appointment_type,start_date,end_date,status,feedback_status,kunde_nachname,kunde_plz,kunde_vorname&limit=5000',{headers:hd()})).json();
            setAppointments(apptR);

            // Load EFS data
            const efsR=await(await fetch(ap('efs_projekte')+'?select=efs_id,simplified_status,status,kunde_nachname,kunde_plz,gesamtpreis_eur,leveto_id&limit=5000',{headers:hd()})).json();
            setEfsData(efsR);

            setLastLoad(new Date());
        }catch(e){console.error('Load error:',e)}
        setLoading(false);
    },[]);

    useEffect(()=>{loadData()},[loadData]);

    // Build appointment lookup by nachname+plz
    const apptLookup=useMemo(()=>{
        const map={};
        appointments.forEach(a=>{
            const k=`${(a.kunde_nachname||'').toLowerCase().trim()}_${(a.kunde_plz||'').trim()}`;
            if(!map[k])map[k]=[];
            map[k].push(a);
        });
        return map;
    },[appointments]);

    // Build EFS lookup
    const efsLookup=useMemo(()=>{
        const byId={};efsData.forEach(e=>{byId[e.efs_id]=e});
        const byNamePlz={};efsData.forEach(e=>{
            const k=`${(e.kunde_nachname||'').toLowerCase().trim()}_${(e.kunde_plz||'').trim()}`;
            if(!byNamePlz[k])byNamePlz[k]=[];
            byNamePlz[k].push(e);
        });
        return{byId,byNamePlz};
    },[efsData]);

    // Categorize orders
    const categorized=useMemo(()=>{
        const cats={fin30:[],old60:[],qcneg:[],backvt:[],readymontage:[],nomontage:[],efsissue:[],all:[]};
        const completedStatuses=['efs abnahmeprotokoll','barzahler (rechnung komplett','montage abgeschlossen','trustpilot'];

        orders.forEach(o=>{
            const f=(o.beedoo_fortschritt||'').toLowerCase();
            const days=o._days||0;
            const nameKey=`${((o.kunde_name||'').split(/\s+/).pop()||'').toLowerCase().trim()}_${(o.kunde_plz||'').trim()}`;
            
            // Enrich with appointments
            o._appts=apptLookup[nameKey]||[];
            o._hasMontageAppt=o._appts.some(a=>(a.appointment_type||'').toLowerCase().includes('montage'));
            
            // Enrich with EFS
            if(o.efs_projekt_id){o._efs=efsLookup.byId[o.efs_projekt_id]||null}
            if(!o._efs){const efsMatches=efsLookup.byNamePlz[nameKey];if(efsMatches?.length)o._efs=efsMatches[0]}

            cats.all.push(o);

            // Finanzierung >30d
            if((f.includes('finanzierung')||f.includes('vertrag unterzeichnet - finanzierung'))&&days>30)cats.fin30.push(o);
            
            // Alt >60d (excluding completed/barzahler)
            if(days>60&&!completedStatuses.some(s=>f.includes(s)))cats.old60.push(o);
            
            // QC negativ
            if(f.includes('qc negativ')||f.includes('technisch nicht machbar'))cats.qcneg.push(o);
            
            // Zurück an Vertrieb
            if(f.includes('zurück'))cats.backvt.push(o);
            
            // Ready for montage (has Freigabe but no montage appointment)
            if((f.includes('freigabe')||f.includes('planung'))&&!f.includes('montage abgeschlossen'))cats.readymontage.push(o);
            
            // No montage appointment (advanced orders)
            const advancedStages=['freigabe','planung','ab erhalten','quali call','qc positiv','efs 10%','efs abnahme'];
            if(advancedStages.some(s=>f.includes(s))&&!o._hasMontageAppt&&!o.montage_datum)cats.nomontage.push(o);
            
            // EFS issues
            if(o._efs){
                const es=(o._efs.simplified_status||'').toUpperCase();
                if(['REVOKED','CUSTOMER_REJECTED','LAND_REGISTRY_CHECK','MISSING_PROPERTY_OWNERS'].includes(es))cats.efsissue.push(o);
            }
        });

        return cats;
    },[orders,apptLookup,efsLookup]);

    // Filtered + sorted list
    const currentList=useMemo(()=>{
        let list=categorized[cat]||[];
        if(search.trim()){
            const q=search.toLowerCase();
            list=list.filter(o=>(o.kunde_name||'').toLowerCase().includes(q)||(o.auftrag_nr||'').toString().includes(q)||(o.kunde_plz||'').includes(q)||(o.kunde_ort||'').toLowerCase().includes(q)||(o._vt_name||'').toLowerCase().includes(q)||(o.beedoo_fortschritt||'').toLowerCase().includes(q));
        }
        list=[...list].sort((a,b)=>{
            let va,vb;
            if(sortCol==='days'){va=a._days||0;vb=b._days||0}
            else if(sortCol==='name'){va=(a.kunde_name||'').toLowerCase();vb=(b.kunde_name||'').toLowerCase()}
            else if(sortCol==='plz'){va=a.kunde_plz||'';vb=b.kunde_plz||''}
            else if(sortCol==='fortschritt'){va=(a.beedoo_fortschritt||'').toLowerCase();vb=(b.beedoo_fortschritt||'').toLowerCase()}
            else if(sortCol==='vt'){va=(a._vt_name||'').toLowerCase();vb=(b._vt_name||'').toLowerCase()}
            else if(sortCol==='kwp'){va=a.anlagen_kwp||0;vb=b.anlagen_kwp||0}
            else{va=a[sortCol]||'';vb=b[sortCol]||''}
            if(va<vb)return sortDir==='asc'?-1:1;if(va>vb)return sortDir==='asc'?1:-1;return 0;
        });
        return list;
    },[categorized,cat,search,sortCol,sortDir]);

    const toggleSort=col=>{if(sortCol===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortCol(col);setSortDir('desc')}};
    const sortIcon=col=>sortCol===col?(sortDir==='asc'?' ↑':' ↓'):'';
    const fm=v=>typeof v==='number'?v.toLocaleString('de-DE'):v;

    if(loading)return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16}}>
        <span className="spinner" style={{width:32,height:32,borderWidth:3,color:'var(--a)'}}/>
        <div style={{color:'var(--td)',fontSize:14}}>Lade Aufträge & Termine...</div>
    </div>);

    return(<React.Fragment>
        <div className="hdr">
            <div className="hdr-l">
                <div className="logo"><img src="https://bee-doo-tools.vercel.app/bee-doo-Logo-white.svg" style={{height:28}} alt="bee-doo" /> <span>Stuck Orders</span></div>
            </div>
            <div className="hdr-r">
                <span style={{fontSize:11,color:'var(--td)'}}>{lastLoad?`Geladen: ${lastLoad.toLocaleTimeString('de-DE')}`:''}</span>
                <button className="btn bo bsm" onClick={loadData}>🔄</button>
                <a href="https://bee-doo-tools.vercel.app/" className="hdr-lk">← Toolbox</a>
            </div>
        </div>
        <div className="mn">
            {/* Category Cards */}
            <div className="sts fi">
                {CATS.map(c=>{
                    const count=(categorized[c.k]||[]).length;
                    return<div key={c.k} className={`st ${cat===c.k?'on':''}`} onClick={()=>{setCat(c.k);setSearch('')}}>
                        <div className="st-l">{c.i} {c.l}</div>
                        <div className="st-v" style={{color:cat===c.k?c.color:'var(--tb)'}}>{fm(count)}</div>
                        <div className="st-s">{c.desc}</div>
                    </div>
                })}
            </div>

            {/* Search + Info */}
            <div className="cd fi">
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
                    <div className="cd-t" style={{margin:0}}>
                        {CATS.find(c=>c.k===cat)?.i} {CATS.find(c=>c.k===cat)?.l}
                        <span style={{fontSize:12,color:'var(--td)',fontWeight:400,marginLeft:8}}>
                            {fm(currentList.length)} {currentList.length!==categorized[cat]?.length?`von ${fm(categorized[cat]?.length)} `:''} Aufträge
                        </span>
                    </div>
                    <input className="srch" placeholder="🔍 Kunde, AN-Nr, PLZ, VT suchen..." value={search} onChange={e=>setSearch(e.target.value)}/>
                </div>
            </div>

            {/* Orders Table */}
            <div className="cd fi" style={{padding:0,overflow:'hidden'}}>
                <div style={{overflowX:'auto'}}>
                    <table className="mt">
                        <thead><tr>
                            <th className="sort" onClick={()=>toggleSort('name')}>Kunde{sortIcon('name')}</th>
                            <th className="sort" onClick={()=>toggleSort('plz')}>PLZ{sortIcon('plz')}</th>
                            <th className="sort" onClick={()=>toggleSort('fortschritt')}>Fortschritt{sortIcon('fortschritt')}</th>
                            <th className="sort" onClick={()=>toggleSort('days')}>Alter{sortIcon('days')}</th>
                            <th className="sort" onClick={()=>toggleSort('vt')}>Vertriebler{sortIcon('vt')}</th>
                            <th className="sort" onClick={()=>toggleSort('kwp')}>kWp{sortIcon('kwp')}</th>
                            <th>Montage</th>
                            <th>EFS</th>
                            <th></th>
                        </tr></thead>
                        <tbody>
                            {currentList.length===0&&<tr><td colSpan={9} className="empty">
                                {search?'Keine Ergebnisse für diese Suche':'Keine Aufträge in dieser Kategorie 🎉'}
                            </td></tr>}
                            {currentList.slice(0,200).map(o=>{
                                const efsStatus=o._efs?.simplified_status;
                                const efsBadge=efsStatus?(
                                    ['REVOKED','CUSTOMER_REJECTED'].includes(efsStatus)?'tg-r':
                                    ['COMPLETED','GRID_CONNECTED','INSTALLED'].includes(efsStatus)?'tg-g':
                                    ['INSTALLATION_CONFIRMED','PROJECT_APPROVED'].includes(efsStatus)?'tg-b':'tg-o'
                                ):'';
                                return<tr key={o.id}>
                                    <td style={{color:'var(--tb)',fontWeight:600,whiteSpace:'nowrap',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis'}} title={o.kunde_name}>{o.kunde_name||'—'}</td>
                                    <td style={{fontFamily:'monospace',fontSize:11}}>{o.kunde_plz||'—'}</td>
                                    <td>
                                        <span className={`tg ${
                                            (o.beedoo_fortschritt||'').toLowerCase().includes('qc negativ')?'tg-r':
                                            (o.beedoo_fortschritt||'').toLowerCase().includes('zurück')?'tg-p':
                                            (o.beedoo_fortschritt||'').toLowerCase().includes('freigabe')?'tg-b':
                                            (o.beedoo_fortschritt||'').toLowerCase().includes('finanzierung')?'tg-o':
                                            (o.beedoo_fortschritt||'').toLowerCase().includes('abnahme')?'tg-g':'tg-o'
                                        }`}>{(o.beedoo_fortschritt||'—').length>35?(o.beedoo_fortschritt||'').substring(0,35)+'…':o.beedoo_fortschritt||'—'}</span>
                                    </td>
                                    <td>{daysBadge(o._days)}</td>
                                    <td style={{fontSize:11,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={o._vt_name}>{o._vt_name}</td>
                                    <td style={{fontFamily:'monospace',fontSize:11,color:'var(--a)'}}>{o.anlagen_kwp||'—'}</td>
                                    <td>{o._hasMontageAppt?<span className="tg tg-g">✅ Geplant</span>:o.montage_datum?<span className="tg tg-g">✅ {new Date(o.montage_datum).toLocaleDateString('de-DE')}</span>:<span className="tg" style={{background:'rgba(255,255,255,.05)',color:'var(--td)'}}>—</span>}</td>
                                    <td>{efsStatus?<span className={`tg ${efsBadge}`} title={efsStatus}>{efsStatus.replace(/_/g,' ').substring(0,16)}</span>:<span style={{color:'var(--td)',fontSize:10}}>—</span>}</td>
                                    <td><button className="btn bo bsm" onClick={()=>setDetail(o)} style={{padding:'3px 8px',fontSize:10}}>Details</button></td>
                                </tr>
                            })}
                        </tbody>
                    </table>
                </div>
                {currentList.length>200&&<div style={{padding:12,textAlign:'center',fontSize:12,color:'var(--td)',borderTop:'1px solid var(--b)'}}>
                    Zeige 200 von {fm(currentList.length)} — Suche nutzen um einzuschränken
                </div>}
            </div>

            {/* Summary stats */}
            <div className="cd fi">
                <div className="cd-t">📊 Zusammenfassung</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:14,fontSize:12}}>
                    <div>
                        <div style={{color:'var(--td)',marginBottom:6}}>Aktive Aufträge</div>
                        <div style={{fontSize:28,fontWeight:700,color:'var(--a)'}}>{fm(orders.length)}</div>
                    </div>
                    <div>
                        <div style={{color:'var(--td)',marginBottom:6}}>Stuck-Quote (>30d Finanzierung)</div>
                        <div style={{fontSize:28,fontWeight:700,color:'var(--r)'}}>{orders.length>0?((categorized.fin30?.length||0)/orders.length*100).toFixed(1):'0'}%</div>
                    </div>
                    <div>
                        <div style={{color:'var(--td)',marginBottom:6}}>Montage-Termine (Leveto)</div>
                        <div style={{fontSize:28,fontWeight:700,color:'var(--bl)'}}>{fm(appointments.length)}</div>
                    </div>
                    <div>
                        <div style={{color:'var(--td)',marginBottom:6}}>Ø Alter aktiver Aufträge</div>
                        <div style={{fontSize:28,fontWeight:700,color:'var(--o)'}}>{orders.length?Math.round(orders.reduce((s,o)=>s+(o._days||0),0)/orders.length):0}d</div>
                    </div>
                </div>
            </div>
        </div>

        {/* Detail Modal */}
        {detail&&<div className="detail-overlay" onClick={e=>{if(e.target===e.currentTarget)setDetail(null)}}>
            <div className="detail-card fi">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
                    <h2>📋 {detail.kunde_name||'Auftrag'} <span style={{fontSize:13,color:'var(--td)',fontWeight:400}}>AN {detail.auftrag_nr||'—'}</span></h2>
                    <button onClick={()=>setDetail(null)} style={{background:'none',border:'none',color:'var(--td)',fontSize:20,cursor:'pointer',padding:4}}>✕</button>
                </div>
                
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
                    <div style={{background:'var(--el)',borderRadius:10,padding:14}}>
                        <div style={{fontSize:10,color:'var(--td)',textTransform:'uppercase',marginBottom:6}}>Status</div>
                        <div style={{fontSize:14,fontWeight:600,color:'var(--tb)'}}>{detail.beedoo_fortschritt||'—'}</div>
                        <div style={{fontSize:11,color:'var(--td)',marginTop:4}}>{detail.auftragsstatus}</div>
                    </div>
                    <div style={{background:'var(--el)',borderRadius:10,padding:14}}>
                        <div style={{fontSize:10,color:'var(--td)',textTransform:'uppercase',marginBottom:6}}>Alter</div>
                        <div style={{fontSize:14,fontWeight:600,color:detail._days>60?'var(--r)':detail._days>30?'var(--o)':'var(--g)'}}>{detail._days||0} Tage</div>
                        <div style={{fontSize:11,color:'var(--td)',marginTop:4}}>seit {detail.datum_angenommen?new Date(detail.datum_angenommen).toLocaleDateString('de-DE'):'—'}</div>
                    </div>
                </div>

                <div style={{marginBottom:16}}>
                    {[['Kunde',detail.kunde_name],['Adresse',`${detail.kunde_strasse||''} ${detail.kunde_plz||''} ${detail.kunde_ort||''}`],['Vertriebler',detail._vt_name],['Produkt',detail.produkt_typ],['Anlage',`${detail.anlagen_kwp||'—'} kWp${detail.hat_speicher?` + ${detail.speicher_kwh||'?'} kWh Speicher`:''}`],['Lead-Quelle',detail.lead_quelle],['Finanzierung',detail.auftragsstatus],['Notiz',detail.notiz]].filter(([,v])=>v&&v.trim()&&v.trim()!=='—').map(([l,v])=>
                        <div key={l} className="detail-row"><div className="detail-label">{l}</div><div className="detail-value">{v}</div></div>
                    )}
                </div>

                {/* EFS Info */}
                {detail._efs&&<div style={{background:'var(--el)',borderRadius:10,padding:14,marginBottom:16}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--tb)',marginBottom:8}}>📊 EFS Finanzierung</div>
                    <div style={{fontSize:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                        <div>Status: <span style={{color:'var(--a)',fontWeight:600}}>{detail._efs.simplified_status?.replace(/_/g,' ')}</span></div>
                        {detail._efs.gesamtpreis_eur&&<div>Gesamtpreis: <span style={{fontWeight:600}}>{parseFloat(detail._efs.gesamtpreis_eur).toLocaleString('de-DE',{minimumFractionDigits:2})} €</span></div>}
                    </div>
                </div>}

                {/* Montage Appointments */}
                {detail._appts?.length>0&&<div style={{background:'var(--el)',borderRadius:10,padding:14,marginBottom:16}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--tb)',marginBottom:8}}>📅 Montage-Termine ({detail._appts.length})</div>
                    {detail._appts.map((a,i)=><div key={i} style={{fontSize:11,padding:6,borderBottom:i<detail._appts.length-1?'1px solid var(--b)':'none'}}>
                        <span style={{color:'var(--a)',fontWeight:600}}>{a.appointment_type}</span>
                        {a.start_date&&<span style={{color:'var(--td)',marginLeft:8}}>{new Date(a.start_date).toLocaleDateString('de-DE')} {new Date(a.start_date).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span>}
                        <span className={`tg ${a.status==='Closed'?'tg-g':a.status==='Cancelled'?'tg-r':'tg-b'}`} style={{marginLeft:8}}>{a.status}</span>
                        {a.feedback_status&&<span style={{color:'var(--td)',marginLeft:6}}>· {a.feedback_status}</span>}
                    </div>)}
                </div>}

                {/* Workflow History */}
                {detail.workflow_history&&<div style={{marginBottom:16}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--tb)',marginBottom:8}}>🔄 Workflow-Verlauf</div>
                    <div style={{maxHeight:250,overflowY:'auto',background:'var(--el)',borderRadius:10,padding:14}}>
                        {parseWH(detail.workflow_history).reverse().map((step,i)=><div key={i} style={{fontSize:11,padding:'4px 0',borderBottom:'1px solid var(--b)',display:'flex',gap:8,alignItems:'flex-start'}}>
                            <span style={{color:'var(--td)',whiteSpace:'nowrap',minWidth:90}}>{step.date} {step.time}</span>
                            <span style={{color:'var(--a)',fontSize:10,minWidth:50}}>{step.source}</span>
                            <span style={{color:'var(--t)'}}>{step.action}</span>
                        </div>)}
                        {parseWH(detail.workflow_history).length===0&&<div style={{fontSize:11,color:'var(--td)'}}>
                            {detail.workflow_history.substring(0,500)}
                        </div>}
                    </div>
                </div>}
            </div>
        </div>}
    </React.Fragment>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
