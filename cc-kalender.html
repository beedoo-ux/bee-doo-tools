<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bee-doo CC Kalender</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2333;
  --border: #21262d; --border2: #30363d;
  --text: #e6edf3; --text2: #7d8590; --text3: #3d444d;
  --accent: #F5C500; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
  --name-w: 170px; --slot-w: 80px; --row-h: 68px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }

/* TOPBAR */
.topbar { height: 50px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; padding: 0 14px; flex-shrink: 0; }
.logo { font-weight: 800; font-size: 15px; color: var(--accent); white-space: nowrap; }
.logo span { color: var(--text2); font-weight: 400; }
.div { width: 1px; height: 22px; background: var(--border2); }
.date-nav { display: flex; align-items: center; gap: 5px; }
.nbtn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); width: 26px; height: 26px; border-radius: 6px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.nbtn:hover { background: var(--border2); color: var(--text); }
.dlabel { font-size: 13px; font-weight: 700; min-width: 180px; text-align: center; }
.tbtn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; transition: all .15s; }
.tbtn:hover { background: var(--border2); color: var(--text); }
.vtabs { display: flex; gap: 2px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px; padding: 2px; }
.vtab { padding: 3px 12px; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text2); transition: all .15s; }
.vtab.on { background: var(--accent); color: #000; }
.sync { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); margin-left: auto; }
.sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.sdot.s { background: var(--accent); animation: sp 1s infinite; }
.sdot.e { background: var(--red); }
@keyframes sp { 0%,100%{opacity:1}50%{opacity:.2} }
.bookbtn { background: var(--accent); color: #000; border: none; border-radius: 7px; padding: 6px 14px; font-family: inherit; font-size: 12px; font-weight: 800; cursor: pointer; white-space: nowrap; }
.bookbtn:hover { background: #f7d420; }

/* VT BAR */
.vtbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 5px 14px; display: flex; align-items: center; gap: 5px; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.vtbar::-webkit-scrollbar { display: none; }
.vtlabel { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; flex-shrink: 0; }
.chip { padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .15s; }
.chip.on { font-weight: 700; color: #000; }
.chip:hover { opacity: .8; }

/* STATS */
.sbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 4px 14px 4px calc(var(--name-w) + 14px); display: flex; gap: 14px; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.sbar::-webkit-scrollbar { display: none; }
.sp { display: flex; align-items: center; gap: 5px; font-size: 11px; white-space: nowrap; }
.spd { width: 6px; height: 6px; border-radius: 50%; }
.spn { font-weight: 700; color: var(--text); }
.spl { color: var(--text2); }

/* CALENDAR */
.calwrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

/* Single container scrolls both X and Y */
.calscroll { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
.calscroll::-webkit-scrollbar { width: 6px; height: 6px; }
.calscroll::-webkit-scrollbar-track { background: var(--bg); }
.calscroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* Inner wrapper — total width = name col + all slots */
.calinner { display: inline-flex; flex-direction: column; min-width: 100%; }

/* Header sticks to top while scrolling vertically */
.calhead { display: flex; background: var(--bg2); border-bottom: 2px solid var(--border2); position: sticky; top: 0; z-index: 50; }
/* Name corner sticks to left AND top */
.hn { width: var(--name-w); min-width: var(--name-w); border-right: 2px solid var(--border2); padding: 8px 10px; font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; display: flex; align-items: center; position: sticky; left: 0; background: var(--bg2); z-index: 60; }
.hslots { display: flex; }
.hslot { width: var(--slot-w); min-width: var(--slot-w); flex-shrink: 0; border-right: 1px solid var(--border); text-align: center; padding: 7px 2px; font-size: 11px; font-weight: 700; color: var(--text2); }
.hslot.half { font-size: 9px; color: var(--text3); font-weight: 400; }
.hslot.now { color: var(--red); font-weight: 800; }

/* ROW */
.row { display: flex; border-bottom: 1px solid var(--border); min-height: var(--row-h); position: relative; width: max-content; min-width: 100%; }
.row:hover .namecell { background: #1a2030; }
.namecell { width: var(--name-w); min-width: var(--name-w); border-right: 2px solid var(--border2); padding: 6px 10px; display: flex; align-items: center; gap: 7px; position: sticky; left: 0; background: var(--bg2); z-index: 10; transition: background .1s; }
.nbar { width: 3px; height: 30px; border-radius: 2px; flex-shrink: 0; }
.nname { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; }
.nsub { font-size: 10px; color: var(--text2); }
.nfree { font-size: 10px; color: var(--text3); }

.slotswrap { position: relative; width: calc(var(--slot-w) * 28); flex-shrink: 0; }
.slotbg { display: flex; position: absolute; inset: 0; }
.sc { width: var(--slot-w); min-width: var(--slot-w); flex-shrink: 0; border-right: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.sc:hover { background: rgba(245,197,0,.06); }
.sc.half { border-right: 1px dashed var(--border); }
.sc.now { background: rgba(248,81,73,.06); }

/* APT */
.apt { position: absolute; top: 5px; bottom: 5px; border-radius: 5px; padding: 3px 6px; font-size: 10px; overflow: hidden; cursor: pointer; z-index: 5; border-left: 3px solid; display: flex; flex-direction: column; justify-content: center; }
.apt:hover { filter: brightness(1.2); z-index: 15; }
.an { font-weight: 700; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.at { font-size: 10px; opacity: .75; font-weight: 600; }
.al { font-size: 10px; opacity: .65; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.so { background: rgba(88,166,255,.16); border-color: #58a6ff; color: #79b8ff; }
.sc2{ background: rgba(63,185,80,.14);  border-color: #3fb950; color: #7ee787; }
.sca{ background: rgba(110,118,129,.06); border-color: #333; color: #4a5058; border-style: dashed; opacity: 0.5; }
.sca .an { text-decoration: line-through; text-decoration-color: #555; }
.sca .at { text-decoration: line-through; text-decoration-color: #444; }
.sca .al { text-decoration: line-through; text-decoration-color: #444; }

/* NOW LINE */
.nowline { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); z-index: 20; pointer-events: none; }
.nowline::before { content: ''; position: absolute; top: 5px; left: -4px; width: 10px; height: 10px; border-radius: 50%; background: var(--red); }

/* LOADING */
.loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 999; }
.spin { width: 34px; height: 34px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: sp2 .8s linear infinite; }
@keyframes sp2 { to { transform: rotate(360deg); } }

/* MODAL */
.mbg { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 300; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 20px; }
.mtitle { font-size: 15px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.mx { width: 24px; height: 24px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.fg { margin-bottom: 12px; }
.fl { display: block; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.fi, .fsel { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 10px; outline: none; transition: border .15s; }
.fi:focus, .fsel:focus { border-color: var(--accent); }
.fsel option { background: var(--bg2); }
.fr2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mdiv { height: 1px; background: var(--border); margin: 12px 0; }
.cw { background: rgba(210,153,34,.12); border: 1px solid rgba(210,153,34,.4); border-radius: 7px; padding: 8px 10px; font-size: 11px; color: #d29922; margin-bottom: 10px; display: none; }
.mbtns { display: flex; gap: 8px; }
.mbtn { flex: 1; padding: 9px; border-radius: 7px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid var(--border2); background: var(--bg3); color: var(--text); }
.mbtn:hover { background: var(--border2); }
.mbtn.p { background: var(--accent); color: #000; border-color: var(--accent); flex: 2; }
.mbtn.p:hover { background: #f7d420; }
.mst { font-size: 11px; color: var(--text2); text-align: center; margin-top: 7px; }

/* TOOLTIP */
.tt { position: fixed; background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 11px; font-size: 11px; z-index: 400; max-width: 190px; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,.6); display: none; }
.ttt { font-weight: 700; margin-bottom: 4px; }
.ttr { color: var(--text2); margin-bottom: 2px; }
.ttr span { color: var(--text); }

/* TOAST */
.tfw { position: fixed; bottom: 14px; right: 14px; z-index: 999; display: flex; flex-direction: column; gap: 6px; }
.tf { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 13px; font-size: 12px; font-weight: 600; box-shadow: 0 8px 32px rgba(0,0,0,.5); animation: sup .2s ease; }
.tf.ok { border-color: var(--green); }
.tf.er { border-color: var(--red); }
@keyframes sup { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:768px){
  :root{ --name-w:130px; --slot-w:70px; --row-h:60px; }
  .dlabel{ min-width:120px; font-size:11px; }
}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div style="font-size:20px;font-weight:800;color:var(--accent)">bee-doo</div>
  <div class="spin"></div>
  <div style="font-size:12px;color:var(--text2)" id="ltxt">Lade Leveto-Daten…</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">bee-doo <span>CC-Kalender</span></div>
  <div class="div"></div>
  <div class="date-nav">
    <button class="nbtn" onclick="chDay(-1)">◀</button>
    <div class="dlabel" id="dlabel">–</div>
    <button class="nbtn" onclick="chDay(1)">▶</button>
    <button class="tbtn" onclick="goToday()">Heute</button>
  </div>
  <div class="div"></div>
  <div class="vtabs">
    <div class="vtab on" id="vtDay" onclick="setView('day')">Tag</div>
    <div class="vtab" id="vtWeek" onclick="setView('week')">Woche</div>
  </div>
  <div class="sync"><div class="sdot" id="sdot"></div><span id="slabel">–</span></div>
  <div style="display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:4px 10px;">
    <span style="font-size:11px;color:var(--text3);font-weight:700;">PLZ</span>
    <input id="plzInput" type="text" maxlength="5" placeholder="z.B. 33609"
      style="background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:13px;font-weight:600;width:70px;"
      oninput="filterByPlz(this.value)" />
    <span id="plzClear" onclick="clearPlz()" style="cursor:pointer;color:var(--text3);font-size:14px;display:none;">✕</span>
  </div>
  <button class="bookbtn" onclick="openModal(null,null,null)">+ Termin buchen</button>
</div>

<!-- VT CHIPS -->
<div class="vtbar">
  <span class="vtlabel">Berater:</span>
  <div id="chips" style="display:flex;gap:5px;"></div>
</div>

<!-- STATS -->
<div class="sbar" id="sbar"></div>

<!-- CALENDAR -->
<div class="calwrap">
  <div class="calscroll" id="calscroll">
    <div class="calinner">
      <div class="calhead" id="calhead">
        <div class="hn">Berater</div>
        <div class="hslots" id="hslots"></div>
      </div>
      <div id="calbody"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <div class="mtitle">Termin buchen <div class="mx" onclick="closeModal()">✕</div></div>
  <div class="fr2">
    <div class="fg"><label class="fl">Vorname</label><input class="fi" id="fVn" placeholder="Max"></div>
    <div class="fg"><label class="fl">Nachname *</label><input class="fi" id="fNn" placeholder="Mustermann"></div>
  </div>
  <div class="fr2">
    <div class="fg"><label class="fl">Straße + Nr.</label><input class="fi" id="fSt" placeholder="Musterstr. 1"></div>
    <div class="fg"><label class="fl">PLZ + Ort</label><input class="fi" id="fPo" placeholder="33609 Bielefeld"></div>
  </div>
  <div class="fg"><label class="fl">Telefon</label><input class="fi" id="fTl" placeholder="0521 123456"></div>
  <div class="mdiv"></div>
  <div class="fr2">
    <div class="fg"><label class="fl">Berater *</label><select class="fsel" id="fBr" onchange="chkConfl()"></select></div>
    <div class="fg"><label class="fl">Typ</label>
      <select class="fsel" id="fTp">
        <option>Termin vor Ort PV</option>
        <option>Termin vor Ort WP</option>
        <option>Online-Termin PV</option>
        <option>Ersttermin</option>
      </select>
    </div>
  </div>
  <div class="fr2">
    <div class="fg"><label class="fl">Datum *</label><input class="fi" type="date" id="fDt" onchange="chkConfl()"></div>
    <div class="fg"><label class="fl">Uhrzeit *</label><select class="fsel" id="fZt" onchange="chkConfl()"></select></div>
  </div>
  <div class="fg"><label class="fl">Dauer</label>
    <select class="fsel" id="fDr">
      <option value="60">1 Std.</option><option value="90">1,5 Std.</option>
      <option value="120" selected>2 Std.</option><option value="150">2,5 Std.</option>
      <option value="180">3 Std.</option>
    </select>
  </div>
  <div class="fg"><label class="fl">Notiz</label><input class="fi" id="fNz" placeholder="Info für den Berater…"></div>
  <div class="cw" id="cw">⚠️ Dieser Berater hat zu dieser Zeit bereits einen Termin!</div>
  <div class="mbtns">
    <button class="mbtn" onclick="closeModal()">Abbrechen</button>
    <button class="mbtn p" id="subBtn" onclick="submitBook()">✓ Termin buchen</button>
  </div>
  <div class="mst" id="mst"></div>
</div>
</div>

<!-- CUSTOMER DETAIL MODAL -->
<div class="mbg" id="detailModal" style="display:none" onclick="if(event.target===this)closeDetail()">
<div class="modal" style="max-width:400px;">
  <div class="mtitle" id="detailTitle">Kundendaten <div class="mx" onclick="closeDetail()">✕</div></div>
  <div id="detailBody"></div>
</div>
</div>

<div class="tt" id="tt"></div>
<div class="tfw" id="tfw"></div>

<script>
const PROXY = '/api/leveto';
const SH = 7, EH = 21, SPH = 2;
const SLOTS = (EH - SH) * SPH;
const SYNC_MS = 5 * 60 * 1000;

const DEFAULT_VTS = [
  "Tayfun Süleymaniye","Andreas Klee","Stefan Hensel","Nino Rimmler",
  "Gino Ulitzka","Miguel Schader","Fabian Hindenberg","Patrick Kalinowski",
  "Maxim Horten","Marco Bringmann","Philipp-Torben Hannigk","Pascal Schallenberg"
];
const ALL_VTS = [
  "Tayfun Süleymaniye","Andreas Klee","Stefan Hensel","Nino Rimmler",
  "Gino Ulitzka","Miguel Schader","Fabian Hindenberg","Patrick Kalinowski",
  "Maxim Horten","Marco Bringmann","Philipp-Torben Hannigk","Pascal Schallenberg",
  "Martin Bott","Dimitri van Eeuwen","Klaus Vollmer","Kadir Danyildiz",
  "Martin Bott (Fachberater)","Farshad Nourouzi","Pascal Meier","Bernd Krahwinkel",
  "Jannis Pfeiffer","Lukas Kirschner","Hartmut Seitz","Janik Voß",
  "Maximilian Koch","Richard Winzent","Kevin Kraus","Frank Reddig",
  "Daniel Saweljew","Fabian Goede"
];
const COLORS = [
  "#58a6ff","#3fb950","#f97316","#a78bfa","#ec4899","#14b8a6",
  "#F5C500","#06b6d4","#f85149","#84cc16","#8b5cf6","#f59e0b",
  "#10b981","#6366f1","#e11d48","#0ea5e9","#d97706","#059669",
  "#7c3aed","#be185d","#22d3ee","#facc15","#4ade80","#fb923c",
  "#c084fc","#34d399","#60a5fa","#fb7185","#a3e635","#fbbf24"
];
const col = n => COLORS[ALL_VTS.indexOf(n) % COLORS.length] || "#58a6ff";

let S = { apts:[], active: new Set(DEFAULT_VTS), view:'day', off:0, syncing:false };

const today0 = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const viewDate = () => { const d=today0(); d.setDate(d.getDate()+S.off); return d; };
const fmt = d => d.toISOString().slice(0,10);
const fmtDayLong = d => {
  const DN=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const MN=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return `${DN[d.getDay()]}, ${d.getDate()}. ${MN[d.getMonth()]} ${d.getFullYear()}`;
};
const parseD = s => s ? new Date(s.replace(' ','T')) : null;
const fmtT = d => d ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : '';
const slot2t = s => { const m=s*30+SH*60; return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; };
const t2slot = (h,m) => (h-SH)*SPH + Math.floor(m/30);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const isToday = d => fmt(d) === fmt(today0());

// ── SYNC ─────────────────────────────────────────────────────────
async function sync(silent=false) {
  if(S.syncing) return;
  S.syncing=true;
  document.getElementById('sdot').className='sdot s';
  document.getElementById('slabel').textContent='Sync…';
  try {
    const r = await fetch(`${PROXY}?action=appointments`);
    const d = await r.json();
    if(d.ok) {
      S.apts = d.data||[];
      const t = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('sdot').className='sdot';
      document.getElementById('slabel').textContent=t+' Uhr';
      render();
    } else { document.getElementById('sdot').className='sdot e'; document.getElementById('slabel').textContent='Fehler'; }
  } catch(e) { document.getElementById('sdot').className='sdot e'; document.getElementById('slabel').textContent='Verbindungsfehler'; }
  S.syncing=false;
}

// ── RENDER ─────────────────────────────────────────────────────────
function setView(v) {
  S.view=v;
  document.getElementById('vtDay').classList.toggle('on',v==='day');
  document.getElementById('vtWeek').classList.toggle('on',v==='week');
  render();
}
function chDay(d) { S.off+=d; render(); }
function goToday() { S.off=0; render(); }

function render() {
  renderChips();
  renderHeader();
  renderBody();
  renderStats();
}

function renderHeader() {
  const d = viewDate();
  if(S.view==='week'){
    const ws = new Date(d); ws.setDate(d.getDate()-d.getDay()+1);
    const days = Array.from({length:7},(_,i)=>{const x=new Date(ws);x.setDate(ws.getDate()+i);return x;});
    document.getElementById('dlabel').textContent =
      `${days[0].getDate()}. – ${days[6].getDate()}. ${['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][days[6].getMonth()]} ${days[6].getFullYear()}`;
    document.getElementById('hslots').innerHTML = days.map(day=>`
      <div class="hslot" style="flex:1;font-size:12px;${isToday(day)?'color:var(--accent);':''}">${['So','Mo','Di','Mi','Do','Fr','Sa'][day.getDay()]} ${day.getDate()}.</div>
    `).join('');
  } else {
    document.getElementById('dlabel').textContent = fmtDayLong(d);
    let h='';
    for(let s=0;s<SLOTS;s++){
      const isH=s%2===1;
      const nowS = isToday(d) && isNowSlot(s);
      h+=`<div class="hslot${isH?' half':''}${nowS?' now':''}">${isH?'':slot2t(s)}</div>`;
    }
    document.getElementById('hslots').innerHTML=h;
  }
}

function isNowSlot(s) {
  const n=new Date(); return s===t2slot(n.getHours(),n.getMinutes());
}

function renderBody() {
  const d = viewDate();
  const dateStr = fmt(d);
  const active = ALL_VTS.filter(v=>S.active.has(v));
  let html='';

  if(S.view==='week'){
    const ws=new Date(d); ws.setDate(d.getDate()-d.getDay()+1);
    const days=Array.from({length:7},(_,i)=>{const x=new Date(ws);x.setDate(ws.getDate()+i);return x;});
    active.forEach(vt=>{
      const c=col(vt);
      const [fn,...ln]=vt.split(' ');
      const daysCells = days.map(day=>{
        const ds=fmt(day);
        const vapts=S.apts.filter(a=>(a.start_date||'').slice(0,10)===ds&&a.user_received===vt&&a.status!=='Cancelled');
        return `<div style="flex:1;border-right:1px solid var(--border);padding:3px 4px;min-height:var(--row-h);background:${isToday(day)?'rgba(245,197,0,.025)':''};">
          ${vapts.map(a=>{
            const st=parseD(a.start_date);
            const name=[a.vorname,a.nachname].filter(Boolean).join(' ')||'–';
            return `<div class="apt so" style="position:relative;top:0;left:0;width:100%;margin-bottom:2px;border-left-color:${c};background:${c}18;color:${c};"
              data-n="${esc(name)}" data-s="${esc(fmtT(st))}" data-e="" data-v="${esc(vt)}" data-pl="${esc(a.plz||'')}" data-ci="${esc(a.stadt||'')}" data-st="${esc(a.status||'')}">
              <div class="at">${esc(fmtT(st))}</div>
              <div class="an">${esc(name)}</div>
            </div>`;
          }).join('')}
          ${vapts.length===0?`<div style="font-size:10px;color:var(--text3);padding:2px;">frei</div>`:''}
        </div>`;
      }).join('');
      html+=`<div class="row">
        <div class="namecell"><div class="nbar" style="background:${c}"></div><div><div class="nname">${esc(fn)}<br><span style="color:var(--text2);font-weight:500;">${esc(ln.join(' '))}</span></div></div></div>
        <div class="slotswrap" style="display:flex;">${daysCells}</div>
      </div>`;
    });
  } else {
    active.forEach(vt=>{
      const c=col(vt);
      const [fn,...ln]=vt.split(' ');
      const vapts=S.apts.filter(a=>(a.start_date||'').slice(0,10)===dateStr&&a.user_received===vt);
      const cnt=vapts.filter(a=>a.status!=='Cancelled').length;

      // Lane assignment: greedy algorithm
      const sorted = [...vapts].sort((a,b)=>(a.start_date||'').localeCompare(b.start_date||''));
      const lanes = []; // lanes[i] = end time of last apt in that lane
      const aptLane = [];
      sorted.forEach(a=>{
        const st=parseD(a.start_date), en=parseD(a.end_date);
        if(!st||!en){aptLane.push(0);return;}
        let placed=false;
        for(let i=0;i<lanes.length;i++){
          if(st>=lanes[i]){lanes[i]=en;aptLane.push(i);placed=true;break;}
        }
        if(!placed){lanes.push(en);aptLane.push(lanes.length-1);}
      });
      const numLanes=Math.max(1,lanes.length);
      const rowH=numLanes*68; // px per lane

      let slotBg='';
      for(let s=0;s<SLOTS;s++){
        const nowS=isToday(d)&&isNowSlot(s);
        slotBg+=`<div class="sc${s%2===1?' half':''}${nowS?' now':''}" style="height:${rowH}px;" data-date="${dateStr}" data-slot="${s}" data-vt="${esc(vt)}"></div>`;
      }

      let aBlocks='';
      sorted.forEach((a,idx)=>{
        const st=parseD(a.start_date), en=parseD(a.end_date);
        if(!st||!en) return;
        const ss=t2slot(st.getHours(),st.getMinutes());
        const es=t2slot(en.getHours(),en.getMinutes());
        if(ss<0||ss>=SLOTS) return;
        const lp=(ss/SLOTS)*100;
        const wp=Math.max(1.5,((Math.min(es,SLOTS)-ss)/SLOTS)*100);
        const lane=aptLane[idx]||0;
        const topPx=lane*68+4;
        const botPx=(numLanes-lane-1)*68+4;
        const sc2=a.status==='Closed'?'sc2':a.status==='Cancelled'?'sca':'so';
        const name=[a.vorname,a.nachname].filter(Boolean).join(' ')||'–';
        const addr = [a.strasse, a.hausnummer].filter(Boolean).join(' ');
        aBlocks+=`<div class="apt ${sc2}" style="left:${lp}%;width:${wp}%;top:${topPx}px;bottom:${botPx}px;border-left-color:${c};background:${c}1a;color:${c};"
          data-n="${esc(name)}" data-s="${esc(fmtT(st))}" data-e="${esc(fmtT(en))}" data-v="${esc(vt)}"
          data-pl="${esc(a.plz||'')}" data-ci="${esc(a.stadt||'')}" data-st="${esc(a.status||'')}"
          data-addr="${esc(addr)}" data-ph="${esc(a.telefon||a.phone||'')}" data-tx="${esc(a.text||'')}"
          onclick="showDetail(this.dataset)">
          <div class="at">${esc(fmtT(st))}–${esc(fmtT(en))}</div>
          <div class="an">${esc(name)}</div>
          <div class="al">${esc(a.plz||'')} ${esc(a.stadt||'')}</div>
        </div>`;
        // Lane separator line
        if(lane>0){
          aBlocks+=`<div style="position:absolute;left:0;right:0;top:${lane*68}px;height:1px;background:var(--border2);z-index:3;pointer-events:none;"></div>`;
        }
      });

      // Draw lane separator lines
      let sepLines='';
      for(let l=1;l<numLanes;l++){
        sepLines+=`<div style="position:absolute;left:0;right:0;top:${l*68}px;height:1px;background:var(--border2);z-index:3;pointer-events:none;"></div>`;
      }

      html+=`<div class="row" style="min-height:${rowH}px;">
        <div class="namecell" style="min-height:${rowH}px;">
          <div class="nbar" style="background:${c};height:${Math.min(rowH-10,60)}px;"></div>
          <div>
            <div class="nname">${esc(fn)}<br><span style="color:var(--text2);font-weight:500;">${esc(ln.join(' '))}</span></div>
            ${cnt>0?`<div class="nsub">${cnt} Termin${cnt!==1?'e':''}${numLanes>1?` <span style="color:var(--red);font-size:9px;">⚠ ${numLanes} Zeilen</span>`:''}</div>`:`<div class="nfree">frei</div>`}
          </div>
        </div>
        <div class="slotswrap" style="height:${rowH}px;">
          <div class="slotbg">${slotBg}</div>
          ${sepLines}
          ${aBlocks}
          ${isToday(d)?`<div class="nowline" id="nl_${vt.replace(/ /g,'_')}" style="left:${nowPct()}%;top:0;bottom:0;height:${rowH}px;"></div>`:''}
        </div>
      </div>`;
    });
  }

  const body = document.getElementById('calbody');
  body.innerHTML = html || `<div style="padding:40px;text-align:center;color:var(--text2)">Keine Berater ausgewählt</div>`;

  // Events
  body.querySelectorAll('.apt').forEach(el=>{
    el.addEventListener('mouseenter', e=>showTT(e,el.dataset));
    el.addEventListener('mousemove', moveTT);
    el.addEventListener('mouseleave', hideTT);
  });
  // clicks handled via inline onclick on apt blocks
  body.querySelectorAll('.sc').forEach(el=>{
    el.addEventListener('click', ()=>openModal(el.dataset.date, el.dataset.slot, el.dataset.vt));
  });
}

function nowPct() {
  const n=new Date();
  const mins=(n.getHours()-SH)*60+n.getMinutes();
  return Math.max(0,Math.min(100,(mins/((EH-SH)*60))*100));
}

function renderChips() {
  const wrap=document.getElementById('chips');
  wrap.innerHTML='';
  ALL_VTS.forEach(vt=>{
    const on=S.active.has(vt);
    const c=col(vt);
    const ch=document.createElement('div');
    ch.className='chip'+(on?' on':'');
    const pts=vt.split(' ');
    ch.textContent=pts[0]+(pts[1]?' '+pts[1][0]+'.':'');
    ch.title=vt;
    if(on){ch.style.background=c+'22';ch.style.borderColor=c;ch.style.color=c;}
    ch.onclick=()=>{ S.active.has(vt)?S.active.delete(vt):S.active.add(vt); render(); };
    wrap.appendChild(ch);
  });
}

// ── TOOLTIP ──────────────────────────────────────────────────────────
function showTT(e,d){
  const t=document.getElementById('tt');
  t.innerHTML=`<div class="ttt" style="color:${col(d.v)}">${esc(d.n)}</div>
    ${d.s?`<div class="ttr">🕐 <span>${esc(d.s)}${d.e?' – '+esc(d.e):''}</span></div>`:''}

function moveTT(e){
  const t=document.getElementById('tt');
  t.style.left=Math.min(e.clientX+12,window.innerWidth-205)+'px';
  t.style.top=Math.min(e.clientY+8,window.innerHeight-140)+'px';
}

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(dateStr, slot, vtName){
  const zs=document.getElementById('fZt'); zs.innerHTML='';
  for(let s=0;s<SLOTS;s++){
    const o=document.createElement('option');
    o.value=slot2t(s); o.textContent=slot2t(s);
    if(slot!==null&&parseInt(slot)===s) o.selected=true;
    zs.appendChild(o);
  }
  const bs=document.getElementById('fBr'); bs.innerHTML='<option value="">— wählen —</option>';
  ALL_VTS.forEach(vt=>{
    const o=document.createElement('option'); o.value=vt; o.textContent=vt;
    if(vt===vtName) o.selected=true; bs.appendChild(o);
  });
  document.getElementById('fDt').value=dateStr||fmt(viewDate());
  ['fVn','fNn','fSt','fPo','fTl','fNz'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mst').textContent='';
  document.getElementById('cw').style.display='none';
  document.getElementById('modal').style.display='flex';
  chkConfl();
}
function closeModal(){ document.getElementById('modal').style.display='none'; }

function chkConfl(){
  const b=document.getElementById('fBr').value;
  const d=document.getElementById('fDt').value;
  const z=document.getElementById('fZt').value;
  const dr=parseInt(document.getElementById('fDr').value)||120;
  if(!b||!d||!z) return;
  const st=new Date(`${d}T${z}:00`), en=new Date(st.getTime()+dr*60000);
  const c=S.apts.some(a=>{
    if(a.user_received!==b||(a.start_date||'').slice(0,10)!==d||a.status==='Cancelled') return false;
    const as=parseD(a.start_date),ae=parseD(a.end_date);
    return as<en&&ae>st;
  });
  document.getElementById('cw').style.display=c?'block':'none';
}

async function submitBook(){
  const b=document.getElementById('fBr').value;
  const nn=document.getElementById('fNn').value.trim();
  if(!b){toast('Bitte Berater wählen','er');return;}
  if(!nn){toast('Bitte Nachname eingeben','er');return;}
  const btn=document.getElementById('subBtn');
  btn.disabled=true; btn.textContent='Buche…';
  const vn=document.getElementById('fVn').value.trim();
  const st=document.getElementById('fSt').value.trim();
  const po=document.getElementById('fPo').value.trim();
  const tl=document.getElementById('fTl').value.trim();
  const nz=document.getElementById('fNz').value.trim();
  const tp=document.getElementById('fTp').value;
  const dt=document.getElementById('fDt').value;
  const zt=document.getElementById('fZt').value;
  const dr=parseInt(document.getElementById('fDr').value)||120;
  const [plz,...sp]=po.split(' '); const stadt=sp.join(' ');
  const sm=st.match(/^(.*?)\s+(\S+)$/)||['',st,''];
  const s0=new Date(`${dt}T${zt}:00`), e0=new Date(s0.getTime()+dr*60000);
  const fmtDt=x=>x.toISOString().replace('T',' ').slice(0,19);
  try {
    await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'book',appointmentData:{
        start_date:fmtDt(s0),end_date:fmtDt(e0),
        appointment_type:tp,user_received:b,
        vorname:vn,nachname:nn,strasse:sm[1]||st,hausnummer:sm[2]||'',
        plz,stadt,telefon:tl,projectID:1,quelle:'Callcenter',
        text:nz?`Callcenter\n${nz}`:'Callcenter',
        id_extern:'beedoo_cc_'+Date.now()
      }})
    });
    S.apts.push({id:'l'+Date.now(),start_date:fmtDt(s0),end_date:fmtDt(e0),
      user_received:b,vorname:vn,nachname:nn,plz,stadt,status:'Open'});
    closeModal(); toast(`✓ Termin für ${vn} ${nn} gebucht!`,'ok'); render();
    setTimeout(()=>sync(true),10000);
  } catch(e){ document.getElementById('mst').textContent='Fehler: '+e.message; }
  btn.disabled=false; btn.textContent='✓ Termin buchen';
}

function toast(msg,type='ok'){
  const w=document.getElementById('tfw');
  const t=document.createElement('div');
  t.className=`tf ${type}`; t.textContent=msg;
  w.appendChild(t); setTimeout(()=>t.remove(),4000);
}

// ── PLZ FILTER ────────────────────────────────────────────────────
let plzFilter = '';

function filterByPlz(val) {
  plzFilter = val.trim();
  document.getElementById('plzClear').style.display = plzFilter ? 'block' : 'none';
  
  if (!plzFilter || plzFilter.length < 2) {
    // Reset to default
    S.active = new Set(DEFAULT_VTS);
    render();
    return;
  }
  
  // Build PLZ→VT map from appointment history
  const vtPlzCount = {};
  S.apts.forEach(a => {
    const vt = a.user_received;
    const plz = (a.plz || '').trim();
    if (!vt || !plz || plz.length < 4) return;
    if (!vtPlzCount[vt]) vtPlzCount[vt] = {};
    const key = plz.slice(0, plzFilter.length);
    vtPlzCount[vt][key] = (vtPlzCount[vt][key] || 0) + 1;
  });
  
  // Find VTs that have appointments in this PLZ prefix
  const prefix = plzFilter;
  const matching = ALL_VTS.filter(vt => {
    const counts = vtPlzCount[vt] || {};
    return Object.keys(counts).some(k => k.startsWith(prefix) || prefix.startsWith(k));
  });
  
  if (matching.length > 0) {
    S.active = new Set(matching);
    showPlzInfo(matching.length, prefix);
  } else {
    // No history → show all, warn
    S.active = new Set(DEFAULT_VTS);
    showPlzInfo(0, prefix);
  }
  render();
}

function showPlzInfo(count, prefix) {
  const el = document.getElementById('plzInput');
  el.style.color = count > 0 ? 'var(--green)' : 'var(--red)';
}

function clearPlz() {
  document.getElementById('plzInput').value = '';
  document.getElementById('plzInput').style.color = 'var(--text)';
  document.getElementById('plzClear').style.display = 'none';
  plzFilter = '';
  S.active = new Set(DEFAULT_VTS);
  render();
}

function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }

async function init(){
  document.getElementById('ltxt').textContent='Lade Leveto-Daten…';
  await sync(false);
  document.getElementById('loader').style.display='none';
  setInterval(()=>sync(true),SYNC_MS);
  setInterval(()=>{
    document.querySelectorAll('.nowline').forEach(el=>el.style.left=nowPct()+'%');
    document.querySelectorAll('.hslot').forEach((el,i)=>{
      if(isToday(viewDate())) el.classList.toggle('now',i===t2slot(new Date().getHours(),new Date().getMinutes()));
    });
  },60000);
}
document.addEventListener('DOMContentLoaded',init);
