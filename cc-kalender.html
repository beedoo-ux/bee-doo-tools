<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bee-doo CC Kalender</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f1e;
  --bg2: #111827;
  --bg3: #1a2236;
  --border: #1e2d4a;
  --border2: #2a3a5c;
  --text: #e2e8f4;
  --text2: #8899b4;
  --text3: #4a5a78;
  --accent: #F5C500;
  --accent2: #f7d420;
  --blue: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #a78bfa;
  --radius: 10px;
  --col-w: 180px;
  --time-w: 56px;
  --hour-h: 80px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { 
  font-weight: 800; 
  font-size: 18px; 
  color: var(--accent);
  letter-spacing: -0.5px;
}
.logo span { color: var(--text2); font-weight: 400; }
.sync-badge {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--text2);
}
.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
.sync-dot.loading { background: var(--accent); animation: spin-dot 1s infinite; }
.sync-dot.error { background: var(--red); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* TOOLBAR */
.toolbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.week-nav { display: flex; align-items: center; gap: 8px; }
.btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 7px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--border2); border-color: var(--text3); }
.btn.accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.btn.accent:hover { background: var(--accent2); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--text2); }
.btn.ghost:hover { background: var(--bg3); color: var(--text); }
.week-label {
  font-size: 14px;
  font-weight: 600;
  min-width: 160px;
  text-align: center;
  color: var(--text);
}

/* VT FILTER */
.vt-filter-wrap {
  display: flex; align-items: center; gap: 8px; flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.vt-filter-wrap::-webkit-scrollbar { display: none; }
.vt-chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.vt-chip.active {
  border-color: transparent;
  color: #000;
  font-weight: 700;
}
.vt-chip:hover { opacity: .8; }

/* CALENDAR GRID */
.cal-outer {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 112px);
  overflow: hidden;
}
.cal-header-row {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
  overflow: hidden;
}
.cal-header-time {
  width: var(--time-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 8px 4px;
  text-align: center;
  font-size: 11px;
  color: var(--text3);
}
.cal-header-cols {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.cal-day-header {
  min-width: 140px;
  flex: 1;
  border-right: 1px solid var(--border);
  padding: 8px 10px;
}
.cal-day-name {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.cal-day-date {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.cal-day-date.today { color: var(--accent); }

/* SCROLL BODY */
.cal-body {
  display: flex;
  flex: 1;
  overflow: auto;
  position: relative;
}
.cal-body::-webkit-scrollbar { width: 6px; height: 6px; }
.cal-body::-webkit-scrollbar-track { background: var(--bg); }
.cal-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* TIME COLUMN */
.cal-time-col {
  width: var(--time-w);
  flex-shrink: 0;
  position: sticky;
  left: 0;
  z-index: 20;
  background: var(--bg2);
  border-right: 1px solid var(--border);
}
.time-slot {
  height: var(--hour-h);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 4px;
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
}
.time-slot.half { 
  height: calc(var(--hour-h) / 2);
  border-bottom: 1px dashed var(--border);
  font-size: 10px;
  color: var(--text3);
  opacity: 0.5;
}

/* DAY COLUMNS */
.cal-days-wrap {
  flex: 1;
  display: flex;
  min-width: 0;
}
.cal-day-col {
  min-width: 140px;
  flex: 1;
  border-right: 1px solid var(--border);
  position: relative;
}
.cal-day-col.today-col { background: rgba(245,197,0,.02); }
.hour-line {
  height: var(--hour-h);
  border-bottom: 1px solid var(--border);
  position: relative;
  cursor: pointer;
}
.hour-line::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  border-bottom: 1px dashed var(--border);
  opacity: .5;
}
.hour-line:hover { background: rgba(245,197,0,.04); }

/* APPOINTMENTS */
.apt-block {
  position: absolute;
  left: 3px;
  right: 3px;
  border-radius: 6px;
  padding: 4px 6px;
  font-size: 11px;
  overflow: hidden;
  cursor: pointer;
  z-index: 10;
  transition: opacity .1s;
  border-left: 3px solid;
}
.apt-block:hover { opacity: .85; filter: brightness(1.1); }
.apt-block .apt-time { font-size: 10px; opacity: .75; font-weight: 600; }
.apt-block .apt-name { font-weight: 700; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.apt-block .apt-loc { font-size: 10px; opacity: .7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.apt-status-open { background: rgba(59,130,246,.18); border-color: #3b82f6; color: #93c5fd; }
.apt-status-closed { background: rgba(34,197,94,.15); border-color: #22c55e; color: #86efac; }
.apt-status-cancelled { background: rgba(100,116,139,.15); border-color: #64748b; color: #94a3b8; }

/* NOW LINE */
.now-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--red);
  z-index: 15;
  pointer-events: none;
}
.now-line::before {
  content: '';
  position: absolute;
  left: -4px;
  top: -4px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--red);
}

/* MODAL */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  width: 520px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  padding: 24px;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.modal-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all .15s;
}
.modal-close:hover { background: var(--border2); color: var(--text); }

.form-group { margin-bottom: 16px; }
.form-label { 
  display: block; 
  font-size: 12px; 
  font-weight: 600; 
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 6px;
}
.form-input, .form-select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  transition: border .15s;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select option { background: var(--bg2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* LEAD SEARCH */
.lead-search-wrap { position: relative; }
.lead-results {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  z-index: 50;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.lead-item {
  padding: 10px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.lead-item:hover { background: var(--bg3); }
.lead-item:last-child { border-bottom: none; }
.lead-item-name { font-size: 13px; font-weight: 600; color: var(--text); }
.lead-item-detail { font-size: 11px; color: var(--text2); margin-top: 2px; }
.lead-selected {
  background: rgba(245,197,0,.1);
  border: 1px solid rgba(245,197,0,.3);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-top: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.lead-selected-name { font-size: 13px; font-weight: 700; color: var(--accent); }
.lead-selected-detail { font-size: 11px; color: var(--text2); }

/* TOAST */
.toast-wrap {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 500;
  max-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  animation: slideIn .2s ease;
  display: flex; align-items: center; gap: 10px;
}
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
.toast.info { border-color: var(--blue); }
@keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* LOADING OVERLAY */
.loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text2); }

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 4px;
  padding: 0 20px 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-bar::-webkit-scrollbar { display: none; }
.stat-pill {
  flex-shrink: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.stat-pill-dot { width: 6px; height: 6px; border-radius: 50%; }
.stat-pill-num { font-weight: 700; color: var(--text); }
.stat-pill-label { color: var(--text2); }

/* VT COLUMNS MODE */
.cal-vt-mode {
  display: flex;
  flex: 1;
  min-width: 0;
}

/* TOOLTIP */
.apt-tooltip {
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px;
  font-size: 12px;
  z-index: 300;
  max-width: 220px;
  pointer-events: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.apt-tooltip-title { font-weight: 700; color: var(--text); margin-bottom: 6px; }
.apt-tooltip-row { color: var(--text2); margin-bottom: 3px; }
.apt-tooltip-row span { color: var(--text); }

/* VIEW TOGGLE */
.view-tabs { display: flex; gap: 4px; }
.view-tab {
  padding: 6px 14px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  transition: all .15s;
}
.view-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  :root { --col-w: 130px; --hour-h: 60px; --time-w: 44px; }
  .toolbar { padding: 8px 12px; }
  .header { padding: 0 12px; }
  .stats-bar { padding: 0 12px 8px; }
  .modal { padding: 16px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div style="color:var(--accent);font-size:24px;font-weight:800;">bee-doo</div>
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Lade Kalender…</div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">bee-doo <span>CC Kalender</span></div>
    <div class="sync-badge">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Verbinden…</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="view-tabs">
      <div class="view-tab active" onclick="setView('week')">Woche</div>
      <div class="view-tab" onclick="setView('vt')">VT-Übersicht</div>
    </div>
    <button class="btn accent" onclick="openBookModal(null, null)">+ Termin buchen</button>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="week-nav">
    <button class="btn ghost" onclick="changeWeek(-1)">◀</button>
    <div class="week-label" id="weekLabel">–</div>
    <button class="btn ghost" onclick="changeWeek(1)">▶</button>
    <button class="btn" onclick="goToday()">Heute</button>
  </div>
  <div style="width:1px;height:24px;background:var(--border2);"></div>
  <div style="font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap;">VTs:</div>
  <div class="vt-filter-wrap" id="vtChips"></div>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar"></div>

<!-- CALENDAR -->
<div class="cal-outer" id="calOuter">
  <div class="cal-header-row" id="calHeaderRow">
    <div class="cal-header-time"></div>
    <div class="cal-header-cols" id="calHeaderCols"></div>
  </div>
  <div class="cal-body" id="calBody">
    <div class="cal-time-col" id="calTimeCol"></div>
    <div class="cal-days-wrap" id="calDaysWrap"></div>
  </div>
</div>

<!-- BOOKING MODAL -->
<div class="modal-backdrop" id="bookModal" style="display:none;" onclick="closeBookModal(e)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      Termin buchen
      <button class="modal-close" onclick="closeBookModal()">✕</button>
    </div>

    <!-- Lead Suche -->
    <div class="form-group">
      <label class="form-label">🔍 Lead in Leveto suchen</label>
      <div class="lead-search-wrap">
        <input type="text" class="form-input" id="leadSearch" placeholder="Name, PLZ oder Telefon…" oninput="onLeadSearch(this.value)" autocomplete="off">
        <div class="lead-results" id="leadResults" style="display:none;"></div>
      </div>
      <div id="leadSelectedBox" style="display:none;" class="lead-selected">
        <div>
          <div class="lead-selected-name" id="leadSelectedName">–</div>
          <div class="lead-selected-detail" id="leadSelectedDetail">–</div>
        </div>
        <button class="btn ghost" style="padding:4px 8px;font-size:11px;" onclick="clearLead()">✕</button>
      </div>
    </div>

    <div style="height:1px;background:var(--border);margin:16px 0;"></div>
    <div style="font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;">Oder: Kunde manuell eingeben</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Vorname</label>
        <input type="text" class="form-input" id="fVorname" placeholder="Max">
      </div>
      <div class="form-group">
        <label class="form-label">Nachname *</label>
        <input type="text" class="form-input" id="fNachname" placeholder="Mustermann">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Straße + Nr.</label>
        <input type="text" class="form-input" id="fStrasse" placeholder="Musterstr. 1">
      </div>
      <div class="form-group">
        <label class="form-label">PLZ + Ort</label>
        <input type="text" class="form-input" id="fPlzOrt" placeholder="33609 Bielefeld">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Telefon</label>
      <input type="text" class="form-input" id="fTelefon" placeholder="0521 123456">
    </div>

    <div style="height:1px;background:var(--border);margin:16px 0;"></div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Berater *</label>
        <select class="form-select" id="fBerater">
          <option value="">— Berater wählen —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Termin-Typ</label>
        <select class="form-select" id="fTyp">
          <option value="Termin vor Ort PV">Termin vor Ort PV</option>
          <option value="Termin vor Ort WP">Termin vor Ort WP</option>
          <option value="Online-Termin PV">Online-Termin PV</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Datum *</label>
        <input type="date" class="form-input" id="fDatum">
      </div>
      <div class="form-group">
        <label class="form-label">Uhrzeit *</label>
        <select class="form-select" id="fZeit">
          <!-- filled by JS -->
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Dauer</label>
      <select class="form-select" id="fDauer">
        <option value="60">1 Stunde</option>
        <option value="90">1,5 Stunden</option>
        <option value="120" selected>2 Stunden</option>
        <option value="150">2,5 Stunden</option>
        <option value="180">3 Stunden</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Notizen</label>
      <input type="text" class="form-input" id="fNotizen" placeholder="Zusatzinfo für den Berater…">
    </div>

    <div id="bookConflictWarn" style="display:none;background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.4);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:#fb923c;margin-bottom:12px;">
      ⚠️ Dieser Berater hat um diese Zeit bereits einen Termin!
    </div>

    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn" onclick="closeBookModal()" style="flex:1;">Abbrechen</button>
      <button class="btn accent" onclick="submitBooking()" style="flex:2;" id="submitBtn">✓ Termin buchen</button>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--text3);text-align:center;" id="bookStatus"></div>
  </div>
</div>

<!-- TOOLTIP -->
<div class="apt-tooltip" id="tooltip" style="display:none;"></div>

<!-- TOASTS -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
const PROXY = "/api/leveto";
const START_HOUR = 7;
const END_HOUR = 21;
const HOURS = END_HOUR - START_HOUR;
const SYNC_INTERVAL = 5 * 60 * 1000;

const VT_COLORS = [
  "#3b82f6","#22c55e","#f97316","#a78bfa","#ec4899","#14b8a6",
  "#eab308","#06b6d4","#ef4444","#84cc16","#8b5cf6","#f59e0b",
  "#10b981","#6366f1","#e11d48","#0ea5e9","#d97706","#059669",
  "#7c3aed","#be185d"
];

let state = {
  view: "week",
  weekOffset: 0,
  appointments: [],
  vts: [],
  activeVTs: new Set(),
  selectedLead: null,
  lastSync: null,
  syncing: false,
  bookingSlot: null,
};

// ─── DATE HELPERS ───────────────────────────────
function getWeekStart(offset = 0) {
  const d = new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff + offset * 7);
  return d;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmtDate(d) { return d.toISOString().slice(0,10); }
function fmtDay(d) { return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()]; }
function fmtDayFull(d) {
  const m = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"][d.getMonth()];
  return `${d.getDate()}. ${m}`;
}
function isToday(d) { return fmtDate(d) === fmtDate(new Date()); }
function parseDate(str) { return str ? new Date(str.replace(" ", "T")) : null; }
function fmtTime(d) { if(!d) return ""; return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }

// ─── API ────────────────────────────────────────
async function apiGet(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const r = await fetch(`${PROXY}?${qs}`);
  return r.json();
}
async function apiPost(action, body) {
  const r = await fetch(PROXY, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action, ...body }),
  });
  return r.json();
}

// ─── SYNC ───────────────────────────────────────
async function syncAppointments(silent = false) {
  if (state.syncing) return;
  state.syncing = true;
  setSyncStatus("loading", "Synchronisiere…");
  try {
    const data = await apiGet("appointments");
    if (data.ok) {
      state.appointments = data.data || [];
      state.lastSync = new Date();
      setSyncStatus("ok", `${state.lastSync.toLocaleTimeString("de-DE", {hour:"2-digit",minute:"2-digit"})} Uhr`);
      if (!silent) renderCalendar();
      else renderCalendar();
      updateStats();
    } else {
      setSyncStatus("error", "Fehler!");
    }
  } catch (e) {
    setSyncStatus("error", "Verbindungsfehler");
  }
  state.syncing = false;
}

async function loadVTs() {
  try {
    const data = await apiGet("users");
    if (data.ok && data.data.length > 0) {
      state.vts = data.data.map((u, i) => ({
        id: u.userID,
        name: `${u.firstName} ${u.lastName}`.trim(),
        username: u.username,
        color: VT_COLORS[i % VT_COLORS.length],
        group: u.group_name,
      }));
    } else {
      // Fallback: extract from appointments
      const names = new Set();
      state.appointments.forEach(a => {
        if (a.user_received && !a.user_received.includes("Support") &&
            !a.user_received.includes("OMEGA") && !a.user_received.includes("Schulung") &&
            !a.user_received.includes("DELETED") && !a.user_received.includes("GmbH") &&
            !a.user_received.includes("Team") && !a.user_received.includes("Solar") &&
            !a.user_received.includes("AC/DC") && !a.user_received.includes("Montage") &&
            !a.user_received.includes("Pvau") && !a.user_received.includes("EP -")) {
          names.add(a.user_received);
        }
      });
      state.vts = [...names].sort().map((n, i) => ({
        id: n, name: n, username: n, color: VT_COLORS[i % VT_COLORS.length]
      }));
    }
    // Show all by default (or limit to 8 for performance)
    state.activeVTs = new Set(state.vts.map(v => v.name));
    renderVTChips();
    renderBeraterSelect();
  } catch(e) {
    console.error("loadVTs error:", e);
  }
}

// ─── RENDER ─────────────────────────────────────
function setView(v) {
  state.view = v;
  document.querySelectorAll(".view-tab").forEach((t, i) => {
    t.classList.toggle("active", (i === 0 && v === "week") || (i === 1 && v === "vt"));
  });
  renderCalendar();
}

function changeWeek(delta) { state.weekOffset += delta; renderCalendar(); }
function goToday() { state.weekOffset = 0; renderCalendar(); }

function renderCalendar() {
  if (state.view === "week") renderWeekView();
  else renderVTView();
}

function renderWeekView() {
  const ws = getWeekStart(state.weekOffset);
  const days = Array.from({length: 7}, (_, i) => addDays(ws, i));

  // Week label
  const we = days[6];
  document.getElementById("weekLabel").textContent =
    `${fmtDayFull(ws)} – ${fmtDayFull(we)} ${we.getFullYear()}`;

  const activeVTs = state.vts.filter(v => state.activeVTs.has(v.name));

  // Header
  const hcols = document.getElementById("calHeaderCols");
  hcols.innerHTML = days.map(d => `
    <div class="cal-day-header" style="min-width:${Math.max(140, 900/7)}px;flex:1;">
      <div class="cal-day-name">${fmtDay(d)}</div>
      <div class="cal-day-date${isToday(d)?" today":""}">${d.getDate()}</div>
    </div>
  `).join("");

  // Time col
  const tc = document.getElementById("calTimeCol");
  tc.innerHTML = "";
  for (let h = START_HOUR; h < END_HOUR; h++) {
    tc.innerHTML += `<div class="time-slot">${String(h).padStart(2,"0")}:00</div>`;
  }

  // Day columns
  const dw = document.getElementById("calDaysWrap");
  dw.innerHTML = "";
  const dayW = Math.max(140, 900/7);

  days.forEach(day => {
    const dayStr = fmtDate(day);
    const col = document.createElement("div");
    col.className = "cal-day-col" + (isToday(day) ? " today-col" : "");
    col.style.minWidth = dayW + "px";
    col.style.flex = "1";

    // Hour lines
    for (let h = START_HOUR; h < END_HOUR; h++) {
      const hl = document.createElement("div");
      hl.className = "hour-line";
      hl.dataset.hour = h;
      hl.dataset.date = dayStr;
      hl.addEventListener("click", (e) => {
        if (e.target === hl || e.target.className === "hour-line") {
          openBookModal(dayStr, h);
        }
      });
      col.appendChild(hl);
    }

    // Now line
    if (isToday(day)) {
      const now = new Date();
      const totalMins = (now.getHours() - START_HOUR) * 60 + now.getMinutes();
      if (totalMins >= 0 && totalMins <= HOURS * 60) {
        const pct = totalMins / (HOURS * 60) * 100;
        const nl = document.createElement("div");
        nl.className = "now-line";
        nl.style.top = pct + "%";
        col.appendChild(nl);
      }
    }

    // Appointments
    const dayApts = state.appointments.filter(a => {
      const sd = (a.start_date || "").slice(0,10);
      return sd === dayStr && state.activeVTs.has(a.user_received);
    });

    // Group overlapping appointments
    const placed = [];
    dayApts.forEach(a => {
      const start = parseDate(a.start_date);
      const end = parseDate(a.end_date);
      if (!start || !end) return;
      const sh = start.getHours() + start.getMinutes()/60;
      const eh = end.getHours() + end.getMinutes()/60;
      if (sh < START_HOUR || sh >= END_HOUR) return;

      const topPct = Math.max(0, (sh - START_HOUR) / HOURS * 100);
      const heightPct = Math.min(100 - topPct, (eh - sh) / HOURS * 100);

      // Find VT color
      const vt = state.vts.find(v => v.name === a.user_received);
      const color = vt ? vt.color : "#3b82f6";

      let statusClass = "apt-status-open";
      if (a.status === "Closed") statusClass = "apt-status-closed";
      if (a.status === "Cancelled") statusClass = "apt-status-cancelled";

      const el = document.createElement("div");
      el.className = `apt-block ${statusClass}`;
      el.style.top = topPct + "%";
      el.style.height = heightPct + "%";
      el.style.borderLeftColor = color;
      el.style.backgroundColor = color + "20";
      el.style.color = color;

      const name = [a.vorname, a.nachname].filter(Boolean).join(" ") || "–";
      el.innerHTML = `
        <div class="apt-time">${fmtTime(start)}</div>
        <div class="apt-name">${escHtml(name)}</div>
        <div class="apt-loc">${escHtml(a.user_received || "")}</div>
      `;

      el.addEventListener("mouseenter", (e) => showTooltip(e, a, color));
      el.addEventListener("mousemove", (e) => moveTooltip(e));
      el.addEventListener("mouseleave", hideTooltip);
      col.appendChild(el);
    });

    dw.appendChild(col);
  });

  // Scroll to 8:00
  setTimeout(() => {
    const body = document.getElementById("calBody");
    if (body && !body._scrolled) {
      body.scrollTop = (1 / HOURS) * (document.getElementById("calTimeCol").scrollHeight || HOURS * 80);
      body._scrolled = true;
    }
  }, 100);
}

  const today = fmtDate(new Date());
  // VT overview: VTs as columns, days as rows — or VTs as cols with week scroll
  // For simplicity: show TODAY for each active VT as columns
  const activeVTs = state.vts.filter(v => state.activeVTs.has(v.name));

  document.getElementById("weekLabel").textContent =
    `${fmtDayFull(ws)} – ${fmtDayFull(addDays(ws,6))} ${ws.getFullYear()}`;

  // Use same week view but with VTs as columns and only 1 day (today)
  const days = Array.from({length: 7}, (_, i) => addDays(ws, i));

  const hcols = document.getElementById("calHeaderCols");
  hcols.innerHTML = activeVTs.map(vt => `
    <div class="cal-day-header" style="min-width:160px;flex:1;border-left:3px solid ${vt.color};">

    tc.innerHTML += `<div class="time-slot">${String(h).padStart(2,"0")}:00</div>`;
  }

  const dw = document.getElementById("calDaysWrap");
  dw.innerHTML = "";

  // Show only today in VT mode
  const dayStr = today;
  activeVTs.forEach(vt => {

    col.style.minWidth = "160px";

    if (totalMins >= 0 && totalMins <= HOURS * 60) {
      const pct = totalMins / (HOURS * 60) * 100;
      const nl = document.createElement("div");
      nl.className = "now-line";
      nl.style.top = pct + "%";
      col.appendChild(nl);
    }

    // VT's appointments for today
    const vtApts = state.appointments.filter(a =>

    vtApts.forEach(a => {

      if (!start || !end) return;
      const sh = start.getHours() + start.getMinutes()/60;
      const eh = end.getHours() + end.getMinutes()/60;
      if (sh < START_HOUR || sh >= END_HOUR) return;
      const topPct = Math.max(0, (sh - START_HOUR) / HOURS * 100);
      const heightPct = Math.min(100 - topPct, (eh - sh) / HOURS * 100);

      let statusClass = "apt-status-open";
      if (a.status === "Closed") statusClass = "apt-status-closed";
      if (a.status === "Cancelled") statusClass = "apt-status-cancelled";

}

function renderVTChips() {
  const wrap = document.getElementById("vtChips");
  const all = document.createElement("div");
  all.className = "vt-chip" + (state.activeVTs.size === state.vts.length ? " active" : "");
  all.textContent = "Alle";
  all.style.background = state.activeVTs.size === state.vts.length ? "#F5C50030" : "";
  all.style.borderColor = state.activeVTs.size === state.vts.length ? "#F5C500" : "";
  all.style.color = state.activeVTs.size === state.vts.length ? "#F5C500" : "";
  all.addEventListener("click", () => {
    if (state.activeVTs.size === state.vts.length) state.activeVTs.clear();
    else state.activeVTs = new Set(state.vts.map(v => v.name));
    renderVTChips(); renderCalendar();
  });
  wrap.innerHTML = "";
  wrap.appendChild(all);

  state.vts.forEach(vt => {
    const chip = document.createElement("div");
    const active = state.activeVTs.has(vt.name);
    chip.className = "vt-chip" + (active ? " active" : "");
    chip.textContent = vt.name.split(" ")[0] + " " + (vt.name.split(" ")[1] || "").charAt(0) + ".";
    chip.title = vt.name;
    if (active) {
      chip.style.background = vt.color + "25";
      chip.style.borderColor = vt.color;
      chip.style.color = vt.color;
    }
    chip.addEventListener("click", () => {
      if (state.activeVTs.has(vt.name)) state.activeVTs.delete(vt.name);
      else state.activeVTs.add(vt.name);
      renderVTChips(); renderCalendar();
    });
    wrap.appendChild(chip);
  });
}

function renderBeraterSelect() {
  const sel = document.getElementById("fBerater");
  sel.innerHTML = '<option value="">— Berater wählen —</option>';
  state.vts.forEach(vt => {
    const o = document.createElement("option");
    o.value = vt.name;
    o.textContent = vt.name;
    sel.appendChild(o);
  });
}

function updateStats() {
  const today = fmtDate(new Date());
  const ws = getWeekStart(state.weekOffset);
  const we = addDays(ws, 6);
  const weStr = fmtDate(we);
  const wsStr = fmtDate(ws);

  const weekApts = state.appointments.filter(a => {
    const d = (a.start_date || "").slice(0,10);
    return d >= wsStr && d <= weStr && state.activeVTs.has(a.user_received);
  });
  const todayApts = state.appointments.filter(a =>
    (a.start_date || "").slice(0,10) === today && state.activeVTs.has(a.user_received)
  );
  const open = weekApts.filter(a => a.status === "Open").length;
  const closed = weekApts.filter(a => a.status === "Closed").length;
  const cancelled = weekApts.filter(a => a.status === "Cancelled").length;

  document.getElementById("statsBar").innerHTML = `
    <div class="stat-pill">
      <div class="stat-pill-dot" style="background:var(--accent);"></div>
      <span class="stat-pill-num">${todayApts.length}</span>
      <span class="stat-pill-label">heute</span>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-dot" style="background:var(--text2);"></div>
      <span class="stat-pill-num">${weekApts.length}</span>
      <span class="stat-pill-label">diese Woche</span>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-dot" style="background:var(--blue);"></div>
      <span class="stat-pill-num">${open}</span>
      <span class="stat-pill-label">offen</span>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-dot" style="background:var(--green);"></div>
      <span class="stat-pill-num">${closed}</span>
      <span class="stat-pill-label">abgeschlossen</span>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-dot" style="background:var(--text3);"></div>
      <span class="stat-pill-num">${cancelled}</span>
      <span class="stat-pill-label">storniert</span>
    </div>
  `;
}

// ─── SYNC STATUS ────────────────────────────────
function setSyncStatus(status, label) {
  const dot = document.getElementById("syncDot");
  const lbl = document.getElementById("syncLabel");
  dot.className = "sync-dot " + (status === "ok" ? "" : status);
  lbl.textContent = label;
}

// ─── TOOLTIP ────────────────────────────────────
function showTooltip(e, apt, color) {
  const t = document.getElementById("tooltip");
  const name = [apt.vorname, apt.nachname].filter(Boolean).join(" ") || "–";
  const addr = [apt.strasse, apt.hausnummer, apt.plz, apt.stadt].filter(Boolean).join(" ");
  const start = parseDate(apt.start_date);
  const end = parseDate(apt.end_date);
  t.innerHTML = `
    <div class="apt-tooltip-title" style="color:${color};">${escHtml(name)}</div>
    <div class="apt-tooltip-row">🕐 <span>${fmtTime(start)} – ${fmtTime(end)}</span></div>
    <div class="apt-tooltip-row">👤 <span>${escHtml(apt.user_received||"–")}</span></div>
    ${addr ? `<div class="apt-tooltip-row">📍 <span>${escHtml(addr)}</span></div>` : ""}
    <div class="apt-tooltip-row">Status: <span>${apt.status||"–"}</span></div>
    ${apt.quelle ? `<div class="apt-tooltip-row">Quelle: <span>${escHtml(apt.quelle)}</span></div>` : ""}
  `;
  t.style.display = "block";
  moveTooltip(e);
}
function moveTooltip(e) {
  const t = document.getElementById("tooltip");
  t.style.left = Math.min(e.clientX + 16, window.innerWidth - 240) + "px";
  t.style.top = Math.min(e.clientY + 8, window.innerHeight - 180) + "px";
}
function hideTooltip() { document.getElementById("tooltip").style.display = "none"; }

// ─── BOOKING MODAL ──────────────────────────────
let leadSearchTimer = null;

function openBookModal(date, hour, vtName = null) {
  state.selectedLead = null;
  document.getElementById("leadSelectedBox").style.display = "none";
  document.getElementById("leadSearch").value = "";
  document.getElementById("leadResults").style.display = "none";
  document.getElementById("fVorname").value = "";
  document.getElementById("fNachname").value = "";
  document.getElementById("fStrasse").value = "";
  document.getElementById("fPlzOrt").value = "";
  document.getElementById("fTelefon").value = "";
  document.getElementById("fNotizen").value = "";
  document.getElementById("bookStatus").textContent = "";
  document.getElementById("bookConflictWarn").style.display = "none";

  if (date) document.getElementById("fDatum").value = date;
  else document.getElementById("fDatum").value = fmtDate(new Date());

  // Fill time select
  const tSel = document.getElementById("fZeit");
  tSel.innerHTML = "";
  for (let h = START_HOUR; h < END_HOUR; h++) {
    for (let m = 0; m < 60; m += 30) {
      const val = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
      const o = document.createElement("option");
      o.value = val;
      o.textContent = val;
      if (hour !== null && h === hour && m === 0) o.selected = true;
      tSel.appendChild(o);
    }
  }

  if (vtName) document.getElementById("fBerater").value = vtName;
  else document.getElementById("fBerater").value = "";

  document.getElementById("bookModal").style.display = "flex";

  // Check conflict on change
  document.getElementById("fBerater").onchange = checkConflict;
  document.getElementById("fDatum").onchange = checkConflict;
  document.getElementById("fZeit").onchange = checkConflict;
}

function closeBookModal() {
  document.getElementById("bookModal").style.display = "none";
  clearTimeout(leadSearchTimer);
}

function onLeadSearch(val) {
  clearTimeout(leadSearchTimer);
  if (val.length < 3) { document.getElementById("leadResults").style.display = "none"; return; }
  leadSearchTimer = setTimeout(() => fetchLeads(val), 400);
}

async function fetchLeads(query) {
  try {
    const data = await apiGet("leads", { search: query });
    const leads = data.data || [];
    const res = document.getElementById("leadResults");
    if (!leads.length) { res.style.display = "none"; return; }
    res.innerHTML = leads.slice(0, 8).map((l, i) => `
      <div class="lead-item" onclick="selectLead(${i})">
        <div class="lead-item-name">${escHtml(l.firstName||"")} ${escHtml(l.lastName||"")}</div>
        <div class="lead-item-detail">
          ${escHtml(l.homeAddress?.postalCode||"")} ${escHtml(l.homeAddress?.city||"")} · 
          ${escHtml(l.telephone||l.mobile||"")}
        </div>
      </div>
    `).join("");
    res._leads = leads;
    res.style.display = "block";
  } catch(e) {}
}

function selectLead(idx) {
  const leads = document.getElementById("leadResults")._leads || [];
  const l = leads[idx];
  if (!l) return;
  state.selectedLead = l;
  const name = `${l.firstName||""} ${l.lastName||""}`.trim();
  const addr = l.homeAddress;
  document.getElementById("leadSelectedName").textContent = name;
  document.getElementById("leadSelectedDetail").textContent =
    [addr?.postalCode, addr?.city, l.telephone].filter(Boolean).join(" · ");
  document.getElementById("leadSelectedBox").style.display = "flex";
  document.getElementById("leadResults").style.display = "none";
  document.getElementById("leadSearch").value = "";

  // Pre-fill form
  document.getElementById("fVorname").value = l.firstName || "";
  document.getElementById("fNachname").value = l.lastName || "";
  if (addr) {
    document.getElementById("fStrasse").value = `${addr.street||""} ${addr.housenr||""}`.trim();
    document.getElementById("fPlzOrt").value = `${addr.postalCode||""} ${addr.city||""}`.trim();
  }
  document.getElementById("fTelefon").value = l.telephone || l.mobile || "";
}

function clearLead() {
  state.selectedLead = null;
  document.getElementById("leadSelectedBox").style.display = "none";
}

function checkConflict() {
  const berater = document.getElementById("fBerater").value;
  const datum = document.getElementById("fDatum").value;
  const zeit = document.getElementById("fZeit").value;
  const dauer = parseInt(document.getElementById("fDauer").value) || 120;
  if (!berater || !datum || !zeit) return;

  const startStr = `${datum} ${zeit}:00`;
  const startDt = parseDate(startStr);
  const endDt = new Date(startDt.getTime() + dauer * 60000);

  const conflict = state.appointments.some(a => {
    if (a.user_received !== berater) return false;
    if ((a.start_date||"").slice(0,10) !== datum) return false;
    if (a.status === "Cancelled") return false;
    const aStart = parseDate(a.start_date);
    const aEnd = parseDate(a.end_date);
    return aStart < endDt && aEnd > startDt;
  });

  document.getElementById("bookConflictWarn").style.display = conflict ? "block" : "none";
}

async function submitBooking() {
  const berater = document.getElementById("fBerater").value;
  const datum = document.getElementById("fDatum").value;
  const zeit = document.getElementById("fZeit").value;
  const dauer = parseInt(document.getElementById("fDauer").value) || 120;
  const nachname = document.getElementById("fNachname").value.trim();
  const vorname = document.getElementById("fVorname").value.trim();

  if (!berater) { showToast("Bitte Berater wählen", "error"); return; }
  if (!datum) { showToast("Bitte Datum wählen", "error"); return; }
  if (!nachname) { showToast("Bitte Nachname eingeben", "error"); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Buche…";

  const strasse = document.getElementById("fStrasse").value.trim();
  const plzOrt = document.getElementById("fPlzOrt").value.trim();
  const telefon = document.getElementById("fTelefon").value.trim();
  const notizen = document.getElementById("fNotizen").value.trim();
  const typ = document.getElementById("fTyp").value;

  const parts = plzOrt.split(" ");
  const plz = parts[0] || "";
  const stadt = parts.slice(1).join(" ") || "";
  const strasseParts = strasse.match(/^(.*?)\s+(\S+)$/) || ["", strasse, ""];
  const strasseNr = strasseParts[2] || "";
  const strasseName = strasseParts[1] || strasse;

  const startDt = parseDate(`${datum} ${zeit}:00`);
  const endDt = new Date(startDt.getTime() + dauer * 60000);

  const fmtDt = d => d.toISOString().replace("T"," ").slice(0,19);

  const appointmentData = {
    start_date: fmtDt(startDt),
    end_date: fmtDt(endDt),
    appointment_type: typ,
    user_received: berater,
    vorname, nachname,
    strasse: strasseName,
    hausnummer: strasseNr,
    plz, stadt,
    telefon,
    projectID: 1,
    quelle: "Callcenter",
    text: notizen ? `Callcenter-Buchung\n${notizen}` : "Callcenter-Buchung",
    leadID: state.selectedLead?.id || null,
  };

  document.getElementById("bookStatus").textContent = "Schreibe in Leveto…";

  try {
    const result = await apiPost("book", { appointmentData });
    closeBookModal();
    showToast(`✓ Termin für ${vorname} ${nachname} gebucht!`, "success");
    // Optimistic update
    state.appointments.push({
      id: "local_" + Date.now(),
      start_date: fmtDt(startDt),
      end_date: fmtDt(endDt),
      user_received: berater,
      vorname, nachname,
      strasse: strasseName,
      hausnummer: strasseNr,
      plz, stadt,
      appointment_type: typ,
      status: "Open",
      quelle: "Callcenter",
    });
    renderCalendar();
    updateStats();
    // Re-sync after 10s to get server state
    setTimeout(() => syncAppointments(true), 10000);
  } catch(e) {
    document.getElementById("bookStatus").textContent = "Fehler: " + e.message;
  }

  btn.disabled = false;
  btn.textContent = "✓ Termin buchen";
}

// ─── TOAST ──────────────────────────────────────
function showToast(msg, type = "info") {
  const wrap = document.getElementById("toastWrap");
  const t = document.createElement("div");
  t.className = `toast ${type}`;
  const icons = { success: "✅", error: "❌", info: "ℹ️" };
  t.innerHTML = `<span>${icons[type]||""}</span> ${escHtml(msg)}`;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// ─── UTILS ──────────────────────────────────────
function escHtml(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── INIT ───────────────────────────────────────
async function init() {
  document.getElementById("loadingText").textContent = "Lade Leveto-Daten…";
  await syncAppointments(false);
  document.getElementById("loadingText").textContent = "Lade Berater…";
  await loadVTs();
  document.getElementById("loadingOverlay").style.display = "none";
  renderCalendar();
  updateStats();

  // Auto-sync every 5 min
  setInterval(() => syncAppointments(true), SYNC_INTERVAL);

  // Update now-line every minute
  setInterval(() => {
    document.querySelectorAll(".now-line").forEach(nl => {
      const now = new Date();
      const totalMins = (now.getHours() - START_HOUR) * 60 + now.getMinutes();
      nl.style.top = (totalMins / (HOURS * 60) * 100) + "%";
    });
  }, 60000);
}

document.addEventListener("DOMContentLoaded", init);
document.addEventListener("click", (e) => {
  if (!e.target.closest(".lead-search-wrap")) {
    document.getElementById("leadResults").style.display = "none";
  }
});
</script>
