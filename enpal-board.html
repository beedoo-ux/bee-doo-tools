<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bee-doo · Enpal Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0e1a;color:#e8ecf4;min-height:100vh}
:root{--a:#F5C500;--g:#22c55e;--r:#ef4444;--bl:#3b82f6;--cy:#06b6d4;--o:#f59e0b;--p:#a855f7;--bg:#0a0e1a;--cd:#111827;--el:#1a2236;--tb:#e8ecf4;--td:#8896b0}
.hdr{background:#111827;border-bottom:1px solid #1e2a42;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-l img{height:22px;filter:brightness(0) invert(1);opacity:.8}
.hdr-l span{font-size:15px;font-weight:700;color:var(--a)}
.hdr-r{display:flex;gap:8px}
.hdr-lk{color:var(--td);text-decoration:none;font-size:12px;font-weight:500;padding:6px 12px;border-radius:6px;background:#1a2236;border:1px solid #263354;transition:all .15s}
.hdr-lk:hover{color:var(--a);border-color:var(--a)}
.badge-ext{background:var(--bl);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px}
.main{max-width:1200px;margin:0 auto;padding:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--el);border-radius:12px;padding:14px;text-align:center}
.kpi-l{font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px}
.kpi-v{font-size:24px;font-weight:800}
.kpi-s{font-size:11px;margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:#111827;color:var(--td);border:1px solid transparent;transition:all .15s}
.tab:hover{color:var(--tb)}
.tab.on{background:var(--el);color:var(--a);border-color:#F5C50033}
.cd{background:var(--el);border-radius:12px;padding:16px;margin-bottom:12px}
.cd-t{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--tb)}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.funnel-label{width:140px;font-size:12px;font-weight:600;color:var(--td);text-align:right;flex-shrink:0}
.funnel-bar{height:28px;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:700;color:#fff;min-width:36px;transition:width .4s}
.funnel-pct{font-size:11px;color:var(--td);min-width:40px}
.stat-box{background:#111827;border-radius:10px;padding:12px;text-align:center}
.stat-box-v{font-size:20px;font-weight:800}
.stat-box-l{font-size:10px;color:var(--td);margin-top:4px;text-transform:uppercase;letter-spacing:.3px}
.search{width:100%;background:#111827;border:1px solid #263354;border-radius:8px;padding:10px 14px;color:var(--tb);font-family:inherit;font-size:14px;outline:none;margin-bottom:12px}
.search:focus{border-color:var(--a)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:1px solid #1e2a42}
td{padding:8px;font-size:12px;border-bottom:1px solid #111827;color:var(--tb)}
tr:hover td{background:#ffffff04}
.tg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.tg-g{background:#22c55e22;color:#22c55e}.tg-r{background:#ef444422;color:#ef4444}.tg-o{background:#f59e0b22;color:#f59e0b}.tg-b{background:#3b82f622;color:#3b82f6}.tg-p{background:#a855f722;color:#a855f7}.tg-d{background:#64748b22;color:#94a3b8}
.bar-h{width:100%;height:6px;background:#111827;border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px}
.lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.lock input{background:#1a2236;border:2px solid #263354;border-radius:10px;padding:12px 18px;color:#e8ecf4;font-family:inherit;font-size:16px;width:280px;text-align:center;outline:none}
.lock input:focus{border-color:var(--a)}
.btn{background:var(--a);color:#0a0e1a;border:none;border-radius:8px;padding:10px 24px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.spinner{width:24px;height:24px;border:3px solid #263354;border-top-color:var(--a);border-radius:50%;animation:sp .6s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){.kpis{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.funnel-label{width:100px;font-size:11px}table{display:block;overflow-x:auto}}
@media(max-width:480px){.kpis{grid-template-columns:repeat(2,1fr)}.kpi{padding:10px}.kpi-v{font-size:20px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const SB='https://hqzpemfaljxcysyqssng.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const hd=()=>({apikey:AK,Authorization:`Bearer ${AK}`});
const EXT_TOKEN='enpal-beedoo-2026';
const ST_OK=['Terminiert','Angebot erstellt','Angebot angenommen','AB erstellt'];
const ST_WVL=['WVL','Neuer Lead','Interessiert - Zugewiesen'];
const ST_BAD=['REKLAMATION','5x NICHT ERREICHT','nicht erreicht','Kein Interesse','Telefonnummer falsch','15 Kontaktversuche'];
const ST_QUAL=['Nicht im PLZ-Gebiet','Verbrauch unter 3000 kWh','Später als 1 Jahr geplant','T.n.M. Dach zu klein','Kunde zu alt','An Wettbewerber verloren'];
const stCat=s=>{if(ST_OK.includes(s))return'ok';if(ST_WVL.includes(s))return'wvl';if(ST_BAD.includes(s))return'bad';if(ST_QUAL.includes(s))return'qual';return'other'};
const stColor=c=>c==='ok'?'var(--g)':c==='wvl'?'var(--o)':c==='bad'?'var(--r)':c==='qual'?'var(--p)':'var(--td)';
const stTag=c=>c==='ok'?'tg-g':c==='wvl'?'tg-o':c==='bad'?'tg-r':c==='qual'?'tg-p':'tg-d';
const fm=v=>typeof v==='number'?v.toLocaleString('de-DE'):v;
const pct=(a,b)=>b>0?(a/b*100).toFixed(1):'0';

function App(){
    const params=new URLSearchParams(window.location.search);
    const urlToken=params.get('token');
    const isInt=!urlToken;
    const[authed,setAuthed]=useState(isInt||urlToken===EXT_TOKEN);
    const[pw,setPw]=useState('');const[err,setErr]=useState('');
    const[leads,setLeads]=useState(null);const[tab,setTab]=useState('overview');const[search,setSearch]=useState('');

    useEffect(()=>{if(!authed)return;(async()=>{const all=[];for(let o=0;o<10000;o+=1000){const r=await fetch(`${SB}/rest/v1/enpal_leads?select=*&limit=1000&offset=${o}&order=leveto_erstellt_am.desc.nullslast`,{headers:hd()});const d=await r.json();if(!d.length)break;all.push(...d);if(d.length<1000)break}setLeads(all)})()},[authed]);

    const an=useMemo(()=>{if(!leads)return null;const total=leads.length;const cats={ok:0,wvl:0,bad:0,qual:0,other:0};const byStatus={};const byQuelle={};const byPlz={};const monthly={};
        leads.forEach(l=>{const cat=stCat(l.status_name);cats[cat]++;const s=l.status_name||'?';byStatus[s]=(byStatus[s]||0)+1;const q=l.quelle||'?';byQuelle[q]=(byQuelle[q]||0)+1;const p=(l.plz||'').substring(0,2);if(p)byPlz[p+'xxx']=(byPlz[p+'xxx']||0)+1;if(l.leveto_erstellt_am){const ym=l.leveto_erstellt_am.substring(0,7);monthly[ym]=(monthly[ym]||0)+1}});
        return{total,cats,byStatus,byQuelle,byPlz,monthly,mitAuftrag:leads.filter(l=>l.hat_auftrag).length,storno:leads.filter(l=>l.storniert).length}},[leads]);

    const filtered=useMemo(()=>{if(!leads)return[];if(!search.trim())return leads;const q=search.toLowerCase();return leads.filter(l=>(l.kunde_nachname||'').toLowerCase().includes(q)||(l.kunde_vorname||'').toLowerCase().includes(q)||(l.plz||'').includes(q)||(l.ort||'').toLowerCase().includes(q)||(l.status_name||'').toLowerCase().includes(q)||(l.berater_name||'').toLowerCase().includes(q)||String(l.leveto_id).includes(q))},[leads,search]);

    if(!authed)return<div className="lock"><img src="https://bee-doo-tools.vercel.app/Logo%20bee-doo%20Schriftzug.svg" style={{height:32,filter:'brightness(0) invert(1)',opacity:.7}} alt=""/><div style={{fontSize:20,fontWeight:800,color:'var(--a)'}}>Enpal Partner Board</div><div style={{color:'var(--td)',fontSize:13}}>Bitte Zugangstoken eingeben</div><input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr('')}} onKeyDown={e=>{if(e.key==='Enter'){if(pw===EXT_TOKEN)setAuthed(true);else setErr('Falsches Passwort')}}} placeholder="Token..." autoFocus/><button className="btn" onClick={()=>{if(pw===EXT_TOKEN)setAuthed(true);else setErr('Falsches Passwort')}}>Zugang</button>{err&&<div style={{color:'var(--r)',fontSize:13}}>{err}</div>}</div>;
    if(!leads)return<div><div className="spinner"/></div>;

    const TABS=[{k:'overview',l:'📊 Übersicht'},{k:'funnel',l:'🎯 Funnel'},{k:'status',l:'📋 Status'},{k:'leads',l:'🔍 Leads'},{k:'geo',l:'📍 Regionen'}];

    return<React.Fragment>
        <div className="hdr"><div className="hdr-l"><img src="https://bee-doo-tools.vercel.app/Logo%20bee-doo%20Schriftzug.svg" alt=""/><span>Enpal Board</span>{!isInt&&<span className="badge-ext">EXTERN</span>}</div><div className="hdr-r">{isInt&&<a className="hdr-lk" href="dashboard.html">Dashboard</a>}{isInt&&<a className="hdr-lk" href="index.html">Toolbox</a>}</div></div>
        <div className="main">
            <div className="kpis">
                <div className="kpi"><div className="kpi-l">Gesamt Leads</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(an.total)}</div></div>
                <div className="kpi"><div className="kpi-l">In Bearbeitung</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(an.cats.ok)}</div><div className="kpi-s" style={{color:'var(--g)'}}>{pct(an.cats.ok,an.total)}%</div></div>
                <div className="kpi"><div className="kpi-l">Offen / WVL</div><div className="kpi-v" style={{color:'var(--o)'}}>{fm(an.cats.wvl)}</div><div className="kpi-s" style={{color:'var(--o)'}}>{pct(an.cats.wvl,an.total)}%</div></div>
                <div className="kpi"><div className="kpi-l">Nicht erreicht</div><div className="kpi-v" style={{color:'var(--r)'}}>{fm(an.cats.bad)}</div><div className="kpi-s" style={{color:'var(--r)'}}>{pct(an.cats.bad,an.total)}%</div></div>
                <div className="kpi"><div className="kpi-l">Disqualifiziert</div><div className="kpi-v" style={{color:'var(--p)'}}>{fm(an.cats.qual)}</div><div className="kpi-s" style={{color:'var(--p)'}}>{pct(an.cats.qual,an.total)}%</div></div>
                <div className="kpi"><div className="kpi-l">→ Auftrag</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(an.mitAuftrag)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{pct(an.mitAuftrag,an.total)}% CR</div></div>
            </div>
            <div className="tabs">{TABS.map(t=><div key={t.k} className={`tab ${tab===t.k?'on':''}`} onClick={()=>setTab(t.k)}>{t.l}</div>)}</div>

            {tab==='overview'&&<React.Fragment><div className="g2">
                <div className="cd"><div className="cd-t">📊 Status-Kategorien</div><div style={{maxWidth:500}}>{[{l:'✅ In Bearbeitung',v:an.cats.ok,c:'var(--g)'},{l:'⏳ Offen / WVL',v:an.cats.wvl,c:'var(--o)'},{l:'❌ Nicht erreicht',v:an.cats.bad,c:'var(--r)'},{l:'🚫 Disqualifiziert',v:an.cats.qual,c:'var(--p)'}].map((s,i)=>{const mx=Math.max(an.cats.ok,an.cats.bad,an.cats.wvl,an.cats.qual,1);return<div key={i} className="funnel-row"><span className="funnel-label">{s.l}</span><div className="funnel-bar" style={{width:`${Math.max(s.v/mx*100,5)}%`,background:s.c}}>{fm(s.v)}</div><span className="funnel-pct">{pct(s.v,an.total)}%</span></div>})}</div></div>
                <div className="cd"><div className="cd-t">📊 Quellen</div>{Object.entries(an.byQuelle).sort((a,b)=>b[1]-a[1]).map(([q,c])=>{const mx=Math.max(...Object.values(an.byQuelle));return<div key={q} className="funnel-row"><span className="funnel-label">{q}</span><div className="funnel-bar" style={{width:`${Math.max(c/mx*100,5)}%`,background:'var(--bl)'}}>{fm(c)}</div><span className="funnel-pct">{pct(c,an.total)}%</span></div>})}</div>
            </div>
            <div className="cd"><div className="cd-t">📈 Leads pro Monat</div><div style={{display:'flex',alignItems:'flex-end',gap:6,height:160,paddingTop:20}}>{Object.entries(an.monthly).sort().slice(-12).map(([m,c])=>{const mx=Math.max(...Object.values(an.monthly),1);return<div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}><span style={{fontSize:11,fontWeight:700,color:'var(--a)'}}>{c}</span><div style={{width:'100%',maxWidth:50,height:c/mx*120,background:'linear-gradient(180deg,var(--a),var(--a)44)',borderRadius:'5px 5px 0 0',minHeight:3}}/><span style={{fontSize:9,color:'var(--td)'}}>{m.split('-')[1]}/{m.split('-')[0].slice(2)}</span></div>})}</div></div></React.Fragment>}

            {tab==='funnel'&&<div className="cd"><div className="cd-t">🎯 Conversion Funnel</div><div style={{maxWidth:600,margin:'0 auto'}}>{[{l:'Leads generiert',v:an.total,c:'var(--a)'},{l:'In Bearbeitung',v:an.cats.ok,c:'var(--g)'},{l:'→ Auftrag (aktiv)',v:an.mitAuftrag-an.storno,c:'var(--cy)'}].map((s,i)=>{const mx=an.total||1;return<div key={i} className="funnel-row" style={{marginBottom:14}}><span className="funnel-label" style={{width:160,fontSize:13}}>{s.l}</span><div className="funnel-bar" style={{width:`${Math.max(s.v/mx*100,5)}%`,background:s.c,height:36,fontSize:14}}>{fm(s.v)}</div><span className="funnel-pct" style={{fontSize:13,fontWeight:700}}>{i>0?pct(s.v,an.total)+'%':''}</span></div>})}</div><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginTop:20}}><div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)'}}>{pct(an.cats.ok,an.total)}%</div><div className="stat-box-l">Bearbeitungsquote</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--r)'}}>{pct(an.cats.bad,an.total)}%</div><div className="stat-box-l">Nicht-Erreichbar</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--cy)'}}>{pct(an.mitAuftrag,an.total)}%</div><div className="stat-box-l">Conversion Rate</div></div><div className="stat-box"><div className="stat-box-v" style={{color:'var(--p)'}}>{pct(an.cats.qual,an.total)}%</div><div className="stat-box-l">Disqualifiziert</div></div></div></div>}

            {tab==='status'&&<div className="cd"><div className="cd-t">📋 Alle Status</div><table><thead><tr><th>Status</th><th>Anzahl</th><th>%</th><th></th></tr></thead><tbody>{Object.entries(an.byStatus).sort((a,b)=>b[1]-a[1]).map(([s,c])=>{const cat=stCat(s);const mx=Math.max(...Object.values(an.byStatus));return<tr key={s}><td><span className={`tg ${stTag(cat)}`}>{s}</span></td><td style={{fontWeight:700}}>{fm(c)}</td><td style={{color:'var(--td)'}}>{pct(c,an.total)}%</td><td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/mx*100}%`,background:stColor(cat)}}/></div></td></tr>})}</tbody></table></div>}

            {tab==='leads'&&<div className="cd"><div className="cd-t">🔍 Lead-Tabelle ({fm(filtered.length)}{search?' gefiltert':''} von {fm(an.total)})</div><input className="search" placeholder="Suche nach Name, PLZ, Ort, Status, Berater..." value={search} onChange={e=>setSearch(e.target.value)}/><div style={{overflowX:'auto'}}><table><thead><tr><th>ID</th>{isInt&&<th>Name</th>}<th>PLZ</th><th>Ort</th><th>Status</th><th>Quelle</th><th>Berater</th>{isInt&&<th>Telefon</th>}<th>Erstellt</th><th>Auftrag</th></tr></thead><tbody>{filtered.slice(0,200).map(l=>{const cat=stCat(l.status_name);return<tr key={l.leveto_id}><td style={{fontFamily:'monospace',fontSize:11,color:'var(--td)'}}>{l.leveto_id}</td>{isInt&&<td style={{fontWeight:600,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.kunde_vorname} {l.kunde_nachname}</td>}<td style={{fontFamily:'monospace',fontSize:11}}>{l.plz}</td><td style={{fontSize:11,color:'var(--td)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.ort}</td><td><span className={`tg ${stTag(cat)}`}>{l.status_name}</span></td><td style={{fontSize:11,color:'var(--td)'}}>{(l.quelle||'').replace('Enpal','').replace(' - ','').trim()||'PV'}</td><td style={{fontSize:11,color:'var(--td)',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.berater_name||'—'}</td>{isInt&&<td style={{fontSize:11,color:'var(--td)',fontFamily:'monospace'}}>{l.telefon||''}</td>}<td style={{fontSize:11,color:'var(--td)',whiteSpace:'nowrap'}}>{l.leveto_erstellt_am?new Date(l.leveto_erstellt_am).toLocaleDateString('de-DE'):''}</td><td>{l.hat_auftrag?<span className="tg tg-g">AN {l.auftrag_nr}</span>:l.storniert?<span className="tg tg-r">Storno</span>:'—'}</td></tr>})}</tbody></table>{filtered.length>200&&<div style={{textAlign:'center',padding:12,color:'var(--td)',fontSize:12}}>200 von {fm(filtered.length)} — Suchfilter nutzen</div>}</div></div>}

            {tab==='geo'&&<div className="cd"><div className="cd-t">📍 Top 20 Regionen</div><table><thead><tr><th>#</th><th>PLZ</th><th>Leads</th><th>%</th><th></th></tr></thead><tbody>{Object.entries(an.byPlz).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([p,c],i)=>{const mx=Math.max(...Object.values(an.byPlz));return<tr key={p}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td><td style={{fontWeight:600,fontFamily:'monospace'}}>{p}</td><td style={{fontWeight:700,color:'var(--bl)'}}>{fm(c)}</td><td style={{color:'var(--td)'}}>{pct(c,an.total)}%</td><td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/mx*100}%`,background:'var(--bl)'}}/></div></td></tr>})}</tbody></table></div>}

            <div style={{textAlign:'center',padding:'16px 0',fontSize:11,color:'#3a4a6a'}}>Letzte Sync: {leads[0]?.sync_am?new Date(leads[0].sync_am).toLocaleString('de-DE'):'—'} · {fm(an.total)} Leads</div>
        </div>
    </React.Fragment>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
