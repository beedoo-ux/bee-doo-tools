<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bee-doo · Enpal Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0e1a;color:#e8ecf4;min-height:100vh}
:root{--a:#F5C500;--g:#22c55e;--r:#ef4444;--bl:#3b82f6;--cy:#06b6d4;--o:#f59e0b;--p:#a855f7;--pk:#ec4899;--bg:#0a0e1a;--cd:#111827;--el:#1a2236;--tb:#e8ecf4;--td:#8896b0}
.hdr{background:#111827;border-bottom:1px solid #1e2a42;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-l img{height:22px;filter:brightness(0) invert(1);opacity:.8}
.hdr-l span{font-size:15px;font-weight:700;color:var(--a)}
.hdr-r{display:flex;gap:8px}
.hdr-lk{color:var(--td);text-decoration:none;font-size:12px;font-weight:500;padding:6px 12px;border-radius:6px;background:#1a2236;border:1px solid #263354;transition:all .15s}
.hdr-lk:hover{color:var(--a);border-color:var(--a)}
.badge-ext{background:var(--bl);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px}
.main{max-width:1200px;margin:0 auto;padding:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--el);border-radius:12px;padding:12px;text-align:center}
.kpi-l{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.kpi-v{font-size:22px;font-weight:800}
.kpi-s{font-size:10px;margin-top:2px}
.pills{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #263354;transition:all .15s;background:#111827;color:var(--td)}
.pill.on{background:var(--a);color:#0a0e1a;border-color:var(--a)}
.tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:#111827;color:var(--td);border:1px solid transparent;transition:all .15s}
.tab:hover{color:var(--tb)}
.tab.on{background:var(--el);color:var(--a);border-color:#F5C50033}
.cd{background:var(--el);border-radius:12px;padding:16px;margin-bottom:12px}
.cd-t{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--tb)}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.flab{width:140px;font-size:12px;font-weight:600;color:var(--td);text-align:right;flex-shrink:0}
.fbar{height:28px;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:700;color:#fff;min-width:36px;transition:width .4s}
.fpct{font-size:11px;color:var(--td);min-width:40px}
.sb{background:#111827;border-radius:10px;padding:12px;text-align:center}
.sb-v{font-size:20px;font-weight:800}
.sb-l{font-size:10px;color:var(--td);margin-top:4px;text-transform:uppercase;letter-spacing:.3px}
.search{width:100%;background:#111827;border:1px solid #263354;border-radius:8px;padding:10px 14px;color:var(--tb);font-family:inherit;font-size:14px;outline:none;margin-bottom:12px}
.search:focus{border-color:var(--a)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:1px solid #1e2a42;white-space:nowrap}
td{padding:8px;font-size:12px;border-bottom:1px solid #111827;color:var(--tb)}
tr:hover td{background:#ffffff04}
.tg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.tg-g{background:#22c55e22;color:#22c55e}.tg-r{background:#ef444422;color:#ef4444}.tg-o{background:#f59e0b22;color:#f59e0b}.tg-b{background:#3b82f622;color:#3b82f6}.tg-p{background:#a855f722;color:#a855f7}.tg-pk{background:#ec489922;color:#ec4899}.tg-d{background:#64748b22;color:#94a3b8}
.bar-h{width:100%;height:6px;background:#111827;border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px}
.lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.lock input{background:#1a2236;border:2px solid #263354;border-radius:10px;padding:12px 18px;color:#e8ecf4;font-family:inherit;font-size:16px;width:280px;text-align:center;outline:none}
.lock input:focus{border-color:var(--a)}
.btn{background:var(--a);color:#0a0e1a;border:none;border-radius:8px;padding:10px 24px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.spinner{width:24px;height:24px;border:3px solid #263354;border-top-color:var(--a);border-radius:50%;animation:sp .6s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){.kpis{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}.g3{grid-template-columns:repeat(2,1fr)}.flab{width:100px;font-size:11px}table{display:block;overflow-x:auto}}
@media(max-width:480px){.kpis{grid-template-columns:repeat(2,1fr)}.kpi{padding:10px}.kpi-v{font-size:18px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const SB='https://hqzpemfaljxcysyqssng.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const hd=()=>({apikey:AK,Authorization:`Bearer ${AK}`});
const EXT_TOKEN='enpal-beedoo-2026';

/* Status categories - REKLAMATION is separate (reached but issue) */
const ST_PIPE=['Terminiert','Angebot erstellt','Angebot angenommen','AB erstellt','Kontakt/Angebot per Mail'];
const ST_WVL=['WVL','Neuer Lead','Interessiert - Zugewiesen'];
const ST_NERR=['5x NICHT ERREICHT','nicht erreicht','Telefonnummer falsch','15 Kontaktversuche'];
const ST_DISQ=['Nicht im PLZ-Gebiet','Verbrauch unter 3000 kWh','Später als 1 Jahr geplant','T.n.M. Dach zu klein','T.n.M. Dachbelag','Kunde zu alt','An Wettbewerber verloren','Möchte Haus verkaufen','Solaranlage vorhanden','Kein Eigentümer','Doppelt im System','Miete/Selbstmontage','Mehrfamilienhaus','Kein Interesse'];
const catOf=s=>{if(s==='REKLAMATION')return'rekl';if(ST_PIPE.includes(s))return'pipe';if(ST_WVL.includes(s))return'wvl';if(ST_NERR.includes(s))return'nerr';if(ST_DISQ.includes(s))return'disq';return'other'};
const catCol=c=>({rekl:'var(--pk)',pipe:'var(--g)',wvl:'var(--o)',nerr:'var(--r)',disq:'var(--p)',other:'var(--td)'}[c]);
const catTg=c=>({rekl:'tg-pk',pipe:'tg-g',wvl:'tg-o',nerr:'tg-r',disq:'tg-p',other:'tg-d'}[c]);
const catLbl=c=>({rekl:'Reklamation',pipe:'In Pipeline',wvl:'Offen/WVL',nerr:'Nicht erreicht',disq:'Disqualifiziert',other:'Sonstige'}[c]);
const fm=v=>typeof v==='number'?v.toLocaleString('de-DE'):v;
const pct=(a,b)=>b>0?(a/b*100).toFixed(1):'0';

function App(){
    const params=new URLSearchParams(window.location.search);
    const urlToken=params.get('token');
    const isInt=!urlToken;
    const[authed,setAuthed]=useState(isInt||urlToken===EXT_TOKEN);
    const[pw,setPw]=useState('');const[err,setErr]=useState('');
    const[leads,setLeads]=useState(null);const[tab,setTab]=useState('overview');const[search,setSearch]=useState('');const[qF,setQF]=useState('Alle');

    useEffect(()=>{if(!authed)return;(async()=>{const all=[];for(let o=0;o<10000;o+=1000){const r=await fetch(`${SB}/rest/v1/enpal_leads?select=*&limit=1000&offset=${o}&order=leveto_erstellt_am.desc.nullslast`,{headers:hd()});const d=await r.json();if(!d.length)break;all.push(...d);if(d.length<1000)break}setLeads(all)})()},[authed]);

    const quellen=useMemo(()=>{if(!leads)return[];return['Alle',...[...new Set(leads.map(l=>l.quelle).filter(Boolean))].sort()]},[leads]);
    const fL=useMemo(()=>!leads?[]:qF==='Alle'?leads:leads.filter(l=>l.quelle===qF),[leads,qF]);

    const an=useMemo(()=>{
        if(!leads)return null;const src=fL;const t=src.length;
        const cats={rekl:0,pipe:0,wvl:0,nerr:0,disq:0,other:0};
        const byStatus={};const byQuelle={};const byPlz={};const monthly={};const byBerater={};
        src.forEach(l=>{
            const c=catOf(l.status_name);cats[c]++;
            byStatus[l.status_name||'?']=(byStatus[l.status_name||'?']||0)+1;
            byQuelle[l.quelle||'?']=(byQuelle[l.quelle||'?']||0)+1;
            const p2=(l.plz||'').substring(0,2);if(p2)byPlz[p2+'xxx']=(byPlz[p2+'xxx']||0)+1;
            if(l.leveto_erstellt_am){const ym=l.leveto_erstellt_am.substring(0,7);if(!monthly[ym])monthly[ym]={t:0,rekl:0,pipe:0,nerr:0};monthly[ym].t++;monthly[ym][c==='rekl'?'rekl':c==='pipe'?'pipe':c==='nerr'?'nerr':'t']+=0;if(c==='rekl')monthly[ym].rekl++;if(c==='pipe')monthly[ym].pipe++;if(c==='nerr')monthly[ym].nerr++}
            const bn=l.berater_name||'(nicht zugewiesen)';
            if(!byBerater[bn])byBerater[bn]={t:0,rekl:0,pipe:0,nerr:0,wvl:0,disq:0,auftrag:0};
            byBerater[bn].t++;byBerater[bn][c==='rekl'?'rekl':c==='pipe'?'pipe':c==='nerr'?'nerr':c==='wvl'?'wvl':'disq']++;
            if(l.hat_auftrag)byBerater[bn].auftrag++;
        });
        const mitAuftrag=src.filter(l=>l.hat_auftrag).length;
        const storno=src.filter(l=>l.storniert).length;
        const ohneB=src.filter(l=>!l.berater_name).length;
        return{t,cats,byStatus,byQuelle,byPlz,monthly,byBerater,mitAuftrag,storno,ohneB}
    },[fL,leads]);

    const filtered=useMemo(()=>{if(!fL.length)return[];if(!search.trim())return fL;const q=search.toLowerCase();return fL.filter(l=>(l.kunde_nachname||'').toLowerCase().includes(q)||(l.kunde_vorname||'').toLowerCase().includes(q)||(l.plz||'').includes(q)||(l.ort||'').toLowerCase().includes(q)||(l.status_name||'').toLowerCase().includes(q)||(l.berater_name||'').toLowerCase().includes(q)||String(l.leveto_id).includes(q))},[fL,search]);

    if(!authed)return<div className="lock"><img src="https://bee-doo-tools.vercel.app/Logo%20bee-doo%20Schriftzug.svg" style={{height:32,filter:'brightness(0) invert(1)',opacity:.7}} alt=""/><div style={{fontSize:20,fontWeight:800,color:'var(--a)'}}>Enpal Partner Board</div><div style={{color:'var(--td)',fontSize:13}}>Bitte Zugangstoken eingeben</div><input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr('')}} onKeyDown={e=>{if(e.key==='Enter'){if(pw===EXT_TOKEN)setAuthed(true);else setErr('Falsches Passwort')}}} placeholder="Token..." autoFocus/><button className="btn" onClick={()=>{if(pw===EXT_TOKEN)setAuthed(true);else setErr('Falsches Passwort')}}>Zugang</button>{err&&<div style={{color:'var(--r)',fontSize:13}}>{err}</div>}</div>;
    if(!leads||!an)return<div><div className="spinner"/></div>;

    const TABS=[{k:'overview',l:'📊 Übersicht'},{k:'funnel',l:'🎯 Funnel'},{k:'berater',l:'👤 Berater'},{k:'reklamation',l:'⚠️ Reklamation'},{k:'status',l:'📋 Status'},{k:'leads',l:'🔍 Leads'},{k:'geo',l:'📍 Regionen'}];

    return<React.Fragment>
        <div className="hdr"><div className="hdr-l"><img src="https://bee-doo-tools.vercel.app/Logo%20bee-doo%20Schriftzug.svg" alt=""/><span>Enpal Board</span>{!isInt&&<span className="badge-ext">EXTERN</span>}</div><div className="hdr-r">{isInt&&<a className="hdr-lk" href="dashboard.html">Dashboard</a>}{isInt&&<a className="hdr-lk" href="index.html">Toolbox</a>}</div></div>
        <div className="main">
            <div className="kpis">
                <div className="kpi"><div className="kpi-l">Gesamt Leads</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(an.t)}</div></div>
                <div className="kpi"><div className="kpi-l">⚠️ Reklamation</div><div className="kpi-v" style={{color:'var(--pk)'}}>{fm(an.cats.rekl)}</div><div className="kpi-s" style={{color:'var(--pk)'}}>{pct(an.cats.rekl,an.t)}%</div></div>
                <div className="kpi"><div className="kpi-l">❌ Nicht erreicht</div><div className="kpi-v" style={{color:'var(--r)'}}>{fm(an.cats.nerr)}</div><div className="kpi-s" style={{color:'var(--r)'}}>{pct(an.cats.nerr,an.t)}%</div></div>
                <div className="kpi"><div className="kpi-l">✅ In Pipeline</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(an.cats.pipe)}</div><div className="kpi-s" style={{color:'var(--g)'}}>{pct(an.cats.pipe,an.t)}%</div></div>
                <div className="kpi"><div className="kpi-l">🚫 Disqualifiziert</div><div className="kpi-v" style={{color:'var(--p)'}}>{fm(an.cats.disq)}</div><div className="kpi-s" style={{color:'var(--p)'}}>{pct(an.cats.disq,an.t)}%</div></div>
                <div className="kpi"><div className="kpi-l">⏳ Offen / WVL</div><div className="kpi-v" style={{color:'var(--o)'}}>{fm(an.cats.wvl)}</div><div className="kpi-s" style={{color:'var(--o)'}}>{pct(an.cats.wvl,an.t)}%</div></div>
                <div className="kpi"><div className="kpi-l">🎯 → Auftrag</div><div className="kpi-v" style={{color:'var(--cy)'}}>{fm(an.mitAuftrag)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{pct(an.mitAuftrag,an.t)}% CR</div></div>
            </div>

            <div className="pills"><span style={{fontSize:11,color:'var(--td)',fontWeight:600,marginRight:4}}>QUELLE:</span>{quellen.map(q=><div key={q} className={`pill ${qF===q?'on':''}`} onClick={()=>setQF(q)}>{q}{q!=='Alle'?` (${leads.filter(l=>l.quelle===q).length})`:` (${leads.length})`}</div>)}</div>
            <div className="tabs">{TABS.map(t=><div key={t.k} className={`tab ${tab===t.k?'on':''}`} onClick={()=>setTab(t.k)}>{t.l}</div>)}</div>

            {/* === ÜBERSICHT === */}
            {tab==='overview'&&<React.Fragment>
                <div className="g3">
                    {[{l:'⚠️ Reklamation',k:'rekl'},{l:'❌ Nicht erreicht',k:'nerr'},{l:'✅ In Pipeline',k:'pipe'},{l:'🚫 Disqualifiziert',k:'disq'},{l:'⏳ Offen/WVL',k:'wvl'},{l:'📭 Ohne Berater',k:null}].map((s,i)=>{
                        const v=s.k?an.cats[s.k]:an.ohneB;const mx=Math.max(...Object.values(an.cats),an.ohneB,1);
                        return<div key={i} className="sb"><div className="sb-v" style={{color:s.k?catCol(s.k):'var(--o)'}}>{fm(v)}</div><div className="sb-l">{s.l}</div><div style={{marginTop:6}}><div className="bar-h"><div className="bar-f" style={{width:`${v/mx*100}%`,background:s.k?catCol(s.k):'var(--o)'}}/></div></div><div style={{fontSize:10,color:'var(--td)',marginTop:3}}>{pct(v,an.t)}%</div></div>
                    })}
                </div>
                <div className="g2">
                    <div className="cd"><div className="cd-t">📊 Quellen-Vergleich</div>{Object.entries(an.byQuelle).sort((a,b)=>b[1]-a[1]).map(([q,c])=>{const mx=Math.max(...Object.values(an.byQuelle));return<div key={q} className="frow"><span className="flab">{q}</span><div className="fbar" style={{width:`${Math.max(c/mx*100,5)}%`,background:'var(--bl)'}}>{fm(c)}</div><span className="fpct">{pct(c,an.t)}%</span></div>})}</div>
                    <div className="cd"><div className="cd-t">📈 Monatstrend</div><div style={{display:'flex',alignItems:'flex-end',gap:4,height:160,paddingTop:20}}>{Object.entries(an.monthly).sort().slice(-12).map(([m,d])=>{const mx=Math.max(...Object.values(an.monthly).map(x=>x.t),1);return<div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}><span style={{fontSize:9,fontWeight:700,color:'var(--a)'}}>{d.t}</span><div style={{width:'100%',display:'flex',flexDirection:'column',gap:1}}><div style={{width:'100%',height:Math.max(d.pipe/mx*100,1),background:'var(--g)',borderRadius:'3px 3px 0 0',minHeight:d.pipe?2:0}}/><div style={{width:'100%',height:Math.max(d.rekl/mx*100,1),background:'var(--pk)',minHeight:d.rekl?2:0}}/><div style={{width:'100%',height:Math.max(d.nerr/mx*100,1),background:'var(--r)',borderRadius:'0 0 3px 3px',minHeight:d.nerr?2:0}}/><div style={{width:'100%',height:Math.max((d.t-d.pipe-d.rekl-d.nerr)/mx*100,1),background:'#263354',borderRadius:'0 0 3px 3px',minHeight:1}}/></div><span style={{fontSize:8,color:'var(--td)'}}>{m.split('-')[1]}/{m.split('-')[0].slice(2)}</span></div>})}</div><div style={{display:'flex',gap:12,justifyContent:'center',marginTop:8}}>{[{l:'Pipeline',c:'var(--g)'},{l:'Reklamation',c:'var(--pk)'},{l:'Nicht err.',c:'var(--r)'},{l:'Andere',c:'#263354'}].map(x=><div key={x.l} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,color:'var(--td)'}}><div style={{width:8,height:8,borderRadius:2,background:x.c}}/>{x.l}</div>)}</div></div>
                </div>
            </React.Fragment>}

            {/* === FUNNEL === */}
            {tab==='funnel'&&<div className="cd"><div className="cd-t">🎯 Lead-Funnel</div><div style={{maxWidth:650,margin:'0 auto'}}>{[
                {l:'Leads generiert',v:an.t,c:'var(--a)'},
                {l:'Erreicht (Berater)',v:an.t-an.cats.nerr-an.ohneB,c:'var(--bl)'},
                {l:'In Pipeline',v:an.cats.pipe,c:'var(--g)'},
                {l:'→ Auftrag',v:an.mitAuftrag,c:'var(--cy)'},
            ].map((s,i)=>{const mx=an.t||1;return<div key={i} className="frow" style={{marginBottom:14}}><span className="flab" style={{width:160,fontSize:13}}>{s.l}</span><div className="fbar" style={{width:`${Math.max(s.v/mx*100,5)}%`,background:s.c,height:36,fontSize:14}}>{fm(s.v)}</div><span className="fpct" style={{fontSize:13,fontWeight:700}}>{i>0?pct(s.v,an.t)+'%':''}</span></div>})}</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10,marginTop:20}}>
                    <div className="sb"><div className="sb-v" style={{color:'var(--pk)'}}>{pct(an.cats.rekl,an.t)}%</div><div className="sb-l">Reklamationsquote</div></div>
                    <div className="sb"><div className="sb-v" style={{color:'var(--r)'}}>{pct(an.cats.nerr,an.t)}%</div><div className="sb-l">Nicht-Erreichbar</div></div>
                    <div className="sb"><div className="sb-v" style={{color:'var(--o)'}}>{pct(an.ohneB,an.t)}%</div><div className="sb-l">Ohne Berater</div></div>
                    <div className="sb"><div className="sb-v" style={{color:'var(--g)'}}>{pct(an.cats.pipe,an.t)}%</div><div className="sb-l">Pipeline-Rate</div></div>
                    <div className="sb"><div className="sb-v" style={{color:'var(--cy)'}}>{pct(an.mitAuftrag,an.t)}%</div><div className="sb-l">Conversion Rate</div></div>
                    <div className="sb"><div className="sb-v" style={{color:'var(--p)'}}>{pct(an.cats.disq,an.t)}%</div><div className="sb-l">Disqualifiziert</div></div>
                </div>
            </div>}

            {/* === BERATER === */}
            {tab==='berater'&&<div className="cd"><div className="cd-t">👤 Berater-Performance ({Object.keys(an.byBerater).length-1} Berater + unzugewiesen)</div>
                <div style={{overflowX:'auto'}}><table><thead><tr><th>#</th><th>Berater</th><th>Leads</th><th>✅ Pipeline</th><th>⚠️ Rekl.</th><th>❌ N.Err.</th><th>🚫 Disq.</th>{isInt&&<th>🎯 Auftrag</th>}<th>Pipeline%</th><th>Rekl.%</th></tr></thead><tbody>
                {Object.entries(an.byBerater).sort((a,b)=>b[1].t-a[1].t).map(([n,d],i)=>{
                    const pipeP=pct(d.pipe,d.t);const reklP=pct(d.rekl,d.t);
                    return<tr key={n} style={n==='(nicht zugewiesen)'?{background:'#1a1520'}:{}}>
                        <td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td>
                        <td style={{fontWeight:600,maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:n==='(nicht zugewiesen)'?'var(--o)':'var(--tb)'}}>{n}</td>
                        <td style={{fontWeight:700}}>{fm(d.t)}</td>
                        <td style={{color:'var(--g)',fontWeight:700}}>{d.pipe}</td>
                        <td style={{color:'var(--pk)',fontWeight:700}}>{d.rekl}</td>
                        <td style={{color:'var(--r)',fontWeight:700}}>{d.nerr}</td>
                        <td style={{color:'var(--p)'}}>{d.disq}</td>
                        {isInt&&<td>{d.auftrag>0?<span className="tg tg-g">{d.auftrag}</span>:'—'}</td>}
                        <td><span className={`tg ${parseFloat(pipeP)>=50?'tg-g':parseFloat(pipeP)>=25?'tg-o':'tg-r'}`}>{pipeP}%</span></td>
                        <td><span className={`tg ${parseFloat(reklP)<=10?'tg-g':parseFloat(reklP)<=25?'tg-o':'tg-r'}`}>{reklP}%</span></td>
                    </tr>
                })}
                </tbody></table></div>
            </div>}

            {/* === REKLAMATION === */}
            {tab==='reklamation'&&<React.Fragment>
                <div className="g3">
                    <div className="sb"><div className="sb-v" style={{color:'var(--pk)'}}>{fm(an.cats.rekl)}</div><div className="sb-l">Reklamationen gesamt</div></div>
                    <div className="sb"><div className="sb-v" style={{color:'var(--pk)'}}>{pct(an.cats.rekl,an.t)}%</div><div className="sb-l">Reklamationsquote</div></div>
                    <div className="sb"><div className="sb-v" style={{color:'var(--o)'}}>{fm(fL.filter(l=>l.status_name==='REKLAMATION'&&!l.berater_name).length)}</div><div className="sb-l">Davon ohne Berater</div></div>
                </div>
                <div className="g2">
                    <div className="cd"><div className="cd-t">⚠️ Reklamation nach Quelle</div>{Object.entries(an.byQuelle).sort((a,b)=>b[1]-a[1]).map(([q,total])=>{
                        const rk=fL.filter(l=>l.quelle===q&&l.status_name==='REKLAMATION').length;
                        const rp=pct(rk,total);
                        return<div key={q} className="frow"><span className="flab">{q}</span><div className="fbar" style={{width:`${Math.max(parseFloat(rp),5)}%`,background:'var(--pk)',maxWidth:'70%'}}>{rk}</div><span className="fpct" style={{fontWeight:700,color:parseFloat(rp)>40?'var(--r)':parseFloat(rp)>25?'var(--o)':'var(--g)'}}>{rp}%</span></div>
                    })}</div>
                    <div className="cd"><div className="cd-t">⚠️ Reklamation nach Berater</div>{Object.entries(an.byBerater).filter(([n,d])=>d.rekl>0&&n!=='(nicht zugewiesen)').sort((a,b)=>b[1].rekl-a[1].rekl).slice(0,10).map(([n,d])=>{
                        const rp=pct(d.rekl,d.t);
                        return<div key={n} className="frow"><span className="flab" style={{fontSize:11}}>{n}</span><div className="fbar" style={{width:`${Math.max(d.rekl/Math.max(...Object.values(an.byBerater).filter(x=>x.t>0).map(x=>x.rekl)),1)*100,5)}%`,background:'var(--pk)'}}>{d.rekl}</div><span className="fpct">{rp}%</span></div>
                    })}</div>
                </div>
            </React.Fragment>}

            {/* === STATUS === */}
            {tab==='status'&&<div className="cd"><div className="cd-t">📋 Alle Status</div><table><thead><tr><th>Status</th><th>Kat.</th><th>Anzahl</th><th>%</th><th></th></tr></thead><tbody>{Object.entries(an.byStatus).sort((a,b)=>b[1]-a[1]).map(([s,c])=>{const cat=catOf(s);const mx=Math.max(...Object.values(an.byStatus));return<tr key={s}><td style={{fontWeight:600}}>{s}</td><td><span className={`tg ${catTg(cat)}`}>{catLbl(cat)}</span></td><td style={{fontWeight:700}}>{fm(c)}</td><td style={{color:'var(--td)'}}>{pct(c,an.t)}%</td><td style={{width:'25%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/mx*100}%`,background:catCol(cat)}}/></div></td></tr>})}</tbody></table></div>}

            {/* === LEADS === */}
            {tab==='leads'&&<div className="cd"><div className="cd-t">🔍 Lead-Tabelle ({fm(filtered.length)}{search?' gefiltert':''} von {fm(an.t)})</div><input className="search" placeholder="Suche nach Name, PLZ, Ort, Status, Berater..." value={search} onChange={e=>setSearch(e.target.value)}/><div style={{overflowX:'auto'}}><table><thead><tr><th>ID</th>{isInt&&<th>Name</th>}<th>PLZ</th><th>Ort</th><th>Status</th><th>Quelle</th><th>Berater</th>{isInt&&<th>Tel.</th>}<th>Erstellt</th><th>Auftrag</th></tr></thead><tbody>{filtered.slice(0,200).map(l=>{const cat=catOf(l.status_name);return<tr key={l.leveto_id}><td style={{fontFamily:'monospace',fontSize:11,color:'var(--td)'}}>{l.leveto_id}</td>{isInt&&<td style={{fontWeight:600,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.kunde_vorname} {l.kunde_nachname}</td>}<td style={{fontFamily:'monospace',fontSize:11}}>{l.plz}</td><td style={{fontSize:11,color:'var(--td)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.ort}</td><td><span className={`tg ${catTg(cat)}`}>{l.status_name}</span></td><td style={{fontSize:11,color:'var(--td)'}}>{(l.quelle||'').replace('Enpal','').replace(' - ','').trim()||'PV'}</td><td style={{fontSize:11,color:l.berater_name?'var(--td)':'var(--o)',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.berater_name||'—'}</td>{isInt&&<td style={{fontSize:11,color:'var(--td)',fontFamily:'monospace'}}>{l.telefon||''}</td>}<td style={{fontSize:11,color:'var(--td)',whiteSpace:'nowrap'}}>{l.leveto_erstellt_am?new Date(l.leveto_erstellt_am).toLocaleDateString('de-DE'):''}</td><td>{l.hat_auftrag?<span className="tg tg-g">AN {l.auftrag_nr}</span>:l.storniert?<span className="tg tg-r">Storno</span>:'—'}</td></tr>})}</tbody></table>{filtered.length>200&&<div style={{textAlign:'center',padding:12,color:'var(--td)',fontSize:12}}>200 von {fm(filtered.length)} — Suchfilter nutzen</div>}</div></div>}

            {/* === GEO === */}
            {tab==='geo'&&<div className="cd"><div className="cd-t">📍 Top 20 Regionen</div><table><thead><tr><th>#</th><th>PLZ</th><th>Leads</th><th>Pipeline</th><th>Rekl.</th><th>%</th><th></th></tr></thead><tbody>{Object.entries(an.byPlz).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([p,c],i)=>{
                const mx=Math.max(...Object.values(an.byPlz));
                const plzLeads=fL.filter(l=>(l.plz||'').startsWith(p.replace('xxx','')));
                const plzPipe=plzLeads.filter(l=>ST_PIPE.includes(l.status_name)).length;
                const plzRekl=plzLeads.filter(l=>l.status_name==='REKLAMATION').length;
                return<tr key={p}><td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td><td style={{fontWeight:600,fontFamily:'monospace'}}>{p}</td><td style={{fontWeight:700,color:'var(--bl)'}}>{fm(c)}</td><td style={{color:'var(--g)',fontWeight:600}}>{plzPipe}</td><td style={{color:'var(--pk)',fontWeight:600}}>{plzRekl}</td><td style={{color:'var(--td)'}}>{pct(c,an.t)}%</td><td style={{width:'25%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/mx*100}%`,background:'var(--bl)'}}/></div></td></tr>
            })}</tbody></table></div>}

            <div style={{textAlign:'center',padding:'16px 0',fontSize:11,color:'#3a4a6a'}}>Letzte Sync: {leads[0]?.sync_am?new Date(leads[0].sync_am).toLocaleString('de-DE'):'—'} · {fm(an.t)} Leads · {Object.keys(an.byBerater).length-1} Berater</div>
        </div>
    </React.Fragment>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
