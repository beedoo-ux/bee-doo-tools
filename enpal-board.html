<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>bee-doo · Enpal Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--sf:#111827;--el:#1a2236;--el2:#222d45;--a:#F5C500;--g:#22c55e;--r:#ef4444;--o:#f59e0b;--bl:#3b82f6;--cy:#06b6d4;--p:#a855f7;--pk:#ec4899;--tb:#e2e8f0;--td:#8896b3;--brd:#1e293b}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tb);min-height:100vh;-webkit-font-smoothing:antialiased}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--sf);border-bottom:2px solid var(--a)}
.hdr img{height:28px;filter:brightness(0) invert(1)}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-l span{font-size:13px;font-weight:700;color:var(--a);text-transform:uppercase;letter-spacing:1.5px}
.hdr-r{display:flex;gap:10px}
.hdr-lk{color:var(--td);text-decoration:none;font-size:12px;font-weight:600;padding:6px 12px;border-radius:6px;background:var(--el);transition:.2s}
.hdr-lk:hover{color:var(--a);background:var(--el2)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.badge-enpal{background:#f97316;color:#fff}
.badge-wp{background:#8b5cf6;color:#fff}
.badge-live{background:var(--g);color:#000;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.nav{display:flex;gap:4px;padding:8px 16px;background:var(--sf);overflow-x:auto;border-bottom:1px solid var(--brd)}
.nav-i{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--td);transition:.2s;white-space:nowrap}
.nav-i:hover{color:var(--tb);background:var(--el)}
.nav-i.on{color:var(--a);background:var(--el2)}
.main{max-width:1400px;margin:0 auto;padding:16px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--el);border-radius:10px;padding:14px 16px;border:1px solid var(--brd)}
.kpi-l{font-size:11px;font-weight:600;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-v{font-size:26px;font-weight:800}
.kpi-s{font-size:11px;margin-top:2px}
.cd{background:var(--el);border-radius:10px;padding:16px;border:1px solid var(--brd)}
.cd-t{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--tb)}
.fi{animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sub-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.sub-tab{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;color:var(--td);cursor:pointer;background:var(--el);transition:.2s}
.sub-tab:hover{color:var(--tb)}
.sub-tab.on{color:var(--a);background:var(--el2);border:1px solid var(--a)33}
.mt{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.mt thead th{text-align:left;padding:8px 10px;color:var(--td);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--el)}
.mt tbody td{padding:7px 10px;border-bottom:1px solid var(--brd)22}
.mt tbody tr:hover{background:var(--el2)44}
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.funnel-label{min-width:140px;font-size:12px;font-weight:600;color:var(--td);text-align:right}
.funnel-bar{height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;min-width:40px;text-shadow:0 1px 2px #0004}
.funnel-pct{font-size:11px;color:var(--td);min-width:50px}
.bar-h{height:6px;background:var(--el2);border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:width .4s}
.stat-box{background:var(--el2);border-radius:8px;padding:12px;text-align:center}
.stat-box-v{font-size:28px;font-weight:800}
.stat-box-l{font-size:10px;font-weight:600;color:var(--td);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
.tg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.tg-g{background:#22c55e22;color:#22c55e}
.tg-r{background:#ef444422;color:#ef4444}
.tg-o{background:#f59e0b22;color:#f59e0b}
.tg-b{background:#3b82f622;color:#3b82f6}
.tg-p{background:#a855f722;color:#a855f7}
.tg-pk{background:#ec489922;color:#ec4899}
.search-box{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-box input,.search-box select{background:var(--el2);border:1px solid var(--brd);color:var(--tb);padding:8px 12px;border-radius:6px;font-size:12px;font-family:inherit;outline:none;transition:.2s}
.search-box input:focus,.search-box select:focus{border-color:var(--a)}
.search-box input{flex:1;min-width:200px}
@media(max-width:768px){.g2{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.funnel-label{min-width:90px;font-size:10px}table{display:block;overflow-x:auto}.hdr{padding:10px 14px}.main{padding:10px}}
@media(max-width:480px){.kpis{grid-template-columns:1fr 1fr}.kpi-v{font-size:20px}.nav-i{padding:6px 10px;font-size:12px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback}=React;
const SB='https://hqzpemfaljxcysyqssng.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const hd=()=>({apikey:AK,Authorization:`Bearer ${AK}`});
const fm=v=>typeof v==='number'?v.toLocaleString('de-DE'):v;
const pct=(a,b)=>b>0?(a/b*100).toFixed(1):'0';
const fmDate=d=>{if(!d)return'—';try{return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'})}catch{return'—'}};

// Status classification
const S_OK=['Terminiert','Angebot erstellt','Angebot angenommen','AB erstellt','Interessiert - Zugewiesen'];
const S_WVL=['WVL','Neuer Lead'];
const S_DEAD=['REKLAMATION','5x NICHT ERREICHT','nicht erreicht','Nicht im PLZ-Gebiet','Kein Interesse','An Wettbewerber verloren','Kunde zu alt','Möchte Haus verkaufen','Telefonnummer falsch','Später als 1 Jahr geplant','Verbrauch unter 3000 kWh','T.n.M. Dach zu klein','15 Kontaktversuche'];
const statusCat=s=>{if(!s)return'unknown';if(S_OK.includes(s))return'hot';if(S_WVL.includes(s))return'warm';if(S_DEAD.includes(s))return'cold';return'unknown'};
const statusColor=s=>{const c=statusCat(s);return c==='hot'?'var(--g)':c==='warm'?'var(--o)':c==='cold'?'var(--r)':'var(--td)'};
const statusIcon=s=>{const c=statusCat(s);return c==='hot'?'🟢':c==='warm'?'🟡':c==='cold'?'🔴':'⚪'};

async function loadAll(){
    const r=await fetch(`${SB}/rest/v1/enpal_leads?select=*&order=leveto_erstellt_am.desc&limit=5000`,{headers:hd()});
    return r.json();
}

function KPIs({leads}){
    const total=leads.length;
    const hot=leads.filter(l=>statusCat(l.status_name)==='hot').length;
    const warm=leads.filter(l=>statusCat(l.status_name)==='warm').length;
    const cold=leads.filter(l=>statusCat(l.status_name)==='cold').length;
    const withOrder=leads.filter(l=>l.hat_auftrag).length;
    const storno=leads.filter(l=>l.storniert).length;
    const terminiert=leads.filter(l=>l.status_name==='Terminiert').length;
    const angebot=leads.filter(l=>['Angebot erstellt','Angebot angenommen'].includes(l.status_name)).length;
    return<div className="kpis fi">
        <div className="kpi"><div className="kpi-l">Gesamt Leads</div><div className="kpi-v" style={{color:'var(--a)'}}>{fm(total)}</div><div className="kpi-s"><span className="badge badge-live">● Live</span></div></div>
        <div className="kpi"><div className="kpi-l">🟢 Hot (Aktiv)</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(hot)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{pct(hot,total)}%</div></div>
        <div className="kpi"><div className="kpi-l">🟡 Warm (WVL)</div><div className="kpi-v" style={{color:'var(--o)'}}>{fm(warm)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{pct(warm,total)}%</div></div>
        <div className="kpi"><div className="kpi-l">🔴 Kalt / Lost</div><div className="kpi-v" style={{color:'var(--r)'}}>{fm(cold)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{pct(cold,total)}%</div></div>
        <div className="kpi"><div className="kpi-l">📅 Terminiert</div><div className="kpi-v" style={{color:'var(--cy)'}}>{fm(terminiert)}</div><div className="kpi-s" style={{color:'var(--td)'}}>{pct(terminiert,total)}% CR</div></div>
        <div className="kpi"><div className="kpi-l">📝 Angebote</div><div className="kpi-v" style={{color:'var(--bl)'}}>{fm(angebot)}</div></div>
        <div className="kpi"><div className="kpi-l">🏆 Aufträge</div><div className="kpi-v" style={{color:'var(--g)'}}>{fm(withOrder)}</div><div className="kpi-s" style={{color:storno>0?'var(--r)':'var(--td)'}}>{storno} storniert</div></div>
    </div>
}

function Funnel({leads}){
    const total=leads.length;
    const erreicht=leads.filter(l=>!['5x NICHT ERREICHT','nicht erreicht','Neuer Lead','Telefonnummer falsch','15 Kontaktversuche'].includes(l.status_name)).length;
    const terminiert=leads.filter(l=>['Terminiert','Angebot erstellt','Angebot angenommen','AB erstellt'].includes(l.status_name)).length;
    const angebot=leads.filter(l=>['Angebot erstellt','Angebot angenommen','AB erstellt'].includes(l.status_name)).length;
    const auftrag=leads.filter(l=>l.hat_auftrag&&!l.storniert).length;
    const steps=[
        {l:'Leads geliefert',v:total,c:'var(--a)'},
        {l:'Erreicht / Qualifiziert',v:erreicht,c:'var(--bl)'},
        {l:'Termin gelegt',v:terminiert,c:'var(--cy)'},
        {l:'Angebot erstellt',v:angebot,c:'var(--p)'},
        {l:'Auftrag (aktiv)',v:auftrag,c:'var(--g)'}
    ];
    return<div className="cd fi" style={{marginBottom:12}}><div className="cd-t">📊 Conversion Funnel</div>
        <div style={{maxWidth:700}}>{steps.map((s,i)=>{const w=Math.max(s.v/Math.max(total,1)*100,4);return<div key={i} className="funnel-row">
            <span className="funnel-label">{s.l}</span>
            <div className="funnel-bar" style={{width:`${w}%`,background:s.c}}>{fm(s.v)}</div>
            <span className="funnel-pct">{i>0?pct(s.v,total)+'%':''}</span>
        </div>})}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:8,marginTop:14}}>
            <div className="stat-box"><div className="stat-box-v" style={{color:'var(--bl)',fontSize:22}}>{pct(erreicht,total)}%</div><div className="stat-box-l">Erreichbarkeit</div></div>
            <div className="stat-box"><div className="stat-box-v" style={{color:'var(--cy)',fontSize:22}}>{pct(terminiert,total)}%</div><div className="stat-box-l">Lead→Termin</div></div>
            <div className="stat-box"><div className="stat-box-v" style={{color:'var(--p)',fontSize:22}}>{pct(angebot,terminiert)}%</div><div className="stat-box-l">Termin→Angebot</div></div>
            <div className="stat-box"><div className="stat-box-v" style={{color:'var(--g)',fontSize:22}}>{pct(auftrag,total)}%</div><div className="stat-box-l">Lead→Auftrag</div></div>
        </div>
    </div>
}

function StatusBreakdown({leads}){
    const statuses={};
    leads.forEach(l=>{const s=l.status_name||'(leer)';statuses[s]=(statuses[s]||0)+1});
    const sorted=Object.entries(statuses).sort((a,b)=>b[1]-a[1]);
    const max=sorted[0]?sorted[0][1]:1;
    return<div className="cd fi"><div className="cd-t">📋 Status-Verteilung</div>
        <table className="mt"><thead><tr><th></th><th>Status</th><th>Anz.</th><th>%</th><th></th></tr></thead>
        <tbody>{sorted.map(([s,c])=><tr key={s}>
            <td style={{width:24}}>{statusIcon(s)}</td>
            <td style={{color:statusColor(s),fontWeight:600,fontSize:11}}>{s}</td>
            <td style={{fontWeight:700}}>{fm(c)}</td>
            <td style={{color:'var(--td)',fontSize:11}}>{pct(c,leads.length)}%</td>
            <td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/max*100}%`,background:statusColor(s)}}/></div></td>
        </tr>)}</tbody></table>
    </div>
}

function QuellenSplit({leads}){
    const quellen={};
    leads.forEach(l=>{const q=l.quelle||'?';if(!quellen[q])quellen[q]={total:0,hot:0,term:0,auftrag:0};quellen[q].total++;if(statusCat(l.status_name)==='hot')quellen[q].hot++;if(l.status_name==='Terminiert')quellen[q].term++;if(l.hat_auftrag&&!l.storniert)quellen[q].auftrag++});
    return<div className="cd fi"><div className="cd-t">📦 Nach Quelle</div>
        <table className="mt"><thead><tr><th>Quelle</th><th>Leads</th><th>🟢 Hot</th><th>📅 Termin</th><th>🏆 Auftrag</th><th>CR%</th></tr></thead>
        <tbody>{Object.entries(quellen).sort((a,b)=>b[1].total-a[1].total).map(([q,d])=><tr key={q}>
            <td><span className={`badge ${q.includes('WP')?'badge-wp':'badge-enpal'}`}>{q}</span></td>
            <td style={{fontWeight:700}}>{fm(d.total)}</td>
            <td style={{color:'var(--g)'}}>{fm(d.hot)}</td>
            <td style={{color:'var(--cy)'}}>{fm(d.term)}</td>
            <td style={{color:'var(--g)',fontWeight:700}}>{fm(d.auftrag)}</td>
            <td style={{color:'var(--td)'}}>{pct(d.term,d.total)}%</td>
        </tr>)}</tbody></table>
    </div>
}

function Timeline({leads}){
    const months={};
    leads.forEach(l=>{if(!l.leveto_erstellt_am)return;const ym=l.leveto_erstellt_am.substring(0,7);if(!months[ym])months[ym]={total:0,hot:0,cold:0};months[ym].total++;const c=statusCat(l.status_name);if(c==='hot')months[ym].hot++;if(c==='cold')months[ym].cold++});
    const sorted=Object.entries(months).sort().slice(-12);
    const max=Math.max(...sorted.map(([,d])=>d.total),1);
    return<div className="cd fi"><div className="cd-t">📈 Leads / Monat</div>
        <div style={{display:'flex',alignItems:'flex-end',gap:6,height:200,paddingTop:20}}>{sorted.map(([m,d])=>{
            const hH=d.hot/max*160;const cH=d.cold/max*160;const wH=(d.total-d.hot-d.cold)/max*160;
            return<div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                <span style={{fontSize:10,fontWeight:700,color:'var(--a)'}}>{d.total}</span>
                <div style={{width:'100%',maxWidth:55,display:'flex',flexDirection:'column'}}>
                    <div style={{height:hH,background:'var(--g)',borderRadius:'5px 5px 0 0',minHeight:d.hot?2:0}}/>
                    <div style={{height:wH,background:'var(--o)',minHeight:d.total-d.hot-d.cold>0?2:0}}/>
                    <div style={{height:cH,background:'var(--r)',borderRadius:'0 0 3px 3px',minHeight:d.cold?2:0}}/>
                </div>
                <span style={{fontSize:9,color:'var(--td)'}}>{m.split('-')[1]}/{m.split('-')[0].slice(2)}</span>
            </div>})}</div>
        <div style={{display:'flex',gap:14,justifyContent:'center',marginTop:10,fontSize:11}}>
            <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--g)',marginRight:4,verticalAlign:'middle'}}/>Hot</span>
            <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--o)',marginRight:4,verticalAlign:'middle'}}/>Warm</span>
            <span><span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:'var(--r)',marginRight:4,verticalAlign:'middle'}}/>Lost</span>
        </div>
    </div>
}

function PLZMap({leads}){
    const plz={};leads.forEach(l=>{const p=(l.plz||'').substring(0,2);if(p)plz[p+'xxx']=(plz[p+'xxx']||0)+1});
    const sorted=Object.entries(plz).sort((a,b)=>b[1]-a[1]).slice(0,20);
    const max=sorted[0]?sorted[0][1]:1;
    return<div className="cd fi"><div className="cd-t">📍 Regionen (Top 20 PLZ)</div>
        <table className="mt"><thead><tr><th>#</th><th>PLZ</th><th>Leads</th><th>%</th><th></th></tr></thead>
        <tbody>{sorted.map(([p,c],i)=><tr key={p}>
            <td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td>
            <td style={{fontFamily:'monospace',fontWeight:600,color:'var(--tb)'}}>{p}</td>
            <td style={{fontWeight:700,color:'var(--bl)'}}>{fm(c)}</td>
            <td style={{color:'var(--td)'}}>{pct(c,leads.length)}%</td>
            <td style={{width:'35%'}}><div className="bar-h"><div className="bar-f" style={{width:`${c/max*100}%`,background:'var(--bl)'}}/></div></td>
        </tr>)}</tbody></table>
    </div>
}

function LeadTable({leads,isExtern=false}){
    const[search,setSearch]=useState('');
    const[statusFilter,setStatusFilter]=useState('all');
    const[quelleFilter,setQuelleFilter]=useState('all');
    const statuses=[...new Set(leads.map(l=>l.status_name).filter(Boolean))].sort();
    const quellen=[...new Set(leads.map(l=>l.quelle).filter(Boolean))].sort();
    
    const filtered=useMemo(()=>{
        let f=leads;
        if(statusFilter!=='all')f=f.filter(l=>l.status_name===statusFilter);
        if(quelleFilter!=='all')f=f.filter(l=>l.quelle===quelleFilter);
        if(search){const s=search.toLowerCase();f=f.filter(l=>{
            const fields=[l.kunde_vorname,l.kunde_nachname,l.plz,l.ort,l.berater_name,l.status_name,l.auftrag_nr,String(l.leveto_id)];
            return fields.some(f=>(f||'').toLowerCase().includes(s))
        })}
        return f;
    },[leads,search,statusFilter,quelleFilter]);
    
    return<div className="cd fi"><div className="cd-t">📋 Lead-Tabelle ({fm(filtered.length)} von {fm(leads.length)})</div>
        <div className="search-box">
            <input placeholder="🔍 Suche nach Name, PLZ, Berater, AN-Nr..." value={search} onChange={e=>setSearch(e.target.value)}/>
            <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
                <option value="all">Alle Status</option>
                {statuses.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <select value={quelleFilter} onChange={e=>setQuelleFilter(e.target.value)}>
                <option value="all">Alle Quellen</option>
                {quellen.map(q=><option key={q} value={q}>{q}</option>)}
            </select>
        </div>
        <div style={{maxHeight:500,overflowY:'auto'}}>
        <table className="mt"><thead><tr>
            <th></th><th>ID</th>
            {!isExtern&&<th>Kunde</th>}
            <th>PLZ</th><th>Status</th><th>Quelle</th><th>Berater</th><th>Erstellt</th>
            {!isExtern&&<th>Telefon</th>}
            <th>Auftrag</th>
        </tr></thead>
        <tbody>{filtered.slice(0,200).map(l=><tr key={l.leveto_id}>
            <td>{statusIcon(l.status_name)}</td>
            <td style={{fontFamily:'monospace',fontSize:11,color:'var(--td)'}}>{l.leveto_id}</td>
            {!isExtern&&<td style={{fontWeight:600,color:'var(--tb)',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{[l.kunde_vorname,l.kunde_nachname].filter(Boolean).join(' ')||'—'}</td>}
            <td style={{fontFamily:'monospace',fontSize:11}}>{l.plz||''}</td>
            <td><span className={`tg ${statusCat(l.status_name)==='hot'?'tg-g':statusCat(l.status_name)==='warm'?'tg-o':'tg-r'}`}>{l.status_name||'—'}</span></td>
            <td><span className={`badge ${(l.quelle||'').includes('WP')?'badge-wp':'badge-enpal'}`} style={{fontSize:9}}>{l.quelle||'—'}</span></td>
            <td style={{fontSize:11,color:'var(--td)',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.berater_name||'—'}</td>
            <td style={{fontSize:11,color:'var(--td)',whiteSpace:'nowrap'}}>{fmDate(l.leveto_erstellt_am)}</td>
            {!isExtern&&<td style={{fontSize:11,color:'var(--td)',fontFamily:'monospace'}}>{l.telefon||'—'}</td>}
            <td>{l.hat_auftrag?<span className={`tg ${l.storniert?'tg-r':'tg-g'}`}>{l.storniert?'Storno':l.auftrag_nr||'✓'}</span>:'—'}</td>
        </tr>)}</tbody></table>
        </div>
        {filtered.length>200&&<div style={{textAlign:'center',padding:10,color:'var(--td)',fontSize:11}}>Zeige 200 von {fm(filtered.length)} – Filter verfeinern für mehr</div>}
    </div>
}

function BeraterRanking({leads}){
    const berater={};
    leads.forEach(l=>{const b=l.berater_name||'(kein)';if(!berater[b])berater[b]={total:0,hot:0,term:0};berater[b].total++;if(statusCat(l.status_name)==='hot')berater[b].hot++;if(l.status_name==='Terminiert')berater[b].term++});
    const sorted=Object.entries(berater).filter(([b])=>b!=='(kein)').sort((a,b)=>b[1].total-a[1].total);
    const max=sorted[0]?sorted[0][1].total:1;
    return<div className="cd fi"><div className="cd-t">👥 Berater-Zuordnung</div>
        <table className="mt"><thead><tr><th>#</th><th>Berater</th><th>Leads</th><th>🟢 Hot</th><th>📅 Termin</th><th>CR%</th><th></th></tr></thead>
        <tbody>{sorted.slice(0,20).map(([b,d],i)=><tr key={b}>
            <td style={{color:i<3?'var(--a)':'var(--td)',fontWeight:700}}>{i+1}</td>
            <td style={{fontWeight:600,color:'var(--tb)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b}</td>
            <td style={{fontWeight:700}}>{fm(d.total)}</td>
            <td style={{color:'var(--g)'}}>{fm(d.hot)}</td>
            <td style={{color:'var(--cy)'}}>{fm(d.term)}</td>
            <td>{d.total>=5?<span className={`tg ${d.term/d.total>.08?'tg-g':d.term/d.total>.03?'tg-o':'tg-r'}`}>{pct(d.term,d.total)}%</span>:<span style={{color:'var(--td)'}}>—</span>}</td>
            <td style={{width:'20%'}}><div className="bar-h"><div className="bar-f" style={{width:`${d.total/max*100}%`,background:'var(--bl)'}}/></div></td>
        </tr>)}</tbody></table>
    </div>
}

function App(){
    const[leads,setLeads]=useState([]);
    const[loading,setLoading]=useState(true);
    const[sec,setSec]=useState('overview');
    
    useEffect(()=>{loadAll().then(d=>{setLeads(d);setLoading(false)}).catch(e=>{console.error(e);setLoading(false)})},[]);
    
    if(loading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--a)',fontSize:16,fontWeight:700}}>Lade Enpal-Daten...</div>;
    
    const NAV=[{k:'overview',i:'📊',l:'Übersicht'},{k:'funnel',i:'🔄',l:'Funnel'},{k:'status',i:'📋',l:'Status'},{k:'leads',i:'📑',l:'Leads'},{k:'quellen',i:'📦',l:'Quellen'},{k:'berater',i:'👥',l:'Berater'},{k:'timeline',i:'📈',l:'Timeline'},{k:'regionen',i:'📍',l:'Regionen'}];
    
    return<React.Fragment>
        <div className="hdr"><div className="hdr-l"><img src="https://bee-doo-tools.vercel.app/Logo%20bee-doo%20Schriftzug.svg" alt=""/><span>Enpal Board</span><span className="badge badge-enpal">Intern</span></div><div className="hdr-r"><a className="hdr-lk" href="dashboard.html">Dashboard</a><a className="hdr-lk" href="index.html">Toolbox</a></div></div>
        <nav className="nav">{NAV.map(n=><div key={n.k} className={`nav-i ${sec===n.k?'on':''}`} onClick={()=>setSec(n.k)}><span>{n.i}</span><span>{n.l}</span></div>)}</nav>
        <main className="main">
            <KPIs leads={leads}/>
            {sec==='overview'&&<React.Fragment><Funnel leads={leads}/><div className="g2"><StatusBreakdown leads={leads}/><QuellenSplit leads={leads}/></div></React.Fragment>}
            {sec==='funnel'&&<Funnel leads={leads}/>}
            {sec==='status'&&<StatusBreakdown leads={leads}/>}
            {sec==='leads'&&<LeadTable leads={leads}/>}
            {sec==='quellen'&&<QuellenSplit leads={leads}/>}
            {sec==='berater'&&<BeraterRanking leads={leads}/>}
            {sec==='timeline'&&<Timeline leads={leads}/>}
            {sec==='regionen'&&<PLZMap leads={leads}/>}
        </main>
    </React.Fragment>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
