name: bee-doo Sync Crons

on:
  schedule:
    # Leveto Leads + Contracts Sync - alle 10 Minuten
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      sync:
        description: 'Specific sync to run (leave empty for all due)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Leveto Sync
        run: |
          SYNC_PARAM="${{ github.event.inputs.sync }}"
          URL="https://bee-doo-tools.vercel.app/api/cron-sync"
          if [ -n "$SYNC_PARAM" ]; then
            URL="${URL}?sync=${SYNC_PARAM}"
          fi
          echo "Calling: $URL"
          RESULT=$(curl -sf -m 120 "$URL" -H "Authorization: Bearer manual")
          echo "$RESULT" | python3 -m json.tool
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          ran = d.get('ran', 0)
          print('Ran: {} syncs'.format(ran))
          for r in d.get('results', []):
              status = 'OK' if r.get('success') else 'FAIL'
              key = r.get('sync_key', '?')
              ms = r.get('duration_ms', 0)
              synced = r.get('synced', '')
              err = r.get('error', '')
              print('  {} {} - {}ms'.format(status, key, ms))
              if synced: print('     Synced: {} records'.format(synced))
              if err: print('     Error: {}'.format(err))
          "
