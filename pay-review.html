<!-- bee-doo PAY — Regelwerk Review | Stand: 07.03.2026 -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bee-doo PAY | Regelwerk Review</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--s1:#0d1117;--s2:#161b22;--s3:#21262d;--bd:#30363d;--tx:#e6edf3;--ts:#8b949e;--y:#F5C500;--g:#34d399;--r:#f87171;--b:#60a5fa;--o:#fb923c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:20px}
.wrap{max-width:900px;margin:0 auto}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:22px;font-weight:800;margin-bottom:4px}
.header h1 span{color:var(--y)}
.header p{font-size:12px;color:var(--ts);max-width:600px;margin:8px auto 0;line-height:1.6}
.reviewer-bar{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px;text-align:center;margin-bottom:24px}
.reviewer-bar button{background:var(--s3);border:1.5px solid var(--bd);border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;color:var(--ts);cursor:pointer;margin:0 4px;font-family:inherit;transition:all .15s}
.reviewer-bar button.active{background:var(--y)22;border-color:var(--y);color:var(--y)}
.progress{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px 18px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.progress-bar{width:120px;height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--g);border-radius:4px;transition:width .3s}
.section{margin-bottom:32px}
.section h2{font-size:18px;font-weight:800;margin-bottom:4px}
.section .sub{font-size:12px;color:var(--ts);margin-bottom:16px}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:12px;transition:border-color .2s}
.card.confirmed{border-color:var(--g)66}
.card.changed{border-color:var(--r)66}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.card-title{font-size:16px;font-weight:700}
.card-sub{font-size:11px;color:var(--ts);margin-top:2px}
.btn-group{display:flex;gap:6px;flex-shrink:0}
.btn-ok,.btn-change{border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:transparent;color:var(--ts);font-family:inherit;transition:all .15s}
.btn-ok.active{background:#34d39930;border-color:#34d399;color:#34d399}
.btn-change.active{background:#f8717130;border-color:#f87171;color:#f87171}
.grid{display:grid;gap:10px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-4{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
.val-box{background:var(--s1);border-radius:8px;padding:10px 14px;border:1px solid var(--bd)40}
.val-label{font-size:10px;color:var(--ts);font-weight:600;text-transform:uppercase;margin-bottom:4px}
.val-num{font-size:20px;font-weight:800}
.val-num.green{color:var(--g)}
.staffel-row{display:flex;gap:12px;margin-bottom:12px}
.staffel-box{flex:1;border-radius:8px;padding:12px 16px}
.staffel-basis{background:var(--s1);border:1px solid var(--bd)40}
.staffel-up{background:#34d39908;border:1px solid #34d39925}
.bonus-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.bonus-item{background:var(--s1);border-radius:6px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bd)30;font-size:12px}
.bonus-val{font-weight:700;color:var(--y)}
.info-box{border-radius:8px;padding:10px 14px;margin-top:8px;font-size:13px}
.info-storno{background:#f8717108;border:1px solid #f8717120}
.info-stufen{background:#34d39908;border:1px solid #34d39920}
.info-sg{background:#fb923c08;border:1px solid #fb923c20}
.info-title{font-size:11px;font-weight:700;margin-bottom:4px}
.note-box{margin-top:8px;display:none}
.note-box.visible{display:block}
.note-box textarea{width:100%;background:var(--s1);border:1px solid var(--r)44;border-radius:8px;color:var(--tx);padding:8px 12px;font-size:12px;min-height:60px;resize:vertical;font-family:inherit}
.regel-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:8px}
.regel-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.regel-name{font-weight:700;font-size:14px}
.regel-betrag{font-size:16px;font-weight:800;color:var(--y)}
.regel-desc{font-size:12px;color:var(--ts);margin-top:4px;line-height:1.5}
.tag{font-size:11px;font-weight:600;padding:2px 10px;border-radius:6px;display:inline-block;margin-right:4px}
.submit-box{background:var(--s2);border:1px solid var(--y)33;border-radius:12px;padding:24px;text-align:center}
.submit-btn{background:var(--s3);color:var(--ts);border:none;border-radius:10px;padding:12px 32px;font-size:15px;font-weight:700;cursor:not-allowed;font-family:inherit;transition:all .2s}
.submit-btn.ready{background:var(--y);color:#000;cursor:pointer}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px}
.loading .icon{font-size:48px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@media(max-width:600px){.staffel-row{flex-direction:column}.grid-2{grid-template-columns:1fr}.grid-4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="loading" id="loading"><div class="icon">💰</div><div style="color:var(--ts)">Lade Regelwerk...</div></div>
  <div id="app" style="display:none"></div>
</div>
<script>
const SB="https://hqzpemfaljxcysyqssng.supabase.co/rest/v1";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik";
const H={apikey:SK,Authorization:"Bearer "+SK};
const eur=v=>v==null?"–":Number(v).toLocaleString("de-DE",{minimumFractionDigits:0,maximumFractionDigits:0})+" €";

let state={reviewer:"",feedback:{},matrix:[],regeln:[]};

async function load(){
  try{
    const[mx,mr]=await Promise.all([
      fetch(SB+"/provisions_matrix?aktiv=eq.true&order=sortierung",{headers:H}).then(r=>r.json()),
      fetch(SB+"/pay_mitarbeiter_regeln?aktiv=eq.true&order=typ,mitarbeiter_name",{headers:H}).then(r=>r.json())
    ]);
    state.matrix=mx;state.regeln=mr;
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
    render();
  }catch(e){
    document.getElementById("loading").innerHTML='<div style="color:var(--r);font-size:14px">Fehler: '+e.message+'</div>';
  }
}

function setFB(key,status){state.feedback[key]={...state.feedback[key],status};render();}
function setNote(key,note){state.feedback[key]={...state.feedback[key],note};}

function statusBtns(key){
  const st=state.feedback[key]?.status||"";
  return '<div class="btn-group">'+
    '<button class="btn-ok '+(st==="ok"?"active":"")+'" onclick="setFB(\''+key+'\',\'ok\')">✓ Passt</button>'+
    '<button class="btn-change '+(st==="change"?"active":"")+'" onclick="setFB(\''+key+'\',\'change\')">✎ Ändern</button>'+
  '</div>';
}

function noteBox(key){
  const st=state.feedback[key]?.status||"";
  return '<div class="note-box '+(st==="change"?"visible":"")+'"><textarea placeholder="Was soll geändert werden?" oninput="setNote(\''+key+'\',this.value)">'+(state.feedback[key]?.note||"")+'</textarea></div>';
}

function renderMatrix(mx){
  const k="mx_"+mx.typ;const st=state.feedback[k]?.status||"";
  const isS=mx.kategorie==="scout";const stufen=mx.stufenbonus||[];
  let html='<div class="card '+(st==="ok"?"confirmed":st==="change"?"changed":"")+'">';
  html+='<div class="card-head"><div><div class="card-title" style="color:'+mx.color+'">'+mx.label+'</div><div class="card-sub">Gilt für: '+(mx.typ_mapping||[]).join(", ")+'</div></div>'+statusBtns(k)+'</div>';
  
  if(isS){
    html+='<div style="font-size:12px;color:var(--ts);margin-bottom:10px;line-height:1.5">'+(mx.typ==="scout_angestellt"?'Angestellte Scouts bekommen ein Fixgehalt plus variable Vergütung pro Lead, wahrgenommenem Termin und verkaufter Anlage. Termin "gebucht" wird nicht vergütet — erst wenn der Termin tatsächlich stattgefunden hat.':'HGB-Scouts haben kein Fixgehalt und bekommen nur Provision für wahrgenommene Termine (100€) und verkaufte Anlagen (200€). Kein Storno-Abzug.')+'</div>';
    html+='<div class="grid grid-4">';
    [{l:"Fixgehalt/Monat",v:mx.fix_gehalt},{l:"Pro Lead",v:mx.pro_lead},{l:"Termin gebucht",v:mx.pro_termin_gebucht},{l:"Termin wahrgenommen",v:mx.pro_termin_wahrgenommen},{l:"Pro Anlage (Sale)",v:mx.pro_anlage}].forEach(f=>{
      html+='<div class="val-box"><div class="val-label">'+f.l+'</div><div class="val-num" style="color:'+(Number(f.v)>0?"var(--tx)":"var(--ts)")+'">'+eur(f.v)+'</div></div>';
    });
    html+='</div>';
  }else{
    html+='<div class="staffel-row"><div class="staffel-box staffel-basis"><div class="val-label">Basis (Anlage 1–'+(Number(mx.staffel_ab)-1)+')</div><div class="val-num" style="font-size:26px">'+eur(mx.basis_pro_anlage)+'</div></div>';
    html+='<div class="staffel-box staffel-up"><div class="val-label" style="color:var(--g)">Staffel (ab '+mx.staffel_ab+', rückwirkend)</div><div class="val-num green" style="font-size:26px">'+eur(mx.staffel_pro_anlage)+'</div></div></div>';
    html+='<div class="bonus-grid">';
    [{l:"Eigenlead",v:mx.bonus_eigenlead},{l:"Empfehlung",v:mx.bonus_empfehlung},{l:"Speicher",v:mx.bonus_speicher},{l:"Zero%",v:mx.bonus_zero_prozent}].forEach(b=>{
      html+='<div class="bonus-item"><span style="color:var(--ts)">'+b.l+'</span><span class="bonus-val">+'+eur(b.v)+'</span></div>';
    });
    html+='</div>';
    if(stufen.length){html+='<div class="info-box info-stufen"><div class="info-title" style="color:var(--g)">🏆 Stufenbonus</div>';stufen.forEach(s=>{html+='<span style="margin-right:16px">≥'+s.ab+' Anlagen = <b style="color:var(--g)">'+eur(s.betrag)+'</b></span>';});html+='</div>';}
    if(Number(mx.systemgebuehr_prozent)>0){html+='<div class="info-box info-sg"><div class="info-title" style="color:var(--o)">💳 Systemgebühr (nur HGB)</div>bee-doo stellt jedem HGB-Vertriebler eine Systemgebühr in Rechnung: '+mx.systemgebuehr_prozent+'% der Netto-Provision, maximal '+eur(mx.systemgebuehr_max_netto)+' netto + '+mx.systemgebuehr_ust_satz+'% USt. Wird automatisch von der Auszahlung abgezogen.</div>';}
  }
  
  html+='<div class="info-box info-storno"><div class="info-title" style="color:var(--r)">Storno-Logik</div>'+(mx.storno_dynamisch?'<b>Dynamisch:</b> Wenn ein Auftrag storniert wird, wird genau der Betrag wieder abgezogen, den der Berater dafür bekommen hat (inkl. aller Boni). Beispiel: Berater hat 1.700€ + 800€ Eigenlead bekommen → bei Storno werden 2.500€ abgezogen.':'Fester Betrag: '+eur(mx.storno_rueckbuchung)+' pro Storno')+' · Widerrufsfrist: '+mx.storno_frist_tage+' Tage · Nach abgeschlossener Montage: '+(mx.storno_nach_montage?"Storno möglich":"Kein Storno mehr")+'</div>';
  html+=noteBox(k)+'</div>';
  return html;
}

function render(){
  const mx=state.matrix;const mr=state.regeln;
  const allKeys=[...mx.map(m=>"mx_"+m.typ),...mr.filter(r=>!["sperrliste","vorschuss"].includes(r.typ)).map(r=>"mr_"+r.id)];
  const confirmed=allKeys.filter(k=>state.feedback[k]?.status==="ok").length;
  const changes=allKeys.filter(k=>state.feedback[k]?.status==="change").length;
  const total=allKeys.length;
  const pct=total?Math.round((confirmed+changes)/total*100):0;
  
  const typLabels={flat_rate:"Flat-Rate",scout_eigenlead:"Scout-Eigenlead",scout_umleitung:"Scout-Umleitung",skip_abrechnung:"Skip",team_bonus:"Team-Bonus"};
  const typColors={flat_rate:"var(--y)",scout_eigenlead:"var(--g)",scout_umleitung:"var(--b)",skip_abrechnung:"var(--r)",team_bonus:"#2dd4bf"};
  
  let html='<div class="header"><h1>bee-doo <span>PAY</span></h1><p style="font-size:14px;color:var(--ts)">Regelwerk Review · Stand 07.03.2026</p><p>Wir stellen die Provisionsabrechnung auf ein neues System um. Alle Regeln, die ihr hier seht, werden ab sofort für die automatische Berechnung der Gutschriften verwendet. Bitte prüft jeden Punkt und klickt auf <span style="color:var(--g);font-weight:600">✓ Passt</span> wenn alles korrekt ist, oder auf <span style="color:var(--r);font-weight:600">✎ Ändern</span> wenn etwas angepasst werden muss — dann könnt ihr dazuschreiben was geändert werden soll.</p></div>';
  
  // Reviewer
  html+='<div class="reviewer-bar"><div style="font-size:13px;color:var(--ts);margin-bottom:8px">Wer prüft?</div>';
  ["Olaf Schader","Patrick Windolph","Patrick Grabowski"].forEach(n=>{
    html+='<button class="'+(state.reviewer===n?"active":"")+'" onclick="state.reviewer=\''+n+'\';render()">'+n+'</button>';
  });
  html+='</div>';
  
  // Progress
  html+='<div class="progress"><div><span style="font-weight:700;color:var(--g)">'+confirmed+' bestätigt</span>'+(changes>0?'<span style="color:var(--r);margin-left:12px;font-weight:600">'+changes+' Änderungen</span>':'')+'<span style="color:var(--ts);margin-left:12px">'+(total-confirmed-changes)+' offen</span></div>';
  html+='<div style="display:flex;align-items:center;gap:12px"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><span style="font-size:12px;font-weight:700;color:'+(pct===100?"var(--g)":"var(--ts)")+'">'+pct+'%</span></div></div>';
  
  // Matrix
  html+='<div class="section"><h2>📋 Provisionsmodelle</h2><div class="sub">5 Modelle — gelten für alle Mitarbeiter je nach Typ</div>';
  html+='<div style="background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:16px;font-size:12px;color:var(--ts);line-height:1.7"><b style="color:var(--tx)">So funktioniert es:</b> Jeder Mitarbeiter ist einem Typ zugeordnet (z.B. "HGB Vertriebler" oder "Angestellt Scout"). Das System schaut automatisch, welches Modell für den jeweiligen Typ gilt, und berechnet die Provision danach.<br><br><b style="color:var(--y)">Staffel-Logik:</b> Erreicht ein Berater die Staffel-Schwelle (z.B. 8 Anlagen im Monat), bekommt er den höheren Satz — und zwar rückwirkend auf ALLE Anlagen des Monats, nicht nur ab der 8. Anlage.<br><br><b style="color:var(--y)">Boni:</b> Eigenleads (selbst generiert), Empfehlungen, Speicher-Erweiterungen und Zero%-Finanzierungen werden zusätzlich zur Basis-Provision vergütet.</div>';
  mx.forEach(m=>{html+=renderMatrix(m);});
  html+='</div>';
  
  // Individuelle Regeln
  const groups={};mr.filter(r=>!["sperrliste","vorschuss"].includes(r.typ)).forEach(r=>{(groups[r.typ]=groups[r.typ]||[]).push(r);});
  html+='<div class="section"><h2>⭐ Individuelle Regeln</h2><div class="sub">Pro Mitarbeiter — Flat-Rates, Scout-Eigenleads, Team-Boni, Umleitungen</div>';
  html+='<div style="background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:16px;font-size:12px;color:var(--ts);line-height:1.7"><b style="color:var(--tx)">Was sind individuelle Regeln?</b> Manche Mitarbeiter haben Sondervereinbarungen, die von den Standard-Modellen abweichen:<br><br><b style="color:var(--y)">Flat-Rate:</b> Statt der normalen Staffel bekommt der Berater einen festen Betrag pro Anlage — egal wie viele er verkauft. Bsp: Christoph Held bekommt immer 3.000€/Anlage statt 1.400/1.700€.<br><br><b style="color:var(--g)">Scout-Eigenlead:</b> Wenn ein bestimmter Scout den Lead gebracht hat, bekommt der zugeordnete Vertriebler einen Extra-Bonus von 800€. Das ist eine individuelle Zuordnung Scout → Vertriebler.<br><br><b style="color:#2dd4bf">Team-Bonus:</b> Teamleiter bekommen einen Bonus pro Sale ihrer Team-Mitglieder. Christoph z.B. 200€ pro Sale aller VTs, Tayfun 300€ pro Sale seines Teams.<br><br><b style="color:var(--b)">Scout-Umleitung:</b> Die Provision eines Beraters wird auf eine andere Person umgeleitet (z.B. Kalinowski → Dagmar Schmitz).<br><br><b style="color:var(--r)">Skip:</b> Für diesen Mitarbeiter wird keine Abrechnung erstellt.</div>';
  Object.entries(groups).forEach(([typ,items])=>{
    const col=typColors[typ]||"var(--ts)";
    html+='<div style="margin-bottom:16px"><div style="margin-bottom:8px"><span class="tag" style="background:'+col+'18;color:'+col+'">'+(typLabels[typ]||typ)+'</span><span style="font-size:12px;color:var(--ts)">'+items.length+' Einträge</span></div>';
    items.forEach(r=>{
      const k="mr_"+r.id;const st=state.feedback[k]?.status||"";
      const cfg=r.config||{};
      const desc=cfg.regel||cfg.beschreibung||(cfg.bezugsgruppe==="alle_vt"?"Pro Sale ALLER Vertriebler":cfg.bezugsgruppe==="eigenes_team"?"Pro Sale eigenes Team: "+(cfg.team_mitglieder||[]).join(", "):"");
      html+='<div class="regel-card '+(st==="ok"?"confirmed":st==="change"?"changed":"")+'">';
      html+='<div class="regel-head"><div style="flex:1;min-width:200px"><span class="regel-name">'+r.mitarbeiter_name+'</span>'+(Number(r.betrag)?'<span class="regel-betrag" style="margin-left:12px">'+eur(r.betrag)+'</span>':'')+'<div class="regel-desc">'+desc+'</div>'+(r.gueltig_ab?'<div style="font-size:10px;color:var(--ts);margin-top:4px">Gültig ab: '+r.gueltig_ab+(r.gueltig_bis?" bis "+r.gueltig_bis:"")+'</div>':'')+'</div>'+statusBtns(k)+'</div>';
      html+=noteBox(k)+'</div>';
    });
    html+='</div>';
  });
  html+='</div>';
  
  // Sperrlisten
  const sperren=mr.filter(r=>r.typ==="sperrliste");
  if(sperren.length){
    html+='<div class="section"><h2>🔒 Sperrlisten</h2><div class="sub">Gesperrte Aufträge — werden nicht provisioniert</div>';
    html+='<div style="background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:16px;font-size:12px;color:var(--ts);line-height:1.7"><b style="color:var(--tx)">Was bedeutet das?</b> Diese Aufträge sind gesperrt und werden bei der Provisionsberechnung übersprungen — meistens wegen offener Grundbuchprüfung (EFS meldet LAND_REGISTRY_CHECK). Sobald die Prüfung abgeschlossen ist, kann die Sperre aufgehoben werden.</div>';
    html+='<div class="card"><div style="display:grid;gap:6px">';
    sperren.forEach(r=>{const c=r.config||{};html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)20;font-size:13px"><div><span style="font-weight:600;color:var(--r)">'+c.auftrag_nr+'</span> — '+c.kunde_name+' <span style="font-size:11px;color:var(--ts)">('+c.grund+')</span></div></div>';});
    html+='</div></div></div>';
  }
  
  // Submit
  const canSubmit=state.reviewer&&(confirmed+changes)>0;
  html+='<div class="submit-box"><div style="font-size:16px;font-weight:700;margin-bottom:8px">Review abschließen</div>';
  html+='<div style="font-size:13px;color:var(--ts);margin-bottom:16px">'+(confirmed+changes)+' von '+total+' bearbeitet'+(!state.reviewer?" — bitte oben Name wählen":"")+'</div>';
  html+='<button class="submit-btn '+(canSubmit?"ready":"")+'" onclick="'+(canSubmit?"submitReview()":"")+'">'+(!state.reviewer?"Bitte Namen auswählen":confirmed+changes===0?"Mindestens 1 Punkt bewerten":"✓ Review abschicken")+'</button></div>';
  
  document.getElementById("app").innerHTML=html;
}

function submitReview(){
  const data={reviewer:state.reviewer,timestamp:new Date().toISOString(),feedback:state.feedback};
  // Simple: show success
  document.getElementById("app").innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:64px;margin-bottom:16px">✅</div><div style="font-size:22px;font-weight:800;color:var(--g)">Review abgeschickt!</div><div style="font-size:14px;color:var(--ts);margin-top:8px;max-width:400px;margin-left:auto;margin-right:auto">'+Object.values(state.feedback).filter(f=>f.status==="ok").length+' bestätigt, '+Object.values(state.feedback).filter(f=>f.status==="change").length+' Änderungswünsche von '+state.reviewer+'.</div><div style="margin-top:24px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px;text-align:left;font-size:12px;max-width:500px;margin-left:auto;margin-right:auto"><div style="font-weight:700;margin-bottom:8px">Änderungswünsche:</div>'+Object.entries(state.feedback).filter(([k,v])=>v.status==="change"&&v.note).map(([k,v])=>'<div style="margin-bottom:6px;padding:6px 0;border-bottom:1px solid var(--bd)20"><span style="color:var(--r);font-weight:600">'+k+'</span>: '+v.note+'</div>').join("")+'</div></div>';
}

load();
</script>
