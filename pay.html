<style>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback}=React;
const SB='https://hqzpemfaljxcysyqssng.supabase.co/rest/v1';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const H={apikey:SK,Authorization:`Bearer ${SK}`};
const fmt=n=>new Intl.NumberFormat('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const fmtE=n=>fmt(n)+'\u00a0€';
const fmtE0=n=>(n||0).toLocaleString('de-DE')+'€';
const sbG=async(t,q='')=>{const r=await fetch(`${SB}/${t}?${q}`,{headers:H});return r.json();};
const sbGAll=async(t,q='')=>{let all=[],off=0;while(true){const d=await sbG(t,`${q}&offset=${off}&limit=1000`);all=[...all,...d];if(d.length<1000)break;off+=1000;}return all;};

// Month helpers
const getMonths=()=>{const now=new Date(),ms=[];for(let i=0;i<18;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);ms.push({key:`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`,label:d.toLocaleString('de-DE',{month:'long',year:'numeric'})});}return ms;};
const getRange=mk=>{const[y,m]=mk.split('/').map(Number);const e=new Date(y,m,0);return{s:`${y}-${String(m).padStart(2,'0')}-01`,e:`${y}-${String(m).padStart(2,'0')}-${String(e.getDate()).padStart(2,'0')}`};};
const gK=name=>{const p=name.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();};

// Resolve mitarbeiter.typ → matrix row
function resolveMatrix(maTyp, matrixRows){
  for(const mx of matrixRows){
    if((mx.typ_mapping||[]).includes(maTyp)) return mx;
  }
  return matrixRows[0]; // fallback
}

// Calculate provision for a single person
function calcProvision(ma, auftraege, mx, sonderRegeln){
  if(!mx) return{name:`${ma.vorname} ${ma.nachname}`,total:0,details:[],anlagen:0,stornos:0};
  const name=`${ma.vorname} ${ma.nachname}`;
  const aktiv=auftraege.filter(a=>!a.storniert);
  const stornos=auftraege.filter(a=>a.storniert);
  const n=aktiv.length, ns=stornos.length;
  
  // Check for Sonderprovision: flat_rate overrides everything
  const sonder=sonderRegeln.filter(s=>s.mitarbeiter_id===ma.id&&s.aktiv);
  const flatRate=sonder.find(s=>s.typ==='flat_rate');
  const skipAbr=sonder.find(s=>s.typ==='skip_abrechnung');
  if(skipAbr) return{name,total:0,details:[{label:'Abrechnung übersprungen',b:0}],anlagen:n,stornos:ns,skip:true,maId:ma.id,typ:mx.typ};
  
  const details=[];
  let total=0;
  
  if(mx.kategorie==='scout'){
    const fix=Number(mx.fix_gehalt||0);
    if(fix){details.push({label:'Fixgehalt',b:fix});total+=fix;}
    const anlP=n*Number(mx.pro_anlage||0);
    details.push({label:`${n} Anlagen × ${fmtE0(mx.pro_anlage)}`,b:anlP});total+=anlP;
    if(ns&&Number(mx.storno_rueckbuchung)){const sP=ns*Number(mx.storno_rueckbuchung);details.push({label:`${ns} Stornos × ${fmtE0(mx.storno_rueckbuchung)}`,b:sP});total+=sP;}
    return{name,typ:mx.typ,anlagen:n,stornos:ns,total,details,maId:ma.id,hgb:mx.typ.includes('hgb'),kuerzel:ma.kuerzel};
  }
  
  // Vertrieb
  const useFlat=!!flatRate;
  const flatBetrag=useFlat?Number(flatRate.betrag):0;
  const rate=useFlat?flatBetrag:(n>=Number(mx.staffel_ab)?Number(mx.staffel_pro_anlage):Number(mx.basis_pro_anlage));
  const staffelErreicht=!useFlat&&n>=Number(mx.staffel_ab);
  const bP=n*rate;
  const tag=useFlat?' (Flat)':staffelErreicht?' (Staffel)':'';
  details.push({label:`${n} Anlagen × ${fmtE0(rate)}${tag}`,b:bP});total+=bP;
  
  // Boni (skip if flat says no eigenlead etc)
  const flatDesc=(flatRate?.beschreibung||'').toLowerCase();
  const noEL=flatDesc.includes('kein eigenlead');
  const noEM=flatDesc.includes('kein empfehlung');
  
  const el=aktiv.filter(a=>(a.lead_quelle||'').toLowerCase().includes('eigenlead')).length;
  const em=aktiv.filter(a=>(a.lead_quelle||'').toLowerCase().includes('empfehlung')).length;
  const sp=aktiv.filter(a=>a.speichererweiterung).length;
  
  if(el&&!noEL&&Number(mx.bonus_eigenlead)){const p=el*Number(mx.bonus_eigenlead);details.push({label:`${el} Eigenleads × ${fmtE0(mx.bonus_eigenlead)}`,b:p});total+=p;}
  if(em&&!noEM&&Number(mx.bonus_empfehlung)){const p=em*Number(mx.bonus_empfehlung);details.push({label:`${em} Empfehlungen × ${fmtE0(mx.bonus_empfehlung)}`,b:p});total+=p;}
  if(sp&&Number(mx.bonus_speicher)){const p=sp*Number(mx.bonus_speicher);details.push({label:`${sp} Speicher × ${fmtE0(mx.bonus_speicher)}`,b:p});total+=p;}
  
  // Scout-Eigenlead Sonder
  const scEL=sonder.filter(s=>s.typ==='scout_eigenlead');
  scEL.forEach(s=>{
    try{const d=JSON.parse(s.beschreibung);const cnt=aktiv.filter(a=>a.scouter_id===d.scout_id).length;if(cnt){const p=cnt*Number(s.betrag);details.push({label:`${cnt}× Scout-EL (${d.scout_name}) ${fmtE0(s.betrag)}`,b:p});total+=p;}}catch(e){}
  });
  
  // Storno
  if(ns){
    const stornoRate=useFlat?-flatBetrag:Number(mx.storno_rueckbuchung||0);
    if(stornoRate){const sP=ns*stornoRate;details.push({label:`${ns} Stornos × ${fmtE0(stornoRate)}`,b:sP});total+=sP;}
  }
  
  // Auto-Zuschuss
  const autoZ=Number(ma.auto_zuschuss||0);
  if(autoZ){details.push({label:'Auto-Zuschuss',b:autoZ});total+=autoZ;}
  
  return{name,typ:mx.typ,anlagen:n,stornos:ns,eigenleads:el,empfehlungen:em,speicher:sp,staffelErreicht,rate,total,details,maId:ma.id,hgb:mx.typ.includes('hgb')||mx.typ.includes('agentur'),useFlat,kuerzel:ma.kuerzel,
    steuernummer:ma.steuernummer,ustid:ma.ustid,firmenname:ma.firmenname,strasse:ma.strasse,hausnr:ma.hausnr,plz:ma.plz,ort:ma.ort,abrechnungsart:ma.abrechnungsart};
}

function App(){
  const[matrix,setMatrix]=useState([]);
  const[mitarbeiter,setMitarbeiter]=useState([]);
  const[auftraege,setAuftraege]=useState([]);
  const[sonder,setSonder]=useState([]);
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState('uebersicht');
  const months=useMemo(()=>getMonths(),[]);
  const[selMonth,setSelMonth]=useState(months[1]?.key||months[0]?.key);
  const[selPerson,setSelPerson]=useState(null);
  const[katFilter,setKatFilter]=useState('alle');

  useEffect(()=>{
    Promise.all([
      sbG('provisions_matrix','aktiv=eq.true&order=sortierung'),
      sbG('mitarbeiter','aktiv=eq.true&select=id,vorname,nachname,kuerzel,typ,abrechnungsart,steuernummer,ustid,firmenname,strasse,hausnr,plz,ort,auto_zuschuss,grundgehalt,email'),
      sbGAll('pay_auftraege','select=*&order=auftrags_datum.desc'),
      sbG('pay_sonderprovisionen','aktiv=eq.true'),
    ]).then(([mx,ma,af,sd])=>{setMatrix(mx);setMitarbeiter(ma);setAuftraege(af);setSonder(sd);setLoading(false);});
  },[]);

  const range=useMemo(()=>getRange(selMonth),[selMonth]);
  const monthData=useMemo(()=>auftraege.filter(a=>a.auftrags_datum>=range.s&&a.auftrags_datum<=range.e),[auftraege,range]);
  
  // Build vertriebler_id → mitarbeiter map
  const maById=useMemo(()=>{const m={};mitarbeiter.forEach(ma=>m[ma.id]=ma);return m;},[mitarbeiter]);
  
  // Group auftraege by vertriebler_id
  const grouped=useMemo(()=>{
    const m={};
    monthData.forEach(a=>{
      const vid=a.vertriebler_id;
      if(!vid)return;
      if(!m[vid])m[vid]=[];
      m[vid].push(a);
    });
    return m;
  },[monthData]);
  
  // Calculate provisions
  const provs=useMemo(()=>{
    const results=[];
    // For each vertriebler with orders this month
    Object.entries(grouped).forEach(([vid,aufs])=>{
      const ma=maById[vid];
      if(!ma)return;
      const mx=resolveMatrix(ma.typ,matrix);
      const p=calcProvision(ma,aufs,mx,sonder);
      if(!p.skip) results.push(p);
    });
    return results.sort((a,b)=>b.total-a.total);
  },[grouped,maById,matrix,sonder]);

  const filtered=useMemo(()=>{
    if(katFilter==='alle')return provs;
    if(katFilter==='hgb')return provs.filter(p=>p.hgb);
    if(katFilter==='ang')return provs.filter(p=>!p.hgb);
    if(katFilter==='scout')return provs.filter(p=>p.typ?.includes('scout'));
    if(katFilter==='vertrieb')return provs.filter(p=>!p.typ?.includes('scout'));
    return provs;
  },[provs,katFilter]);

  const totalP=filtered.reduce((s,p)=>s+p.total,0);
  const totalA=filtered.reduce((s,p)=>s+(p.anlagen||0),0);
  const totalS=filtered.reduce((s,p)=>s+(p.stornos||0),0);
  const monthLabel=(() => {try{const[y,m]=selMonth.split('/');return new Date(+y,+m-1,1).toLocaleString('de-DE',{month:'long',year:'numeric'});}catch(e){return selMonth;}})();

  return(
    <div>
      <div className="app-header">
        <div className="logo-area">
          <div style={{width:36,height:36,borderRadius:8,background:'#F5C50015',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>💰</div>
          <div><div className="logo-text">bee-doo <span>PAY</span></div><div className="logo-sub">Provisionsabrechnung</div></div>
        </div>
        <div className="controls">
          <select value={selMonth} onChange={e=>{setSelMonth(e.target.value);setSelPerson(null);}}>
            {months.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}
          </select>
          {loading&&<div className="spinner"/>}
        </div>
      </div>

      <div className="tabs">
        {[{id:'uebersicht',l:'Übersicht'},{id:'matrix',l:'Provisionsmatrix'},{id:'detail',l:'Detail / Gutschrift'},{id:'sonder',l:'Sonderprovisionen'}].map(t=>
          <button key={t.id} className={`tab${tab===t.id?' active':''}`} onClick={()=>{setTab(t.id);if(t.id!=='detail')setSelPerson(null);}}>{t.l}</button>
        )}
      </div>

      <div className="content">
        {tab==='uebersicht'&&<TabUebersicht {...{filtered,totalP,totalA,totalS,monthData,monthLabel,setTab,setSelPerson,katFilter,setKatFilter,matrix}}/>}
        {tab==='matrix'&&<TabMatrix matrix={matrix}/>}
        {tab==='detail'&&<TabDetail {...{provs:filtered,selPerson,setSelPerson,monthLabel,matrix,selMonth}}/>}
        {tab==='sonder'&&<TabSonder sonder={sonder}/>}
      </div>
    </div>
  );
}

// ═══ ÜBERSICHT ═══
function TabUebersicht({filtered,totalP,totalA,totalS,monthData,monthLabel,setTab,setSelPerson,katFilter,setKatFilter,matrix}){
  const[sortK,setSortK]=useState('total');
  const[sortD,setSortD]=useState('desc');
  const sorted=useMemo(()=>{const s=[...filtered];s.sort((a,b)=>{const av=typeof a[sortK]==='string'?a[sortK]||'':a[sortK]||0;const bv=typeof b[sortK]==='string'?b[sortK]||'':b[sortK]||0;if(typeof av==='string')return sortD==='desc'?bv.localeCompare(av):av.localeCompare(bv);return sortD==='desc'?bv-av:av-bv;});return s;},[filtered,sortK,sortD]);
  const tSort=k=>{if(sortK===k)setSortD(d=>d==='desc'?'asc':'desc');else{setSortK(k);setSortD('desc');}};
  const SI=({k})=>sortK===k?(sortD==='desc'?' ↓':' ↑'):'';
  
  const kats=[{id:'alle',l:'Alle'},{id:'vertrieb',l:'Vertrieb'},{id:'scout',l:'Scout'},{id:'hgb',l:'HGB'},{id:'ang',l:'Angestellt'}];
  
  return(
    <div>
      <div className="stats-row">
        {[{l:'Gesamt Provision',v:fmtE(totalP),c:'gold',s:`${filtered.length} Berater`},{l:'Anlagen (aktiv)',v:totalA,c:'green',s:`Ø ${filtered.length?(totalA/filtered.length).toFixed(1):0}`},{l:'Stornos',v:totalS,c:'red',s:`${monthData.length?((totalS/monthData.length)*100).toFixed(1):0}% Quote`},{l:'Ø Provision',v:fmtE(filtered.length?totalP/filtered.length:0),c:'blue',s:'pro Berater'}].map(k=>
          <div key={k.l} className="stat"><div className="stat-label">{k.l}</div><div className={`stat-value ${k.c}`}>{k.v}</div><div className="stat-sub">{k.s}</div></div>
        )}
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {kats.map(k=><button key={k.id} onClick={()=>setKatFilter(k.id)} className={`btn btn-sm ${katFilter===k.id?'btn-y':'btn-s'}`}>{k.l}</button>)}
      </div>

      <div className="card">
        <div className="card-head"><h3>Abrechnung – {monthLabel}</h3><span style={{fontSize:11,color:'#8b949e'}}>{filtered.length} Berater · {monthData.length} Aufträge</span></div>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr>
              {[{k:'kuerzel',l:'',a:'center',w:40},{k:'name',l:'Berater'},{k:'typ',l:'Typ',a:'center'},{k:'anlagen',l:'Anlagen',a:'center'},{k:'stornos',l:'St.',a:'center'},{k:'eigenleads',l:'EL',a:'center'},{k:'total',l:'Provision',a:'right'}].map(h=>
                <th key={h.k} onClick={()=>tSort(h.k)} style={{textAlign:h.a||'left',width:h.w}}>{h.l}<SI k={h.k}/></th>
              )}
              <th style={{width:30}}/>
            </tr></thead>
            <tbody>
              {sorted.map(p=>{
                const isHGB=p.hgb;const isSc=p.typ?.includes('scout');
                const bc=isSc?'badge-sc':isHGB?'badge-hgb':'badge-ang';
                const tl=p.useFlat?'FLAT':isSc?(isHGB?'SC-H':'SC-A'):isHGB?'HGB':'ANG';
                return(
                  <tr key={p.maId||p.name} className="row" onClick={()=>{setSelPerson(p.maId||p.name);setTab('detail');}}>
                    <td style={{textAlign:'center'}}><div style={{width:28,height:28,borderRadius:6,background:'#21262d',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#8b949e'}}>{p.kuerzel||gK(p.name)}</div></td>
                    <td style={{fontWeight:600}}>{p.name}</td>
                    <td style={{textAlign:'center'}}><span className={`badge ${bc}`}>{tl}</span></td>
                    <td style={{textAlign:'center',fontWeight:700}}>{p.anlagen}{p.staffelErreicht&&<span className="staffel-star">★</span>}</td>
                    <td style={{textAlign:'center',color:p.stornos>0?'#f85149':'#484f58'}}>{p.stornos}</td>
                    <td style={{textAlign:'center',color:(p.eigenleads||0)>0?'#3fb950':'#484f58'}}>{p.eigenleads||0}</td>
                    <td style={{textAlign:'right',fontWeight:800,fontSize:14,color:p.staffelErreicht?'#3fb950':'#F5C500'}}>{fmtE(p.total)}</td>
                    <td style={{textAlign:'center',color:'#484f58'}}>→</td>
                  </tr>
                );
              })}
              {!sorted.length&&<tr><td colSpan={8} style={{padding:40,textAlign:'center',color:'#484f58'}}>Keine Aufträge im gewählten Monat</td></tr>}
            </tbody>
            {sorted.length>0&&<tfoot><tr>
              <td/><td>Gesamt ({filtered.length})</td><td/><td style={{textAlign:'center'}}>{totalA}</td><td style={{textAlign:'center',color:'#f85149'}}>{totalS}</td><td style={{textAlign:'center'}}>{filtered.reduce((s,p)=>s+(p.eigenleads||0),0)}</td><td style={{textAlign:'right',fontSize:16,color:'#F5C500'}}>{fmtE(totalP)}</td><td/>
            </tr></tfoot>}
          </table>
        </div>
      </div>
    </div>
  );
}

// ═══ MATRIX ═══
function TabMatrix({matrix}){
  const[calcTyp,setCalcTyp]=useState(matrix[0]?.typ||'');
  const[v,setV]=useState({anlagen:6,eigenleads:1,empfehlungen:0,speicher:1,zero:0});
  const mx=matrix.find(m=>m.typ===calcTyp)||{};
  const isS=mx.kategorie==='scout';
  const sV=(k,val)=>setV(p=>({...p,[k]:val===''?'':Math.max(0,parseInt(val)||0)}));
  let cD=[],cT=0;
  if(isS){const aP=(v.anlagen||0)*Number(mx.pro_anlage||0);const fix=Number(mx.fix_gehalt||0);cD=[...(fix?[{l:'Fixgehalt',v:fix}]:[]),{l:`${v.anlagen||0} Anlagen × ${fmtE0(mx.pro_anlage)}`,v:aP}];cT=fix+aP;}
  else{const n=v.anlagen||0,rate=n>=Number(mx.staffel_ab)?Number(mx.staffel_pro_anlage):Number(mx.basis_pro_anlage);const bP=n*rate;const eP=(v.eigenleads||0)*Number(mx.bonus_eigenlead||0);const emP=(v.empfehlungen||0)*Number(mx.bonus_empfehlung||0);const sP=(v.speicher||0)*Number(mx.bonus_speicher||0);const zP=(v.zero||0)*Number(mx.bonus_zero_prozent||0);cD=[{l:`${n}× ${fmtE0(rate)}${n>=Number(mx.staffel_ab)?' (Staffel)':''}`,v:bP},{l:`${v.eigenleads||0}× EL ${fmtE0(mx.bonus_eigenlead)}`,v:eP},{l:`${v.empfehlungen||0}× EM ${fmtE0(mx.bonus_empfehlung)}`,v:emP},{l:`${v.speicher||0}× Speicher ${fmtE0(mx.bonus_speicher)}`,v:sP},{l:`${v.zero||0}× Zero% ${fmtE0(mx.bonus_zero_prozent)}`,v:zP}];cT=bP+eP+emP+sP+zP;}
  
  return(
    <div>
      <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>Provisionsmatrix</div>
      <div style={{fontSize:12,color:'#8b949e',marginBottom:16}}>Live aus Supabase · provisions_matrix Tabelle</div>
      <div className="mx-grid">
        {matrix.map(mx=>{const isS=mx.kategorie==='scout';return(
          <div key={mx.typ} className="mx-card">
            <div className="mx-card-head"><div className="mx-dot" style={{background:mx.color}}/><div><div style={{fontWeight:700,fontSize:14}}>{mx.label}</div><div style={{fontSize:10,color:'#8b949e',marginTop:2}}>Mapping: {(mx.typ_mapping||[]).join(', ')||'–'}</div></div></div>
            <div style={{padding:18}}>
              {isS?(
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  {[{l:'Fix/Monat',v:mx.fix_gehalt},{l:'Pro Lead',v:mx.pro_lead},{l:'Termin geb.',v:mx.pro_termin_gebucht},{l:'Termin wahrg.',v:mx.pro_termin_wahrgenommen},{l:'Pro Anlage',v:mx.pro_anlage},{l:'Storno',v:mx.storno_rueckbuchung,neg:true}].map(f=>
                    <div key={f.l} style={{padding:'10px 12px',background:'#0d111780',borderRadius:8,border:'1px solid #21262d40'}}>
                      <div style={{fontSize:10,color:'#8b949e',fontWeight:600,marginBottom:4}}>{f.l}</div>
                      <div style={{fontSize:18,fontWeight:800,color:f.neg?'#f85149':(Number(f.v)>0?'#e6edf3':'#484f58')}}>{fmtE(f.v)}</div>
                    </div>
                  )}
                </div>
              ):(
                <>
                  <div className="mx-staffel">
                    <div className="mx-staffel-box" style={{background:'#0d111780',borderColor:'#21262d40'}}><div style={{fontSize:10,color:'#8b949e',fontWeight:600}}>Basis (1-{Number(mx.staffel_ab)-1})</div><div style={{fontSize:22,fontWeight:800,marginTop:4}}>{fmtE(mx.basis_pro_anlage)}</div></div>
                    <div className="mx-staffel-box" style={{background:'#3fb95008',borderColor:'#3fb95020'}}><div style={{fontSize:10,color:'#3fb950',fontWeight:600}}>Ab {mx.staffel_ab} (rückw.)</div><div style={{fontSize:22,fontWeight:800,color:'#3fb950',marginTop:4}}>{fmtE(mx.staffel_pro_anlage)}</div></div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    {[{l:'Eigenlead',v:mx.bonus_eigenlead},{l:'Empfehlung',v:mx.bonus_empfehlung},{l:'Speicher',v:mx.bonus_speicher},{l:'Zero%',v:mx.bonus_zero_prozent}].map(b=>
                      <div key={b.l} className="mx-bonus-row"><span style={{color:'#8b949e'}}>{b.l}</span><span style={{fontWeight:700,color:'#F5C500'}}>+{fmtE(b.v)}</span></div>
                    )}
                  </div>
                  <div className="mx-storno"><div style={{fontSize:12,fontWeight:700,color:'#f85149'}}>Storno: {fmtE(mx.storno_rueckbuchung)}</div><div style={{fontSize:11,color:'#8b949e',marginTop:4}}>Frist: {mx.storno_frist_tage} Tage · Nach Montage: {mx.storno_nach_montage?'ja':'nein'}</div></div>
                </>
              )}
            </div>
          </div>
        );})}
      </div>
      {/* Rechner */}
      <div className="card" style={{border:'1px solid #F5C50020'}}>
        <div className="card-head" style={{flexWrap:'wrap',gap:8}}>
          <h3>Provisionsrechner</h3>
          <div style={{display:'flex',gap:6}}>{matrix.map(m=><button key={m.typ} onClick={()=>setCalcTyp(m.typ)} className={`btn btn-sm ${calcTyp===m.typ?'btn-y':'btn-s'}`}>{m.short_label}</button>)}</div>
        </div>
        <div style={{padding:20}}>
          <div style={{display:'grid',gridTemplateColumns:isS?'1fr':'repeat(auto-fit,minmax(130px,1fr))',gap:12,marginBottom:20}}>
            {(isS?[{k:'anlagen',l:'Anlagen'}]:[{k:'anlagen',l:'Anlagen'},{k:'eigenleads',l:'Eigenleads'},{k:'empfehlungen',l:'Empfehlungen'},{k:'speicher',l:'Speicher'},{k:'zero',l:'Zero%'}]).map(f=>
              <div key={f.k}><div style={{fontSize:11,color:'#8b949e',fontWeight:600,marginBottom:6}}>{f.l}</div><input type="number" min="0" value={v[f.k]??''} onChange={e=>sV(f.k,e.target.value)} style={{width:'100%',fontSize:20,fontWeight:800,textAlign:'center'}}/></div>
            )}
          </div>
          <div style={{borderTop:'1px solid #21262d',paddingTop:16}}>
            {cD.map((d,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:13,color:d.v>0?'#e6edf3':'#484f58'}}><span>{d.l}</span><span style={{fontWeight:600}}>{fmtE(d.v)}</span></div>)}
            <div style={{display:'flex',justifyContent:'space-between',padding:'14px 0 0',marginTop:10,borderTop:'2px solid #F5C50030',fontSize:18,fontWeight:800}}><span>Gesamt</span><span style={{color:'#F5C500'}}>{fmtE(cT)}</span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══ DETAIL / GUTSCHRIFT ═══
function TabDetail({provs,selPerson,setSelPerson,monthLabel,matrix,selMonth}){
  if(!selPerson){
    return(<div>
      <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>Berater auswählen – {monthLabel}</div>
      <div className="detail-grid">
        {provs.map(p=>{const isHGB=p.hgb;return(
          <div key={p.maId||p.name} className="person-card" onClick={()=>setSelPerson(p.maId)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><div style={{fontWeight:700,fontSize:14}}>{p.name}</div><span className={`badge ${p.typ?.includes('scout')?'badge-sc':isHGB?'badge-hgb':'badge-ang'}`}>{p.useFlat?'FLAT':p.typ?.includes('scout')?(isHGB?'SC-H':'SC-A'):isHGB?'HGB':'ANG'}</span></div>
              <div style={{textAlign:'right'}}><div style={{fontSize:18,fontWeight:800,color:'#F5C500'}}>{fmtE(p.total)}</div><div style={{fontSize:11,color:'#8b949e'}}>{p.anlagen} Anlagen</div></div>
            </div>
          </div>
        );})}
      </div>
    </div>);
  }
  const p=provs.find(x=>x.maId===selPerson);
  if(!p)return<div style={{color:'#8b949e'}}>Berater nicht gefunden</div>;
  const isHGB=p.hgb;
  const ust=isHGB?19:0;
  const ustB=p.total*(ust/100);
  const brutto=p.total+ustB;
  const[y,m]=selMonth.split('/');
  const lzD=new Date(+y,+m-2,1);
  const lzLabel=lzD.toLocaleString('de-DE',{month:'long',year:'numeric'});
  
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20}}>
        <button className="btn btn-s" onClick={()=>setSelPerson(null)}>← Zurück</button>
        <div><div style={{fontSize:18,fontWeight:800}}>{p.name}</div><div style={{fontSize:12,color:'#8b949e'}}>{monthLabel} · Leistungszeitraum: {lzLabel}</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        {/* Gutschrift */}
        <div className="gs-preview">
          <div style={{marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:'#F5C500',marginBottom:4}}>Gutschrift</div>
            <div style={{fontSize:11,color:'#8b949e'}}>gem. §14 Abs. 2 Satz 2 UStG</div>
          </div>
          <div style={{fontSize:12,color:'#8b949e',marginBottom:4}}>bee-doo GmbH · Am Stadtholz 39 · 33609 Bielefeld</div>
          <div style={{fontSize:12,color:'#8b949e',marginBottom:4}}>An: {p.firmenname||p.name}</div>
          {p.strasse&&<div style={{fontSize:11,color:'#484f58',marginBottom:12}}>{p.strasse} {p.hausnr}, {p.plz} {p.ort}</div>}
          
          <div style={{marginBottom:8}}>
            {p.details.map((d,i)=><div key={i} className="gs-line" style={{color:d.b>=0?'#e6edf3':'#f85149'}}>
              <span>{d.label}</span><span style={{fontWeight:700}}>{fmtE(d.b)}</span>
            </div>)}
          </div>
          
          <div style={{borderTop:'1px solid #30363d',paddingTop:8}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#8b949e',marginBottom:4}}><span>Netto</span><span>{fmtE(p.total)}</span></div>
            {isHGB&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#8b949e',marginBottom:4}}><span>zzgl. {ust}% USt</span><span>{fmtE(ustB)}</span></div>}
            <div className="gs-total"><span>Auszahlung</span><span style={{color:'#F5C500'}}>{fmtE(brutto)}</span></div>
          </div>
          
          {p.steuernummer&&<div style={{fontSize:10,color:'#484f58',marginTop:12}}>StNr: {p.steuernummer}</div>}
          {p.ustid&&<div style={{fontSize:10,color:'#484f58'}}>USt-Id: {p.ustid}</div>}
        </div>
        
        {/* KPIs */}
        <div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
            {[{l:'Anlagen',v:p.anlagen,c:'#3fb950'},{l:'Stornos',v:p.stornos,c:p.stornos>0?'#f85149':'#484f58'},{l:'Eigenleads',v:p.eigenleads||0,c:(p.eigenleads||0)>0?'#3fb950':'#484f58'},{l:'Empfehlungen',v:p.empfehlungen||0,c:(p.empfehlungen||0)>0?'#58a6ff':'#484f58'}].map(k=>
              <div key={k.l} className="stat"><div className="stat-label">{k.l}</div><div style={{fontSize:28,fontWeight:800,color:k.c,marginTop:4}}>{k.v}</div></div>
            )}
          </div>
          {p.staffelErreicht&&<div style={{background:'#3fb95010',border:'1px solid #3fb95025',borderRadius:10,padding:'14px 16px',marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:700,color:'#3fb950'}}>★ Staffel erreicht!</div>
            <div style={{fontSize:12,color:'#8b949e',marginTop:4}}>Erhöhte Rate aktiv — rückwirkend auf alle Anlagen</div>
          </div>}
          {p.useFlat&&<div style={{background:'#F5C50010',border:'1px solid #F5C50025',borderRadius:10,padding:'14px 16px',marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:700,color:'#F5C500'}}>Flat-Rate aktiv</div>
            <div style={{fontSize:12,color:'#8b949e',marginTop:4}}>Individuelle Sonderprovision statt Staffel</div>
          </div>}
          <div className="stat" style={{marginTop:12}}>
            <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Abrechnungsdetails</div>
            <div style={{fontSize:12,color:'#8b949e',lineHeight:1.8}}>
              Typ: <span style={{color:'#e6edf3'}}>{isHGB?'HGB §84 (Gutschrift)':'Angestellt (Netto)'}</span><br/>
              USt: <span style={{color:'#e6edf3'}}>{isHGB?'19% (Gutschriftsverfahren)':'Keine (Gehaltsabrechnung)'}</span><br/>
              Rate: <span style={{color:'#e6edf3',fontWeight:600}}>{fmtE(p.rate)} / Anlage</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══ SONDERPROVISIONEN ═══
function TabSonder({sonder}){
  const typen={flat_rate:'Flat-Rate',scout_eigenlead:'Scout-Eigenlead',scout_umleitung:'Scout-Umleitung',skip_abrechnung:'Keine Abrechnung'};
  const colors={flat_rate:'background:#F5C50020;color:#F5C500',scout_eigenlead:'background:#3fb95020;color:#3fb950',scout_umleitung:'background:#58a6ff20;color:#58a6ff',skip_abrechnung:'background:#f8514920;color:#f85149'};
  
  const grouped={};
  sonder.forEach(s=>{const t=s.typ||'sonstige';if(!grouped[t])grouped[t]=[];grouped[t].push(s);});
  
  return(
    <div>
      <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>Sonderprovisionen</div>
      <div style={{fontSize:12,color:'#8b949e',marginBottom:20}}>Individuelle Regeln aus pay_sonderprovisionen · {sonder.length} aktive Regeln</div>
      {Object.entries(grouped).map(([typ,items])=>(
        <div key={typ} style={{marginBottom:24}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
            <span className="sonder-type" style={{cssText:colors[typ]||'background:#21262d;color:#8b949e'}}>{typen[typ]||typ}</span>
            <span style={{color:'#484f58',fontSize:11}}>{items.length} Einträge</span>
          </div>
          {items.map(s=>(
            <div key={s.id} className="sonder-card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontWeight:600,color:'#e6edf3'}}>{s.mitarbeiter_name}</span>
                <span style={{fontWeight:700,color:'#F5C500'}}>{Number(s.betrag)?fmtE(s.betrag):''}</span>
              </div>
              <div style={{color:'#8b949e',fontSize:11}}>{typeof s.beschreibung==='string'&&s.beschreibung.startsWith('{')?(() => {try{const d=JSON.parse(s.beschreibung);return d.regel||s.beschreibung;}catch(e){return s.beschreibung;}})():s.beschreibung}</div>
              <div style={{color:'#484f58',fontSize:10,marginTop:4}}>Gültig: {s.gueltig_ab||'–'} bis {s.gueltig_bis||'unbefristet'}</div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
