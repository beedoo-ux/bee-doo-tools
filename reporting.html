async function sbFetch(table, params = '') {
  const url = `${SB_URL}/rest/v1/${table}${params ? '?' + params : ''}`;
  const res = await fetch(url, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
  });
  if (!res.ok) throw new Error(`Supabase ${table}: ${res.status}`);
  return res.json();
}

async function sbCount(table, params = '') {
  const url = `${SB_URL}/rest/v1/${table}?select=id&limit=1${params ? '&' + params : ''}`;
  const res = await fetch(url, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'count=exact' }
  });
  const range = res.headers.get('content-range');
  return range ? parseInt(range.split('/')[1]) || 0 : 0;
}

// Paginated fetch for large tables
async function sbFetchAll(table, params = '', pageSize = 500) {
  let all = [], offset = 0, hasMore = true;
  while (hasMore) {
    const sep = params ? '&' : '';
    const url = `${SB_URL}/rest/v1/${table}?${params}${sep}limit=${pageSize}&offset=${offset}`;
    const res = await fetch(url, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'count=exact' }
    });
    if (!res.ok) throw new Error(`Supabase ${table}: ${res.status}`);
    const data = await res.json();
    all = all.concat(data);
    hasMore = data.length === pageSize;
    offset += pageSize;
    if (offset > 50000) break; // Safety limit
  }
  return all;
}

// ═══ HELPERS ═══
const fmt = n => typeof n === "number" ? n.toLocaleString("de-DE") : n;
const eur = n => {
  if (n == null) return "–";
  if (n >= 1000000) return `${(n/1000000).toFixed(2).replace('.',',')}M €`;
  if (n >= 1000) return `${(n/1000).toFixed(n >= 100000 ? 0 : 1).replace('.',',')}k €`;
  return `${fmt(Math.round(n))} €`;
};
const pct = (a, b) => b > 0 ? ((a / b) * 100).toFixed(1) : "0.0";
const dayName = d => ['So','Mo','Di','Mi','Do','Fr','Sa'][new Date(d).getDay()];
const fmtDate = d => {
  const dt = new Date(d);
  return `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.`;
};
const monthNames = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

// ═══ MONTH HELPERS ═══
function getMonthRange(year, month) {
  const start = `${year}-${String(month).padStart(2,'0')}-01`;
  const endDate = new Date(year, month, 0);
  const end = `${year}-${String(month).padStart(2,'0')}-${String(endDate.getDate()).padStart(2,'0')}`;
  const nextMonth = month === 12 ? `${year+1}-01-01` : `${year}-${String(month+1).padStart(2,'0')}-01`;
  return { start, end, nextMonth, daysInMonth: endDate.getDate() };
}

function getAvailableMonths() {
  const months = [{ year: 0, month: 0, label: 'Alle (ab Okt 2025)' }];
  const now = new Date();
  const minDate = new Date(2025, 9, 1); // Oktober 2025
  for (let i = 0; i < 24; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    if (d < minDate) break;
    months.push({ year: d.getFullYear(), month: d.getMonth() + 1, label: `${monthNames[d.getMonth()]} ${d.getFullYear()}` });
  }
  return months;
}

// ═══ DATA PROCESSING ═══
function processAuftraege(auftraege, mitarbeiterMap) {
  const total = auftraege.length;
  const aktiv = auftraege.filter(a => !a.storniert);
  const storno = auftraege.filter(a => a.storniert);

  const nettoAktiv = aktiv.reduce((s, a) => s + (a.an_wert_netto || 0) / 100, 0);
  const nettoGesamt = auftraege.reduce((s, a) => s + (a.an_wert_netto || 0) / 100, 0);
  const nettoStorno = storno.reduce((s, a) => s + (a.an_wert_netto || 0) / 100, 0);
  const avgNetto = aktiv.length > 0 ? nettoAktiv / aktiv.length : 0;

  const speicher = aktiv.filter(a => a.hat_speicher).length;
  const kwpValues = aktiv.map(a => (a.anlagen_kwp || 0) / 100).filter(v => v > 0.5 && v < 100);
  const avgKwp = kwpValues.length > 0 ? kwpValues.reduce((s, v) => s + v, 0) / kwpValues.length : 0;
  const moduleValues = aktiv.map(a => a.angebot_module || 0).filter(v => v > 0);
  const avgModule = moduleValues.length > 0 ? moduleValues.reduce((s, v) => s + v, 0) / moduleValues.length : 0;

  // Daily breakdown
  const dailyMap = {};
  auftraege.forEach(a => {
    const d = a.auftrags_datum;
    if (!d) return;
    if (!dailyMap[d]) dailyMap[d] = { d: fmtDate(d), raw: d, total: 0, aktiv: 0, storno: 0, netto: 0 };
    dailyMap[d].total++;
    if (a.storniert) dailyMap[d].storno++;
    else { dailyMap[d].aktiv++; dailyMap[d].netto += (a.an_wert_netto || 0) / 100; }
  });
  const daily = Object.values(dailyMap).sort((a, b) => a.raw.localeCompare(b.raw));

  // Weekday breakdown
  const wdMap = { Mo: { v: 0, days: new Set() }, Di: { v: 0, days: new Set() }, Mi: { v: 0, days: new Set() }, Do: { v: 0, days: new Set() }, Fr: { v: 0, days: new Set() }, Sa: { v: 0, days: new Set() }, So: { v: 0, days: new Set() } };
  aktiv.forEach(a => {
    if (!a.auftrags_datum) return;
    const wd = dayName(a.auftrags_datum);
    if (wdMap[wd]) { wdMap[wd].v++; wdMap[wd].days.add(a.auftrags_datum); }
  });
  const weekday = ['Mo','Di','Mi','Do','Fr','Sa','So'].map(d => ({
    d, v: wdMap[d].v, days: wdMap[d].days.size, avg: wdMap[d].days.size > 0 ? (wdMap[d].v / wdMap[d].days.size).toFixed(1) : '0'
  })).filter(w => w.v > 0);

  // Berater breakdown
  const beraterMap = {};
  auftraege.forEach(a => {
    const vid = a.vertriebler_id;
    const name = vid ? (mitarbeiterMap[vid] || `ID ${vid.slice(0,6)}`) : 'Nicht zugewiesen';
    if (!beraterMap[name]) beraterMap[name] = { n: name, s: 0, st: 0, net: 0, speicher: 0 };
    if (a.storniert) beraterMap[name].st++;
    else {
      beraterMap[name].s++;
      beraterMap[name].net += (a.an_wert_netto || 0) / 100;
      if (a.hat_speicher) beraterMap[name].speicher++;
    }
  });
  const berater = Object.values(beraterMap).sort((a, b) => {
    if (a.n === 'Nicht zugewiesen') return 1;
    if (b.n === 'Nicht zugewiesen') return -1;
    return b.s - a.s || b.net - a.net;
  });

  // Quellen breakdown
  const quellenMap = {};
  auftraege.forEach(a => {
    const q = a.lead_quelle || 'Unbekannt';
    if (!quellenMap[q]) quellenMap[q] = { n: q, s: 0, b: 0, st: 0, net: 0 };
    quellenMap[q].b++;
    if (a.storniert) quellenMap[q].st++;
    else { quellenMap[q].s++; quellenMap[q].net += (a.an_wert_netto || 0) / 100; }
  });
  const quellen = Object.values(quellenMap).sort((a, b) => b.s - a.s);

  // kWp distribution
  const kwpDist = [
    { name: '<8 kWp', v: kwpValues.filter(v => v < 8).length },
    { name: '8–12 kWp', v: kwpValues.filter(v => v >= 8 && v < 12).length },
    { name: '≥12 kWp', v: kwpValues.filter(v => v >= 12).length },
  ];

  return {
    total, aktiv: aktiv.length, storno: storno.length,
    nettoGesamt, nettoAktiv, nettoStorno, avgNetto,
    speicher, avgKwp: +avgKwp.toFixed(1), avgModule: +avgModule.toFixed(0),
    daily, weekday, berater, quellen, kwpDist,
  };
}

function processLeads(leads) {
  const total = leads.length;

  // ── Status categorization ──
  const isTerm = s => /terminiert|termin gelegt|termin vor ort|angebot/i.test(s);
  const isAuftrag = s => /auftrag|vertrag|sale/i.test(s);
  const isStorno = s => /storn/i.test(s);
  const isNE = s => /nicht erreicht/i.test(s);
  const isKeinInt = s => /kein interesse/i.test(s);
  const isRekl = s => /reklamation/i.test(s);
  const isNeu = s => /neuer lead|neu$/i.test(s);
  const isWVL = s => /wvl|wiedervorlage/i.test(s);
  const isNoPLZ = s => /nicht im plz/i.test(s);

  // ── Funnel KPIs ──
  let terminiert=0, auftrag=0, storno=0, ne=0, keinInt=0, rekl=0, neu=0, wvl=0, noPLZ=0, optIn=0, hasEFS=0;
  leads.forEach(l => {
    const sn = (l.status_name||'').trim();
    if(isTerm(sn)) terminiert++;
    if(isAuftrag(sn)) auftrag++;
    if(isStorno(sn)) storno++;
    if(isNE(sn)) ne++;
    if(isKeinInt(sn)) keinInt++;
    if(isRekl(sn)) rekl++;
    if(isNeu(sn)) neu++;
    if(isWVL(sn)) wvl++;
    if(isNoPLZ(sn)) noPLZ++;
    if(l.opt_in_bestaetigt) optIn++;
    if(l.efs_id) hasEFS++;
  });

  // ── Status breakdown ──
  const statusMap = {};
  leads.forEach(l => {
    const s = (l.status_name || 'Unbekannt').trim();
    if (!statusMap[s]) statusMap[s] = 0;
    statusMap[s]++;
  });
  const statusColors = { 'Terminiert': C.green, 'Termin gelegt': '#3FB950', 'REKLAMATION': C.red, 'Nicht erreicht': C.orange, 'Nicht im PLZ-Gebiet': C.purple, 'WVL': C.blue, '5x NICHT ERREICHT': '#D29922', 'Neuer Lead': C.cyan, 'Kein Interesse': C.dim, 'Auftrag': C.gold, 'Storniert': C.red };
  const status = Object.entries(statusMap)
    .map(([name, v]) => ({ name, v, fill: statusColors[name] || C.muted }))
    .sort((a, b) => b.v - a.v);

  // ── Timeline (daily) ──
  const dailyMap = {};
  leads.forEach(l => {
    const d = (l.erster_status_datum || l.leveto_erstellt_am || '').substring(0,10);
    if(!d || d < '2025-01-01') return;
    if(!dailyMap[d]) dailyMap[d] = { d, total: 0, term: 0, ne: 0 };
    dailyMap[d].total++;
    const sn = (l.status_name||'').trim();
    if(isTerm(sn)||isAuftrag(sn)) dailyMap[d].term++;
    if(isNE(sn)) dailyMap[d].ne++;
  });
  const timeline = Object.values(dailyMap).sort((a,b)=>a.d.localeCompare(b.d));
  // Aggregate to weekly for cleaner charts
  const weeklyMap = {};
  timeline.forEach(d => {
    const dt = new Date(d.d);
    const wk = new Date(dt.setDate(dt.getDate()-dt.getDay()+1));
    const key = wk.toISOString().substring(0,10);
    if(!weeklyMap[key]) weeklyMap[key] = { d: `KW ${Math.ceil((new Date(key).getTime()-new Date(key.substring(0,4)+'-01-01').getTime())/604800000)}`, raw: key, total: 0, term: 0 };
    weeklyMap[key].total += d.total;
    weeklyMap[key].term += d.term;
  });
  const weekly = Object.values(weeklyMap).sort((a,b)=>a.raw.localeCompare(b.raw)).slice(-16);

  // ── Geographic (Stadt/PLZ) ──
  const ortMap = {};
  leads.forEach(l => {
    const o = (l.ort||'').trim();
    if(!o) return;
    if(!ortMap[o]) ortMap[o] = { n: o, total: 0, term: 0, plz: l.plz||'' };
    ortMap[o].total++;
    const sn = (l.status_name||'').trim();
    if(isTerm(sn)||isAuftrag(sn)) ortMap[o].term++;
  });
  const topOrte = Object.values(ortMap).sort((a,b)=>b.total-a.total).slice(0,20);
  const plzMap = {};
  leads.forEach(l => {
    const p = (l.plz||'').substring(0,2);
    if(!p) return;
    if(!plzMap[p]) plzMap[p] = { n: p+'xxx', total: 0, term: 0 };
    plzMap[p].total++;
    const sn = (l.status_name||'').trim();
    if(isTerm(sn)||isAuftrag(sn)) plzMap[p].term++;
  });
  const plzRegionen = Object.values(plzMap).sort((a,b)=>b.total-a.total).slice(0,15);

  // ── Quellen with conversion ──
  const quellenMap = {};
  leads.forEach(l => {
    const q = l.quelle || 'Unbekannt';
    if (!quellenMap[q]) quellenMap[q] = { n: q, total: 0, term: 0, rekl: 0, ne: 0, auftrag: 0, storno: 0 };
    quellenMap[q].total++;
    const sn = (l.status_name || '').trim();
    if (isTerm(sn)) quellenMap[q].term++;
    if (isRekl(sn)) quellenMap[q].rekl++;
    if (isNE(sn)) quellenMap[q].ne++;
    if (isAuftrag(sn)) quellenMap[q].auftrag++;
    if (isStorno(sn)) quellenMap[q].storno++;
  });
  const quellen = Object.values(quellenMap).sort((a, b) => b.total - a.total);

  // ── Berater performance ──
  const beraterLeadMap = {};
  leads.forEach(l => {
    const b = l.berater_name || 'Nicht zugewiesen';
    if (!beraterLeadMap[b]) beraterLeadMap[b] = { n: b, total: 0, term: 0, auftrag: 0, ne: 0, storno: 0 };
    beraterLeadMap[b].total++;
    const sn = (l.status_name || '').trim();
    if (isTerm(sn) || isAuftrag(sn)) beraterLeadMap[b].term++;
    if (isAuftrag(sn)) beraterLeadMap[b].auftrag++;
    if (isNE(sn)) beraterLeadMap[b].ne++;
    if (isStorno(sn)) beraterLeadMap[b].storno++;
  });
  const beraterLeads = Object.values(beraterLeadMap).sort((a, b) => b.term - a.term);

  // ── Processing speed (Erstellt → Status) ──
  let processingTimes = [];
  leads.forEach(l => {
    if(l.leveto_erstellt_am && l.status_datum && l.status_datum !== l.leveto_erstellt_am) {
      const diff = (new Date(l.status_datum) - new Date(l.leveto_erstellt_am)) / 3600000;
      if(diff > 0 && diff < 720) processingTimes.push(diff);
    }
  });
  processingTimes.sort((a,b)=>a-b);
  const medianProcessing = processingTimes.length > 0 ? processingTimes[Math.floor(processingTimes.length/2)] : 0;
  const avgProcessing = processingTimes.length > 0 ? processingTimes.reduce((s,v)=>s+v,0)/processingTimes.length : 0;

  // ── Anrede/Geschlecht ──
  const anredeMap = {};
  leads.forEach(l => {
    const a = l.anrede || 'Unbekannt';
    if(!anredeMap[a]) anredeMap[a] = 0;
    anredeMap[a]++;
  });

  // ── Status indicator breakdown ──
  const indicatorMap = {};
  leads.forEach(l => {
    const i = l.status_indicator || 'Unbekannt';
    if(!indicatorMap[i]) indicatorMap[i] = 0;
    indicatorMap[i]++;
  });

  return {
    total, status, quellen, beraterLeads, weekly, topOrte, plzRegionen, anredeMap, indicatorMap,
    funnel: { terminiert, auftrag, storno, ne, keinInt, rekl, neu, wvl, noPLZ, optIn, hasEFS },
    processing: { median: medianProcessing, avg: avgProcessing, count: processingTimes.length },
  };
}

function processTermine(termine) {
  const total = termine.length;
  const now = new Date();
  const today = now.toISOString().slice(0, 10);

  // Split past vs future
  let nStattgefunden = 0, nAusgefallen = 0, nZukunft = 0, nHeute = 0;
  // Past: Closed + Open = stattgefunden (Open in past = nicht ausgewertet aber stattgefunden)
  // Cancelled = ausgefallen
  termine.forEach(t => {
    const d = (t.start_date || '').slice(0, 10);
    if (d === today) nHeute++;
    if (d > today) { nZukunft++; return; }
    // Past or today
    if (t.status === 'Cancelled') nAusgefallen++;
    else nStattgefunden++; // Closed + Open in past = stattgefunden
  });
  const nVergangenheit = nStattgefunden + nAusgefallen;
  const convRate = nVergangenheit > 0 ? (nStattgefunden / nVergangenheit * 100) : 0;

  // Termine gelegt heute (by creation_date)
  let nGelegtHeute = 0;
  termine.forEach(t => {
    const cd = (t.creation_date || '').slice(0, 10);
    if (cd === today) nGelegtHeute++;
  });

  // Daily chart – by start_date, 3 bars: gesamt, stattgefunden, ausgefallen
  const dailyMap = {};
  termine.forEach(t => {
    const d = (t.start_date || '').slice(0, 10);
    if (!d) return;
    if (!dailyMap[d]) dailyMap[d] = { d: fmtDate(d), raw: d, gesamt: 0, stattgef: 0, ausgef: 0 };
    dailyMap[d].gesamt++;
    if (d <= today) {
      if (t.status === 'Cancelled') dailyMap[d].ausgef++;
      else dailyMap[d].stattgef++;
    }
  });
  const daily = Object.values(dailyMap).sort((a, b) => a.raw.localeCompare(b.raw));

  // By Quelle
  const quellenMap = {};
  termine.forEach(t => {
    const q = t.quelle || 'Unbekannt';
    if (!quellenMap[q]) quellenMap[q] = { name: q, total: 0, stattgefunden: 0, ausgefallen: 0 };
    quellenMap[q].total++;
    const d = (t.start_date || '').slice(0, 10);
    if (d <= today) {
      if (t.status === 'Cancelled') quellenMap[q].ausgefallen++;
      else quellenMap[q].stattgefunden++;
    }
  });
  const quellen = Object.values(quellenMap).sort((a, b) => b.total - a.total);

  // By Berater
  const beraterTermMap = {};
  termine.forEach(t => {
    const name = t.berater || 'Nicht zugewiesen';
    if (!beraterTermMap[name]) beraterTermMap[name] = { n: name, total: 0, stattgefunden: 0, ausgefallen: 0 };
    beraterTermMap[name].total++;
    const d = (t.start_date || '').slice(0, 10);
    if (d <= today) {
      if (t.status === 'Cancelled') beraterTermMap[name].ausgefallen++;
      else beraterTermMap[name].stattgefunden++;
    }
  });
  const berater = Object.values(beraterTermMap)
    .sort((a, b) => a.n === 'Nicht zugewiesen' ? 1 : b.n === 'Nicht zugewiesen' ? -1 : b.total - a.total);

  return { total, nStattgefunden, nAusgefallen, nZukunft, nHeute, nGelegtHeute, convRate, daily, quellen, berater };
}

function processEFS(projekte) {
  const total = projekte.length;
  const byStatus = {};
  projekte.forEach(p => {
    const s = p.simplified_status || 'UNKNOWN';
    byStatus[s] = (byStatus[s] || 0) + 1;
  });

  const statusLabels = {
    CREATED: 'Erstellt', PRE_APPROVED: 'Vorgeprüft', PROJECT_APPROVED: 'Genehmigt',
    REVOCATION_PERIOD: 'Widerrufsfrist', INSTALLATION_CONFIRMED: 'Montage bestätigt',
    INSTALLED: 'Installiert', GRID_CONNECTED: 'Netzanschluss', COMPLETED: 'Abgeschlossen',
    REVOKED: 'Widerrufen', CUSTOMER_REJECTED: 'Kunde abgelehnt', REGISTRATION_SENT: 'Anmeldung',
    OFFER_SENT: 'Angebot', OFFER_SIGNED: 'Unterschrieben',
  };
  const statusColors2 = {
    CREATED: C.cyan, PRE_APPROVED: C.blue, PROJECT_APPROVED: C.green,
    REVOCATION_PERIOD: C.amber, INSTALLATION_CONFIRMED: C.gold,
    INSTALLED: C.teal, GRID_CONNECTED: '#3FB950', COMPLETED: '#2EA043',
    REVOKED: C.red, CUSTOMER_REJECTED: C.pink, REGISTRATION_SENT: C.purple,
  };

  const pipeline = Object.entries(byStatus)
    .map(([key, v]) => ({ name: statusLabels[key] || key, v, key, fill: statusColors2[key] || C.muted }))
    .sort((a, b) => b.v - a.v);

  // Revenue
  const activeProjects = projekte.filter(p => !['REVOKED','CUSTOMER_REJECTED'].includes(p.simplified_status));
  const totalRevenue = activeProjects.reduce((s, p) => s + (p.gesamtpreis_eur || 0), 0);
  const avgPrice = activeProjects.length > 0 ? totalRevenue / activeProjects.length : 0;
  const totalKwp = activeProjects.reduce((s, p) => s + (p.pv_kwp || 0), 0);
  const avgKwp = activeProjects.length > 0 ? totalKwp / activeProjects.length : 0;
  const withBat = activeProjects.filter(p => p.bat_kwh && p.bat_kwh > 0).length;

  // Zuständiger breakdown
  const zustMap = {};
  projekte.forEach(p => {
    const z = p.zustaendiger || 'Nicht zugewiesen';
    if (!zustMap[z]) zustMap[z] = { n: z, total: 0, active: 0, revoked: 0, completed: 0, revenue: 0 };
    zustMap[z].total++;
    if (['REVOKED','CUSTOMER_REJECTED'].includes(p.simplified_status)) zustMap[z].revoked++;
    else if (['COMPLETED','GRID_CONNECTED','INSTALLED'].includes(p.simplified_status)) { zustMap[z].completed++; zustMap[z].revenue += (p.gesamtpreis_eur || 0); }
    else { zustMap[z].active++; zustMap[z].revenue += (p.gesamtpreis_eur || 0); }
  });
  const zustaendige = Object.values(zustMap).sort((a, b) => b.total - a.total);

  return { total, pipeline, totalRevenue, avgPrice, totalKwp, avgKwp, withBat, activeCount: activeProjects.length, zustaendige };
}

// ═══ CASHFLOW PROCESSING ═══
function processCashflow(transactions) {
  const byMonth = {};
  transactions.forEach(t => {
    const m = (t.buchungsdatum || '').slice(0, 7);
    if (!m || m < '2025-01') return;
    if (!byMonth[m]) byMonth[m] = { m, label: monthNames[parseInt(m.slice(5,7))-1] + ' ' + m.slice(2,4), ein: 0, aus: 0, einCnt: 0, ausCnt: 0 };
    const b = Math.abs(parseFloat(t.betrag) || 0);
    if (t.soll_haben === 'CRDT') { byMonth[m].ein += b; byMonth[m].einCnt++; }
    else { byMonth[m].aus += b; byMonth[m].ausCnt++; }
  });
  const monthly = Object.values(byMonth).sort((a, b) => a.m.localeCompare(b.m));
  monthly.forEach((m, i) => { m.saldo = m.ein - m.aus; m.cumSaldo = (i > 0 ? monthly[i-1].cumSaldo : 0) + m.saldo; });

  const totalEin = transactions.filter(t => t.soll_haben === 'CRDT').reduce((s, t) => s + Math.abs(parseFloat(t.betrag) || 0), 0);
  const totalAus = transactions.filter(t => t.soll_haben === 'DBIT').reduce((s, t) => s + Math.abs(parseFloat(t.betrag) || 0), 0);

  // Auto-Kategorisierung
  const catRules = [
    { name: 'Gehälter & Löhne', test: t => /gehalt|lohn|salary|sozialversicherung|krankenkasse|aok|barmer|dak|tk |ikk|knappschaft|beiträge/i.test(`${t.gegenkonto_name||''} ${t.verwendungszweck||''}`) },
    { name: 'Provisionen', test: t => /provision|gutschrift|abrech/i.test(`${t.verwendungszweck||''}`) },
    { name: 'Material & Einkauf', test: t => /solar|modul|speicher|wechselrichter|pv|montage|material|fox ess|sungrow|huawei|enphase/i.test(`${t.gegenkonto_name||''} ${t.verwendungszweck||''}`) },
    { name: 'Miete & Büro', test: t => /miete|stadtwerk|strom|gas|wasser|büro|office|immobil/i.test(`${t.gegenkonto_name||''} ${t.verwendungszweck||''}`) },
    { name: 'Fahrzeuge & Reisen', test: t => /tanken|benzin|diesel|kfz|leasing|fleet|sixt|shell|aral|total|esso|reise|hotel|bahn/i.test(`${t.gegenkonto_name||''} ${t.verwendungszweck||''}`) },
    { name: 'Software & IT', test: t => /vercel|github|google|amazon|aws|hetzner|software|saas|api|twilio|brevo|supabase|stripe|microsoft|adobe/i.test(`${t.gegenkonto_name||''} ${t.verwendungszweck||''}`) },
    { name: 'Versicherung', test: t => /versicherung|allianz|axa|hdi|signal|zurich|ergo/i.test(`${t.gegenkonto_name||''} ${t.verwendungszweck||''}`) },
    { name: 'Steuern & Gebühren', test: t => /finanzamt|steuer|ust|umsatzsteuer|notar|gez|ihk|gema/i.test(`${t.gegenkonto_name||''} ${t.verwendungszweck||''}`) },
    { name: 'Marketing', test: t => /marketing|werbung|facebook|meta|instagram|google ads|flyer|druck/i.test(`${t.gegenkonto_name||''} ${t.verwendungszweck||''}`) },
  ];
  const categories = {};
  const catMonthly = {};
  transactions.filter(t => t.soll_haben === 'DBIT').forEach(t => {
    const b = Math.abs(parseFloat(t.betrag) || 0);
    const m = (t.buchungsdatum || '').slice(0, 7);
    let cat = 'Sonstiges';
    for (const r of catRules) { if (r.test(t)) { cat = r.name; break; } }
    if (!categories[cat]) categories[cat] = { name: cat, sum: 0, cnt: 0 };
    categories[cat].sum += b; categories[cat].cnt++;
    if (m && m >= '2025-01') {
      if (!catMonthly[m]) catMonthly[m] = {};
      if (!catMonthly[m][cat]) catMonthly[m][cat] = 0;
      catMonthly[m][cat] += b;
    }
  });
  const catBreakdown = Object.values(categories).sort((a, b) => b.sum - a.sum);
  const catMonthlyData = Object.entries(catMonthly).sort(([a],[b]) => a.localeCompare(b)).map(([m, cats]) => ({ m, label: monthNames[parseInt(m.slice(5,7))-1] + ' ' + m.slice(2,4), ...cats }));
  const catNames = catBreakdown.slice(0, 6).map(c => c.name);

  // Top Empfänger (Ausgaben)
  const empfMap = {};
  transactions.filter(t => t.soll_haben === 'DBIT').forEach(t => {
    const n = (t.gegenkonto_name || 'Unbekannt').trim().substring(0, 40);
    if (!empfMap[n]) empfMap[n] = { n, sum: 0, cnt: 0 };
    empfMap[n].sum += Math.abs(parseFloat(t.betrag) || 0);
    empfMap[n].cnt++;
  });
  const topEmpfaenger = Object.values(empfMap).sort((a, b) => b.sum - a.sum).slice(0, 15);

  // Top Einzahler
  const einzMap = {};
  transactions.filter(t => t.soll_haben === 'CRDT').forEach(t => {
    const n = (t.gegenkonto_name || 'Unbekannt').trim().substring(0, 40);
    if (!einzMap[n]) einzMap[n] = { n, sum: 0, cnt: 0 };
    einzMap[n].sum += Math.abs(parseFloat(t.betrag) || 0);
    einzMap[n].cnt++;
  });
  const topEinzahler = Object.values(einzMap).sort((a, b) => b.sum - a.sum).slice(0, 10);

  // Burn rate (avg monthly out last 3 months)
  const last3 = monthly.slice(-3);
  const avgBurn = last3.length > 0 ? last3.reduce((s, m) => s + m.aus, 0) / last3.length : 0;
  const avgIncome = last3.length > 0 ? last3.reduce((s, m) => s + m.ein, 0) / last3.length : 0;
  const netBurn = avgBurn - avgIncome;
  const lastCum = monthly.length > 0 ? monthly[monthly.length - 1].cumSaldo : 0;
  const runwayMonths = netBurn > 0 ? Math.max(0, lastCum / netBurn) : 99;

  // Weekly trend (last 12 weeks)
  const weekMap = {};
  transactions.forEach(t => {
    const d = t.buchungsdatum;
    if (!d) return;
    const dt = new Date(d);
    const wk = new Date(dt.setDate(dt.getDate() - dt.getDay() + 1));
    const key = wk.toISOString().slice(0, 10);
    if (!weekMap[key]) weekMap[key] = { d: key, label: fmtDate(key), ein: 0, aus: 0 };
    const b = Math.abs(parseFloat(t.betrag) || 0);
    if (t.soll_haben === 'CRDT') weekMap[key].ein += b;
    else weekMap[key].aus += b;
  });
  const weekly = Object.values(weekMap).sort((a, b) => a.d.localeCompare(b.d)).slice(-12);
  weekly.forEach(w => { w.saldo = w.ein - w.aus; });

  // Top Einzeltransaktionen
  const biggestOut = transactions.filter(t => t.soll_haben === 'DBIT').map(t => ({
    datum: (t.buchungsdatum || '').slice(0, 10), name: (t.gegenkonto_name || '').substring(0, 35),
    betrag: Math.abs(parseFloat(t.betrag) || 0), zweck: (t.verwendungszweck || '').substring(0, 50)
  })).sort((a, b) => b.betrag - a.betrag).slice(0, 10);

  const biggestIn = transactions.filter(t => t.soll_haben === 'CRDT').map(t => ({
    datum: (t.buchungsdatum || '').slice(0, 10), name: (t.gegenkonto_name || '').substring(0, 35),
    betrag: Math.abs(parseFloat(t.betrag) || 0), zweck: (t.verwendungszweck || '').substring(0, 50)
  })).sort((a, b) => b.betrag - a.betrag).slice(0, 10);

  // MoM growth
  monthly.forEach((m, i) => {
    if (i > 0) {
      m.einGrowth = monthly[i-1].ein > 0 ? ((m.ein - monthly[i-1].ein) / monthly[i-1].ein * 100) : 0;
      m.ausGrowth = monthly[i-1].aus > 0 ? ((m.aus - monthly[i-1].aus) / monthly[i-1].aus * 100) : 0;
    } else { m.einGrowth = 0; m.ausGrowth = 0; }
  });

  return { monthly, totalEin, totalAus, topEmpfaenger, topEinzahler, avgBurn, avgIncome, weekly, total: transactions.length, catBreakdown, catMonthlyData, catNames, netBurn, runwayMonths, lastCum, biggestOut, biggestIn };
}

// ═══ TEAM PERFORMANCE PROCESSING ═══
function processTeam(auftraege, termine, leads, mitarbeiterList) {
  const maMap = {};
  mitarbeiterList.forEach(m => {
    maMap[m.id] = { id: m.id, name: `${m.vorname} ${m.nachname}`.trim(), typ: m.typ || '', kuerzel: m.kuerzel || '' };
  });

  // Sales per person with monthly breakdown
  const vtPerf = {};
  auftraege.forEach(a => {
    const vid = a.vertriebler_id;
    if (!vid) return;
    const name = maMap[vid]?.name || `ID ${vid.slice(0,6)}`;
    const typ = maMap[vid]?.typ || '';
    if (!vtPerf[vid]) vtPerf[vid] = { id: vid, name, typ, sales: 0, storno: 0, netto: 0, speicher: 0, eigenlead: 0, empfehlung: 0, kwpSum: 0, byMonth: {} };
    const m = (a.auftrags_datum || '').slice(0, 7);
    if (a.storniert) vtPerf[vid].storno++;
    else {
      vtPerf[vid].sales++;
      vtPerf[vid].netto += (a.an_wert_netto || 0) / 100;
      if (a.hat_speicher) vtPerf[vid].speicher++;
      if (a.ist_eigenlead) vtPerf[vid].eigenlead++;
      if (a.ist_empfehlung) vtPerf[vid].empfehlung++;
      vtPerf[vid].kwpSum += (a.anlagen_kwp || 0) / 100;
      if (m) { if (!vtPerf[vid].byMonth[m]) vtPerf[vid].byMonth[m] = 0; vtPerf[vid].byMonth[m]++; }
    }
  });
  // Collect all months for sparklines
  const allMonths = [...new Set(auftraege.filter(a=>!a.storniert).map(a=>(a.auftrags_datum||'').slice(0,7)).filter(m=>m>='2025-01'))].sort();
  Object.values(vtPerf).forEach(v => {
    v.stornoRate = v.sales + v.storno > 0 ? (v.storno / (v.sales + v.storno) * 100) : 0;
    v.avgKwp = v.sales > 0 ? v.kwpSum / v.sales : 0;
    v.avgNetto = v.sales > 0 ? v.netto / v.sales : 0;
    v.speicherRate = v.sales > 0 ? (v.speicher / v.sales * 100) : 0;
    v.eigenleadRate = v.sales > 0 ? (v.eigenlead / v.sales * 100) : 0;
    v.sparkline = allMonths.map(m => v.byMonth[m] || 0);
    // Trend: last month vs previous
    const last2 = allMonths.slice(-2).map(m => v.byMonth[m] || 0);
    v.trend = last2.length === 2 && last2[0] > 0 ? ((last2[1] - last2[0]) / last2[0] * 100) : 0;
  });
  const vtRanking = Object.values(vtPerf).filter(v => v.sales + v.storno > 0).sort((a, b) => b.sales - a.sales);

  // Termine per person
  const termPerf = {};
  const today = new Date().toISOString().slice(0, 10);
  termine.forEach(t => {
    const name = t.berater || 'Unbekannt';
    if (!termPerf[name]) termPerf[name] = { name, total: 0, stattgef: 0, ausgef: 0 };
    termPerf[name].total++;
    const d = (t.start_date || '').slice(0, 10);
    if (d <= today) {
      if (t.status === 'Cancelled') termPerf[name].ausgef++;
      else termPerf[name].stattgef++;
    }
  });
  Object.values(termPerf).forEach(t => {
    t.convRate = t.stattgef + t.ausgef > 0 ? (t.stattgef / (t.stattgef + t.ausgef) * 100) : 0;
  });
  const termRanking = Object.values(termPerf).filter(t => t.total > 0).sort((a, b) => b.total - a.total);

  // Type summary
  const typSummary = {};
  vtRanking.forEach(v => {
    const t = v.typ || 'Sonstige';
    if (!typSummary[t]) typSummary[t] = { typ: t, persons: 0, sales: 0, storno: 0, netto: 0, speicher: 0, eigenlead: 0 };
    typSummary[t].persons++;
    typSummary[t].sales += v.sales;
    typSummary[t].storno += v.storno;
    typSummary[t].netto += v.netto;
    typSummary[t].speicher += v.speicher;
    typSummary[t].eigenlead += v.eigenlead;
  });
  Object.values(typSummary).forEach(t => {
    t.avgPerPerson = t.persons > 0 ? t.sales / t.persons : 0;
    t.stornoRate = t.sales + t.storno > 0 ? (t.storno / (t.sales + t.storno) * 100) : 0;
    t.avgNetto = t.sales > 0 ? t.netto / t.sales : 0;
    t.speicherRate = t.sales > 0 ? (t.speicher / t.sales * 100) : 0;
  });
  const typBreakdown = Object.values(typSummary).sort((a, b) => b.sales - a.sales);

  // Efficiency metrics
  const totalSales = vtRanking.reduce((s, v) => s + v.sales, 0);
  const totalTermine = termine.length;
  const totalLeads = leads.length;
  const terminToSale = totalTermine > 0 ? (totalSales / totalTermine * 100) : 0;
  const leadToSale = totalLeads > 0 ? (totalSales / totalLeads * 100) : 0;
  const avgRevenuePerTermin = totalTermine > 0 ? vtRanking.reduce((s, v) => s + v.netto, 0) / totalTermine : 0;
  const activeVTs = vtRanking.filter(v => v.sales > 0).length;
  const avgSalesPerVT = activeVTs > 0 ? totalSales / activeVTs : 0;

  // Scout chain: Scouter → Leads assigned → Termine → Sales
  const scoutPerf = {};
  leads.forEach(l => {
    const b = l.berater_name || '';
    if (!b) return;
    if (!scoutPerf[b]) scoutPerf[b] = { name: b, leads: 0, term: 0, auftrag: 0, storno: 0 };
    scoutPerf[b].leads++;
    const sn = (l.status_name || '');
    if (/terminiert|termin gelegt|termin vor ort|angebot|auftrag|vertrag/i.test(sn)) scoutPerf[b].term++;
    if (/auftrag|vertrag|sale/i.test(sn)) scoutPerf[b].auftrag++;
    if (/storn/i.test(sn)) scoutPerf[b].storno++;
  });
  Object.values(scoutPerf).forEach(s => {
    s.termRate = s.leads > 0 ? (s.term / s.leads * 100) : 0;
    s.saleRate = s.leads > 0 ? (s.auftrag / s.leads * 100) : 0;
  });
  const scoutChain = Object.values(scoutPerf).filter(s => s.leads >= 5).sort((a, b) => b.saleRate - a.saleRate).slice(0, 20);

  // Monthly Sales Trend (for stacked area chart)
  const monthlyByTyp = {};
  auftraege.filter(a => !a.storniert).forEach(a => {
    const m = (a.auftrags_datum || '').slice(0, 7);
    const vid = a.vertriebler_id;
    const typ = maMap[vid]?.typ || 'Sonstige';
    const simTyp = /haupt/i.test(typ) ? 'HGB Haupt' : /hgb/i.test(typ) ? 'HGB Agentur' : /angest.*vert/i.test(typ) ? 'Angest. VT' : /scout/i.test(typ) ? 'Scouter' : 'Sonstige';
    if (m && m >= '2025-01') {
      if (!monthlyByTyp[m]) monthlyByTyp[m] = { m, label: monthNames[parseInt(m.slice(5,7))-1]+' '+m.slice(2,4) };
      if (!monthlyByTyp[m][simTyp]) monthlyByTyp[m][simTyp] = 0;
      monthlyByTyp[m][simTyp]++;
    }
  });
  const monthlyTypData = Object.values(monthlyByTyp).sort((a, b) => a.m.localeCompare(b.m));
  const typNames = ['HGB Haupt', 'HGB Agentur', 'Angest. VT', 'Scouter'];

  return { vtRanking, termRanking, typBreakdown, allMonths, efficiency: { terminToSale, leadToSale, avgRevenuePerTermin, avgSalesPerVT, activeVTs, totalSales, totalTermine, totalLeads }, scoutChain, monthlyTypData, typNames };
}

// ═══ PIPELINE VELOCITY PROCESSING ═══
function processPipeline(leads, auftraege) {
  const now = new Date();

  // Lead age analysis
  const ageGroups = [
    { label: '< 7 Tage', min: 0, max: 7, cnt: 0, term: 0 },
    { label: '7–14 Tage', min: 7, max: 14, cnt: 0, term: 0 },
    { label: '14–30 Tage', min: 14, max: 30, cnt: 0, term: 0 },
    { label: '30–60 Tage', min: 30, max: 60, cnt: 0, term: 0 },
    { label: '60–90 Tage', min: 60, max: 90, cnt: 0, term: 0 },
    { label: '> 90 Tage', min: 90, max: 9999, cnt: 0, term: 0 },
  ];
  const isTerm = s => /terminiert|termin gelegt|termin vor ort|angebot/i.test(s);
  const isAuftrag = s => /auftrag|vertrag|sale/i.test(s);
  const isStorno = s => /storn/i.test(s);
  const isOpen = s => !isAuftrag(s) && !isStorno(s) && !/kein interesse|nicht im plz|reklamation|5x nicht/i.test(s);

  let openLeads = 0, stalledLeads = 0;
  const stalledList = [];
  leads.forEach(l => {
    const created = l.erster_status_datum || l.leveto_erstellt_am;
    if (!created) return;
    const age = (now - new Date(created)) / 86400000;
    const sn = (l.status_name || '').trim();
    ageGroups.forEach(g => { if (age >= g.min && age < g.max) { g.cnt++; if (isTerm(sn) || isAuftrag(sn)) g.term++; } });
    if (isOpen(sn)) {
      openLeads++;
      if (age > 30) {
        stalledLeads++;
        if (stalledList.length < 50) stalledList.push({ name: `${l.vorname || ''} ${l.nachname || ''}`.trim(), status: sn, age: Math.round(age), ort: l.ort || '', berater: l.berater_name || '' });
      }
    }
  });
  stalledList.sort((a, b) => b.age - a.age);

  // Status flow / dropout funnel
  let total = leads.length, terminiert = 0, auftragN = 0, stornoN = 0, neN = 0, keinIntN = 0;
  leads.forEach(l => {
    const sn = (l.status_name || '').trim();
    if (isTerm(sn) || isAuftrag(sn)) terminiert++;
    if (isAuftrag(sn)) auftragN++;
    if (isStorno(sn)) stornoN++;
    if (/nicht erreicht/i.test(sn)) neN++;
    if (/kein interesse/i.test(sn)) keinIntN++;
  });
  const funnel = [
    { name: 'Leads gesamt', v: total, color: C.blue },
    { name: 'Terminiert', v: terminiert, color: C.green },
    { name: 'Auftrag', v: auftragN, color: C.gold },
  ];
  const dropouts = [
    { name: 'Nicht erreicht', v: neN, color: C.orange },
    { name: 'Kein Interesse', v: keinIntN, color: C.dim },
    { name: 'Storniert', v: stornoN, color: C.red },
  ];

  // Processing speed (lead to termin)
  const speeds = [];
  leads.forEach(l => {
    if (l.leveto_erstellt_am && l.status_datum) {
      const diff = (new Date(l.status_datum) - new Date(l.leveto_erstellt_am)) / 86400000;
      if (diff > 0 && diff < 180) speeds.push(diff);
    }
  });
  speeds.sort((a, b) => a - b);
  const medianSpeed = speeds.length > 0 ? speeds[Math.floor(speeds.length / 2)] : 0;
  const avgSpeed = speeds.length > 0 ? speeds.reduce((s, v) => s + v, 0) / speeds.length : 0;

  // Auftrags-Phase durations (from workflow_history)
  const phaseDurations = {};
  auftraege.filter(a => a.workflow_history && !a.storniert).forEach(a => {
    let wf = a.workflow_history;
    if (typeof wf === 'string') try { wf = JSON.parse(wf); } catch(e) { return; }
    if (!Array.isArray(wf)) return;
    for (let i = 0; i < wf.length - 1; i++) {
      const from = wf[i]?.status || wf[i]?.name || '';
      const to = wf[i + 1]?.status || wf[i + 1]?.name || '';
      const d1 = wf[i]?.date || wf[i]?.datum || '';
      const d2 = wf[i + 1]?.date || wf[i + 1]?.datum || '';
      if (!d1 || !d2 || !from) continue;
      const days = (new Date(d2) - new Date(d1)) / 86400000;
      if (days >= 0 && days < 365) {
        const key = from.substring(0, 30);
        if (!phaseDurations[key]) phaseDurations[key] = { phase: key, durations: [], count: 0 };
        phaseDurations[key].durations.push(days);
        phaseDurations[key].count++;
      }
    }
  });
  const phases = Object.values(phaseDurations).map(p => {
    p.durations.sort((a, b) => a - b);
    p.median = p.durations[Math.floor(p.durations.length / 2)] || 0;
    p.avg = p.durations.reduce((s, v) => s + v, 0) / p.durations.length;
    return p;
  }).filter(p => p.count >= 3).sort((a, b) => b.count - a.count).slice(0, 12);

  return { ageGroups, openLeads, stalledLeads, stalledList, funnel, dropouts, medianSpeed, avgSpeed, phases };
}

// ═══ PROVISIONS PROCESSING ═══
function processProvisionen(historie) {
  const byPeriode = {};
  historie.forEach(h => {
    const p = h.periode || '?';
    if (!byPeriode[p]) byPeriode[p] = { p, label: p, sum: 0, cnt: 0, byVT: {}, byProdukt: {} };
    const netto = parseFloat(h.netto) || 0;
    byPeriode[p].sum += netto;
    byPeriode[p].cnt++;
    const vt = h.vertriebler || 'Unbekannt';
    if (!byPeriode[p].byVT[vt]) byPeriode[p].byVT[vt] = 0;
    byPeriode[p].byVT[vt] += netto;
    const prod = h.produkt || 'PV';
    if (!byPeriode[p].byProdukt[prod]) byPeriode[p].byProdukt[prod] = 0;
    byPeriode[p].byProdukt[prod] += netto;
  });
  const monthly = Object.values(byPeriode).sort((a, b) => a.p.localeCompare(b.p));

  // MoM growth
  monthly.forEach((m, i) => {
    m.avgPerPos = m.cnt > 0 ? m.sum / m.cnt : 0;
    m.sumGrowth = i > 0 && monthly[i-1].sum > 0 ? ((m.sum - monthly[i-1].sum) / monthly[i-1].sum * 100) : 0;
  });

  // Per VT total
  const vtMap = {};
  historie.forEach(h => {
    const vt = h.vertriebler || 'Unbekannt';
    if (!vtMap[vt]) vtMap[vt] = { name: vt, sum: 0, cnt: 0, perioden: new Set(), byMonth: {} };
    const netto = parseFloat(h.netto) || 0;
    vtMap[vt].sum += netto;
    vtMap[vt].cnt++;
    vtMap[vt].perioden.add(h.periode);
    const p = h.periode || '?';
    if (!vtMap[vt].byMonth[p]) vtMap[vt].byMonth[p] = 0;
    vtMap[vt].byMonth[p] += netto;
  });
  const allPerioden = [...new Set(historie.map(h => h.periode))].sort();
  Object.values(vtMap).forEach(v => {
    v.avgPerMonth = v.perioden.size > 0 ? v.sum / v.perioden.size : 0;
    v.periodenCount = v.perioden.size;
    v.sparkline = allPerioden.map(p => v.byMonth[p] || 0);
    // Trend
    const last2 = allPerioden.slice(-2).map(p => v.byMonth[p] || 0);
    v.trend = last2.length === 2 && last2[0] > 0 ? ((last2[1] - last2[0]) / last2[0] * 100) : 0;
  });
  const vtRanking = Object.values(vtMap).sort((a, b) => b.sum - a.sum).slice(0, 30);

  // Totals
  const totalSum = historie.reduce((s, h) => s + (parseFloat(h.netto) || 0), 0);
  const totalCnt = historie.length;
  const avgPerPosition = totalCnt > 0 ? totalSum / totalCnt : 0;
  const perioden = new Set(historie.map(h => h.periode)).size;
  const avgPerMonth = perioden > 0 ? totalSum / perioden : 0;

  // Commission bracket distribution
  const bracketMap = {};
  historie.forEach(h => {
    const netto = parseFloat(h.netto) || 0;
    let bracket = '0–500€';
    if (netto > 5000) bracket = '>5.000€';
    else if (netto > 3000) bracket = '3.000–5.000€';
    else if (netto > 2000) bracket = '2.000–3.000€';
    else if (netto > 1500) bracket = '1.500–2.000€';
    else if (netto > 1000) bracket = '1.000–1.500€';
    else if (netto > 500) bracket = '500–1.000€';
    if (!bracketMap[bracket]) bracketMap[bracket] = { name: bracket, cnt: 0, sum: 0 };
    bracketMap[bracket].cnt++;
    bracketMap[bracket].sum += netto;
  });
  const brackets = Object.values(bracketMap).sort((a, b) => {
    const order = ['0–500€','500–1.000€','1.000–1.500€','1.500–2.000€','2.000–3.000€','3.000–5.000€','>5.000€'];
    return order.indexOf(a.name) - order.indexOf(b.name);
  });

  // Scout provisionen
  const scoutMap = {};
  historie.filter(h => h.scouter && h.scouter_bonus).forEach(h => {
    const s = h.scouter;
    if (!scoutMap[s]) scoutMap[s] = { name: s, sum: 0, cnt: 0 };
    scoutMap[s].sum += parseFloat(h.scouter_bonus) || 0;
    scoutMap[s].cnt++;
  });
  const scoutRanking = Object.values(scoutMap).sort((a, b) => b.sum - a.sum).slice(0, 15);

  // Produkt-Mix
  const produktMap = {};
  historie.forEach(h => {
    const p = h.produkt || 'PV';
    if (!produktMap[p]) produktMap[p] = { name: p, sum: 0, cnt: 0 };
    produktMap[p].sum += parseFloat(h.netto) || 0;
    produktMap[p].cnt++;
  });
  const produktMix = Object.values(produktMap).sort((a,b) => b.sum - a.sum);

  // Quelle analysis
  const quelleMap = {};
  historie.forEach(h => {
    const q = h.quelle || 'Standard';
    if (!quelleMap[q]) quelleMap[q] = { name: q, sum: 0, cnt: 0 };
    quelleMap[q].sum += parseFloat(h.netto) || 0;
    quelleMap[q].cnt++;
  });
  const quelleBreakdown = Object.values(quelleMap).sort((a,b) => b.sum - a.sum);

  return { monthly, vtRanking, scoutRanking, totalSum, totalCnt, avgPerPosition, avgPerMonth, perioden, brackets, produktMix, quelleBreakdown, allPerioden };
}

// ═══ FORECAST PROCESSING ═══
function processForecast(auftraege, leads, efsProjekte) {
  // Pipeline value
  const openAuftraege = auftraege.filter(a => !a.storniert);
  const pipelineNetto = openAuftraege.reduce((s, a) => s + (a.an_wert_netto || 0) / 100, 0);

  // Monthly trend for extrapolation
  const monthlyMap = {};
  auftraege.filter(a => !a.storniert).forEach(a => {
    const m = (a.auftrags_datum || '').slice(0, 7);
    if (!m || m < '2025-10') return;
    if (!monthlyMap[m]) monthlyMap[m] = { m, sales: 0, netto: 0 };
    monthlyMap[m].sales++;
    monthlyMap[m].netto += (a.an_wert_netto || 0) / 100;
  });
  const monthlyTrend = Object.values(monthlyMap).sort((a, b) => a.m.localeCompare(b.m));

  // 3-month forecast based on moving average
  const last3 = monthlyTrend.slice(-3);
  const avgSales = last3.length > 0 ? last3.reduce((s, m) => s + m.sales, 0) / last3.length : 0;
  const avgNetto = last3.length > 0 ? last3.reduce((s, m) => s + m.netto, 0) / last3.length : 0;

  const forecast = [];
  const now = new Date();
  for (let i = 1; i <= 3; i++) {
    const fd = new Date(now.getFullYear(), now.getMonth() + i, 1);
    forecast.push({
      m: `${fd.getFullYear()}-${String(fd.getMonth() + 1).padStart(2, '0')}`,
      label: monthNames[fd.getMonth()] + ' ' + fd.getFullYear(),
      salesLow: Math.round(avgSales * 0.8),
      salesMid: Math.round(avgSales),
      salesHigh: Math.round(avgSales * 1.2),
      nettoMid: Math.round(avgNetto),
    });
  }

  // EFS Pipeline value
  const activeEFS = efsProjekte.filter(p => !['REVOKED', 'CUSTOMER_REJECTED'].includes(p.simplified_status));
  const efsPipelineValue = activeEFS.reduce((s, p) => s + (p.gesamtpreis_eur || 0), 0);
  const efsCompleted = efsProjekte.filter(p => ['COMPLETED', 'GRID_CONNECTED', 'INSTALLED'].includes(p.simplified_status));
  const efsCompletedValue = efsCompleted.reduce((s, p) => s + (p.gesamtpreis_eur || 0), 0);

  // Conversion rate from lead to sale
  const isTerm = s => /terminiert|termin gelegt|termin vor ort|angebot/i.test(s);
  const isAuft = s => /auftrag|vertrag|sale/i.test(s);
  const termLeads = leads.filter(l => isTerm(l.status_name || '') || isAuft(l.status_name || '')).length;
  const convRate = leads.length > 0 ? (termLeads / leads.length * 100) : 0;

  return { pipelineNetto, monthlyTrend, forecast, avgSales, avgNetto, efsPipelineValue, efsCompletedValue, convRate, openCount: openAuftraege.length };
}

// ═══ MONATSVERGLEICH PROCESSING ═══
function processVergleich(auftraege, leads, termine) {
  const mMap = {};
  const addMonth = (m) => { if (!mMap[m]) mMap[m] = { m, label: monthNames[parseInt(m.slice(5,7))-1] + ' ' + m.slice(2,4), sales: 0, storno: 0, netto: 0, leads: 0, termine: 0, termStattgef: 0 }; };
  const today = new Date().toISOString().slice(0, 10);

  auftraege.forEach(a => {
    const m = (a.auftrags_datum || '').slice(0, 7);
    if (!m || m < '2025-01') return;
    addMonth(m);
    if (a.storniert) mMap[m].storno++;
    else { mMap[m].sales++; mMap[m].netto += (a.an_wert_netto || 0) / 100; }
  });
  leads.forEach(l => {
    const m = (l.erster_status_datum || l.leveto_erstellt_am || '').slice(0, 7);
    if (!m || m < '2025-01') return;
    addMonth(m);
    mMap[m].leads++;
  });
  termine.forEach(t => {
    const m = (t.start_date || '').slice(0, 7);
    if (!m || m < '2025-01') return;
    addMonth(m);
    mMap[m].termine++;
    const d = (t.start_date || '').slice(0, 10);
    if (d <= today && t.status !== 'Cancelled') mMap[m].termStattgef++;
  });

  const months = Object.values(mMap).sort((a, b) => a.m.localeCompare(b.m));
  months.forEach((m, i) => {
    if (i > 0) {
      const prev = months[i - 1];
      m.salesGrowth = prev.sales > 0 ? ((m.sales - prev.sales) / prev.sales * 100) : 0;
      m.leadsGrowth = prev.leads > 0 ? ((m.leads - prev.leads) / prev.leads * 100) : 0;
      m.nettoGrowth = prev.netto > 0 ? ((m.netto - prev.netto) / prev.netto * 100) : 0;
    } else {
      m.salesGrowth = 0; m.leadsGrowth = 0; m.nettoGrowth = 0;
    }
    m.convRate = m.leads > 0 ? (m.sales / m.leads * 100) : 0;
    m.termConv = m.termine > 0 ? (m.termStattgef / m.termine * 100) : 0;
  });

  return { months };
}

        <MiniStat label="Terminiert" value={fmt(f.terminiert)} sub={`${convRate}% Quote`} color={C.green} />
        <MiniStat label="Auftrag" value={fmt(f.auftrag)} sub={`${auftrRate}% der Leads`} color={C.gold} />
        <MiniStat label="Storno" value={fmt(f.storno)} color={C.red} />
        <MiniStat label="Nicht erreicht" value={fmt(f.ne)} sub={`${neRate}%`} color={C.orange} />
        <MiniStat label="Ø Bearbeitung" value={d.processing.median > 0 ? (d.processing.median < 24 ? `${d.processing.median.toFixed(0)}h` : `${(d.processing.median/24).toFixed(1)}d`) : '–'} sub={d.processing.count > 0 ? `${fmt(d.processing.count)} gemessen` : ''} color={C.cyan} />

      {/* ── Funnel + Status ── */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:18 }} className="grid-1">

          <FunnelBar label="Auftrag / Sale" value={f.auftrag} total={d.total} color={C.gold} icon="🎉" />
          <FunnelBar label="Kein Interesse" value={f.keinInt} total={d.total} color={C.dim} icon="🚫" />
          <FunnelBar label="Nicht erreicht" value={f.ne} total={d.total} color={C.orange} icon="📵" />
          <FunnelBar label="WVL / Wiedervorlage" value={f.wvl} total={d.total} color={C.blue} icon="🔄" />
          <FunnelBar label="Nicht im PLZ-Gebiet" value={f.noPLZ} total={d.total} color={C.purple} icon="📍" />
          <FunnelBar label="Storniert" value={f.storno} total={d.total} color={C.red} icon="❌" />
          <FunnelBar label="REKLAMATION" value={f.rekl} total={d.total} color="#F85149" icon="⚠️" />

        <Sec title="📊 Status-Verteilung">
          <ResponsiveContainer width="100%" height={280}>
            <PieChart>
              <Pie data={d.status.slice(0, 10)} cx="50%" cy="50%" outerRadius={85} innerRadius={40} dataKey="v" paddingAngle={2}
                label={({ name, v }) => v > d.total*0.03 ? `${name}: ${v}` : ''} labelLine={false} style={{ fontSize: 10 }}>
                {d.status.slice(0, 10).map((s, i) => <Cell key={i} fill={s.fill || CL[i % CL.length]} />)}
              </Pie>
              <Tooltip contentStyle={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:12 }} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginTop:8, justifyContent:'center' }}>
            {d.status.slice(0,10).map((s,i) => (
              <span key={i} style={{ fontSize:10, color:C.sec, display:'flex', alignItems:'center', gap:4 }}>
                <span style={{ width:8, height:8, borderRadius:2, background:s.fill||CL[i%CL.length], flexShrink:0 }} />
                {s.name} ({fmt(s.v)})
              </span>
            ))}
          </div>
        </Sec>
      </div>

      {/* ── Timeline ── */}
      {d.weekly.length > 2 && (
        <Sec title="📈 Lead-Verlauf (Wochen)" sub="Eingegangene Leads vs. Terminierte">
          <ResponsiveContainer width="100%" height={220}>
            <ComposedChart data={d.weekly} margin={{ top:5, right:10, left:0, bottom:5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="d" stroke={C.dim} tick={{ fontSize:10, fill:C.sec }} />
              <YAxis stroke={C.dim} tick={{ fontSize:10, fill:C.sec }} />
              <Tooltip contentStyle={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:12 }} />
              <Area type="monotone" dataKey="total" name="Leads" fill={`${C.blue}20`} stroke={C.blue} strokeWidth={2} />
              <Line type="monotone" dataKey="term" name="Terminiert" stroke={C.green} strokeWidth={2} dot={{ r:3, fill:C.green }} />
            </ComposedChart>
          </ResponsiveContainer>
        </Sec>
      )}

      {/* ── Quellen + Berater ── */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:18 }} className="grid-1">
        <Sec title="📡 Leads nach Quelle" sub="Mit Terminierungs- & Auftragsquote">
          <RankTable data={d.quellen.filter(q=>q.total>1)} columns={[
            { label: 'Quelle', key: 'n', bold: true },
            { label: 'Leads', key: 'total', align: 'center', mono: true, bold: true },
            { label: 'Term.', key: 'term', align: 'center', mono: true, color: () => C.green },
            { label: 'Auftr.', key: 'auftrag', align: 'center', mono: true, color: () => C.gold },
            { label: 'NE', key: 'ne', align: 'center', mono: true, color: () => C.orange },
            { label: 'T-Rate', render: r => `${r.total > 0 ? (r.term/r.total*100).toFixed(0) : 0}%`, align: 'center', mono: true, color: r => r.total > 3 && r.term/r.total > 0.15 ? C.green : C.sec },
          ]} />
        </Sec>

        <Sec title="🏆 Berater-Ranking" sub="Nach Terminierungsleistung">
          <RankTable data={d.beraterLeads.filter(b => b.total > 5).slice(0, 20)} columns={[
            { label: '#', render: (_, i) => i + 1, align: 'center' },
            { label: 'Berater', key: 'n', bold: true },
            { label: 'Leads', key: 'total', align: 'center', mono: true },
            { label: 'Term.', key: 'term', align: 'center', mono: true, bold: true, color: () => C.green },
            { label: 'Auftr.', key: 'auftrag', align: 'center', mono: true, color: () => C.gold },
            { label: 'NE', key: 'ne', align: 'center', mono: true, color: () => C.orange },
            { label: 'Quote', render: r => `${r.total > 0 ? (r.term/r.total*100).toFixed(0) : 0}%`, align: 'center', mono: true, color: r => r.total > 5 && r.term/r.total > 0.2 ? C.green : C.sec },
          ]} />
        </Sec>
      </div>

      {/* ── Geo-Analyse ── */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:18 }} className="grid-1">
        <Sec title="🗺️ Top Städte" sub="Nach Lead-Aufkommen">
          <div style={{ maxHeight:380, overflowY:'auto' }}>
            <RankTable data={d.topOrte.slice(0,15)} columns={[
              { label: '#', render: (_, i) => i + 1, align: 'center' },
              { label: 'Stadt', key: 'n', bold: true },
              { label: 'PLZ', key: 'plz', align: 'center', mono: true, color: () => C.dim },
              { label: 'Leads', key: 'total', align: 'center', mono: true, bold: true },
              { label: 'Term.', key: 'term', align: 'center', mono: true, color: () => C.green },
              { label: 'Rate', render: r => `${r.total > 0 ? (r.term/r.total*100).toFixed(0) : 0}%`, align: 'center', mono: true },
            ]} />
          </div>
        </Sec>

        <Sec title="📮 PLZ-Regionen" sub="Erste 2 Stellen der PLZ">
          <ResponsiveContainer width="100%" height={Math.min(d.plzRegionen.length * 28 + 30, 380)}>
            <BarChart data={d.plzRegionen} layout="vertical" margin={{ top:5, right:10, left:40, bottom:5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} horizontal={false} />
              <XAxis type="number" stroke={C.dim} tick={{ fontSize:10, fill:C.sec }} />
              <YAxis type="category" dataKey="n" stroke={C.dim} tick={{ fontSize:10, fill:C.sec }} width={50} />
              <Tooltip contentStyle={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:12 }} />
              <Bar dataKey="total" name="Leads" fill={C.blue} radius={[0,4,4,0]} barSize={16} />
              <Bar dataKey="term" name="Terminiert" fill={C.green} radius={[0,4,4,0]} barSize={16} />
            </BarChart>
          </ResponsiveContainer>
        </Sec>
      </div>

      {/* ── Full Status Table ── */}
      <Sec title="📋 Alle Status" sub={`${d.status.length} verschiedene Status`}>
        <div style={{ maxHeight:350, overflowY:'auto' }}>
          <RankTable data={d.status} columns={[
            { label: '#', render: (_, i) => i + 1, align: 'center' },
            { label: 'Status', key: 'name', bold: true, render: r => <span style={{ display:'flex', alignItems:'center', gap:6 }}><span style={{ width:8, height:8, borderRadius:2, background:r.fill, flexShrink:0 }} />{r.name}</span> },
            { label: 'Anzahl', key: 'v', align: 'center', mono: true, bold: true },
            { label: 'Anteil', render: r => `${(r.v/d.total*100).toFixed(1)}%`, align: 'center', mono: true, color: () => C.sec },
          ]} />
        </div>
      </Sec>
    </div>
  );
};

          { label: 'Gesamt', key: 'total', align: 'center', mono: true, bold: true },
          { label: 'Stattgef.', key: 'stattgefunden', align: 'center', mono: true, color: () => C.green },
          { label: 'Ausgefallen', key: 'ausgefallen', align: 'center', mono: true, color: () => C.red },
          { label: 'Quote %', render: r => { const t = r.stattgefunden + r.ausgefallen; return t > 0 ? `${pct(r.stattgefunden, t)}%` : '–'; }, align: 'center', mono: true },
        ]} />

};

// ═══ TAB: CASHFLOW ═══
const TabCashflow = ({ data }) => {
  if (!data) return null;
  const d = data;
  const lastMonth = d.monthly.length > 0 ? d.monthly[d.monthly.length - 1] : null;
  const GrowthBadge2 = ({ v }) => { if (!v || isNaN(v)) return <span style={{ color: C.dim }}>–</span>; return <span style={{ color: v > 0 ? C.red : C.green, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>{v > 0 ? '▲' : '▼'} {Math.abs(v).toFixed(0)}%</span>; };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }} className="grid-cards">
        <KPI label="Gesamteinnahmen" value={eur(d.totalEin)} sub={`${fmt(d.total)} Buchungen`} color={C.green} />
        <KPI label="Gesamtausgaben" value={eur(d.totalAus)} color={C.red} />
        <KPI label="Netto-Saldo" value={eur(d.totalEin - d.totalAus)} color={d.totalEin > d.totalAus ? C.green : C.red} />
        <KPI label="Ø Burn-Rate/Monat" value={eur(d.avgBurn)} sub={`Ø Einnahmen: ${eur(d.avgIncome)}`} color={C.orange} />
        <KPI label="Liquiditäts-Runway" value={d.runwayMonths >= 99 ? '∞' : `${d.runwayMonths.toFixed(1)} Mon.`} sub={d.netBurn > 0 ? `Netto-Burn: ${eur(d.netBurn)}/Mo` : 'Positiver Cashflow!'} color={d.runwayMonths > 6 ? C.green : d.runwayMonths > 3 ? C.orange : C.red} />
        <KPI label="Kumulierter Saldo" value={eur(d.lastCum)} color={d.lastCum >= 0 ? C.green : C.red} />
      </div>

      <Sec title="💰 Monatlicher Cashflow" sub="Einnahmen vs. Ausgaben mit kumuliertem Saldo">
        <ResponsiveContainer width="100%" height={320}>
          <ComposedChart data={d.monthly}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fill: C.sec, fontSize: 11 }} />
            <YAxis yAxisId="left" tick={{ fill: C.sec, fontSize: 11 }} tickFormatter={v => v >= 1000 ? `${(v/1000).toFixed(0)}k` : v} />
            <YAxis yAxisId="right" orientation="right" tick={{ fill: C.sec, fontSize: 11 }} tickFormatter={v => v >= 1000 ? `${(v/1000).toFixed(0)}k` : v} />
            <Tooltip content={<TT />} />
            <Bar dataKey="ein" name="Einnahmen" fill={C.green} radius={[4,4,0,0]} yAxisId="left" />
            <Bar dataKey="aus" name="Ausgaben" fill={`${C.red}90`} radius={[4,4,0,0]} yAxisId="left" />
            <Line dataKey="saldo" name="Monatssaldo" stroke={C.gold} strokeWidth={2} dot={{ fill: C.gold, r: 4 }} yAxisId="left" />
            <Line dataKey="cumSaldo" name="Kumuliert" stroke={C.cyan} strokeWidth={2} strokeDasharray="5 3" dot={{ fill: C.cyan, r: 3 }} yAxisId="right" />
          </ComposedChart>
        </ResponsiveContainer>
      </Sec>

      {d.catBreakdown.length > 0 && <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18 }} className="grid-1">
        <Sec title="📊 Ausgaben nach Kategorie" sub="Automatische Klassifizierung">
          <ResponsiveContainer width="100%" height={250}>
            <PieChart>
              <Pie data={d.catBreakdown.slice(0,8)} cx="50%" cy="50%" outerRadius={85} innerRadius={35} dataKey="sum" paddingAngle={2}
                label={({name,sum}) => sum > d.totalAus*0.05 ? `${name.split(' ')[0]}` : ''} labelLine={false} style={{fontSize:10}}>
                {d.catBreakdown.slice(0,8).map((_, i) => <Cell key={i} fill={CL[i % CL.length]} />)}
              </Pie>
              <Tooltip contentStyle={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:8, color:C.text, fontSize:12 }} formatter={v => eur(v)} />
            </PieChart>
          </ResponsiveContainer>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginTop:8, justifyContent:'center' }}>
            {d.catBreakdown.slice(0,8).map((c,i) => (
              <span key={i} style={{ fontSize:10, color:C.sec, display:'flex', alignItems:'center', gap:4 }}>
                <span style={{ width:8, height:8, borderRadius:2, background:CL[i%CL.length], flexShrink:0 }} />
                {c.name} ({eur(c.sum)})
              </span>
            ))}
          </div>
        </Sec>
        <Sec title="📋 Kategorie-Details">
          <RankTable data={d.catBreakdown} columns={[
            { label: '#', render: (r, i) => i + 1, align: 'center' },
            { label: 'Kategorie', key: 'name', bold: true },
            { label: 'Betrag', render: r => eur(r.sum), align: 'right', mono: true, color: C.red },
            { label: 'Anteil', render: r => `${(r.sum / d.totalAus * 100).toFixed(1)}%`, align: 'center', mono: true },
            { label: 'Anz.', key: 'cnt', align: 'center', mono: true },
          ]} />
        </Sec>
      </div>}

      {d.catMonthlyData.length > 1 && <Sec title="📈 Ausgaben-Kategorien im Zeitverlauf" sub="Top-Kategorien pro Monat">
        <ResponsiveContainer width="100%" height={280}>
          <BarChart data={d.catMonthlyData}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fill: C.sec, fontSize: 11 }} />
            <YAxis tick={{ fill: C.sec, fontSize: 11 }} tickFormatter={v => v >= 1000 ? `${(v/1000).toFixed(0)}k` : v} />
            <Tooltip content={<TT />} />
            {d.catNames.map((cn, i) => <Bar key={cn} dataKey={cn} name={cn} stackId="a" fill={CL[i % CL.length]} />)}
          </BarChart>
        </ResponsiveContainer>
      </Sec>}

      {lastMonth && <Sec title={`📅 Aktueller Monat: ${lastMonth.label}`} sub={`${lastMonth.einCnt} Eingänge · ${lastMonth.ausCnt} Ausgänge`}>
        <div style={{ display: 'flex', gap: 24, flexWrap: 'wrap', alignItems: 'center' }}>
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 6 }}>
              <span style={{ color: C.green, fontWeight: 700 }}>+ {eur(lastMonth.ein)}</span>
              <span style={{ color: C.red, fontWeight: 700 }}>- {eur(lastMonth.aus)}</span>
            </div>
            <div style={{ height: 12, borderRadius: 6, background: `${C.red}40`, overflow: 'hidden' }}>
              <div style={{ width: `${lastMonth.ein / (lastMonth.ein + lastMonth.aus) * 100}%`, height: '100%', background: C.green, borderRadius: 6 }} />
            </div>
            <div style={{ textAlign: 'center', marginTop: 8, fontSize: 18, fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", color: lastMonth.saldo >= 0 ? C.green : C.red }}>
              {lastMonth.saldo >= 0 ? '+' : ''}{eur(lastMonth.saldo)}
            </div>
          </div>
        </div>
      </Sec>}

      <Sec title="📊 Monatsvergleich (MoM)" sub="Ein- und Ausgaben-Wachstum">
        <div style={{ overflowX: 'auto' }}>
          <RankTable data={d.monthly} columns={[
            { label: 'Monat', key: 'label', bold: true },
            { label: 'Einnahmen', render: r => eur(r.ein), align: 'right', mono: true, color: C.green },
            { label: 'MoM', render: r => <GrowthBadge2 v={r.einGrowth} />, align: 'center' },
            { label: 'Ausgaben', render: r => eur(r.aus), align: 'right', mono: true, color: C.red },
            { label: 'MoM', render: r => <GrowthBadge2 v={r.ausGrowth} />, align: 'center' },
            { label: 'Saldo', render: r => <span style={{color: r.saldo >= 0 ? C.green : C.red, fontWeight:700}}>{r.saldo >= 0?'+':''}{eur(r.saldo)}</span>, align: 'right', mono: true },
            { label: 'Kumuliert', render: r => eur(r.cumSaldo), align: 'right', mono: true, color: r => r.cumSaldo >= 0 ? C.cyan : C.red },
          ]} />

        <ResponsiveContainer width="100%" height={300}>
          <ComposedChart data={chartData}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fill: C.sec, fontSize: 11 }} />
            <YAxis tick={{ fill: C.sec, fontSize: 11 }} />
            <Tooltip content={<TT />} />
            <Bar dataKey="sales" name="Sales" fill={C.blue} radius={[4,4,0,0]} />
            <Line dataKey="netto" name="Netto (€)" stroke={C.gold} strokeWidth={2} strokeDasharray={chartData.map((c, i) => i >= d.monthlyTrend.length ? '5 5' : '0').join(' ')} dot={{ fill: C.gold, r: 3 }} />
          </ComposedChart>
        </ResponsiveContainer>
      </Sec>
      <Sec title="3-Monats-Forecast Details">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 }} className="grid-1">
          {d.forecast.map((f, i) => (
            <div key={i} style={{ background: `${C.gold}08`, border: `1px solid ${C.gold}20`, borderRadius: 12, padding: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.gold, marginBottom: 8 }}>{f.label}</div>
              <div style={{ fontSize: 11, color: C.sec, marginBottom: 4 }}>Sales-Prognose:</div>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 20, fontWeight: 800, color: C.text }}>{f.salesMid}</div>
              <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>Range: {f.salesLow} – {f.salesHigh}</div>
              <div style={{ fontSize: 11, color: C.sec, marginTop: 8 }}>Erwarteter Umsatz:</div>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 16, fontWeight: 700, color: C.green }}>{eur(f.nettoMid)}</div>
            </div>
          ))}
        </div>
      </Sec>
    </div>
  );
};

// ═══ TAB: MONATSVERGLEICH ═══
const TabVergleich = ({ data }) => {
  if (!data) return null;
  const d = data;
  const GrowthBadge = ({ v }) => {
    if (v === 0 || isNaN(v)) return <span style={{ color: C.dim }}>–</span>;
    return <span style={{ color: v > 0 ? C.green : C.red, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}>{v > 0 ? '▲' : '▼'} {Math.abs(v).toFixed(1)}%</span>;
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      <Sec title="Monatlicher Trend" sub="Sales, Leads & Umsatz im Zeitverlauf">
        <ResponsiveContainer width="100%" height={300}>
          <ComposedChart data={d.months}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fill: C.sec, fontSize: 11 }} />
            <YAxis yAxisId="left" tick={{ fill: C.sec, fontSize: 11 }} />
            <YAxis yAxisId="right" orientation="right" tick={{ fill: C.sec, fontSize: 11 }} tickFormatter={v => v >= 1000 ? `${(v/1000).toFixed(0)}k` : v} />
            <Tooltip content={<TT />} />
            <Bar dataKey="sales" name="Sales" fill={C.gold} radius={[4,4,0,0]} yAxisId="left" />
            <Bar dataKey="storno" name="Storno" fill={`${C.red}70`} radius={[4,4,0,0]} yAxisId="left" />
            <Line dataKey="netto" name="Netto (€)" stroke={C.green} strokeWidth={2} dot={{ fill: C.green, r: 3 }} yAxisId="right" />
          </ComposedChart>
        </ResponsiveContainer>
      </Sec>
      <Sec title="Detailvergleich pro Monat">
        <div style={{ overflowX: 'auto' }}>
          <RankTable data={d.months} columns={[
            { label: 'Monat', key: 'label', bold: true },
            { label: 'Sales', key: 'sales', align: 'center', mono: true, color: C.gold, bold: true },
            { label: 'MoM', render: r => <GrowthBadge v={r.salesGrowth} />, align: 'center' },
            { label: 'Storno', key: 'storno', align: 'center', mono: true, color: C.red },
            { label: 'Netto', render: r => eur(r.netto), align: 'right', mono: true },
            { label: 'MoM', render: r => <GrowthBadge v={r.nettoGrowth} />, align: 'center' },
            { label: 'Leads', key: 'leads', align: 'center', mono: true, color: C.blue },
            { label: 'MoM', render: r => <GrowthBadge v={r.leadsGrowth} />, align: 'center' },
            { label: 'Termine', key: 'termine', align: 'center', mono: true },
            { label: 'Conv%', render: r => `${r.convRate.toFixed(1)}%`, align: 'center', color: r => r.convRate > 5 ? C.green : C.orange },
          ]} />
        </div>
      </Sec>
      <Sec title="Leads-Trend">
        <ResponsiveContainer width="100%" height={220}>
          <AreaChart data={d.months}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
            <XAxis dataKey="label" tick={{ fill: C.sec, fontSize: 11 }} />
            <YAxis tick={{ fill: C.sec, fontSize: 11 }} />
            <Tooltip content={<TT />} />
            <Area dataKey="leads" name="Leads" fill={`${C.blue}30`} stroke={C.blue} strokeWidth={2} />
            <Area dataKey="termine" name="Termine" fill={`${C.purple}30`} stroke={C.purple} strokeWidth={2} />
          </AreaChart>
        </ResponsiveContainer>
      </Sec>
    </div>
  );
};

// ═══ MAIN APP ═══
const App = () => {
  const availableMonths = useMemo(() => getAvailableMonths(), []);
  const [selectedMonth, setSelectedMonth] = useState(() => {
    const now = new Date();
    return { year: now.getFullYear(), month: now.getMonth() + 1 };
  });
  const [tab, setTab] = useState('sales');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastUpdate, setLastUpdate] = useState(null);

  // Raw data
  const [auftraege, setAuftraege] = useState([]);
  const [leads, setLeads] = useState([]);
  const [termine, setTermine] = useState([]);
  const [efsProjekte, setEfsProjekte] = useState([]);
  const [mitarbeiterList, setMitarbeiterList] = useState([]);
  const [vertriebler, setVertriebler] = useState([]);
  const [bankTransactions, setBankTransactions] = useState([]);
  const [payHistorie, setPayHistorie] = useState([]);

  // Name maps
  const mitarbeiterMap = useMemo(() => {
    const map = {};
    mitarbeiterList.forEach(m => {
      map[m.id] = `${m.vorname} ${m.nachname}`.trim();
    });
    return map;
  }, [mitarbeiterList]);

  const vertrMap = useMemo(() => {
    const map = {};
    vertriebler.forEach(v => { map[v.id] = v.name; });
    return map;
  }, [vertriebler]);

  // Data fetching
  const fetchData = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const isAll = selectedMonth.year === 0;
      const start = isAll ? '2025-10-01' : `${selectedMonth.year}-${String(selectedMonth.month).padStart(2,'0')}-01`;
      const nextMonth = isAll ? `${new Date().getFullYear() + 1}-01-01` : (selectedMonth.month === 12 ? `${selectedMonth.year+1}-01-01` : `${selectedMonth.year}-${String(selectedMonth.month+1).padStart(2,'0')}-01`);

      const [auftraegeData, leadsData, termineData, efsData, maData, vertrData, bankData, payData] = await Promise.all([
        sbFetchAll('auftraege', `auftrags_datum=gte.${start}&auftrags_datum=lt.${nextMonth}&order=auftrags_datum.asc`),
        sbFetchAll('leveto_leads', `erster_status_datum=gte.${start}&erster_status_datum=lt.${nextMonth}&order=erster_status_datum.asc`),
        sbFetchAll('leveto_termine', `start_date=gte.${start}&start_date=lt.${nextMonth}&appointment_type=in.("Termin vor Ort PV","Termin vor Ort ( SCOUT )","Folgetermin vor Ort")&order=start_date.asc`),
        sbFetchAll('efs_projekte', 'order=erstellt_am.desc'),
        sbFetch('mitarbeiter', 'select=id,vorname,nachname,kuerzel,typ&limit=500'),
        sbFetch('vertriebler', 'select=id,name&limit=100'),
        sbFetchAll('bank_transactions', 'order=buchungsdatum.desc'),
        sbFetchAll('pay_auszahlungen_historie', 'order=periode.desc'),
      ]);

      setAuftraege(auftraegeData);
      setLeads(leadsData);
      setTermine(termineData);
      setEfsProjekte(efsData);
      setMitarbeiterList(maData);
      setVertriebler(vertrData);
      setBankTransactions(bankData);
      setPayHistorie(payData);
      setLastUpdate(new Date());
    } catch (err) {
      console.error('Fetch error:', err);
      setError(err.message);
    }
    setLoading(false);
  }, [selectedMonth]);

  useEffect(() => { fetchData(); }, [fetchData]);

  // Processed data
  const salesData = useMemo(() => auftraege.length > 0 ? processAuftraege(auftraege, mitarbeiterMap) : null, [auftraege, mitarbeiterMap]);
  const leadsData = useMemo(() => leads.length > 0 ? processLeads(leads) : null, [leads]);
  const termineData = useMemo(() => termine.length > 0 ? processTermine(termine) : null, [termine]);
  const efsData = useMemo(() => efsProjekte.length > 0 ? processEFS(efsProjekte) : null, [efsProjekte]);
  const cashflowData = useMemo(() => bankTransactions.length > 0 ? processCashflow(bankTransactions) : null, [bankTransactions]);
  const teamData = useMemo(() => (auftraege.length > 0 || termine.length > 0) ? processTeam(auftraege, termine, leads, mitarbeiterList) : null, [auftraege, termine, leads, mitarbeiterList]);
  const pipelineData = useMemo(() => leads.length > 0 ? processPipeline(leads, auftraege) : null, [leads, auftraege]);
  const provisionenData = useMemo(() => payHistorie.length > 0 ? processProvisionen(payHistorie) : null, [payHistorie]);
  const forecastData = useMemo(() => auftraege.length > 0 ? processForecast(auftraege, leads, efsProjekte) : null, [auftraege, leads, efsProjekte]);
  const vergleichData = useMemo(() => (auftraege.length > 0 || leads.length > 0) ? processVergleich(auftraege, leads, termine) : null, [auftraege, leads, termine]);

  const monthLabel = selectedMonth.year === 0 ? 'Gesamt (ab Okt 2025)' : `${monthNames[selectedMonth.month - 1]} ${selectedMonth.year}`;

  return (
    <div style={{ maxWidth: 1400, margin: '0 auto', padding: '60px 20px 40px' }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <span style={{ fontSize: 28, fontWeight: 800, color: C.text }}>bee-doo</span>
            <span style={{ fontSize: 28, fontWeight: 800, color: C.gold }}>Reporting</span>
            <span style={{ background: '#22c55e20', color: '#22c55e', padding: '3px 10px', borderRadius: 20, fontSize: 10, fontWeight: 700 }}>● LIVE</span>
          </div>
          <div style={{ fontSize: 12, color: C.sec, marginTop: 2 }}>
            Daten direkt aus Supabase · Letztes Update: {lastUpdate ? lastUpdate.toLocaleString('de-DE') : '–'}
          </div>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <select
            value={`${selectedMonth.year}-${selectedMonth.month}`}
            onChange={e => {
              const [y, m] = e.target.value.split('-').map(Number);
              setSelectedMonth({ year: y, month: m });
            }}
            style={{
              background: C.card, border: `1px solid ${C.border}`, color: C.text,
              padding: '8px 14px', borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: 'pointer',
            }}
          >
            {availableMonths.map(m => (
              <option key={`${m.year}-${m.month}`} value={`${m.year}-${m.month}`}>{m.label}</option>
            ))}
          </select>
          <button
            onClick={fetchData}
            disabled={loading}
            style={{
              background: loading ? C.dim : C.gold, color: '#000', border: 'none',
              padding: '8px 16px', borderRadius: 10, fontSize: 13, fontWeight: 700,
              cursor: loading ? 'wait' : 'pointer',
            }}
          >
            {loading ? '⏳' : '🔄'} Refresh
          </button>
        </div>
      </div>

      {error && (
        <div style={{ background: `${C.red}15`, border: `1px solid ${C.red}40`, borderRadius: 12, padding: 16, marginBottom: 18, color: C.red, fontSize: 13 }}>
          ❌ Fehler beim Laden: {error}
        </div>
      )}

      {loading ? <LoadingSpinner /> : (
        <>
          {/* Overview KPIs */}
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginBottom: 24 }} className="grid-cards">
            <KPI label="Aufträge aktiv" value={fmt(salesData?.aktiv || 0)} sub={`${monthLabel}`} color={C.gold} />
            <KPI label="Umsatz Netto" value={eur(salesData?.nettoAktiv || 0)} color={C.green} />
            <KPI label="Leads" value={fmt(leadsData?.total || leads.length)} sub={leadsData?.funnel ? `${fmt(leadsData.funnel.terminiert)} terminiert` : (leads.length < 100 ? "⚠️ Sync unvollst." : "")} color={C.blue} />
            <KPI label="Termine" value={fmt(termineData?.total || 0)} color={C.purple} />
            <KPI label="EFS Pipeline" value={fmt(efsData?.activeCount || 0)} sub={eur(efsData?.totalRevenue || 0)} color={C.cyan} />
          </div>

          {/* Tabs */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 20, overflowX: 'auto', paddingBottom: 4, flexWrap: 'wrap' }}>
            <TabBtn active={tab === 'sales'} onClick={() => setTab('sales')} count={salesData?.aktiv}>📊 Sales</TabBtn>
            <TabBtn active={tab === 'leads'} onClick={() => setTab('leads')} count={leadsData?.total || leads.length}>📥 Leads</TabBtn>
            <TabBtn active={tab === 'termine'} onClick={() => setTab('termine')} count={termineData?.total}>📅 Termine</TabBtn>
            <TabBtn active={tab === 'efs'} onClick={() => setTab('efs')} count={efsData?.total}>🔧 EFS</TabBtn>
            <TabBtn active={tab === 'cashflow'} onClick={() => setTab('cashflow')} count={bankTransactions.length}>💰 Cashflow</TabBtn>
            <TabBtn active={tab === 'team'} onClick={() => setTab('team')}>🏆 Team</TabBtn>
            <TabBtn active={tab === 'pipeline'} onClick={() => setTab('pipeline')}>⏱️ Pipeline</TabBtn>
            <TabBtn active={tab === 'provisionen'} onClick={() => setTab('provisionen')} count={payHistorie.length}>💳 Provisionen</TabBtn>
            <TabBtn active={tab === 'forecast'} onClick={() => setTab('forecast')}>🔮 Forecast</TabBtn>
            <TabBtn active={tab === 'vergleich'} onClick={() => setTab('vergleich')}>📈 Vergleich</TabBtn>
          </div>

          {/* Tab Content */}
          {tab === 'sales' && <TabSales data={salesData} />}
          {tab === 'leads' && <TabLeads data={leadsData || { total: 0, status: [], quellen: [], beraterLeads: [], weekly: [], topOrte: [], plzRegionen: [], anredeMap: {}, indicatorMap: {}, funnel: { terminiert:0, auftrag:0, storno:0, ne:0, keinInt:0, rekl:0, neu:0, wvl:0, noPLZ:0, optIn:0, hasEFS:0 }, processing: { median:0, avg:0, count:0 } }} hasWarning={leads.length < 100} />}
          {tab === 'termine' && <TabTermine data={termineData} />}
          {tab === 'efs' && <TabEFS data={efsData} />}
          {tab === 'cashflow' && <TabCashflow data={cashflowData} />}
          {tab === 'team' && <TabTeam data={teamData} />}
          {tab === 'pipeline' && <TabPipeline data={pipelineData} />}
          {tab === 'provisionen' && <TabProvisionen data={provisionenData} />}
          {tab === 'forecast' && <TabForecast data={forecastData} />}
          {tab === 'vergleich' && <TabVergleich data={vergleichData} />}

          {/* Footer */}
          <div style={{ textAlign: 'center', color: C.dim, fontSize: 11, marginTop: 40, padding: 20 }}>
            bee-doo GmbH · Reporting Dashboard · Live-Daten aus Supabase<br />
            {auftraege.length} Aufträge · {leads.length} Leads · {termine.length} Termine · {efsProjekte.length} EFS · {bankTransactions.length} Buchungen · {payHistorie.length} Provisionen
          </div>
        </>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
