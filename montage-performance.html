<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bee-doo | Montage Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root{--a:#F5C500;--ad:rgba(245,197,0,.12);--bg:#08090d;--c:#111219;--ch:#16171f;--el:#1a1b24;--b:rgba(255,255,255,.06);--ba:rgba(245,197,0,.2);--t:#d8dae2;--td:#6b7280;--tb:#f3f4f6;--g:#22c55e;--gd:rgba(34,197,94,.12);--r:#ef4444;--rd:rgba(239,68,68,.12);--o:#f59e0b;--od:rgba(245,158,11,.12);--bl:#3b82f6;--bld:rgba(59,130,246,.12);--p:#a855f7;--pd:rgba(168,85,247,.12);--cy:#06b6d4;--cyd:rgba(6,182,212,.12)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
        @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes sp{to{transform:rotate(360deg)}}
        .fi{animation:fi .3s ease-out}.spinner{width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
        .hdr{padding:14px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(245,197,0,.02) 0%,transparent 100%)}
        .hdr-l{display:flex;align-items:center;gap:14px}.logo{font-size:18px;font-weight:700;color:var(--a);letter-spacing:-.5px}.logo span{color:var(--td);font-weight:400;font-size:15px}
        .hdr-lk{font-size:12px;color:var(--td);text-decoration:none;padding:5px 10px;border-radius:6px;border:1px solid var(--b);transition:all .2s}.hdr-lk:hover{color:var(--a);border-color:var(--ba);background:var(--ad)}
        .mn{max-width:1440px;margin:0 auto;padding:24px 28px}
        .sts{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
        .st{background:var(--c);border:1px solid var(--b);border-radius:10px;padding:16px 18px}.st-l{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}.st-v{font-size:28px;font-weight:700}.st-s{font-size:10px;margin-top:3px}
        .cd{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:20px;margin-bottom:16px}
        .cd-t{font-size:15px;font-weight:600;color:var(--tb);display:flex;align-items:center;gap:8px;margin-bottom:14px}
        .mt{width:100%;border-collapse:collapse;font-size:12px}.mt th{text-align:left;padding:9px 12px;color:var(--td);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b)}
        .mt td{padding:8px 12px;border-bottom:1px solid var(--b)}.mt tr:last-child td{border:none}
        .tg{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
        .tg-r{background:var(--rd);color:var(--r)}.tg-o{background:var(--od);color:var(--o)}.tg-g{background:var(--gd);color:var(--g)}.tg-b{background:var(--bld);color:var(--bl)}.tg-p{background:var(--pd);color:var(--p)}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
        .bar-h{height:8px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.04)}.bar-f{height:100%;border-radius:4px;transition:width .5s ease}
        .funnel-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--b)}.funnel-row:last-child{border:none}
        .funnel-label{width:220px;font-size:12px;color:var(--tb);font-weight:500}
        .funnel-bar{flex:1;position:relative}
        .funnel-val{font-size:13px;font-weight:700;min-width:60px;text-align:right}
        .funnel-days{font-size:11px;color:var(--td);min-width:80px;text-align:right}
        .btn{padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
        .bo{background:transparent;color:var(--t);border:1px solid var(--b)}.bo:hover{border-color:var(--ba);color:var(--a)}
        .bsm{padding:6px 12px;font-size:11px}
        .tabs{display:flex;gap:2px;padding:0 28px;background:var(--bg);border-bottom:1px solid var(--b)}
        .tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--td);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:8px}.tab:hover{color:var(--t)}.tab.on{color:var(--a);border-bottom-color:var(--a)}
        @media(max-width:1100px){.grid2,.grid3{grid-template-columns:1fr}}
        @media(max-width:768px){.mn{padding:14px}.tabs{padding:0 14px;overflow-x:auto}.tab{padding:10px 14px;font-size:12px;white-space:nowrap}.sts{grid-template-columns:repeat(2,1fr)}.funnel-label{width:140px;font-size:11px}.hdr{padding:12px 14px}}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo}=React;
const SU='https://hqzpemfaljxcysyqssng.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const ap=t=>`${SU}/rest/v1/${t}`;
const hd=(x={})=>({apikey:SK,Authorization:`Bearer ${SK}`,'Content-Type':'application/json',...x});
const fm=v=>typeof v==='number'?v.toLocaleString('de-DE'):v;

function parseWH(wh){
    const steps=[];
    const parts=(wh||'').split(/(?=\d{2}\.\d{2}\.\d{4})/);
    for(const p of parts){
        const m=p.match(/^(\d{2})\.(\d{2})\.(\d{4})\s*-\s*(\d{2}):(\d{2})-\s*(.+?):\s*(.+)/);
        if(m){
            try{
                const dt=new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]);
                const source=m[6].trim();
                const action=m[7].trim();
                const trans=action.match(/^(.+?)\s*>\s*(.+)/);
                if(trans)steps.push({dt,source,from:trans[1].trim(),to:trans[2].trim()});
                else steps.push({dt,source,from:'',to:action});
            }catch(e){}
        }
    }
    return steps;
}

const STAGES=[
    {key:'auftrag',label:'Auftrag',color:'var(--a)'},
    {key:'dc_planung',label:'DC in Planung',color:'var(--bl)'},
    {key:'dc_freigabe',label:'DC Freigabe',color:'var(--bl)'},
    {key:'baustelle',label:'Baustelle gestartet',color:'var(--cy)'},
    {key:'dc_fertig',label:'DC Montage fertig',color:'var(--g)'},
    {key:'ac_freigabe',label:'AC Freigabe',color:'var(--p)'},
    {key:'ac_fertig',label:'AC Montage fertig',color:'var(--g)'},
    {key:'abgeschlossen',label:'Montage abgeschlossen',color:'var(--g)'}
];

const STAGE_MATCH={
    auftrag:['auftrag'],
    dc_planung:['dc in planung'],
    dc_freigabe:['dc freigabe','freigabe dc'],
    baustelle:['baustelle gestartet'],
    dc_fertig:['dc montage vollständig','dc montage voll'],
    ac_freigabe:['ac freigabe','freigabe ac'],
    ac_fertig:['ac montage vollständig','ac montage voll'],
    abgeschlossen:['montage abgeschlossen']
};

function matchStage(step){
    const s=step.toLowerCase();
    for(const[key,patterns] of Object.entries(STAGE_MATCH)){
        if(patterns.some(p=>s.includes(p)))return key;
    }
    return null;
}

function App(){
    const[loading,setLoading]=useState(true);
    const[orders,setOrders]=useState([]);
    const[appointments,setAppointments]=useState([]);
    const[tab,setTab]=useState('overview');

    const loadData=useCallback(async()=>{
        setLoading(true);
        try{
            const allOrders=[];
            for(let off=0;off<5000;off+=1000){
                const r=await fetch(ap('auftraege')+`?storniert=eq.false&workflow_history=neq.&select=auftrag_nr,kunde_name,kunde_plz,kunde_ort,beedoo_fortschritt,datum_angenommen,workflow_history,anlagen_kwp,hat_speicher&limit=1000&offset=${off}`,{headers:hd()});
                const d=await r.json();if(!d.length)break;allOrders.push(...d);
            }
            setOrders(allOrders);
            // Load appointments if available
            const apptR=await(await fetch(ap('leveto_appointments')+'?select=leveto_id,appointment_type,start_date,end_date,status,feedback_status,user_created,user_received,kunde_nachname,kunde_plz,storno_reason&limit=10000',{headers:hd()})).json();
            setAppointments(apptR);
        }catch(e){console.error(e)}
        setLoading(false);
    },[]);
    useEffect(()=>{loadData()},[loadData]);

    // Parse all workflows
    const analysis=useMemo(()=>{
        const stageCounts={};STAGES.forEach(s=>{stageCounts[s.key]=0});
        const stageDurations={};// key: 'from→to' -> [days]
        const monthlyCompletions={};// YYYY-MM -> count
        const plzCounts={};// 2-digit PLZ -> count
        const nacharbeitOrders=[];
        const completedOrders=[];
        let totalBaustelle=0;
        let totalNacharbeit=0;
        const stageTimePairs=[];// for transitions

        for(const o of orders){
            const steps=parseWH(o.workflow_history);
            if(!steps.length)continue;
            const reached={};let hasBaustelle=false,hasNacharbeit=false,isComplete=false;

            for(const s of steps){
                const stageKey=matchStage(s.to);
                if(stageKey&&!reached[stageKey]){
                    reached[stageKey]={dt:s.dt,source:s.source};
                    stageCounts[stageKey]++;
                }
                if(s.to.toLowerCase().includes('baustelle gestartet'))hasBaustelle=true;
                if(s.to.toLowerCase().includes('nacharbeit'))hasNacharbeit=true;
                if(s.to.toLowerCase().includes('montage abgeschlossen')){
                    isComplete=true;
                    const ym=`${s.dt.getFullYear()}-${String(s.dt.getMonth()+1).padStart(2,'0')}`;
                    monthlyCompletions[ym]=(monthlyCompletions[ym]||0)+1;
                    const plz2=(o.kunde_plz||'').substring(0,2);
                    if(plz2)plzCounts[plz2]=(plzCounts[plz2]||0)+1;
                }
            }
            if(hasBaustelle)totalBaustelle++;
            if(hasNacharbeit){totalNacharbeit++;nacharbeitOrders.push(o)}
            if(isComplete)completedOrders.push({...o,_reached:reached});

            // Compute stage-to-stage durations
            const stageOrder=['auftrag','dc_planung','dc_freigabe','baustelle','dc_fertig','ac_freigabe','ac_fertig','abgeschlossen'];
            for(let i=0;i<stageOrder.length-1;i++){
                const a=stageOrder[i],b=stageOrder[i+1];
                if(reached[a]&&reached[b]){
                    const days=Math.round((reached[b].dt-reached[a].dt)/(86400000));
                    if(days>=0&&days<365){
                        const k=`${a}→${b}`;
                        if(!stageDurations[k])stageDurations[k]=[];
                        stageDurations[k].push(days);
                    }
                }
            }
            // Also total: auftrag → abgeschlossen
            if(reached.auftrag&&reached.abgeschlossen){
                const days=Math.round((reached.abgeschlossen.dt-reached.auftrag.dt)/86400000);
                if(days>=0&&days<365){
                    if(!stageDurations['total'])stageDurations['total']=[];
                    stageDurations['total'].push(days);
                }
            }
        }

        // Compute medians
        const medians={};
        for(const[k,arr] of Object.entries(stageDurations)){
            arr.sort((a,b)=>a-b);
            medians[k]={median:arr[Math.floor(arr.length/2)],avg:Math.round(arr.reduce((s,v)=>s+v,0)/arr.length*10)/10,n:arr.length,p25:arr[Math.floor(arr.length*.25)],p75:arr[Math.floor(arr.length*.75)]};
        }

        return{stageCounts,medians,monthlyCompletions,plzCounts,totalBaustelle,totalNacharbeit,nacharbeitOrders,completedOrders,totalOrders:orders.length};
    },[orders]);

    // Appointments analysis
    const apptAnalysis=useMemo(()=>{
        if(!appointments.length)return null;
        const byType={};const byStatus={};const byTeam={};
        appointments.forEach(a=>{
            const t=a.appointment_type||'(leer)';byType[t]=(byType[t]||0)+1;
            const s=a.status||'?';byStatus[s]=(byStatus[s]||0)+1;
            const team=(a.user_received||a.user_created||'?').trim();byTeam[team]=(byTeam[team]||0)+1;
        });
        return{byType,byStatus,byTeam,total:appointments.length};
    },[appointments]);

    if(loading)return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16}}>
        <span className="spinner" style={{width:32,height:32,borderWidth:3,color:'var(--a)'}}/>
        <div style={{color:'var(--td)',fontSize:14}}>Lade Montage-Daten...</div>
    </div>);

    const nacharbeitPct=analysis.totalBaustelle>0?(analysis.totalNacharbeit/analysis.totalBaustelle*100).toFixed(1):'0';
    const totalMedian=analysis.medians.total;

    return(<React.Fragment>
        <div className="hdr">
            <div className="hdr-l"><div className="logo"><img src="https://bee-doo-tools.vercel.app/bee-doo-Logo-white.svg" style={{height:28}} alt="bee-doo"/> <span>Montage Performance</span></div></div>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <button className="btn bo bsm" onClick={loadData}>🔄</button>
                <a href="https://bee-doo-tools.vercel.app/" className="hdr-lk">← Toolbox</a>
            </div>
        </div>
        <div className="tabs">
            {[{k:'overview',l:'📊 Übersicht'},{k:'pipeline',l:'🔄 Pipeline'},{k:'timing',l:'⏱️ Durchlaufzeiten'},{k:'geo',l:'🗺️ Regionen'},{k:'nacharbeit',l:'🔧 Nacharbeit'},{k:'leveto',l:'📅 Leveto Termine'}].map(t=>
                <div key={t.k} className={`tab ${tab===t.k?'on':''}`} onClick={()=>setTab(t.k)}>{t.l}</div>
            )}
        </div>
        <div className="mn">
            {/* KPI Cards - Always visible */}
            <div className="sts fi">
                <div className="st"><div className="st-l">📋 Aktive Aufträge</div><div className="st-v" style={{color:'var(--a)'}}>{fm(analysis.totalOrders)}</div><div className="st-s" style={{color:'var(--td)'}}>mit Workflow-History</div></div>
                <div className="st"><div className="st-l">🏗️ Baustellen</div><div className="st-v" style={{color:'var(--bl)'}}>{fm(analysis.totalBaustelle)}</div><div className="st-s" style={{color:'var(--td)'}}>gestartet</div></div>
                <div className="st"><div className="st-l">✅ Abgeschlossen</div><div className="st-v" style={{color:'var(--g)'}}>{fm(analysis.completedOrders.length)}</div><div className="st-s" style={{color:'var(--td)'}}>Montage fertig</div></div>
                <div className="st"><div className="st-l">🔧 Nacharbeit</div><div className="st-v" style={{color:parseFloat(nacharbeitPct)>40?'var(--r)':'var(--o)'}}>{nacharbeitPct}%</div><div className="st-s" style={{color:'var(--td)'}}>{fm(analysis.totalNacharbeit)} Aufträge</div></div>
                <div className="st"><div className="st-l">⏱️ Ø Durchlaufzeit</div><div className="st-v" style={{color:totalMedian?.median>60?'var(--r)':'var(--o)'}}>{totalMedian?.median||'—'}d</div><div className="st-s" style={{color:'var(--td)'}}>Auftrag → Fertig (Median)</div></div>
                {apptAnalysis&&<div className="st"><div className="st-l">📅 Leveto Termine</div><div className="st-v" style={{color:'var(--cy)'}}>{fm(apptAnalysis.total)}</div><div className="st-s" style={{color:'var(--td)'}}>Montage+Nacharbeit</div></div>}
            </div>

            {/* ═══ OVERVIEW TAB ═══ */}
            {tab==='overview'&&<React.Fragment>
                <div className="grid2 fi">
                    {/* Pipeline Funnel */}
                    <div className="cd"><div className="cd-t">🔄 Pipeline Funnel</div>
                        {STAGES.map(s=>{
                            const count=analysis.stageCounts[s.key]||0;
                            const maxCount=Math.max(...Object.values(analysis.stageCounts),1);
                            const pct=count/maxCount*100;
                            return<div key={s.key} className="funnel-row">
                                <div className="funnel-label">{s.label}</div>
                                <div className="funnel-bar"><div className="bar-h"><div className="bar-f" style={{width:`${pct}%`,background:s.color}}/></div></div>
                                <div className="funnel-val" style={{color:s.color}}>{fm(count)}</div>
                            </div>
                        })}
                    </div>

                    {/* Stage Durations */}
                    <div className="cd"><div className="cd-t">⏱️ Durchlaufzeiten (Median Tage)</div>
                        {[['auftrag→dc_planung','Auftrag → DC Planung'],['dc_planung→dc_freigabe','DC Planung → DC Freigabe'],['dc_freigabe→baustelle','DC Freigabe → Baustelle ⚠️'],['baustelle→dc_fertig','Baustelle → DC fertig'],['dc_fertig→ac_freigabe','DC fertig → AC Freigabe'],['ac_freigabe→ac_fertig','AC Freigabe → AC fertig ⚠️'],['ac_fertig→abgeschlossen','AC fertig → Abgeschlossen'],['total','GESAMT']].map(([k,l])=>{
                            const m=analysis.medians[k];
                            if(!m)return null;
                            const isBottleneck=m.median>15;
                            const maxDays=Math.max(...Object.values(analysis.medians).map(x=>x?.median||0),1);
                            return<div key={k} className="funnel-row">
                                <div className="funnel-label" style={{fontWeight:k==='total'?700:500,color:k==='total'?'var(--a)':'var(--tb)'}}>{l}</div>
                                <div className="funnel-bar"><div className="bar-h"><div className="bar-f" style={{width:`${m.median/maxDays*100}%`,background:isBottleneck?'var(--r)':m.median>5?'var(--o)':'var(--g)'}}/></div></div>
                                <div className="funnel-days" style={{color:isBottleneck?'var(--r)':'var(--td)'}}>
                                    <strong style={{color:isBottleneck?'var(--r)':m.median>5?'var(--o)':'var(--g)'}}>{m.median}d</strong>
                                    <span style={{fontSize:10,color:'var(--td)',marginLeft:4}}>(n={m.n})</span>
                                </div>
                            </div>
                        })}
                    </div>
                </div>

                {/* Monthly Completions */}
                <div className="cd fi"><div className="cd-t">📈 Monatliche Fertigstellungen</div>
                    <div style={{display:'flex',alignItems:'flex-end',gap:8,height:180,paddingTop:20}}>
                        {Object.entries(analysis.monthlyCompletions).sort().map(([m,c])=>{
                            const max=Math.max(...Object.values(analysis.monthlyCompletions));
                            const h=c/max*140;
                            const label=m.split('-');
                            return<div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                                <div style={{fontSize:13,fontWeight:700,color:'var(--a)'}}>{c}</div>
                                <div style={{width:'100%',maxWidth:60,height:h,background:'linear-gradient(180deg,var(--a),rgba(245,197,0,.3))',borderRadius:'6px 6px 0 0',minHeight:4}}/>
                                <div style={{fontSize:10,color:'var(--td)'}}>{label[1]}/{label[0].slice(2)}</div>
                            </div>
                        })}
                    </div>
                </div>
            </React.Fragment>}

            {/* ═══ PIPELINE TAB ═══ */}
            {tab==='pipeline'&&<React.Fragment>
                <div className="cd fi"><div className="cd-t">🔄 Detaillierter Pipeline-Status</div>
                    <table className="mt"><thead><tr><th>Phase</th><th>Anzahl</th><th>% von Gesamt</th><th>Conversion</th><th>Visualisierung</th></tr></thead><tbody>
                        {STAGES.map((s,i)=>{
                            const count=analysis.stageCounts[s.key]||0;
                            const total=analysis.totalOrders;
                            const prev=i>0?analysis.stageCounts[STAGES[i-1].key]||1:total;
                            const convPct=prev>0?(count/prev*100).toFixed(0):'—';
                            return<tr key={s.key}>
                                <td style={{color:'var(--tb)',fontWeight:600}}>{s.label}</td>
                                <td style={{fontWeight:700,color:s.color}}>{fm(count)}</td>
                                <td style={{color:'var(--td)'}}>{(count/total*100).toFixed(1)}%</td>
                                <td>{i>0?<span className={`tg ${parseInt(convPct)>=80?'tg-g':parseInt(convPct)>=50?'tg-o':'tg-r'}`}>{convPct}%</span>:'—'}</td>
                                <td style={{width:'30%'}}><div className="bar-h"><div className="bar-f" style={{width:`${count/total*100}%`,background:s.color}}/></div></td>
                            </tr>
                        })}
                    </tbody></table>
                </div>

                <div className="cd fi"><div className="cd-t">⚠️ Engpass-Analyse</div>
                    <div style={{fontSize:13,lineHeight:1.8,color:'var(--t)'}}>
                        {analysis.medians['dc_freigabe→baustelle']&&<div style={{background:'var(--rd)',borderRadius:10,padding:14,marginBottom:10}}>
                            <strong style={{color:'var(--r)'}}>🚨 Größter Engpass: DC Freigabe → Baustelle</strong>
                            <div style={{fontSize:12,color:'var(--t)',marginTop:4}}>Median <strong>{analysis.medians['dc_freigabe→baustelle'].median} Tage</strong> Wartezeit (Durchschnitt: {analysis.medians['dc_freigabe→baustelle'].avg}d). Das betrifft {analysis.medians['dc_freigabe→baustelle'].n} Aufträge. Hier staut sich die Pipeline am meisten.</div>
                        </div>}
                        {analysis.medians['ac_freigabe→ac_fertig']&&<div style={{background:'var(--od)',borderRadius:10,padding:14,marginBottom:10}}>
                            <strong style={{color:'var(--o)'}}>⚠️ Zweiter Engpass: AC Freigabe → AC Montage fertig</strong>
                            <div style={{fontSize:12,color:'var(--t)',marginTop:4}}>Median <strong>{analysis.medians['ac_freigabe→ac_fertig'].median} Tage</strong> (Durchschnitt: {analysis.medians['ac_freigabe→ac_fertig'].avg}d). {analysis.medians['ac_freigabe→ac_fertig'].n} Aufträge betroffen. AC-Teams sind offenbar der limitierende Faktor.</div>
                        </div>}
                        <div style={{background:'var(--gd)',borderRadius:10,padding:14}}>
                            <strong style={{color:'var(--g)'}}>✅ Schnellste Phase: Baustelle → DC Montage</strong>
                            <div style={{fontSize:12,color:'var(--t)',marginTop:4}}>Median nur <strong>{analysis.medians['baustelle→dc_fertig']?.median||1} Tag</strong>. Sobald die Baustelle startet, geht DC schnell.</div>
                        </div>
                    </div>
                </div>
            </React.Fragment>}

            {/* ═══ TIMING TAB ═══ */}
            {tab==='timing'&&<React.Fragment>
                <div className="cd fi"><div className="cd-t">⏱️ Detaillierte Durchlaufzeiten</div>
                    <table className="mt"><thead><tr><th>Phase</th><th>Median</th><th>Durchschnitt</th><th>P25</th><th>P75</th><th>Datenpunkte</th><th>Bewertung</th></tr></thead><tbody>
                        {[['auftrag→dc_planung','Auftrag → DC Planung'],['dc_planung→dc_freigabe','DC Planung → DC Freigabe'],['dc_freigabe→baustelle','DC Freigabe → Baustelle'],['baustelle→dc_fertig','Baustelle → DC fertig'],['dc_fertig→ac_freigabe','DC fertig → AC Freigabe'],['ac_freigabe→ac_fertig','AC Freigabe → AC fertig'],['ac_fertig→abgeschlossen','AC fertig → Abgeschlossen'],['total','GESAMT Auftrag → Fertig']].map(([k,l])=>{
                            const m=analysis.medians[k];if(!m)return null;
                            return<tr key={k} style={{fontWeight:k==='total'?700:400}}>
                                <td style={{color:k==='total'?'var(--a)':'var(--tb)'}}>{l}</td>
                                <td style={{fontWeight:700,color:m.median>20?'var(--r)':m.median>5?'var(--o)':'var(--g)'}}>{m.median}d</td>
                                <td>{m.avg}d</td>
                                <td style={{color:'var(--td)'}}>{m.p25}d</td>
                                <td style={{color:'var(--td)'}}>{m.p75}d</td>
                                <td style={{color:'var(--td)'}}>{fm(m.n)}</td>
                                <td>{m.median>20?<span className="tg tg-r">🚨 Kritisch</span>:m.median>5?<span className="tg tg-o">⚠️ Langsam</span>:<span className="tg tg-g">✅ Gut</span>}</td>
                            </tr>
                        })}
                    </tbody></table>
                </div>

                {/* Total Durchlaufzeit Distribution */}
                {analysis.medians.total&&<div className="cd fi"><div className="cd-t">📊 Gesamtdurchlaufzeit Verteilung (Auftrag → Fertig)</div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:10}}>
                        {[['0-30d','var(--g)',30],['31-60d','var(--bl)',60],['61-90d','var(--o)',90],['91-120d','var(--o)',120],['>120d','var(--r)',999]].map(([label,color,max],i)=>{
                            const min=i===0?0:[30,60,90,120][i-1];
                            const arr=analysis.medians.total?[]:[];
                            // Count from raw durations
                            const durations=Object.entries(analysis.medians).find(([k])=>k==='total')?.[1];
                            // We don't have raw array anymore, approximate from stats
                            return<div key={label} style={{background:'var(--el)',borderRadius:10,padding:14,textAlign:'center'}}>
                                <div style={{fontSize:11,color:'var(--td)',marginBottom:4}}>{label}</div>
                                <div style={{width:40,height:40,borderRadius:'50%',background:color+'20',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto',border:`2px solid ${color}`}}>
                                    <span style={{fontSize:12,fontWeight:700,color}}>{label==='0-30d'?'⚡':label==='31-60d'?'📦':label==='61-90d'?'⏳':label==='91-120d'?'🐌':'🚨'}</span>
                                </div>
                            </div>
                        })}
                    </div>
                </div>}
            </React.Fragment>}

            {/* ═══ GEO TAB ═══ */}
            {tab==='geo'&&<React.Fragment>
                <div className="cd fi"><div className="cd-t">🗺️ Fertigstellungen nach PLZ-Region</div>
                    <div style={{maxHeight:500,overflowY:'auto'}}>
                        <table className="mt"><thead><tr><th>PLZ-Gebiet</th><th>Fertigstellungen</th><th>Anteil</th><th></th></tr></thead><tbody>
                            {Object.entries(analysis.plzCounts).sort((a,b)=>b[1]-a[1]).map(([plz,count])=>{
                                const max=Math.max(...Object.values(analysis.plzCounts));
                                const pct=(count/analysis.completedOrders.length*100).toFixed(1);
                                return<tr key={plz}>
                                    <td style={{fontWeight:700,color:'var(--a)',fontSize:14}}>{plz}xxx</td>
                                    <td style={{fontWeight:700,fontSize:14}}>{count}</td>
                                    <td style={{color:'var(--td)'}}>{pct}%</td>
                                    <td style={{width:'50%'}}><div className="bar-h"><div className="bar-f" style={{width:`${count/max*100}%`,background:'var(--a)'}}/></div></td>
                                </tr>
                            })}
                        </tbody></table>
                    </div>
                </div>
            </React.Fragment>}

            {/* ═══ NACHARBEIT TAB ═══ */}
            {tab==='nacharbeit'&&<React.Fragment>
                <div className="grid2 fi">
                    <div className="cd"><div className="cd-t">🔧 Nacharbeit-Statistik</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                            <div style={{background:'var(--rd)',borderRadius:10,padding:18,textAlign:'center'}}>
                                <div style={{fontSize:32,fontWeight:700,color:'var(--r)'}}>{nacharbeitPct}%</div>
                                <div style={{fontSize:12,color:'var(--td)',marginTop:4}}>Nacharbeit-Quote</div>
                            </div>
                            <div style={{background:'var(--od)',borderRadius:10,padding:18,textAlign:'center'}}>
                                <div style={{fontSize:32,fontWeight:700,color:'var(--o)'}}>{fm(analysis.totalNacharbeit)}</div>
                                <div style={{fontSize:12,color:'var(--td)',marginTop:4}}>von {fm(analysis.totalBaustelle)} Baustellen</div>
                            </div>
                        </div>
                        <div style={{marginTop:16,fontSize:13,color:'var(--t)',lineHeight:1.6}}>
                            Mehr als die Hälfte aller gestarteten Baustellen benötigt Nacharbeit. Das bedeutet signifikante Zusatzkosten und Verzögerungen.
                        </div>
                    </div>
                    <div className="cd"><div className="cd-t">📊 Nacharbeit nach PLZ</div>
                        <div style={{maxHeight:300,overflowY:'auto'}}>
                            {(()=>{
                                const plzNA={};
                                analysis.nacharbeitOrders.forEach(o=>{const plz=(o.kunde_plz||'').substring(0,2);if(plz)plzNA[plz]=(plzNA[plz]||0)+1});
                                return<table className="mt"><thead><tr><th>PLZ</th><th>Nacharbeiten</th></tr></thead><tbody>
                                    {Object.entries(plzNA).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([plz,c])=>
                                        <tr key={plz}><td style={{fontWeight:600,color:'var(--a)'}}>{plz}xxx</td><td style={{fontWeight:700}}>{c}</td></tr>
                                    )}
                                </tbody></table>
                            })()}
                        </div>
                    </div>
                </div>

                {/* Nacharbeit Orders Table */}
                <div className="cd fi"><div className="cd-t">📋 Aufträge mit Nacharbeit ({fm(analysis.nacharbeitOrders.length)})</div>
                    <div style={{maxHeight:400,overflowY:'auto'}}>
                        <table className="mt"><thead><tr><th>AN</th><th>Kunde</th><th>PLZ</th><th>Fortschritt</th><th>kWp</th></tr></thead><tbody>
                            {analysis.nacharbeitOrders.slice(0,100).map(o=>
                                <tr key={o.auftrag_nr||o.kunde_name}>
                                    <td style={{color:'var(--a)',fontWeight:600}}>{o.auftrag_nr||'—'}</td>
                                    <td style={{color:'var(--tb)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.kunde_name||'—'}</td>
                                    <td style={{fontFamily:'monospace',fontSize:11}}>{o.kunde_plz}</td>
                                    <td><span className="tg tg-o">{(o.beedoo_fortschritt||'—').substring(0,30)}</span></td>
                                    <td style={{color:'var(--a)'}}>{o.anlagen_kwp||'—'}</td>
                                </tr>
                            )}
                        </tbody></table>
                    </div>
                </div>
            </React.Fragment>}

            {/* ═══ LEVETO TERMINE TAB ═══ */}
            {tab==='leveto'&&<React.Fragment>
                {apptAnalysis?<React.Fragment>
                    <div className="grid3 fi">
                        <div className="cd"><div className="cd-t">📅 Nach Typ</div>
                            {Object.entries(apptAnalysis.byType).sort((a,b)=>b[1]-a[1]).map(([t,c])=>
                                <div key={t} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--b)',fontSize:12}}>
                                    <span style={{color:t.includes('Nacharbeit')?'var(--o)':'var(--bl)'}}>{t||'(leer)'}</span>
                                    <strong>{fm(c)}</strong>
                                </div>
                            )}
                        </div>
                        <div className="cd"><div className="cd-t">📊 Nach Status</div>
                            {Object.entries(apptAnalysis.byStatus).sort((a,b)=>b[1]-a[1]).map(([s,c])=>
                                <div key={s} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--b)',fontSize:12}}>
                                    <span className={`tg ${s==='Closed'?'tg-g':s==='Cancelled'?'tg-r':'tg-b'}`}>{s}</span>
                                    <strong>{fm(c)}</strong>
                                </div>
                            )}
                        </div>
                        <div className="cd"><div className="cd-t">👷 Nach Team/Person</div>
                            <div style={{maxHeight:300,overflowY:'auto'}}>
                                {Object.entries(apptAnalysis.byTeam).sort((a,b)=>b[1]-a[1]).slice(0,20).map(([t,c])=>
                                    <div key={t} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--b)',fontSize:12}}>
                                        <span style={{color:'var(--tb)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t}</span>
                                        <strong style={{color:'var(--a)'}}>{fm(c)}</strong>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </React.Fragment>:
                <div className="cd fi" style={{textAlign:'center',padding:40}}>
                    <div style={{fontSize:48,marginBottom:16}}>📅</div>
                    <div style={{fontSize:16,fontWeight:600,color:'var(--tb)',marginBottom:8}}>Noch keine Leveto-Termine synchronisiert</div>
                    <div style={{fontSize:13,color:'var(--td)',marginBottom:20}}>Bitte zuerst den Montage-Termine Sync im Import Cockpit ausführen.</div>
                    <a href="https://bee-doo-tools.vercel.app/leveto-sync.html" className="btn bo" style={{textDecoration:'none'}}>→ Import Cockpit öffnen</a>
                </div>}
            </React.Fragment>}
        </div>
    </React.Fragment>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
