<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>bee-doo · Changelog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'DM Sans', system-ui, sans-serif; 
    background: #0f1117; 
    color: #e2e8f0; 
    min-height: 100vh; 
    padding: 32px 24px 80px;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* Back link */
  .back { 
    display: inline-flex; align-items: center; gap: 6px;
    color: #64748b; font-size: 13px; font-weight: 500; 
    text-decoration: none; margin-bottom: 32px;
    transition: color .2s;
  }
  .back:hover { color: #F5C500; }
  .back svg { width: 16px; height: 16px; }

  /* Header */
  .header { margin-bottom: 40px; }
  .header-row { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; flex-wrap: wrap; }
  .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .header h1 span { color: #F5C500; }
  .pulse-dot {
    width: 10px; height: 10px; border-radius: 50%; background: #22c55e;
    box-shadow: 0 0 0 0 rgba(34,197,94,.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
    70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }
  .header-sub { color: #94a3b8; font-size: 14px; line-height: 1.5; }

  /* Filter Bar */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    background: #1a1d27; border: 1.5px solid #2a2d3a; border-radius: 8px;
    color: #94a3b8; font-size: 12px; font-weight: 600; padding: 7px 14px;
    cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .filter-btn:hover { border-color: #3a3d4a; color: #e2e8f0; }
  .filter-btn.active { border-color: #F5C500; color: #F5C500; background: rgba(245,197,0,.06); }

  .search-wrap {
    margin-left: auto; position: relative;
  }
  .search-wrap input {
    background: #1a1d27; border: 1.5px solid #2a2d3a; border-radius: 8px;
    color: #e2e8f0; font-size: 12px; padding: 7px 12px 7px 32px;
    font-family: inherit; outline: none; width: 180px; transition: all .2s;
  }
  .search-wrap input:focus { border-color: #F5C500; width: 220px; }
  .search-wrap input::placeholder { color: #4a5568; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: #4a5568;
  }

  /* Stats row */
  .stats {
    display: flex; gap: 24px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .stat {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #64748b;
  }
  .stat-num { font-weight: 800; font-size: 20px; color: #e2e8f0; }

  /* Timeline */
  .timeline { position: relative; }
  .timeline::before {
    content: ''; position: absolute; left: 15px; top: 24px; bottom: 0;
    width: 2px; background: linear-gradient(180deg, #F5C500 0%, #2a2d3a 30%, #2a2d3a 100%);
    border-radius: 2px;
  }

  /* Day group */
  .day-group { margin-bottom: 28px; }
  .day-label {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px; position: relative; z-index: 1;
  }
  .day-dot {
    width: 12px; height: 12px; border-radius: 50%; background: #1a1d27;
    border: 2.5px solid #F5C500; margin-left: 9px; flex-shrink: 0;
  }
  .day-text {
    font-size: 13px; font-weight: 700; color: #F5C500; 
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .day-count {
    font-size: 11px; color: #64748b; font-weight: 500;
  }

  /* Entry card */
  .entry {
    margin-left: 40px; background: #1a1d27; border: 1.5px solid #2a2d3a;
    border-radius: 12px; padding: 16px 20px; margin-bottom: 8px;
    transition: all .2s; cursor: default;
  }
  .entry:hover { border-color: #3a3d4a; }
  .entry-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }

  .typ-badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 5px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .typ-feat { background: rgba(34,197,94,.12); color: #4ade80; }
  .typ-fix { background: rgba(248,113,113,.12); color: #f87171; }
  .typ-refactor { background: rgba(99,102,241,.12); color: #818cf8; }
  .typ-style { background: rgba(245,197,0,.12); color: #F5C500; }
  .typ-docs { background: rgba(56,189,248,.12); color: #38bdf8; }
  .typ-other { background: rgba(148,163,184,.12); color: #94a3b8; }

  .app-tag {
    font-size: 11px; color: #64748b; font-weight: 500;
    background: #12141c; padding: 2px 8px; border-radius: 4px;
  }
  .entry-time {
    font-size: 11px; color: #4a5568; margin-left: auto; white-space: nowrap;
  }

  .entry-desc { font-size: 13.5px; color: #cbd5e1; line-height: 1.55; }
  .entry-details {
    margin-top: 8px; font-size: 12px; color: #64748b; line-height: 1.5;
    background: #12141c; padding: 10px 14px; border-radius: 8px;
    border-left: 3px solid #2a2d3a; display: none;
  }
  .entry.expanded .entry-details { display: block; }
  .entry.has-details { cursor: pointer; }
  .entry.has-details:hover { border-color: #F5C500; }

  .expand-hint {
    font-size: 11px; color: #4a5568; margin-top: 6px;
    display: none;
  }
  .entry.has-details .expand-hint { display: block; }
  .entry.has-details.expanded .expand-hint { display: none; }

  /* Loading */
  .loading {
    text-align: center; padding: 60px 0; color: #64748b; font-size: 14px;
  }
  .loading-spinner {
    width: 28px; height: 28px; border: 3px solid #2a2d3a;
    border-top-color: #F5C500; border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty {
    text-align: center; padding: 60px 0; color: #4a5568; font-size: 14px;
  }

  /* Footer */
  .footer {
    text-align: center; margin-top: 48px; padding-top: 24px;
    border-top: 1px solid #1e2130; color: #334155; font-size: 12px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 20px 16px 60px; }
    .header h1 { font-size: 22px; }
    .timeline::before { left: 11px; }
    .day-dot { margin-left: 5px; width: 10px; height: 10px; }
    .entry { margin-left: 28px; padding: 14px 16px; }
    .search-wrap input { width: 140px; }
    .search-wrap input:focus { width: 160px; }
    .stats { gap: 16px; }
    .filter-bar { gap: 6px; }
    .entry-time { display: none; }
  }
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Zurück zur Toolbox
  </a>

  <div class="header">
    <div class="header-row">
      <h1>Change<span>log</span></h1>
      <div class="pulse-dot"></div>
    </div>
    <div class="header-sub">Alle Änderungen an der bee-doo Plattform – automatisch dokumentiert.</div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="feat">✨ Features</button>
    <button class="filter-btn" data-filter="fix">🐛 Fixes</button>
    <button class="filter-btn" data-filter="refactor">♻️ Refactor</button>
    <button class="filter-btn" data-filter="style">🎨 Style</button>
    <button class="filter-btn" data-filter="docs">📄 Docs</button>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Suchen..." />
    </div>
  </div>

  <div id="timeline" class="timeline">
    <div class="loading">
      <div class="loading-spinner"></div>
      Lade Änderungen...
    </div>
  </div>

  <div class="footer">bee-doo GmbH · Plattform-Changelog</div>
</div>

<script>
const SUPABASE_URL = 'https://hqzpemfaljxcysyqssng.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';

let allEntries = [];
let activeFilter = 'all';

async function loadChangelog() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/dev_changelog?order=datum.desc&limit=500`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('Fetch failed');
    allEntries = await res.json();
    renderStats();
    renderTimeline();
  } catch (err) {
    document.getElementById('timeline').innerHTML = 
      '<div class="empty">Fehler beim Laden der Daten.</div>';
  }
}

function renderStats() {
  const total = allEntries.length;
  const feats = allEntries.filter(e => e.typ === 'feat').length;
  const fixes = allEntries.filter(e => e.typ === 'fix').length;
  const apps = [...new Set(allEntries.map(e => e.app).filter(Boolean))].length;
  
  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="stat-num">${total}</span> Änderungen</div>
    <div class="stat"><span class="stat-num">${feats}</span> Features</div>
    <div class="stat"><span class="stat-num">${fixes}</span> Fixes</div>
    <div class="stat"><span class="stat-num">${apps}</span> Apps</div>
  `;
}

function renderTimeline() {
  const container = document.getElementById('timeline');
  const search = document.getElementById('searchInput').value.toLowerCase();
  
  let filtered = allEntries;
  if (activeFilter !== 'all') {
    filtered = filtered.filter(e => e.typ === activeFilter);
  }
  if (search) {
    filtered = filtered.filter(e => 
      (e.beschreibung || '').toLowerCase().includes(search) ||
      (e.app || '').toLowerCase().includes(search) ||
      (e.details || '').toLowerCase().includes(search)
    );
  }

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">Keine Einträge gefunden.</div>';
    return;
  }

  // Group by day
  const days = {};
  filtered.forEach(e => {
    const day = new Date(e.datum).toLocaleDateString('de-DE', { 
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
    });
    if (!days[day]) days[day] = [];
    days[day].push(e);
  });

  let html = '';
  for (const [day, entries] of Object.entries(days)) {
    html += `
      <div class="day-group">
        <div class="day-label">
          <div class="day-dot"></div>
          <span class="day-text">${day}</span>
          <span class="day-count">${entries.length} ${entries.length === 1 ? 'Änderung' : 'Änderungen'}</span>
        </div>
    `;
    entries.forEach(e => {
      const time = new Date(e.datum).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      const typClass = `typ-${e.typ || 'other'}`;
      const typLabel = { feat: 'Feature', fix: 'Fix', refactor: 'Refactor', style: 'Style', docs: 'Docs', other: 'Sonstiges' }[e.typ] || 'Sonstiges';
      const hasDetails = e.details && e.details.trim();
      
      html += `
        <div class="entry ${hasDetails ? 'has-details' : ''}" ${hasDetails ? 'onclick="this.classList.toggle(\'expanded\')"' : ''}>
          <div class="entry-top">
            <span class="typ-badge ${typClass}">${typLabel}</span>
            ${e.app ? `<span class="app-tag">${e.app}</span>` : ''}
            <span class="entry-time">${time} Uhr</span>
          </div>
          <div class="entry-desc">${escapeHtml(e.beschreibung || '')}</div>
          ${hasDetails ? `
            <div class="expand-hint">▸ Details anzeigen</div>
            <div class="entry-details">${escapeHtml(e.details)}</div>
          ` : ''}
        </div>
      `;
    });
    html += '</div>';
  }
  container.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTimeline();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', () => {
  renderTimeline();
});

// Init
loadChangelog();
</script>
</body>
</html>
