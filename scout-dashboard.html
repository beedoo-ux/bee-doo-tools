<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bee-doo Scout Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#F5C500;--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;--border:#2a2a2a;--text:#f0f0f0;--text2:#a0a0a0;--text3:#666;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f97316}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.hdr{background:linear-gradient(135deg,#111 0%,#1a1500 100%);border-bottom:2px solid var(--gold);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hl{display:flex;align-items:center;gap:12px}
.logo{font-size:22px;font-weight:800;color:var(--gold)}
.htitle{font-size:13px;color:var(--text2)}
.hr{display:flex;align-items:center;gap:10px}
.livebadge{background:var(--green);color:#000;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.ldot{width:6px;height:6px;background:#000;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.lupd{font-size:11px;color:var(--text3)}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto}
.tab{padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);white-space:nowrap;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.cnt{padding:16px 20px;max-width:1400px;margin:0 auto}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:600px){.kgrid{grid-template-columns:repeat(3,1fr)}}@media(min-width:900px){.kgrid{grid-template-columns:repeat(5,1fr)}}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);opacity:.6}
.kcard.g::before{background:var(--green)}
.kcard.b::before{background:var(--blue)}
.kcard.o::before{background:var(--orange)}
.klbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kval{font-size:28px;font-weight:800;color:var(--text);line-height:1}
.ksub{font-size:11px;color:var(--text2);margin-top:4px}
.kico{position:absolute;top:12px;right:12px;font-size:20px;opacity:.2}
.sec{margin-bottom:20px}
.sech{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sect{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.sect span{color:var(--gold)}
.seca{font-size:12px;color:var(--gold);cursor:pointer;font-weight:600}
.rtbl{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.rtbl table{width:100%;border-collapse:collapse}
.rtbl th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border)}
.rtbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border)}
.rtbl tr:last-child td{border-bottom:none}
.rtbl tr:hover td{background:var(--bg3);cursor:pointer}
.rbadge{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;background:var(--bg4);color:var(--text2)}
.rbadge.gold{background:#f5c50020;color:var(--gold);border:1px solid var(--gold)}
.rbadge.silver{background:#c0c0c020;color:#c0c0c0;border:1px solid #c0c0c0}
.rbadge.bronze{background:#cd7f3220;color:#cd7f32;border:1px solid #cd7f32}
.sname{font-weight:600;color:var(--text)}
.smvpp{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.bwrap{display:flex;align-items:center;gap:8px}
.bbg{flex:1;background:var(--bg4);border-radius:4px;height:6px;min-width:50px}
.bfill{height:6px;border-radius:4px;background:var(--gold)}
.lcnt{font-weight:700;color:var(--gold);font-size:14px;min-width:28px;text-align:right}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:500px){.sgrid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.sgrid{grid-template-columns:repeat(6,1fr)}}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.scnt{font-size:24px;font-weight:800;color:var(--text)}
.sn{font-size:11px;color:var(--text2);margin-top:3px}
.llist{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.litem{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.litem:last-child{border-bottom:none}
.linfo{flex:1;min-width:0}
.lname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmeta{font-size:11px;color:var(--text2);margin-top:2px}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.pg{background:#22c55e20;color:var(--green)}
.po{background:#f9731620;color:var(--orange)}
.pr{background:#ef444420;color:var(--red)}
.pb{background:#3b82f620;color:var(--blue)}
.pgy{background:#66666620;color:var(--text3)}
.sbr{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text);width:100%;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px}
.sbr:focus{border-color:var(--gold)}
.sbr::placeholder{color:var(--text3)}
.fbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .2s}
.fb:hover,.fb.active{background:#f5c50015;color:var(--gold);border-color:var(--gold)}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.loading{text-align:center;padding:40px}
.spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:16px}
.mover.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:460px;max-height:85vh;overflow-y:auto}
.mhdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2)}
.mtitle{font-size:16px;font-weight:700}
.mclose{width:30px;height:30px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);border:none}
.mbody{padding:20px}
.mst{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.mst:last-child{border-bottom:none}
.msl{font-size:12px;color:var(--text2)}
.msv{font-size:13px;font-weight:600}
.tp{display:none}
.tp.active{display:block}
@media(max-width:480px){.cnt{padding:10px}.kval{font-size:22px}.rtbl th:nth-child(3),.rtbl td:nth-child(3){display:none}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hl"><div class="logo">&#x1F41D; bee-doo</div><div class="htitle">Scout Dashboard</div></div>
  <div class="hr"><div class="livebadge"><div class="ldot"></div>LIVE</div><div id="syncbadge" style="padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;display:none;align-items:center;gap:4px"></div><div class="lupd" id="lu">Laedt...</div></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="sw('overview',this)">&#x1F4CA; Uebersicht</button>
  <button class="tab" onclick="sw('ranking',this)">&#x1F3C6; Ranking</button>
  <button class="tab" onclick="sw('leads',this)">&#x1F4CB; Leads</button>
  <button class="tab" onclick="sw('qual',this)">&#x2705; Qualifikation</button>
</div>
<div class="cnt">
  <div class="kgrid">
    <div class="kcard"><div class="kico">&#x1F50D;</div><div class="klbl">Aktive Scouts</div><div class="kval" id="kS">-</div><div class="ksub">gesamt</div></div>
    <div class="kcard g"><div class="kico">&#x26A1;</div><div class="klbl">Leads Gesamt</div><div class="kval" id="kL">-</div><div class="ksub">kumuliert</div></div>
    <div class="kcard b"><div class="kico">&#x1F4C5;</div><div class="klbl">Leads heute</div><div class="kval" id="kT">-</div><div class="ksub" id="kD">-</div></div>
    <div class="kcard o"><div class="kico">&#x1F3AF;</div><div class="klbl">Terminiert Woche</div><div class="kval" id="kTm">-</div><div class="ksub">diese Woche</div></div>
    <div class="kcard" style="border-top:2px solid #a78bfa"><div class="kico">&#x1F4F2;</div><div class="klbl">Scans heute</div><div class="kval" id="kSc">-</div><div class="ksub">scouting app</div></div>
  </div>
  <div class="tp active" id="tp-overview">
    <div class="sec"><div class="sech"><div class="sect">&#x1F3C6; Top 5 Scouts <span>Gesamt</span></div></div><div id="top5"><div class="loading"><div class="spin"></div></div></div></div>
    <div class="sec"><div class="sech"><div class="sect">&#x1F4CA; Lead-Status <span>diese Woche</span></div></div><div class="sgrid" id="sg"><div class="loading"><div class="spin"></div></div></div></div>
    <div class="sec"><div class="sech"><div class="sect">&#x26A1; Neueste Leads</div><div class="seca" onclick="sw('leads',null)">Alle &#x2192;</div></div><div id="rl"><div class="loading"><div class="spin"></div></div></div></div>
  </div>
  <div class="tp" id="tp-ranking">
    <div class="sec">
      <input type="text" class="sbr" id="rs" placeholder="Scout suchen..." oninput="fRank(this.value)">
      <div class="fbar"><button class="fb active" onclick="setSort('leads',this)">Leads</button><button class="fb" onclick="setSort('name',this)">A-Z</button></div>
      <div class="rtbl"><table><thead><tr><th style="width:40px">#</th><th>Scout</th><th>MVPP</th><th>Leads</th></tr></thead><tbody id="rb"><tr><td colspan="4"><div class="loading"><div class="spin"></div></div></td></tr></tbody></table></div>
    </div>
  </div>
  <div class="tp" id="tp-leads">
    <div class="sec">
      <input type="text" class="sbr" placeholder="Name, Ort, Scout..." oninput="fLeads(this.value)">
      <div class="fbar" id="pb"><button class="fb active" onclick="setLP('heute',this)">Heute</button><button class="fb" onclick="setLP('woche',this)">Woche</button><button class="fb" onclick="setLP('monat',this)">Monat</button><button class="fb" onclick="setLP('alle',this)">Alle</button></div>
      <div id="ll"><div class="loading"><div class="spin"></div></div></div>
    </div>
  </div>
  <div class="tp" id="tp-qual">
    <div class="sec">
      <div class="sech"><div class="sect">&#x2705; Qualifikation per Scout</div></div>
      <div class="fbar" id="qb"><button class="fb active" onclick="setQP('woche',this)">Woche</button><button class="fb" onclick="setQP('monat',this)">Monat</button></div>
      <div id="qw"><div class="loading"><div class="spin"></div></div></div>
    </div>
  </div>
</div>
<div class="mover" id="mo" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="mhdr"><div class="mtitle" id="mt">Scout</div><button class="mclose" onclick="document.getElementById('mo').classList.remove('open')">x</button></div>
    <div class="mbody" id="mb"></div>
  </div>
</div>
<script>
var SB='https://hqzpemfaljxcysyqssng.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
var scouts=[],csort='leads',clp='heute',cqp='woche';
function api(p){return fetch(SB+'/rest/v1/'+p,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json()});}
function td(d){return d.toISOString().slice(0,10);}
var TODAY=td(new Date());
function WS(){var d=new Date();d.setDate(d.getDate()-d.getDay()+1);return td(d);}
function MS(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';}
function pf(p){return p==='heute'?TODAY:p==='woche'?WS():p==='monat'?MS():'2020-01-01';}
function pill(s){var x=(s||'').toLowerCase();if(x.indexOf('terminiert')>=0||x.indexOf('angebot')>=0)return'<span class="pill pg">'+(s||'-')+'</span>';if(x.indexOf('nicht erreicht')>=0)return'<span class="pill pgy">'+s+'</span>';if(x.indexOf('wvl')>=0)return'<span class="pill po">'+s+'</span>';if(x.indexOf('reklamation')>=0||x.indexOf('storno')>=0)return'<span class="pill pr">'+s+'</span>';if(x.indexOf('plz')>=0||x.indexOf('gebiet')>=0)return'<span class="pill pb">'+s+'</span>';return'<span class="pill pgy">'+(s||'-')+'</span>';}
function loadAll(){
  api('scouter?active=eq.true&select=id,vorname,nachname,mvpp_id,lead_count&order=lead_count.desc').then(function(d){
    scouts=d;
    document.getElementById('kS').textContent=scouts.length;
    document.getElementById('kL').textContent=scouts.reduce(function(a,s){return a+(s.lead_count||0);},0).toLocaleString('de');
    document.getElementById('kD').textContent=new Date().toLocaleDateString('de',{day:'2-digit',month:'2-digit'});
    renderTop5(scouts);renderRank(scouts);
  });
  Promise.all([
    api('leveto_leads?leveto_erstellt_am=gte.'+TODAY+'T00:00:00&select=id'),
    api('scout_leads?created_at=gte.'+TODAY+'T00:00:00&select=id').catch(function(){return [];})
  ]).then(function(res){
    var lev=Array.isArray(res[0])?res[0].length:0;
    var sc=Array.isArray(res[1])?res[1].length:0;
    document.getElementById('kT').textContent=lev;
    document.getElementById('kSc').textContent=sc;
    if(lev===0){
      var sb=document.getElementById('syncbadge');
      sb.style.display='flex';
      sb.style.background='#ef444420';
      sb.style.color='#ef4444';
      sb.style.border='1px solid #ef444440';
      sb.innerHTML='&#x26A0;&#xFE0F; Leveto nicht kein Sync heute';
    }
  });
  api('leveto_leads?leveto_erstellt_am=gte.'+WS()+'T00:00:00&status_name=ilike.*erminiert*&select=id').then(function(d){document.getElementById('kTm').textContent=Array.isArray(d)?d.length:0;});
  document.getElementById('lu').textContent=new Date().toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit'})+' Uhr';api('leveto_leads?select=sync_erstellt_am&sync_erstellt_am=not.is.null&order=sync_erstellt_am.desc&limit=1').then(function(d){if(d&&d[0]){var dt=new Date(d[0].sync_erstellt_am);var sb=document.getElementById('syncbadge');sb.style.display='flex';var isToday=dt.toDateString()===new Date().toDateString();if(isToday){sb.style.background='#22c55e20';sb.style.color='#22c55e';sb.style.border='1px solid #22c55e40';sb.innerHTML='&#x2705; Sync '+dt.toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit'});}else{sb.style.background='#ef444420';sb.style.color='#ef4444';sb.style.border='1px solid #ef444440';sb.innerHTML='&#x26A0;&#xFE0F; Sync '+dt.toLocaleDateString('de',{day:'2-digit',month:'2-digit'})+' '+dt.toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit'});}}});
  api('leveto_leads?leveto_erstellt_am=gte.'+WS()+'T00:00:00&select=id,vorname,nachname,ort,plz,berater_name,status_name,leveto_erstellt_am&order=leveto_erstellt_am.desc&limit=200').then(function(wl){
    renderSG(wl);renderRL(wl.slice(0,8));
  });
}
function renderTop5(list){
  var t5=list.slice(0,5),mx=Math.max.apply(null,t5.map(function(s){return s.lead_count||0;}).concat([1]));
  document.getElementById('top5').innerHTML='<div class="rtbl"><table><thead><tr><th style="width:40px">#</th><th>Scout</th><th>Leads</th></tr></thead><tbody>'+t5.map(function(s,i){var bc=i===0?'gold':i===1?'silver':i===2?'bronze':'';var pct=Math.round(((s.lead_count||0)/mx)*100);return'<tr onclick="openM(\''+s.id+'\')"><td><div class="rbadge '+bc+'">'+(i+1)+'</div></td><td><div class="sname">'+s.vorname+' '+s.nachname+'</div><div class="smvpp">'+(s.mvpp_id||'-')+'</div></td><td><div class="bwrap"><div class="bbg"><div class="bfill" style="width:'+pct+'%"></div></div><div class="lcnt">'+(s.lead_count||0)+'</div></div></td></tr>';}).join('')+'</tbody></table></div>';
}
function renderSG(leads){
  var c={};leads.forEach(function(l){var s=l.status_name||'-';c[s]=(c[s]||0)+1;});
  var s=Object.entries(c).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  document.getElementById('sg').innerHTML=s.length?s.map(function(e){return'<div class="scard"><div class="scnt">'+e[1]+'</div><div class="sn">'+e[0]+'</div></div>';}).join(''):'<div class="empty">Keine Leads diese Woche</div>';
}
function renderRL(leads){
  document.getElementById('rl').innerHTML=leads.length?'<div class="llist">'+leads.map(function(l){return'<div class="litem"><div class="linfo"><div class="lname">'+(l.vorname||'')+' '+(l.nachname||'')+'</div><div class="lmeta">'+(l.ort||'')+' - '+(l.berater_name||'-')+' - '+(l.leveto_erstellt_am||'').slice(0,10)+'</div></div>'+pill(l.status_name)+'</div>';}).join('')+'</div>':'<div class="empty">Keine Leads</div>';
}
function renderRank(list,f){
  var d=list.slice();
  if(f){var x=f.toLowerCase();d=d.filter(function(s){return(s.vorname+' '+s.nachname).toLowerCase().indexOf(x)>=0||(s.mvpp_id||'').indexOf(x)>=0;});}
  if(csort==='name')d.sort(function(a,b){return a.nachname.localeCompare(b.nachname);});
  var mx=Math.max.apply(null,d.map(function(s){return s.lead_count||0;}).concat([1]));
  document.getElementById('rb').innerHTML=d.length?d.map(function(s,i){var bc=i===0?'gold':i===1?'silver':i===2?'bronze':'';var pct=Math.round(((s.lead_count||0)/mx)*100);return'<tr onclick="openM(\''+s.id+'\')"><td><div class="rbadge '+bc+'">'+(i+1)+'</div></td><td><div class="sname">'+s.vorname+' '+s.nachname+'</div></td><td><span class="smvpp">'+(s.mvpp_id||'-')+'</span></td><td><div class="bwrap"><div class="bbg"><div class="bfill" style="width:'+pct+'%"></div></div><div class="lcnt">'+(s.lead_count||0)+'</div></div></td></tr>';}).join(''):'<tr><td colspan="4"><div class="empty">Kein Ergebnis</div></td></tr>';
}
function renderLeads(p){
  clp=p;document.getElementById('ll').innerHTML='<div class="loading"><div class="spin"></div></div>';
  var url='leveto_leads?select=id,vorname,nachname,ort,plz,berater_name,status_name,leveto_erstellt_am&order=leveto_erstellt_am.desc&limit=150';
  if(p!=='alle')url+='&leveto_erstellt_am=gte.'+pf(p)+'T00:00:00';
  api(url).then(function(leads){
    document.getElementById('ll').innerHTML=leads.length?'<div style="font-size:12px;color:var(--text3);margin-bottom:8px">'+leads.length+' Leads</div><div class="llist" id="lli">'+leads.map(function(l){return'<div class="litem"><div class="linfo"><div class="lname">'+(l.vorname||'')+' '+(l.nachname||'')+'</div><div class="lmeta">'+(l.ort||'')+' '+(l.plz||'')+' - '+(l.berater_name||'-')+' - '+(l.leveto_erstellt_am||'').slice(0,10)+'</div></div>'+pill(l.status_name)+'</div>';}).join('')+'</div>':'<div class="empty">Keine Leads</div>';
  });
}
function renderQual(p){
  cqp=p;document.getElementById('qw').innerHTML='<div class="loading"><div class="spin"></div></div>';
  api('leveto_leads?leveto_erstellt_am=gte.'+pf(p)+'T00:00:00&select=berater_name,status_name&limit=500').then(function(leads){
    var bs={};leads.forEach(function(l){var n=l.berater_name||'Kein Scout';if(!bs[n])bs[n]={total:0,termin:0,ne:0,wvl:0};bs[n].total++;var s=(l.status_name||'').toLowerCase();if(s.indexOf('terminiert')>=0||s.indexOf('angebot')>=0)bs[n].termin++;else if(s.indexOf('nicht erreicht')>=0)bs[n].ne++;else if(s.indexOf('wvl')>=0)bs[n].wvl++;});
    var sorted=Object.entries(bs).sort(function(a,b){return b[1].total-a[1].total;});
    if(!sorted.length){document.getElementById('qw').innerHTML='<div class="empty">Keine Daten</div>';return;}
    var mx=Math.max.apply(null,sorted.map(function(e){return e[1].total;}).concat([1]));
    document.getElementById('qw').innerHTML='<div class="rtbl"><table><thead><tr><th>Scout</th><th>Leads</th><th style="color:var(--green)">Termin</th><th style="color:var(--text3)">N.Err.</th><th style="color:var(--orange)">WVL</th><th>Quote</th></tr></thead><tbody>'+sorted.map(function(e){var name=e[0],d=e[1];var q=d.total>0?Math.round((d.termin/d.total)*100):0;var pct=Math.round((d.total/mx)*100);var qc=q>=20?'var(--green)':q>=10?'var(--orange)':'var(--red)';return'<tr><td><div class="sname">'+name+'</div></td><td><div class="bwrap"><div class="bbg"><div class="bfill" style="width:'+pct+'%"></div></div><span style="font-weight:700;color:var(--text)">'+d.total+'</span></div></td><td style="font-weight:700;color:var(--green)">'+d.termin+'</td><td style="color:var(--text2)">'+d.ne+'</td><td style="color:var(--orange)">'+d.wvl+'</td><td style="font-weight:800;color:'+qc+'">'+q+'%</td></tr>';}).join('')+'</tbody></table></div>';
  });
}
function openM(id){
  var s=scouts.filter(function(x){return x.id===id;})[0];if(!s)return;
  var name=s.vorname+' '+s.nachname;
  document.getElementById('mt').textContent=name;document.getElementById('mb').innerHTML='<div class="loading"><div class="spin"></div></div>';document.getElementById('mo').classList.add('open');
  api('leveto_leads?berater_name=eq.'+encodeURIComponent(name)+'&select=id,status_name,leveto_erstellt_am&order=leveto_erstellt_am.desc&limit=100').then(function(leads){
    var termin=leads.filter(function(l){return(l.status_name||'').toLowerCase().indexOf('terminiert')>=0;}).length;
    var heute=leads.filter(function(l){return(l.leveto_erstellt_am||'').slice(0,10)===TODAY;}).length;
    var woche=leads.filter(function(l){return(l.leveto_erstellt_am||'')>=WS()+'T00:00:00';}).length;
    var q=leads.length>0?Math.round((termin/leads.length)*100):0;
    var qc=q>=20?'var(--green)':q>=10?'var(--orange)':'var(--red)';
    var bs={};leads.forEach(function(l){var x=l.status_name||'-';bs[x]=(bs[x]||0)+1;});
    document.getElementById('mb').innerHTML='<div class="mst"><span class="msl">MVPP ID</span><span class="msv" style="font-family:DM Mono,monospace;color:var(--text2)">'+(s.mvpp_id||'-')+'</span></div><div class="mst"><span class="msl">Leads gesamt</span><span class="msv" style="color:var(--gold);font-size:18px">'+(s.lead_count||0)+'</span></div><div class="mst"><span class="msl">Leads heute</span><span class="msv" style="color:var(--green)">'+heute+'</span></div><div class="mst"><span class="msl">Diese Woche</span><span class="msv">'+woche+'</span></div><div class="mst"><span class="msl">Terminierungsquote</span><span class="msv" style="color:'+qc+';font-size:16px">'+q+'%</span></div><div style="margin-top:14px;font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Status-Verteilung</div>'+Object.entries(bs).sort(function(a,b){return b[1]-a[1];}).map(function(e){return'<div class="mst"><span class="msl">'+e[0]+'</span><span class="msv">'+e[1]+'</span></div>';}).join('');
  });
}
function sw(name,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tp').forEach(function(p){p.classList.remove('active');});
  if(btn)btn.classList.add('active');else{var el=document.querySelector('[onclick*="\''+name+'\'"]');if(el)el.classList.add('active');}
  var tp=document.getElementById('tp-'+name);if(tp)tp.classList.add('active');
  if(name==='leads')renderLeads(clp);if(name==='qual')renderQual(cqp);
}
function fRank(v){renderRank(scouts,v);}
function fLeads(v){var els=document.querySelectorAll('#lli .litem');els.forEach(function(el){el.style.display=el.textContent.toLowerCase().indexOf(v.toLowerCase())>=0?'':'none';});}
function setSort(by,btn){csort=by;document.querySelectorAll('.fbar .fb').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderRank(scouts,document.getElementById('rs').value);}
function setLP(p,btn){document.querySelectorAll('#pb .fb').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderLeads(p);}
function setQP(p,btn){document.querySelectorAll('#qb .fb').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderQual(p);}
loadAll();setInterval(loadAll,120000);
</script>
