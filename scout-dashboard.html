<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bee-doo Scout Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --gold: #F5C500;
    --gold-dim: #F5C50022;
    --gold-soft: #F5C50044;
    --bg: #0d0d0f;
    --bg2: #141417;
    --bg3: #1c1c21;
    --bg4: #242429;
    --border: #2a2a32;
    --text: #f0f0f2;
    --text2: #a0a0b0;
    --text3: #666680;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .animate-in { animation: fadeIn 0.35s ease both; }
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

const SB_URL = 'https://hqzpemfaljxcysyqssng.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';

async function sbFetch(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'count=exact' }
  });
  const data = await r.json();
  const count = r.headers.get('Content-Range')?.split('/')[1];
  return { data, count: parseInt(count) || (Array.isArray(data) ? data.length : 0) };
}

// Datum-Helfer
function getDateRange(filter) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if (filter === 'heute') {
    const t = fmt(now);
    return { gte: `${t}T00:00:00`, lte: `${t}T23:59:59` };
  }
  if (filter === 'woche') {
    const day = now.getDay() || 7;
    const mon = new Date(now); mon.setDate(now.getDate() - day + 1);
    return { gte: `${fmt(mon)}T00:00:00`, lte: `${fmt(now)}T23:59:59` };
  }
  if (filter === 'monat') {
    return { gte: `${now.getFullYear()}-${pad(now.getMonth()+1)}-01T00:00:00`, lte: `${fmt(now)}T23:59:59` };
  }
  return null; // gesamt
}

// Status-Farbe
function statusColor(name) {
  if (!name) return '#666680';
  const n = name.toLowerCase();
  if (n.includes('angenommen') || n.includes('abschluss') || n.includes('auftrag')) return '#22c55e';
  if (n.includes('nicht erreicht') || n.includes('kein interesse') || n.includes('ablehnung')) return '#ef4444';
  if (n.includes('termin') || n.includes('rückruf') || n.includes('interesse')) return '#3b82f6';
  if (n.includes('in bearbeitung') || n.includes('offen') || n.includes('neu')) return '#f97316';
  return '#a0a0b0';
}

function statusIcon(name) {
  if (!name) return '⚪';
  const n = name.toLowerCase();
  if (n.includes('angenommen') || n.includes('abschluss')) return '✅';
  if (n.includes('nicht erreicht')) return '📵';
  if (n.includes('kein interesse')) return '🚫';
  if (n.includes('termin')) return '📅';
  if (n.includes('rückruf')) return '📞';
  if (n.includes('in bearbeitung')) return '🔄';
  return '⚪';
}

// Initialen
function initials(v, n) {
  return `${(v||'')[0]||''}${(n||'')[0]||''}`.toUpperCase();
}

// Farbe für Initialen-Avatar
function avatarColor(name) {
  const colors = ['#F5C500','#3b82f6','#22c55e','#f97316','#8b5cf6','#ec4899','#14b8a6'];
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}

// ─── KPI Card ────────────────────────────────────────────────
function KPICard({ label, value, sub, icon, color, loading, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: 'var(--bg2)',
      border: `1px solid var(--border)`,
      borderRadius: 16,
      padding: '20px 22px',
      cursor: onClick ? 'pointer' : 'default',
      transition: 'border-color .2s, transform .15s',
      position: 'relative',
      overflow: 'hidden',
    }}
    onMouseEnter={e => { if(onClick) e.currentTarget.style.borderColor = '#F5C50066'; e.currentTarget.style.transform = 'translateY(-1px)'; }}
    onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.transform = 'translateY(0)'; }}
    >
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: color || 'var(--gold)', borderRadius: '16px 16px 0 0' }} />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div>
          <div style={{ fontSize: 13, color: 'var(--text2)', fontWeight: 500, marginBottom: 8, textTransform: 'uppercase', letterSpacing: '.05em' }}>{label}</div>
          {loading
            ? <div className="skeleton" style={{ height: 36, width: 80, marginBottom: 8 }} />
            : <div style={{ fontSize: 34, fontWeight: 800, color: 'var(--text)', lineHeight: 1 }}>{value}</div>
          }
          {sub && <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 6 }}>{sub}</div>}
        </div>
        <div style={{ fontSize: 28, opacity: .7 }}>{icon}</div>
      </div>
    </div>
  );
}

// ─── Scout Card ──────────────────────────────────────────────
function ScoutCard({ scout, rank, leads, onClick, selected }) {
  const total = leads.length;
  const maxLeads = scout._maxLeads || 1;
  const pct = Math.round((total / maxLeads) * 100);
  const color = avatarColor(scout.vorname + scout.nachname);

  return (
    <div onClick={onClick} style={{
      background: selected ? 'var(--bg3)' : 'var(--bg2)',
      border: `1px solid ${selected ? 'var(--gold)' : 'var(--border)'}`,
      borderRadius: 14,
      padding: '14px 16px',
      cursor: 'pointer',
      transition: 'all .2s',
      animation: `fadeIn .3s ease ${rank * 0.04}s both`,
    }}
    onMouseEnter={e => { if(!selected) e.currentTarget.style.borderColor = '#F5C50055'; }}
    onMouseLeave={e => { if(!selected) e.currentTarget.style.borderColor = 'var(--border)'; }}
    >
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        {/* Rang */}
        <div style={{ fontSize: 11, fontWeight: 700, color: rank <= 3 ? '#F5C500' : 'var(--text3)', width: 20, textAlign: 'center' }}>
          {rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : `#${rank}`}
        </div>
        {/* Avatar */}
        <div style={{
          width: 38, height: 38, borderRadius: '50%', flexShrink: 0,
          background: color + '33', border: `2px solid ${color}55`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 13, fontWeight: 700, color: color,
        }}>
          {initials(scout.vorname, scout.nachname)}
        </div>
        {/* Name + Bar */}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--text)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
            {scout.vorname} {scout.nachname}
          </div>
          <div style={{ marginTop: 6, height: 4, background: 'var(--bg4)', borderRadius: 4, overflow: 'hidden' }}>
            <div style={{ height: '100%', width: `${pct}%`, background: `linear-gradient(90deg, ${color}, ${color}99)`, borderRadius: 4, transition: 'width .6s ease' }} />
          </div>
        </div>
        {/* Zahl */}
        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: 'var(--text)' }}>{total}</div>
          <div style={{ fontSize: 11, color: 'var(--text3)' }}>Leads</div>
        </div>
      </div>
    </div>
  );
}

// ─── Lead Status Badge ───────────────────────────────────────
function StatusBadge({ name }) {
  const color = statusColor(name);
  return (
    <span style={{
      background: color + '22',
      border: `1px solid ${color}44`,
      color: color,
      padding: '2px 8px',
      borderRadius: 20,
      fontSize: 11,
      fontWeight: 600,
      whiteSpace: 'nowrap',
    }}>
      {statusIcon(name)} {name || 'Unbekannt'}
    </span>
  );
}

// ─── Scout Detail Panel ──────────────────────────────────────
function ScoutDetail({ scout, leads, onClose }) {
  const statusGroups = useMemo(() => {
    const g = {};
    leads.forEach(l => {
      const s = l.status_name || 'Unbekannt';
      g[s] = (g[s] || 0) + 1;
    });
    return Object.entries(g).sort((a,b) => b[1] - a[1]);
  }, [leads]);

  const color = avatarColor(scout.vorname + scout.nachname);
  const recent = [...leads].sort((a,b) => new Date(b.leveto_erstellt_am||0) - new Date(a.leveto_erstellt_am||0)).slice(0,20);

  return (
    <div style={{
      background: 'var(--bg2)',
      border: '1px solid var(--border)',
      borderRadius: 18,
      overflow: 'hidden',
      animation: 'fadeIn .25s ease',
    }}>
      {/* Header */}
      <div style={{ background: 'var(--bg3)', padding: '20px 24px', display: 'flex', alignItems: 'center', gap: 16, borderBottom: '1px solid var(--border)' }}>
        <div style={{
          width: 56, height: 56, borderRadius: '50%',
          background: color + '22', border: `2px solid ${color}`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 18, fontWeight: 800, color: color, flexShrink: 0,
        }}>
          {initials(scout.vorname, scout.nachname)}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 18, fontWeight: 800 }}>{scout.vorname} {scout.nachname}</div>
          <div style={{ fontSize: 13, color: 'var(--text2)', marginTop: 2 }}>
            {scout.mvpp_id} · {leads.length} Leads gesamt
          </div>
        </div>
        <button onClick={onClose} style={{ background: 'var(--bg4)', border: '1px solid var(--border)', color: 'var(--text2)', borderRadius: 8, padding: '6px 12px', cursor: 'pointer', fontSize: 13, fontWeight: 600 }}>✕ Schließen</button>
      </div>

      <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
        {/* Status-Verteilung */}
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>Status-Verteilung</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {statusGroups.map(([s, n]) => (
              <div key={s} style={{
                background: 'var(--bg3)', border: '1px solid var(--border)',
                borderRadius: 10, padding: '6px 12px',
                display: 'flex', alignItems: 'center', gap: 8,
              }}>
                <StatusBadge name={s} />
                <span style={{ fontWeight: 700, fontSize: 14 }}>{n}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Letzte Leads */}
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>Letzte {recent.length} Leads</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {recent.map(l => (
              <div key={l.id} style={{
                background: 'var(--bg3)', border: '1px solid var(--border)',
                borderRadius: 10, padding: '10px 14px',
                display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap',
              }}>
                <div style={{ flex: 1, minWidth: 140 }}>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{l.vorname} {l.nachname}</div>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>
                    {l.plz} {l.ort} · {l.leveto_erstellt_am ? new Date(l.leveto_erstellt_am).toLocaleDateString('de-DE') : '–'}
                  </div>
                </div>
                <StatusBadge name={l.status_name} />
                {l.berater_name && (
                  <span style={{ fontSize: 11, color: 'var(--text3)' }}>👤 {l.berater_name}</span>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Haupt-App ───────────────────────────────────────────────
function App() {
  const [scouts, setScouts] = useState([]);
  const [leads, setLeads] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('monat');
  const [selectedScout, setSelectedScout] = useState(null);
  const [search, setSearch] = useState('');
  const [sortBy, setSortBy] = useState('leads'); // leads | name
  const [statusFilter, setStatusFilter] = useState('alle');

  // Daten laden
  useEffect(() => {
    loadData();
  }, [filter]);

  async function loadData() {
    setLoading(true);
    try {
      // Scouter
      const { data: scouterData } = await sbFetch('scouter?active=eq.true&select=*&order=lead_count.desc&limit=100');
      
      // Leads mit Datumsfilter
      const range = getDateRange(filter);
      let leadsPath = 'leveto_leads?select=id,vorname,nachname,plz,ort,status_name,status_datum,leveto_erstellt_am,mvpp_id,mvpp_name,berater_name,quelle&order=leveto_erstellt_am.desc&limit=5000';
      if (range) {
        leadsPath += `&leveto_erstellt_am=gte.${range.gte}&leveto_erstellt_am=lte.${range.lte}`;
      }
      const { data: leadsData } = await sbFetch(leadsPath);

      setScouts(scouterData || []);
      setLeads(leadsData || []);
    } catch(e) {
      console.error(e);
    }
    setLoading(false);
  }

  // Leads pro Scout
  const leadsByScout = useMemo(() => {
    const map = {};
    (leads || []).forEach(l => {
      const key = l.mvpp_id || l.mvpp_name;
      if (key) {
        if (!map[key]) map[key] = [];
        map[key].push(l);
      }
    });
    return map;
  }, [leads]);

  // Scouts mit Lead-Daten anreichern
  const enrichedScouts = useMemo(() => {
    const withLeads = (scouts || []).map(s => ({
      ...s,
      _leads: leadsByScout[s.mvpp_id] || leadsByScout[s.mvpp_name] || [],
    }));
    const max = Math.max(...withLeads.map(s => s._leads.length), 1);
    return withLeads.map(s => ({ ...s, _maxLeads: max }));
  }, [scouts, leadsByScout]);

  // Status-Gruppen für Filter
  const allStatuses = useMemo(() => {
    const counts = {};
    (leads || []).forEach(l => {
      const s = l.status_name || 'Unbekannt';
      counts[s] = (counts[s] || 0) + 1;
    });
    return Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,8);
  }, [leads]);

  // Gefilterte + sortierte Scouts
  const filteredScouts = useMemo(() => {
    let arr = enrichedScouts;
    if (search) {
      const q = search.toLowerCase();
      arr = arr.filter(s => `${s.vorname} ${s.nachname}`.toLowerCase().includes(q));
    }
    if (statusFilter !== 'alle') {
      arr = arr.filter(s => s._leads.some(l => l.status_name === statusFilter));
      arr = arr.map(s => ({
        ...s,
        _leads: s._leads.filter(l => l.status_name === statusFilter),
      }));
    }
    if (sortBy === 'leads') arr = arr.sort((a,b) => b._leads.length - a._leads.length);
    else arr = arr.sort((a,b) => a.nachname.localeCompare(b.nachname));
    return arr;
  }, [enrichedScouts, search, statusFilter, sortBy]);

  // KPIs
  const totalLeads = leads.length;
  const activeScouts = enrichedScouts.filter(s => s._leads.length > 0).length;
  const topScout = filteredScouts[0];
  const avgPerScout = activeScouts > 0 ? (totalLeads / activeScouts).toFixed(1) : 0;

  const filterLabels = { heute: 'Heute', woche: 'Diese Woche', monat: 'Dieser Monat', gesamt: 'Gesamt' };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)' }}>
      {/* Header */}
      <div style={{
        background: 'var(--bg2)',
        borderBottom: '1px solid var(--border)',
        padding: '0 20px',
        position: 'sticky', top: 0, zIndex: 100,
      }}>
        <div style={{ maxWidth: 1400, margin: '0 auto', display: 'flex', alignItems: 'center', gap: 16, height: 60 }}>
          <a href="/" style={{ color: 'var(--text3)', textDecoration: 'none', fontSize: 13, fontWeight: 500, display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
            ← Toolbox
          </a>
          <div style={{ width: 1, height: 20, background: 'var(--border)' }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1 }}>
            <div style={{
              width: 28, height: 28, borderRadius: 8,
              background: 'var(--gold)', display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 14, flexShrink: 0,
            }}>🔍</div>
            <div>
              <div style={{ fontWeight: 800, fontSize: 16, lineHeight: 1.2 }}>Scout Dashboard</div>
              <div style={{ fontSize: 11, color: 'var(--text3)' }}>bee-doo GmbH</div>
            </div>
          </div>

          {/* Zeitfilter */}
          <div style={{ display: 'flex', gap: 4, background: 'var(--bg3)', borderRadius: 10, padding: 4, flexShrink: 0 }}>
            {Object.entries(filterLabels).map(([k, v]) => (
              <button key={k} onClick={() => setFilter(k)} style={{
                background: filter === k ? 'var(--gold)' : 'transparent',
                color: filter === k ? '#000' : 'var(--text2)',
                border: 'none', borderRadius: 7, padding: '5px 10px',
                fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: 'all .15s',
                whiteSpace: 'nowrap',
              }}>{v}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1400, margin: '0 auto', padding: '20px 16px' }}>
        {/* KPI Grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 14, marginBottom: 20 }}>
          <KPICard label="Leads gesamt" value={loading ? '…' : totalLeads.toLocaleString('de-DE')} sub={filterLabels[filter]} icon="📊" color="var(--gold)" loading={loading} />
          <KPICard label="Aktive Scouts" value={loading ? '…' : activeScouts} sub={`von ${scouts.length} gesamt`} icon="🔍" color="var(--blue)" loading={loading} />
          <KPICard label="Ø Leads/Scout" value={loading ? '…' : avgPerScout} sub="aktive Scouts" icon="📈" color="var(--green)" loading={loading} />
          <KPICard label="Top Scout" value={loading ? '…' : (topScout ? topScout._leads.length : 0)} sub={topScout ? `${topScout.vorname} ${topScout.nachname}` : '–'} icon="🏆" color="var(--orange)" loading={loading} />
        </div>

        {/* Status-Schnellfilter */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
          <button onClick={() => setStatusFilter('alle')} style={{
            background: statusFilter === 'alle' ? 'var(--gold)' : 'var(--bg3)',
            color: statusFilter === 'alle' ? '#000' : 'var(--text2)',
            border: '1px solid var(--border)', borderRadius: 20, padding: '5px 14px',
            fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: 'all .15s',
          }}>Alle</button>
          {allStatuses.map(([s, n]) => (
            <button key={s} onClick={() => setStatusFilter(s === statusFilter ? 'alle' : s)} style={{
              background: statusFilter === s ? statusColor(s) + '33' : 'var(--bg3)',
              color: statusFilter === s ? statusColor(s) : 'var(--text2)',
              border: `1px solid ${statusFilter === s ? statusColor(s) + '66' : 'var(--border)'}`,
              borderRadius: 20, padding: '5px 14px',
              fontSize: 12, fontWeight: 600, cursor: 'pointer', transition: 'all .15s',
            }}>{statusIcon(s)} {s} <span style={{ opacity: .6 }}>({n})</span></button>
          ))}
        </div>

        {/* Haupt-Layout */}
        <div style={{ display: 'grid', gridTemplateColumns: selectedScout ? '1fr 1fr' : '1fr', gap: 16 }}>
          {/* Scout-Liste */}
          <div>
            {/* Suche + Sort */}
            <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
              <div style={{ flex: 1, position: 'relative' }}>
                <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--text3)', fontSize: 14 }}>🔎</span>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Scout suchen…" style={{
                  width: '100%', padding: '9px 12px 9px 34px',
                  background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 10,
                  color: 'var(--text)', fontSize: 14, outline: 'none',
                  transition: 'border-color .2s',
                }}
                onFocus={e => e.target.style.borderColor = 'var(--gold)'}
                onBlur={e => e.target.style.borderColor = 'var(--border)'}
                />
              </div>
              <button onClick={() => setSortBy(sortBy === 'leads' ? 'name' : 'leads')} style={{
                background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 10,
                color: 'var(--text2)', padding: '9px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer',
              }}>
                {sortBy === 'leads' ? '🔢 Leads' : '🔤 Name'}
              </button>
            </div>

            {/* Scout-Count */}
            <div style={{ fontSize: 12, color: 'var(--text3)', marginBottom: 10, fontWeight: 600 }}>
              {loading ? '…' : `${filteredScouts.length} Scouts`}
              {statusFilter !== 'alle' && <span style={{ color: statusColor(statusFilter), marginLeft: 6 }}>· Filter: {statusFilter}</span>}
            </div>

            {/* Liste */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {loading
                ? Array.from({length: 8}).map((_,i) => (
                    <div key={i} className="skeleton" style={{ height: 72, borderRadius: 14 }} />
                  ))
                : filteredScouts.length === 0
                  ? <div style={{ textAlign: 'center', padding: '40px 20px', color: 'var(--text3)', background: 'var(--bg2)', borderRadius: 14, border: '1px solid var(--border)' }}>
                      Keine Scouts gefunden
                    </div>
                  : filteredScouts.map((s, i) => (
                      <ScoutCard
                        key={s.id}
                        scout={s}
                        rank={i+1}
                        leads={s._leads}
                        selected={selectedScout?.id === s.id}
                        onClick={() => setSelectedScout(selectedScout?.id === s.id ? null : s)}
                      />
                    ))
              }
            </div>
          </div>

          {/* Detail Panel */}
          {selectedScout && (
            <div style={{ position: 'sticky', top: 76, height: 'fit-content', maxHeight: 'calc(100vh - 96px)', overflowY: 'auto' }}>
              <ScoutDetail
                scout={selectedScout}
                leads={filteredScouts.find(s => s.id === selectedScout.id)?._leads || []}
                onClose={() => setSelectedScout(null)}
              />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
