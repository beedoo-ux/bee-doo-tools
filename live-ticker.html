<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bee-doo Live-Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a;--surface:#121212;--card:#1a1a1a;--card2:#1f1f1f;
  --gold:#F5C500;--gold-dim:rgba(245,197,0,.15);
  --green:#22c55e;--green-dim:rgba(34,197,94,.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,.12);
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.12);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,.12);
  --text:#f0f0f0;--text-dim:#777;--text-mid:#aaa;
  --border:#242424;--border2:#2e2e2e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:'DM Sans',sans-serif}

.app{max-width:1100px;margin:0 auto;padding:14px 16px 90px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;margin-bottom:16px}
.header-left{display:flex;align-items:center;gap:10px}
.live-dot{width:9px;height:9px;background:var(--red);border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0}
.header h1{font-size:18px;font-weight:800;letter-spacing:-.3px}
.header-right{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-dim)}
.clock{font-family:monospace;font-weight:700;font-size:14px;color:var(--gold)}
.sync-info{font-size:10px}
.icon-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}

/* KPI */
.kpi-sticky-wrap{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:8px 0;margin:0 -16px;padding-left:16px;padding-right:16px;border-bottom:1px solid var(--border);margin-bottom:16px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center}
.kpi .num{font-size:26px;font-weight:900;line-height:1.1}
.kpi .lbl{font-size:10px;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* STATIS BANNER */
.statis-banner{background:linear-gradient(135deg,rgba(245,197,0,.06),transparent);border:1px solid var(--gold-dim);border-left:3px solid var(--gold);border-radius:10px;padding:12px 16px;margin-bottom:16px}
.statis-banner-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.statis-grid{display:flex;flex-wrap:wrap;gap:8px}
.statis-card{background:rgba(245,197,0,.07);border:1px solid rgba(245,197,0,.2);border-radius:8px;padding:8px 12px;font-size:12px}
.statis-card .sc-name{font-weight:700;color:var(--text)}
.statis-card .sc-kunde{color:var(--text-mid);font-size:11px}
.statis-card .sc-wert{color:var(--gold);font-weight:700;font-size:13px;margin-top:2px}

/* AI CARD */
.ai-card{position:relative;background:linear-gradient(135deg,#16102a,var(--card));border:1px solid rgba(168,85,247,.3);border-radius:12px;padding:14px 16px;margin-bottom:16px;overflow:hidden}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--gold),var(--blue))}
.ai-card-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--purple),var(--blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ai-title{font-size:13px;font-weight:700}
.ai-sub{font-size:10px;color:var(--text-dim)}
.ai-refresh{margin-left:auto;background:transparent;border:1px solid rgba(168,85,247,.3);color:var(--purple);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:11px;transition:all .2s}
.ai-refresh:hover{background:var(--purple-dim)}
.ai-refresh:disabled{opacity:.4;cursor:default}
.ai-body{font-size:13px;line-height:1.65;color:#ccc;min-height:20px}
.ai-dots{display:inline-flex;gap:4px;align-items:center}
.ai-dots span{width:5px;height:5px;background:var(--purple);border-radius:50%;animation:bounce .9s infinite}
.ai-dots span:nth-child(2){animation-delay:.15s}
.ai-dots span:nth-child(3){animation-delay:.3s}
.cursor{display:inline-block;width:2px;height:13px;background:var(--purple);margin-left:2px;animation:blink 1s infinite;vertical-align:middle}

/* TIMELINE */
.tl-header{display:flex;align-items:center;gap:8px;padding:6px 0 10px;font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);margin-bottom:4px}
.tl-count{background:var(--card);border:1px solid var(--border);padding:1px 8px;border-radius:10px;font-size:11px;color:var(--text)}
.tl-group{margin-bottom:2px}
.tl-time-row{display:flex;align-items:center;gap:0;padding:8px 0 4px;position:sticky;top:0;z-index:10;background:var(--bg)}
.tl-time{font-family:monospace;font-size:12px;font-weight:700;color:var(--text-dim);width:46px;flex-shrink:0}
.tl-line{flex:1;height:1px;background:var(--border)}
.tl-now-label{font-size:10px;color:var(--green);font-weight:700;margin-left:8px;background:var(--green-dim);padding:1px 7px;border-radius:8px}
.tl-entries{display:flex;flex-direction:column;gap:5px;padding-left:46px;margin-bottom:4px}

/* TERMIN CARD */
.tc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;gap:12px;align-items:flex-start;transition:border-color .2s;position:relative;overflow:hidden}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px}
.tc.slive{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.04);animation:liveGlow 2.5s ease-in-out infinite}
.tc.slive::before{background:var(--green)}
.tc.sdone{opacity:.6}
.tc.sdone::before{background:#444}
.tc.sstorno{opacity:.4}
.tc.sstorno::before{background:var(--red)}
.tc.snext::before{background:#333}
.tc:hover{border-color:var(--border2)}
.tc.slive:hover{border-color:rgba(34,197,94,.5)}

.tc-left{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px}
.tc-av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.tc-zeit{font-size:10px;color:var(--text-dim);font-family:monospace;white-space:nowrap}

.tc-body{flex:1;min-width:0}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px}
.tc-berater{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-badges{display:flex;gap:4px;flex-wrap:nowrap;flex-shrink:0;align-items:center}
.tc-kunde{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.tc-ort{font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.tc-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;white-space:nowrap}
.b-live{background:var(--green-dim);color:var(--green)}
.b-next{background:var(--orange-dim);color:var(--orange)}
.b-done{background:var(--blue-dim);color:var(--blue)}
.b-storno{background:var(--red-dim);color:var(--red)}
.b-pv{background:rgba(59,130,246,.12);color:#60a5fa}
.b-scout-type{background:rgba(168,85,247,.12);color:#c084fc}
.b-folge{background:rgba(245,158,11,.12);color:#fbbf24}
.b-erst{background:rgba(34,197,94,.12);color:#4ade80}
.b-scout-info{background:rgba(168,85,247,.1);color:#c084fc}
.b-quelle{background:rgba(255,255,255,.06);color:var(--text-dim)}
.b-feedback{background:rgba(245,197,0,.12);color:var(--gold)}
.b-verkauft{background:rgba(34,197,94,.15);color:var(--green);font-weight:800}

.prog-bar{height:2px;background:var(--border);border-radius:1px;margin-top:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:1px;transition:width 10s linear}
.remaining{font-size:10px;margin-top:4px;font-weight:600}

/* CHAT FAB */
.fab{position:fixed;bottom:22px;right:22px;width:50px;height:50px;background:linear-gradient(135deg,var(--purple),var(--blue));border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(168,85,247,.4);transition:all .2s;z-index:900}
.fab:hover{transform:scale(1.08)}

/* CHAT */
.chat-wrap{position:fixed;inset:0;z-index:950}
.chat-bg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.chat-panel{position:absolute;bottom:80px;right:22px;width:370px;max-width:calc(100vw - 32px);max-height:calc(100vh - 110px);background:#111;border:1px solid rgba(168,85,247,.3);border-radius:16px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.7);overflow:hidden;animation:slideIn .2s ease}
.chat-hd{background:linear-gradient(135deg,#1a1030,#141414);border-bottom:1px solid rgba(168,85,247,.2);padding:13px 15px;display:flex;align-items:center;gap:10px}
.chat-hd-info{flex:1}
.chat-hd-title{font-size:14px;font-weight:700}
.chat-hd-sub{font-size:10px;color:var(--text-dim);margin-top:1px}
.chat-close{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:17px;padding:3px 6px;border-radius:4px;transition:color .2s}
.chat-close:hover{color:var(--text)}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border)}
.msg{display:flex;gap:7px;animation:slideIn .2s ease}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:88%}
.msg.ai{max-width:88%}
.msg-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.msg.ai .msg-av{background:linear-gradient(135deg,var(--purple),var(--blue))}
.msg.user .msg-av{background:var(--card);border:1px solid var(--border);color:var(--text-dim)}
.msg-bub{padding:8px 11px;border-radius:10px;font-size:12.5px;line-height:1.55}
.msg.ai .msg-bub{background:var(--card);border:1px solid var(--border);color:#ccc}
.msg.user .msg-bub{background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);color:var(--text)}
.chat-sugg{padding:8px 12px 4px;display:flex;flex-wrap:wrap;gap:5px}
.sugg-btn{background:var(--card);border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;border-radius:16px;font-size:11px;cursor:pointer;transition:all .2s}
.sugg-btn:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-dim)}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:7px}
.chat-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 11px;font-size:12.5px;font-family:inherit;outline:none;resize:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--purple)}
.chat-input::placeholder{color:var(--text-dim)}
.chat-send{background:linear-gradient(135deg,var(--purple),var(--blue));border:none;color:#fff;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:opacity .2s;flex-shrink:0}
.chat-send:disabled{opacity:.35;cursor:default}

/* MISC */
.empty{text-align:center;padding:50px 20px;color:var(--text-dim)}
.loading{text-align:center;padding:60px}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.footer{text-align:center;padding:16px 0;font-size:11px;color:var(--text-dim);border-top:1px solid var(--border);margin-top:20px}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
@keyframes liveGlow{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 20px 6px rgba(34,197,94,.2)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:700px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .kpi:last-child{display:none}
  .tc-left{display:none}
  .tl-entries{padding-left:0}
  .chat-panel{right:16px;width:calc(100vw - 32px)}
}
@media(max-width:480px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .kpi:nth-child(3){display:none}
  .header h1{font-size:15px}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const SUPA_URL  = 'https://hqzpemfaljxcysyqssng.supabase.co/rest/v1';
const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';
const CLAUDE_KEY = 'sk-ant-api03-0rQ8e-EKdhaYXkdASCBWZ80am00tYZegKHyuhwJ-l'+'Buc2Qm_VAGnK1iQY8DisddpjPnII5QYzCUqNXnsrMvABw-OV65pwAA';
const CLAUDE_MODEL = 'claude-sonnet-4-6';

const ALLOWED_TYPES = [
  'Termin vor Ort PV',
  'Folgetermin vor Ort',
  'Termin vor Ort ( SCOUT )',
  'Vor Ort Termin',
  'Ersttermin'
];

async function supaGet(path) {
  const r = await fetch(`${SUPA_URL}/${path}`, {
    headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
  });
  if (!r.ok) throw new Error(`DB ${r.status}`);
  return r.json();
}

const COLOR_CACHE = {};
function beraterColor(name) {
  if (!name) return '#666';
  if (COLOR_CACHE[name]) return COLOR_CACHE[name];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  const hue = (Math.abs(h) % 300 + 30); // avoid pure red
  COLOR_CACHE[name] = `hsl(${hue},65%,62%)`;
  return COLOR_CACHE[name];
}
function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(' ');
  return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
}

function typeBadge(t) {
  if (t === 'Termin vor Ort PV')         return { cls:'b-pv',        lbl:'PV' };
  if (t === 'Folgetermin vor Ort')        return { cls:'b-folge',     lbl:'Folge' };
  if (t === 'Termin vor Ort ( SCOUT )')   return { cls:'b-scout-type',lbl:'Scout' };
  if (t === 'Vor Ort Termin')             return { cls:'b-pv',        lbl:'Vor Ort' };
  if (t === 'Ersttermin')                 return { cls:'b-erst',      lbl:'Erst' };
  return { cls:'b-quelle', lbl: t||'?' };
}

async function claudeStream(sys, messages, onChunk, onDone, onError) {
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-api-key': CLAUDE_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({ model:CLAUDE_MODEL, max_tokens:500, stream:true, system:sys, messages })
    });
    if (!r.ok) throw new Error(`Claude ${r.status}`);
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6).trim();
        if (d==='[DONE]') continue;
        try { const p=JSON.parse(d); if(p.type==='content_block_delta'&&p.delta?.text) onChunk(p.delta.text); }
        catch(e){}
      }
    }
    onDone();
  } catch(e) { onError(e.message); }
}

function buildCtx(termine, statis, now) {
  const f = d => d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  const live = termine.filter(t=>t.slive);
  const next = termine.filter(t=>t.snext);
  const done = termine.filter(t=>t.sdone);
  const storno = termine.filter(t=>t.sstorno);
  return `bee-doo Solar Vertrieb NRW – ${now.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})} ${f(now)} Uhr

LIVE (${live.length}): ${live.map(t=>`${t.berater} bei ${t.kunde} (${t.ort})`).join('; ')||'–'}
AUSSTEHEND (${next.length}): ${next.slice(0,10).map(t=>`${t.startZeit} ${t.berater}→${t.kunde}`).join('; ')||'–'}
ERLEDIGT (${done.length}): ${done.slice(0,8).map(t=>`${t.berater}–${t.kunde}${t.feedback?'→'+t.feedback:''}`).join('; ')||'–'}
STORNO (${storno.length}): ${storno.map(t=>`${t.berater}`).join(', ')||'–'}
STATIS HEUTE (${statis.length}): ${statis.map(s=>`${s.berater} → ${s.kunde} (${s.feedback})`).join('; ')||'–'}
Berater: ${[...new Set(termine.map(t=>t.berater))].join(', ')}`;
}

/* ── AI ANALYSE ── */
function AiAnalyse({ termine, statis, now }) {
  const [txt, setTxt] = useState('');
  const [busy, setBusy] = useState(false);
  const [fin, setFin] = useState(false);

  const run = useCallback(() => {
    if (!termine.length) return;
    setTxt(''); setFin(false); setBusy(true);
    claudeStream(
      'Du bist Vertriebsassistent bei bee-doo Solar NRW. Schreibe eine kurze, direkte Tagesanalyse (3-4 Sätze). Was läuft gut, wer hat viel zu tun, gibt es Auffälligkeiten? Kein Titel, einfach losfließen. Deutsch.',
      [{ role:'user', content: buildCtx(termine, statis, now) }],
      c => { setTxt(p=>p+c); setBusy(false); },
      () => setFin(true),
      e => { setTxt(`⚠️ ${e}`); setBusy(false); setFin(true); }
    );
  }, [termine, statis, now]);

  useEffect(() => { if (termine.length>0) run(); }, [termine.length]);
  if (!termine.length) return null;

  return (
    <div className="ai-card">
      <div className="ai-card-hd">
        <div className="ai-icon">✨</div>
        <div><div className="ai-title">KI-Tagesanalyse</div><div className="ai-sub">Claude · auto-generiert</div></div>
        <button className="ai-refresh" onClick={run} disabled={busy&&!txt}>{busy&&!txt?'...':'↺ Neu'}</button>
      </div>
      <div className="ai-body">
        {busy&&!txt ? <><div className="ai-dots"><span/><span/><span/></div>&nbsp;Analysiere...</> : <>{txt}{!fin&&txt&&<span className="cursor"/>}</>}
      </div>
    </div>
  );
}

/* ── TERMIN CARD ── */
function TerminCard({ t, nowMin, scrollTarget }) {
  const bc = beraterColor(t.berater);
  const tb = typeBadge(t.typ);
  const pct = t.slive ? Math.min(100,Math.max(0,((nowMin-t.startMin)/(t.endMin-t.startMin))*100)) : 0;
  const restMin = t.slive ? t.endMin-nowMin : 0;
  const inMin   = t.snext ? t.startMin-nowMin : 0;
  const diffStr = m => m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m`;
  const scoutShow = t.scout && t.scout!==t.berater;
  const quelleShow = t.quelle && !['Eigenlead','Empfehlung','Sonstige'].includes(t.quelle);
  const fbLow = (t.feedback||'').toLowerCase();
  const isVerkauft = fbLow.includes('abschluss')||fbLow.includes('verkauft')||fbLow.includes('kauf')||fbLow.includes('unterschrieben');
  const cls = t.slive?'slive':t.sdone?'sdone':t.sstorno?'sstorno':'snext';

  return (
    <div className={`tc ${cls}${scrollTarget?' scroll-target':''}`}>
      <div className="tc-left">
        <div className="tc-av" style={{background:`${bc}20`,color:bc,border:`1.5px solid ${bc}45`}}>{initials(t.berater)}</div>
        <div className="tc-zeit">{t.startZeit}</div>
      </div>
      <div className="tc-body">
        <div className="tc-top">
          <div className="tc-berater" style={{color:bc}}>{t.berater}</div>
          <div className="tc-badges">
            {t.slive && <span className="badge b-live"><span style={{width:6,height:6,background:'var(--green)',borderRadius:'50%',display:'inline-block',animation:'pulse 1.5s infinite'}}/> Live</span>}
            {t.snext && inMin<=120 && <span className="badge b-next">in {diffStr(inMin)}</span>}
            {t.sdone && <span className="badge b-done">✓</span>}
            {t.sstorno && <span className="badge b-storno">Storno</span>}
            <span className={`badge ${tb.cls}`}>{tb.lbl}</span>
          </div>
        </div>
        <div className="tc-kunde">{t.kunde||'–'}</div>
        <div className="tc-ort">{[t.ort,t.plz].filter(Boolean).join(' · ')||'–'}</div>
        <div className="tc-meta">
          {scoutShow && <span className="badge b-scout-info">👤 {t.scout}</span>}
          {quelleShow && <span className="badge b-quelle">{t.quelle}</span>}
          {t.feedback && <span className={`badge ${isVerkauft?'b-verkauft':'b-feedback'}`}>{isVerkauft?'🏆 ':''}{t.feedback}</span>}
        </div>
        {t.slive && (
          <>
            <div className="prog-bar"><div className="prog-fill" style={{width:`${pct}%`,background:`linear-gradient(90deg,${bc},${bc}88)`}}/></div>
            <div className="remaining" style={{color:bc}}>noch {diffStr(restMin)} · {Math.round(pct)}%</div>
          </>
        )}
      </div>
    </div>
  );
}

/* ── CHAT ── */
const SUGGS = ['Wie läuft der Tag?','Wer hat die meisten Termine?','Gibt es schon Feedback?','Wann sind die nächsten Termine?'];

function Chat({ termine, statis, now, onClose }) {
  const [msgs, setMsgs] = useState([{role:'ai',text:`Hi! Ich kenne alle ${termine.length} heutigen Vertriebstermine. Was willst du wissen?`}]);
  const [input, setInput] = useState('');
  const [busy, setBusy] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs]);

  const sys = useMemo(() => `Du bist Vertriebsassistent bei bee-doo Solar NRW.\n\n${buildCtx(termine,statis,now)}\n\nAntworte kurz auf Deutsch (2-4 Sätze).`, [termine,statis,now]);

  const send = useCallback((txt) => {
    const t=(txt||input).trim();
    if(!t||busy) return;
    setInput('');
    const next=[...msgs,{role:'user',text:t}];
    setMsgs(next);
    setBusy(true);
    const idx=next.length;
    setMsgs(p=>[...p,{role:'ai',text:'',streaming:true}]);
    claudeStream(sys,next.map(m=>({role:m.role==='ai'?'assistant':'user',content:m.text})),
      c=>setMsgs(p=>p.map((m,i)=>i===idx?{...m,text:m.text+c}:m)),
      ()=>{setMsgs(p=>p.map((m,i)=>i===idx?{...m,streaming:false}:m));setBusy(false);},
      e=>{setMsgs(p=>p.map((m,i)=>i===idx?{...m,text:`⚠️ ${e}`,streaming:false}:m));setBusy(false);}
    );
  },[input,msgs,busy,sys]);

  return (
    <div className="chat-wrap">
      <div className="chat-bg" onClick={onClose}/>
      <div className="chat-panel">
        <div className="chat-hd">
          <div className="ai-icon">✨</div>
          <div className="chat-hd-info"><div className="chat-hd-title">KI-Assistent</div><div className="chat-hd-sub">{termine.length} Termine · {statis.length} Statis</div></div>
          <button className="chat-close" onClick={onClose}>✕</button>
        </div>
        <div className="chat-msgs">
          {msgs.map((m,i)=>(
            <div key={i} className={`msg ${m.role}`}>
              <div className="msg-av">{m.role==='ai'?'✨':'👤'}</div>
              <div className="msg-bub">
                {m.text||(m.streaming?<div className="ai-dots"><span/><span/><span/></div>:'')}
                {m.streaming&&m.text&&<span className="cursor"/>}
              </div>
            </div>
          ))}
          <div ref={endRef}/>
        </div>
        {msgs.length<=1&&<div className="chat-sugg">{SUGGS.map((s,i)=><button key={i} className="sugg-btn" onClick={()=>send(s)}>{s}</button>)}</div>}
        <div className="chat-input-row">
          <textarea className="chat-input" placeholder="Frag mich..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}} rows={1}/>
          <button className="chat-send" disabled={!input.trim()||busy} onClick={()=>send()}>➤</button>
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [raw, setRaw]         = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  const [now, setNow]         = useState(new Date());
  const [lastSync, setLastSync] = useState(null);
  const [chatOpen, setChatOpen] = useState(false);
  const liveRef = useRef(null);

  const today = useMemo(() => new Date().toISOString().slice(0,10), []);

  const load = useCallback(async () => {
    try {
      setError(null);
      const typeParam = ALLOWED_TYPES.map(t=>`appointment_type.eq.${encodeURIComponent(t)}`).join(',');
      const data = await supaGet(
        `leveto_appointments?start_date=gte.${today}T00:00:00&start_date=lt.${today}T23:59:59&or=(${typeParam})&select=*&limit=300&order=start_date.asc`
      );
      setRaw(data);
      setLastSync(new Date());
      setLoading(false);
    } catch(e) { setError(e.message); setLoading(false); }
  }, [today]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => { const iv=setInterval(load,90000); return ()=>clearInterval(iv); }, [load]);
  useEffect(() => { const iv=setInterval(()=>setNow(new Date()),20000); return ()=>clearInterval(iv); }, []);

  // Auto-scroll to first live (or next) card after data loads
  useEffect(() => {
    if (!termine.length) return;
    const timer = setTimeout(() => {
      const el = document.querySelector('.scroll-target');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 700);
    return () => clearTimeout(timer);
  }, [termine.length]);

  const nowMin = now.getHours()*60+now.getMinutes();

  // Map raw to display objects with live/next/done computed from current clock
  const termine = useMemo(() => raw.map(r => {
    const start = new Date(r.start_date);
    const end   = new Date(r.end_date||r.start_date);
    const sm = start.getHours()*60+start.getMinutes();
    const em = end.getHours()*60+end.getMinutes();
    const st = (r.status||'').toLowerCase();
    const sstorno = st==='cancelled'||st==='storniert'||st==='abgesagt';
    return {
      id:       r.id,
      berater:  r.user_received||'Unbekannt',
      scout:    r.user_created||'',
      kunde:    `${r.kunde_vorname||''} ${r.kunde_nachname||''}`.trim()||'–',
      plz:      r.kunde_plz||'',
      ort:      r.kunde_stadt||'',
      typ:      r.appointment_type||'',
      status:   r.status||'',
      feedback: r.feedback_status||'',
      quelle:   r.quelle||'',
      startZeit:start.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),
      endZeit:  end.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),
      startMin: sm, endMin: em,
      slive:  !sstorno && nowMin>=sm && nowMin<em,
      sdone:  !sstorno && nowMin>=em,
      snext:  !sstorno && nowMin<sm,
      sstorno,
    };
  }), [raw, nowMin]);

  // Statis direkt aus Terminen: feedback_status enthält 'Abschluss'
  const statisToday = useMemo(() => termine
    .filter(t => {
      const fb = (t.feedback||'').toLowerCase();
      return fb.includes('abschluss') || fb.includes('unterschrieben') || fb.includes('verkauft');
    })
    .map(t => ({
      berater: t.berater,
      kunde:   t.kunde,
      ort:     t.ort,
      zeit:    t.startZeit,
      feedback:t.feedback,
    })), [termine]);

  // Group by start time
  const groups = useMemo(() => {
    const map = {};
    for (const t of termine) {
      if (!map[t.startZeit]) map[t.startZeit]={ zeit:t.startZeit, min:t.startMin, items:[] };
      map[t.startZeit].items.push(t);
    }
    return Object.values(map).sort((a,b)=>a.min-b.min);
  }, [termine]);

  const liveCnt   = termine.filter(t=>t.slive).length;
  const nextCnt   = termine.filter(t=>t.snext).length;
  const doneCnt   = termine.filter(t=>t.sdone).length;
  const stornoCnt = termine.filter(t=>t.sstorno).length;
  const berCnt    = new Set(termine.map(t=>t.berater)).size;

  if (loading) return <div className="app"><div className="loading"><div className="spinner"/><div style={{color:'var(--text-dim)'}}>Lade Daten...</div></div></div>;
  if (error)   return <div className="app"><div className="empty"><div style={{fontSize:40,marginBottom:12}}>⚠️</div><div style={{color:'var(--red)',marginBottom:12}}>{error}</div><button className="icon-btn" onClick={load}>Erneut</button></div></div>;

  return (
    <div className="app">

      {/* HEADER */}
      <div className="header">
        <div className="header-left">
          <div className="live-dot"/>
          <h1>bee-doo Live-Ticker</h1>
        </div>
        <div className="header-right">
          <span>{now.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})}</span>
          <span className="clock">{now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span>
          {lastSync&&<span className="sync-info">Sync {lastSync.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span>}
          <button className="icon-btn" onClick={load}>⟳</button>
        </div>
      </div>

      {/* KPIs – sticky */}
      <div className="kpi-sticky-wrap"><div className="kpi-row">
        <div className="kpi"><div className="num" style={{color:'var(--green)'}}>{liveCnt}</div><div className="lbl">Live</div></div>
        <div className="kpi"><div className="num" style={{color:'var(--orange)'}}>{nextCnt}</div><div className="lbl">Ausstehend</div></div>
        <div className="kpi"><div className="num" style={{color:'var(--blue)'}}>{doneCnt}</div><div className="lbl">Erledigt</div></div>
        <div className="kpi"><div className="num" style={{color:'var(--gold)'}}>{statisToday.length}</div><div className="lbl">Statis heute</div></div>
        <div className="kpi"><div className="num" style={{color:'var(--text-mid)'}}>{berCnt}</div><div className="lbl">Berater</div></div>
      </div></div>

      {/* STATIS BANNER */}
      {statisToday.length>0&&(
        <div className="statis-banner">
          <div className="statis-banner-head">🏆 Statis heute ({statisToday.length})</div>
          <div className="statis-grid">
            {statisToday.map((s,i)=>(
              <div key={i} className="statis-card">
                <div className="sc-name">{s.berater}</div>
                <div className="sc-kunde">{s.kunde}{s.ort?' · '+s.ort:''}</div>
                <div className="sc-wert">✅ {s.feedback} · {s.zeit} Uhr</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* KI ANALYSE */}
      <AiAnalyse termine={termine} statis={statisToday} now={now}/>

      {/* TIMELINE */}
      {termine.length===0 ? (
        <div className="empty"><div style={{fontSize:44,marginBottom:12}}>📅</div><div>Keine Vertriebstermine heute</div></div>
      ) : (
        <>
          <div className="tl-header">
            🗓 Timeline — Nur Vertrieb
            <span className="tl-count">{termine.length} Termine</span>
            {stornoCnt>0&&<span className="tl-count" style={{color:'var(--red-dim)',borderColor:'var(--red-dim)'}}>{stornoCnt} Storno</span>}
          </div>

          {groups.map(g => {
            const nowSlot = g.min<=nowMin && nowMin<g.min+60;
            return (
              <div key={g.zeit} className="tl-group">
                <div className="tl-time-row">
                  <div className="tl-time">{g.zeit}</div>
                  <div className="tl-line"/>
                  {nowSlot&&<span className="tl-now-label">● Jetzt</span>}
                </div>
                <div className="tl-entries">
                  {g.items.map((t,ti,arr)=>{
                    // Mark as scroll target: first live card, or if no live exists, first next card
                    const hasAnyLive = termine.some(x=>x.slive);
                    const isTarget = hasAnyLive ? t.slive && !arr.slice(0,ti).some(x=>x.slive)
                                                : t.snext && !arr.slice(0,ti).some(x=>x.snext);
                    return <TerminCard key={t.id} t={t} nowMin={nowMin} scrollTarget={isTarget}/>;
                  })}
                </div>
              </div>
            );
          })}
        </>
      )}

      <div className="footer">
        Quelle: leveto_appointments · nur Vertrieb · Auto-Refresh 90s · Claude AI
      </div>

      <button className="fab" onClick={()=>setChatOpen(true)}>✨</button>
      {chatOpen&&<Chat termine={termine} statis={statisToday} now={now} onClose={()=>setChatOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
