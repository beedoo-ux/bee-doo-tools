<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bee-doo Live-Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --surface: #141414; --card: #1a1a1a; --card-hover: #222;
  --gold: #F5C500; --gold-dim: #F5C50025; --green: #22c55e; --green-dim: #22c55e18;
  --red: #ef4444; --red-dim: #ef444418; --orange: #f59e0b; --orange-dim: #f59e0b18;
  --blue: #3b82f6; --blue-dim: #3b82f618; --purple: #a855f7;
  --text: #f0f0f0; --text-dim: #777; --border: #2a2a2a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.app { max-width:1200px; margin:0 auto; padding:12px; }

.header { display:flex; align-items:center; justify-content:space-between; padding:12px 0; margin-bottom:12px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px; }
.header h1 { font-size:20px; font-weight:800; display:flex; align-items:center; gap:8px; }
.header h1 .dot { width:10px; height:10px; background:var(--red); border-radius:50%; animation:pulse 1.5s infinite; }
.header-right { display:flex; align-items:center; gap:12px; font-size:12px; color:var(--text-dim); }
.refresh-btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-family:inherit; }
.refresh-btn:hover { background:var(--card-hover); border-color:var(--gold); }

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.section { margin-bottom:16px; animation:slideIn .3s ease; }
.section-head { display:flex; align-items:center; gap:8px; padding:8px 0; font-size:13px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; }
.section-head .count { background:var(--card); padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; color:var(--text); }

.grid { display:grid; gap:8px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }

.card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; position:relative; overflow:hidden; transition:all .2s; }
.card:hover { border-color:var(--gold); background:var(--card-hover); }
.card.live { border-left:3px solid; animation:slideIn .4s ease; }
.card .top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.card .berater { font-size:12px; font-weight:700; }
.card .zeit { font-size:11px; color:var(--text-dim); font-family:monospace; }
.card .kunde { font-size:13px; font-weight:600; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card .adresse { font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card .meta { display:flex; gap:6px; align-items:center; margin-top:6px; flex-wrap:wrap; }

.badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:6px; font-size:10px; font-weight:600; }
.badge-live { background:#22c55e22; color:#22c55e; }
.badge-next { background:#f59e0b22; color:#f59e0b; }
.badge-done { background:#3b82f622; color:#3b82f6; }
.badge-fail { background:#ef444422; color:#ef4444; }
.badge-gold { background:var(--gold-dim); color:var(--gold); }

.progress-bar { height:3px; background:var(--border); border-radius:2px; margin-top:8px; overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; transition:width 1s linear; }

.kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
.kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; text-align:center; }
.kpi .num { font-size:28px; font-weight:800; line-height:1; }
.kpi .label { font-size:10px; color:var(--text-dim); margin-top:2px; text-transform:uppercase; letter-spacing:.5px; }

.empty { text-align:center; padding:40px; color:var(--text-dim); font-size:14px; }
.loading { text-align:center; padding:60px; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }

@media(max-width:768px) {
  .kpi-row { grid-template-columns:repeat(2,1fr); }
  .grid-2,.grid-3 { grid-template-columns:1fr; }
  .header h1 { font-size:16px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const SUPABASE_URL = 'https://hqzpemfaljxcysyqssng.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxenBlbWZhbGp4Y3lzeXFzc25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMzUzOTcsImV4cCI6MjA4NjkxMTM5N30.LSlMApceWuLk5MUctCGCVspXfYhc_As559aaoV2uSik';

const BERATER_FARBEN = {};
function beraterColor(name) {
  if (!name) return '#888';
  if (BERATER_FARBEN[name]) return BERATER_FARBEN[name];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  const color = `hsl(${Math.abs(h) % 360}, 60%, 55%)`;
  BERATER_FARBEN[name] = color;
  return color;
}

async function supaGet(path) {
  const resp = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
  });
  if (!resp.ok) throw new Error(`Supabase ${resp.status}`);
  return resp.json();
}

function App() {
  const [termine, setTermine] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [now, setNow] = useState(new Date());
  const [lastSync, setLastSync] = useState(null);

  const today = useMemo(() => {
    const d = new Date();
    return d.toISOString().slice(0, 10);
  }, []);

  const loadTermine = useCallback(async () => {
    try {
      setError(null);
      
      // Load from termine table (Kalender-Termine)
      const kalTermine = await supaGet(
        `termine?datum=eq.${today}&select=*&order=zeit_minuten.asc`
      );

      // Load from auftraege with termin_datum today
      const auftrTermine = await supaGet(
        `auftraege?termin_datum=eq.${today}&select=kunde_name,kundenberater_name,termin_datum,status,kunde_plz,kunde_ort,kunde_strasse,kunde_hausnr,auftrag_nr&order=erstellt_am.asc`
      );

      // Merge both sources
      const merged = [];

      // Kalender-Termine
      for (const t of kalTermine) {
        const startMin = parseInt(t.zeit_minuten) || 0;
        const dauer = parseInt(t.dauer_minuten) || 120;
        merged.push({
          id: t.id || t.termin_nr,
          berater: t.vertrieb_id || 'Unbekannt',
          kunde: t.kunde || '',
          adresse: [t.adresse, t.plz, t.ort].filter(Boolean).join(', '),
          startMin,
          endMin: startMin + dauer,
          status: t.status || '',
          quelle: 'kalender',
          nr: t.termin_nr
        });
      }

      // Aufträge-Termine (ohne Duplikate)
      const existingKunden = new Set(kalTermine.map(t => (t.kunde || '').toLowerCase()));
      for (const a of auftrTermine) {
        if (existingKunden.has((a.kunde_name || '').toLowerCase())) continue;
        merged.push({
          id: a.auftrag_nr,
          berater: a.kundenberater_name || 'Unbekannt',
          kunde: a.kunde_name || '',
          adresse: [a.kunde_strasse, a.kunde_hausnr, a.kunde_plz, a.kunde_ort].filter(Boolean).join(' '),
          startMin: 540, // Default 9:00
          endMin: 660, // Default 11:00
          status: a.status || '',
          quelle: 'auftrag',
          nr: a.auftrag_nr
        });
      }

      setTermine(merged);
      setLastSync(new Date());
      setLoading(false);
    } catch (err) {
      setError(err.message);
      setLoading(false);
    }
  }, [today]);

  // Initial load + auto-refresh every 60s
  useEffect(() => { loadTermine(); }, [loadTermine]);
  useEffect(() => {
    const iv = setInterval(loadTermine, 60000);
    return () => clearInterval(iv);
  }, [loadTermine]);

  // Clock tick every 30s
  useEffect(() => {
    const iv = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(iv);
  }, []);

  const nowMin = now.getHours() * 60 + now.getMinutes();

  const { live, next, done, ausgefallen } = useMemo(() => {
    const l = [], n = [], d = [], a = [];
    for (const t of termine) {
      const st = (t.status || '').toLowerCase();
      if (st === 'ausgefallen' || st === 'abgesagt' || st === 'storniert') {
        a.push(t);
      } else if (nowMin >= t.startMin && nowMin < t.endMin) {
        l.push(t);
      } else if (nowMin < t.startMin) {
        n.push(t);
      } else {
        d.push(t);
      }
    }
    n.sort((a, b) => a.startMin - b.startMin);
    d.sort((a, b) => b.endMin - a.endMin);
    return { live: l, next: n, done: d, ausgefallen: a };
  }, [termine, nowMin]);

  const fmtMin = (m) => `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
  const diffStr = (min) => min >= 60 ? `${Math.floor(min/60)}h ${min%60}min` : `${min} min`;

  const TerminCard = ({ t, mode }) => {
    const bc = beraterColor(t.berater);
    const pct = mode === 'live' ? Math.min(100, Math.max(0, ((nowMin - t.startMin) / (t.endMin - t.startMin)) * 100)) : 0;
    const remaining = mode === 'live' ? t.endMin - nowMin : 0;
    const startsIn = mode === 'next' ? t.startMin - nowMin : 0;

    return (
      <div className={`card ${mode === 'live' ? 'live' : ''}`} style={mode === 'live' ? { borderLeftColor: bc } : {}}>
        <div className="top">
          <div>
            <div className="berater" style={{ color: bc }}>{t.berater}</div>
            <div className="zeit">{fmtMin(t.startMin)} – {fmtMin(t.endMin)}</div>
          </div>
          <div>
            {mode === 'live' && <span className="badge badge-live"><span className="dot" style={{ width:6, height:6, background:'var(--green)', borderRadius:'50%', display:'inline-block', animation:'pulse 1.5s infinite' }}></span> Live</span>}
            {mode === 'next' && <span className="badge badge-next">in {diffStr(startsIn)}</span>}
            {mode === 'done' && <span className="badge badge-done">✓ fertig</span>}
          </div>
        </div>
        <div className="kunde">{t.kunde || '–'}</div>
        <div className="adresse">{t.adresse || '–'}</div>
        <div className="meta">
          {t.quelle === 'auftrag' && <span className="badge badge-gold">Auftrag</span>}
          {t.status && !['termin','geplant','offen'].includes(t.status.toLowerCase()) && (
            <span className="badge" style={{ background: 'var(--border)', color: 'var(--text-dim)' }}>{t.status}</span>
          )}
          {t.nr && <span style={{ fontSize: 10, color: 'var(--text-dim)' }}>#{t.nr}</span>}
        </div>
        {mode === 'live' && (
          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${pct}%`, background: `linear-gradient(90deg, ${bc}, ${bc}88)` }}></div>
          </div>
        )}
        {mode === 'live' && (
          <div style={{ fontSize: 10, color: bc, marginTop: 4, fontWeight: 600 }}>
            noch {diffStr(remaining)}  ·  {Math.round(pct)}%
          </div>
        )}
      </div>
    );
  };

  if (loading) return (
    <div className="app">
      <div className="loading">
        <div className="spinner"></div>
        <div style={{ color: 'var(--text-dim)' }}>Lade Termine...</div>
      </div>
    </div>
  );

  if (error) return (
    <div className="app">
      <div className="empty">
        <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
        <div style={{ color: 'var(--red)', marginBottom: 12 }}>Fehler: {error}</div>
        <button className="refresh-btn" onClick={loadTermine}>Erneut versuchen</button>
      </div>
    </div>
  );

  const totalActive = live.length + next.length + done.length;
  const beraterSet = new Set(termine.map(t => t.berater));

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <h1><span className="dot"></span> bee-doo Live-Ticker</h1>
        <div className="header-right">
          <span>{now.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' })}</span>
          <span style={{ fontFamily: 'monospace', fontWeight: 700, color: 'var(--gold)' }}>
            {now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}
          </span>
          {lastSync && <span style={{ fontSize: 10 }}>Sync {lastSync.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' })}</span>}
          <button className="refresh-btn" onClick={loadTermine}>⟳</button>
        </div>
      </div>

      {/* KPIs */}
      <div className="kpi-row">
        <div className="kpi">
          <div className="num" style={{ color: 'var(--green)' }}>{live.length}</div>
          <div className="label">Jetzt Live</div>
        </div>
        <div className="kpi">
          <div className="num" style={{ color: 'var(--orange)' }}>{next.length}</div>
          <div className="label">Ausstehend</div>
        </div>
        <div className="kpi">
          <div className="num" style={{ color: 'var(--blue)' }}>{done.length}</div>
          <div className="label">Abgeschlossen</div>
        </div>
        <div className="kpi">
          <div className="num" style={{ color: 'var(--text-dim)' }}>{beraterSet.size}</div>
          <div className="label">Berater aktiv</div>
        </div>
      </div>

      {/* No data */}
      {totalActive === 0 && ausgefallen.length === 0 && (
        <div className="empty">
          <div style={{ fontSize: 48, marginBottom: 12 }}>📅</div>
          <div>Keine Termine für heute gefunden</div>
          <div style={{ fontSize: 12, marginTop: 8 }}>Termine werden aus Supabase (termine + auftraege) geladen</div>
        </div>
      )}

      {/* LIVE */}
      {live.length > 0 && (
        <div className="section">
          <div className="section-head">
            🟢 Jetzt im Termin <span className="count">{live.length}</span>
          </div>
          <div className="grid grid-2">
            {live.map(t => <TerminCard key={t.id} t={t} mode="live" />)}
          </div>
        </div>
      )}

      {/* NEXT */}
      {next.length > 0 && (
        <div className="section">
          <div className="section-head">
            ⏳ Als nächstes <span className="count">{next.length}</span>
          </div>
          <div className="grid grid-3">
            {next.slice(0, 12).map(t => <TerminCard key={t.id} t={t} mode="next" />)}
          </div>
          {next.length > 12 && <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--text-dim)', marginTop: 8 }}>+ {next.length - 12} weitere Termine</div>}
        </div>
      )}

      {/* DONE */}
      {done.length > 0 && (
        <div className="section">
          <div className="section-head">
            ✅ Abgeschlossen <span className="count">{done.length}</span>
          </div>
          <div className="grid grid-3">
            {done.slice(0, 9).map(t => <TerminCard key={t.id} t={t} mode="done" />)}
          </div>
          {done.length > 9 && <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--text-dim)', marginTop: 8 }}>+ {done.length - 9} weitere beendet</div>}
        </div>
      )}

      {/* AUSGEFALLEN */}
      {ausgefallen.length > 0 && (
        <div className="section">
          <div className="section-head">
            ❌ Ausgefallen <span className="count">{ausgefallen.length}</span>
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {ausgefallen.map(t => (
              <div key={t.id} className="badge badge-fail" style={{ padding: '4px 10px' }}>
                <span style={{ fontWeight: 700 }}>{t.berater}</span>
                <span style={{ opacity: .7, marginLeft: 4 }}>{fmtMin(t.startMin)} · {t.kunde}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{ textAlign: 'center', padding: '20px 0', fontSize: 11, color: 'var(--text-dim)' }}>
        Auto-Refresh alle 60s · Daten: Supabase termine + auftraege · {termine.length} Termine geladen
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
